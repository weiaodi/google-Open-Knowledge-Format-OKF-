<script>
const elements = [
  {
    "data": {
      "id": "builtin/array",
      "label": "Array Methods",
      "type": "JS Builtin",
      "description": "Array 的核心方法：map/filter/reduce/find/forEach 等函数式操作方法详解。",
      "bodyHtml": "<br/>\n<h2 class=\"md-h2\">概述</h2>\n<br/>\n<p>Array（数组）是 JavaScript 中最核心的数据结构之一。ES5 起 JavaScript 为 <code class=\"inline-code\">Array.prototype</code> 添加了一套强大的<strong>函数式操作方法</strong>（<code class=\"inline-code\">map</code>、<code class=\"inline-code\">filter</code>、<code class=\"inline-code\">reduce</code>、<code class=\"inline-code\">forEach</code>、<code class=\"inline-code\">find</code> 等），使得开发者可以用声明式的风格处理数据，而不再依赖传统 <code class=\"inline-code\">for</code> 循环。这些方法不可变（不修改原数组）或按约定返回新数组，代码更简洁、更少出错、更易维护。ES6 及后续版本又补充了 <code class=\"inline-code\">flat</code>、<code class=\"inline-code\">flatMap</code>、<code class=\"inline-code\">from</code> 等实用方法。</p>\n<br/>\n<h2 class=\"md-h2\">Syntax</h2>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 常见迭代方法的通用签名\narr.map(callbackFn(element, index, array) { /* ... */ }, thisArg?)\narr.filter(callbackFn(element, index, array) { /* ... */ }, thisArg?)\narr.reduce(callbackFn(accumulator, currentValue, index, array) { /* ... */ }, initialValue?)\narr.forEach(callbackFn(element, index, array) { /* ... */ }, thisArg?)\narr.find(callbackFn(element, index, array) { /* ... */ }, thisArg?)\narr.findIndex(callbackFn(element, index, array) { /* ... */ }, thisArg?)\narr.some(callbackFn(element, index, array) { /* ... */ }, thisArg?)\narr.every(callbackFn(element, index, array) { /* ... */ }, thisArg?)\n\n// ES6+ 方法\narr.flat(depth = 1)\narr.flatMap(callbackFn(element, index, array) { /* ... */ })\nArray.from(arrayLike, mapFn?)\nArray.isArray(value)</code></pre>\n<br/>\n<p>&gt; <strong>注意</strong>：<code class=\"inline-code\">callbackFn</code> 接收三个参数：当前元素、索引（可选）、原数组引用（可选）。<code class=\"inline-code\">thisArg</code> 用于指定回调内部的 <code class=\"inline-code\">this</code> 值。</p>\n<br/>\n<h2 class=\"md-h2\">Examples</h2>\n<br/>\n<h3 class=\"md-h3\">1. <code class=\"inline-code\">map</code>——一对一映射转换</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const nums = [1, 2, 3, 4];\n\n// 基本用法：每个元素平方\nconst squares = nums.map(n =&gt; n * n);\nconsole.log(squares); // [1, 4, 9, 16]\n\n// 提取对象数组中的特定字段\nconst users = [\n  { id: 1, name: 'Alice' },\n  { id: 2, name: 'Bob' },\n];\nconst names = users.map(user =&gt; user.name);\nconsole.log(names); // ['Alice', 'Bob']\n\n// map 不修改原数组\nconsole.log(nums); // [1, 2, 3, 4] — 原数组不变</code></pre>\n<br/>\n<h3 class=\"md-h3\">2. <code class=\"inline-code\">filter</code> + <code class=\"inline-code\">reduce</code>——筛选与聚合</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const transactions = [120, -45, 300, -20, 500, -100];\n\n// filter: 筛选出所有收入（正数）\nconst incomes = transactions.filter(t =&gt; t &gt; 0);\nconsole.log(incomes); // [120, 300, 500]\n\n// reduce: 计算总余额\nconst balance = transactions.reduce((acc, cur) =&gt; acc + cur, 0);\nconsole.log(balance); // 755\n\n// reduce 实现分组\nconst fruits = ['apple', 'banana', 'apple', 'orange', 'banana', 'apple'];\nconst grouped = fruits.reduce((acc, fruit) =&gt; {\n  acc[fruit] = (acc[fruit] || 0) + 1;\n  return acc;\n}, {});\nconsole.log(grouped); // { apple: 3, banana: 2, orange: 1 }</code></pre>\n<br/>\n<h3 class=\"md-h3\">3. <code class=\"inline-code\">find</code> / <code class=\"inline-code\">some</code> / <code class=\"inline-code\">every</code>——条件查找与断言</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const products = [\n  { id: 1, name: 'Laptop', price: 899, inStock: true },\n  { id: 2, name: 'Mouse', price: 29, inStock: false },\n  { id: 3, name: 'Keyboard', price: 79, inStock: true },\n];\n\n// find: 找到第一个符合条件的元素\nconst cheapProduct = products.find(p =&gt; p.price &lt; 50);\nconsole.log(cheapProduct); // { id: 2, name: 'Mouse', ... }\n\n// some: 是否存在至少一个缺货商品\nconst hasOutOfStock = products.some(p =&gt; !p.inStock);\nconsole.log(hasOutOfStock); // true\n\n// every: 是否所有商品都有库存\nconst allInStock = products.every(p =&gt; p.inStock);\nconsole.log(allInStock); // false</code></pre>\n<br/>\n<h3 class=\"md-h3\">4. <code class=\"inline-code\">flatMap</code> + 展开运算——处理嵌套数据</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// flatMap: map 之后自动展平一层\nconst sentences = ['Hello world', 'JavaScript is fun'];\nconst words = sentences.flatMap(s =&gt; s.split(' '));\nconsole.log(words); // ['Hello', 'world', 'JavaScript', 'is', 'fun']\n\n// 等价于先 map 再 flat(1)，但 flatMap 更高效\n// sentences.map(s =&gt; s.split(' ')).flat(1)\n\n// 展开运算 ... 复制与合并\nconst arr1 = [1, 2, 3];\nconst arr2 = [4, 5, 6];\nconst merged = [...arr1, ...arr2];\nconsole.log(merged); // [1, 2, 3, 4, 5, 6]\n\n// 快速去重（配合 Set）\nconst dup = [1, 2, 2, 3, 3, 4];\nconst unique = [...new Set(dup)];\nconsole.log(unique); // [1, 2, 3, 4]</code></pre>\n<br/>\n<h2 class=\"md-h2\">Key Points</h2>\n<br/>\n<p>1. <strong>不可变性（Immutability）</strong>：<code class=\"inline-code\">map</code>、<code class=\"inline-code\">filter</code>、<code class=\"inline-code\">reduce</code>、<code class=\"inline-code\">flat</code>、<code class=\"inline-code\">flatMap</code> 都<strong>返回新数组</strong>，不修改原数组。<code class=\"inline-code\">forEach</code> 和 <code class=\"inline-code\">sort</code>（会原地修改）除外。</p>\n<p>2. <strong>链式调用（Chaining）</strong>：可以连续调用多个方法，例如 <code class=\"inline-code\">arr.filter(x =&gt; x &gt; 0).map(x =&gt; x * 2).reduce(...)</code>，但要注意链太长可能影响可读性。</p>\n<p>3. <strong>稀疏数组（Sparse Arrays）</strong>：<code class=\"inline-code\">forEach</code>、<code class=\"inline-code\">map</code>、<code class=\"inline-code\">filter</code> 会跳过空槽位（<code class=\"inline-code\">empty</code>），而 <code class=\"inline-code\">reduce</code> 不会正确处理稀疏数组，应避免使用。</p>\n<p>4. <strong>回调函数返回值</strong>：<code class=\"inline-code\">map</code> 需要返回转换后的值，<code class=\"inline-code\">filter</code> 需要返回布尔值，<code class=\"inline-code\">reduce</code> 的返回值会成为下次迭代的 <code class=\"inline-code\">accumulator</code>。忘记 <code class=\"inline-code\">return</code> 是常见错误。</p>\n<p>5. <strong><code class=\"inline-code\">reduce</code> 的初始值</strong>：强烈建议始终提供 <code class=\"inline-code\">initialValue</code>。若数组为空且未提供初始值，会抛出 <code class=\"inline-code\">TypeError</code>。</p>\n<p>6. <strong>性能考量</strong>：对于超大数组（&gt;10万项），链式调用每次都会创建新数组，可能产生 GC 压力。极端场景可考虑用 <code class=\"inline-code\">for</code> 循环 + 手动聚合优化。</p>\n<br/>\n<h2 class=\"md-h2\">Common Mistakes</h2>\n<br/>\n<p>1. <strong><code class=\"inline-code\">map</code> 中忘记 return</strong>——花括号 <code class=\"inline-code\">{}</code> 会使箭头函数从隐式返回变为显式返回，漏写 <code class=\"inline-code\">return</code> 会得到 <code class=\"inline-code\">[undefined, undefined, ...]</code>。</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>   // ❌ 错误：花括号需要显式 return\n   [1, 2, 3].map(n =&gt; { n * 2 });   // [undefined, undefined, undefined]\n\n   // ✅ 正确：省略花括号实现隐式返回\n   [1, 2, 3].map(n =&gt; n * 2);       // [2, 4, 6]\n\n   // ✅ 正确：花括号 + return\n   [1, 2, 3].map(n =&gt; { return n * 2; });</code></pre>\n<br/>\n<p>2. <strong>在 <code class=\"inline-code\">forEach</code> 中用 <code class=\"inline-code\">return</code> 或 <code class=\"inline-code\">break</code> 试图提前退出</strong>——<code class=\"inline-code\">forEach</code> 不支持提前终止，<code class=\"inline-code\">return</code> 只跳过当前迭代。</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>   // ❌ 错误：return 无法停止 forEach\n   [1, 2, 3, 4, 5].forEach(n =&gt; {\n     if (n &gt; 3) return;   // 只是跳过 &gt;3 的元素，不是停止\n     console.log(n);\n   }); // 输出 1 2 3\n\n   // ✅ 正确：用 for...of 或 find/some 提前终止\n   for (const n of [1, 2, 3, 4, 5]) {\n     if (n &gt; 3) break;\n     console.log(n);\n   } // 输出 1 2 3</code></pre>\n<br/>\n<p>3. <strong><code class=\"inline-code\">Array.isArray</code> 误用</strong>——<code class=\"inline-code\">typeof []</code> 返回 <code class=\"inline-code\">\"object\"</code>，不可靠；始终用 <code class=\"inline-code\">Array.isArray()</code> 判断。</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>   // ❌ 错误：typeof 无法区分数组和对象\n   console.log(typeof []);           // \"object\" — 不准确\n   console.log(typeof { length: 0 }); // \"object\"\n\n   // ✅ 正确\n   console.log(Array.isArray([]));   // true\n   console.log(Array.isArray({}));   // false</code></pre>\n<br/>\n<h2 class=\"md-h2\">Related Concepts</h2>\n<br/>\n<ul><li><span class=\"link-text\">函数（Functions）</span> — 数组方法的回调本质上是高阶函数的核心应用。</li>\n<li><span class=\"link-text\">箭头函数（Arrow Functions）</span> — 在数组方法中广泛使用箭头函数简化回调写法。</li>\n<li><span class=\"link-text\">解构赋值（Destructuring）</span> — 在 <code class=\"inline-code\">map</code>/<code class=\"inline-code\">filter</code> 的回调参数中配合解构提取对象字段。</li>\n<li><span class=\"link-text\">变量声明（Variables）</span> — 理解 <code class=\"inline-code\">const</code>/<code class=\"inline-code\">let</code> 在数组操作中的作用域。</li>\n</ul><br/>\n<h2 class=\"md-h2\">Citations</h2>\n<br/>\n<ul><li><span class=\"link-text\">MDN: Array</span></li>\n<li><span class=\"link-text\">MDN: Array.prototype.map()</span></li>\n<li><span class=\"link-text\">MDN: Array.prototype.filter()</span></li>\n<li><span class=\"link-text\">MDN: Array.prototype.reduce()</span></li>\n<li><span class=\"link-text\">MDN: Array.prototype.flatMap()</span></li>\n<li><span class=\"link-text\">ECMAScript Language Specification — Array Objects</span></li>\n</ul><br/>",
      "resource": "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Array",
      "tags": [
        "map",
        "filter",
        "reduce",
        "forEach",
        "find",
        "flat",
        "flatMap",
        "spread",
        "Array",
        "ES5",
        "ES6",
        "ES2019"
      ],
      "color": "#50C878"
    }
  },
  {
    "data": {
      "id": "builtin/promise",
      "label": "Promise",
      "type": "JS Builtin",
      "description": "代表异步操作最终完成或失败的对象，是 JavaScript 异步编程的核心构建块",
      "bodyHtml": "<br/>\n<h2 class=\"md-h2\">概述</h2>\n<br/>\n<p><code class=\"inline-code\">Promise</code> 是 ES6 引入的异步编程核心机制，用于表示一个尚未完成但预期在未来完成的异步操作的结果。它解决了传统回调地狱（callback hell）问题，提供了统一的 <code class=\"inline-code\">.then()</code>、<code class=\"inline-code\">.catch()</code> 和 <code class=\"inline-code\">.finally()</code> 链式调用接口。Promise 有三种状态：<strong>pending</strong>（待定）、<strong>fulfilled</strong>（已兑现）和 <strong>rejected</strong>（已拒绝），状态一旦确定便不可逆转。</p>\n<br/>\n<p>在实际开发中，Promise 广泛用于网络请求（<code class=\"inline-code\">fetch</code>）、文件读写、定时器、数据库查询等场景。自 ES2017 起，<code class=\"inline-code\">async/await</code> 语法进一步简化了 Promise 的使用，但理解 Promise 本身的机制仍是掌握 JavaScript 异步编程的关键。</p>\n<br/>\n<h2 class=\"md-h2\">Syntax</h2>\n<br/>\n<h3 class=\"md-h3\">创建 Promise</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>new Promise((resolve, reject) =&gt; {\n  // 异步操作\n  if (/* 成功 */) {\n    resolve(value);   // 将状态切换为 fulfilled\n  } else {\n    reject(error);    // 将状态切换为 rejected\n  }\n});</code></pre>\n<br/>\n<h3 class=\"md-h3\">消费 Promise</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>promise\n  .then(onFulfilled)       // 处理兑现状态\n  .catch(onRejected)       // 处理拒绝状态\n  .finally(onFinally);     // 无论兑现或拒绝都会执行</code></pre>\n<br/>\n<h3 class=\"md-h3\">静态方法</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>Promise.all(iterable);      // 全部兑现才兑现，任一拒绝即拒绝\nPromise.allSettled(iterable); // 等待所有完成，不关心兑现或拒绝\nPromise.race(iterable);     // 第一个完成的 Promise 的结果\nPromise.any(iterable);      // 第一个兑现的 Promise 的结果\nPromise.resolve(value);     // 包装一个值成为已兑现的 Promise\nPromise.reject(reason);     // 创建一个已拒绝的 Promise</code></pre>\n<br/>\n<h2 class=\"md-h2\">Examples</h2>\n<br/>\n<h3 class=\"md-h3\">示例 1：基础用法 —— 用 Promise 封装 setTimeout</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function delay(ms) {\n  return new Promise((resolve) =&gt; {\n    setTimeout(() =&gt; {\n      resolve(`等待了 ${ms} 毫秒`);\n    }, ms);\n  });\n}\n\n// 使用\ndelay(1000).then((message) =&gt; {\n  console.log(message); // 1 秒后输出: \"等待了 1000 毫秒\"\n});</code></pre>\n<br/>\n<h3 class=\"md-h3\">示例 2：链式调用与错误处理</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 模拟一个可能失败的网络请求\nfunction fetchUserData(userId) {\n  return new Promise((resolve, reject) =&gt; {\n    setTimeout(() =&gt; {\n      if (userId &gt; 0) {\n        resolve({ id: userId, name: 'Alice' });\n      } else {\n        reject(new Error('无效的用户 ID'));\n      }\n    }, 500);\n  });\n}\n\nfetchUserData(1)\n  .then((user) =&gt; {\n    console.log('用户数据:', user);\n    // 返回一个新 Promise 来继续链式调用\n    return fetchUserData(user.id + 1);\n  })\n  .then((nextUser) =&gt; {\n    console.log('下一个用户:', nextUser);\n  })\n  .catch((error) =&gt; {\n    console.error('出错了:', error.message); // 如果 userId &lt;= 0，这里捕获错误\n  })\n  .finally(() =&gt; {\n    console.log('请求结束（无论成功与否）');\n  });</code></pre>\n<br/>\n<h3 class=\"md-h3\">示例 3：Promise.all 并发请求</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function fetchData(url) {\n  // 模拟 fetch API\n  return new Promise((resolve) =&gt; {\n    setTimeout(() =&gt; resolve(`来自 ${url} 的数据`), Math.random() * 1000);\n  });\n}\n\n// 同时发起三个请求，等待全部完成\nPromise.all([\n  fetchData('/api/users'),\n  fetchData('/api/posts'),\n  fetchData('/api/comments'),\n])\n  .then(([users, posts, comments]) =&gt; {\n    console.log('全部数据已就绪:');\n    console.log(users);\n    console.log(posts);\n    console.log(comments);\n  })\n  .catch((error) =&gt; {\n    // 只要任意一个请求失败，整个 Promise.all 就会拒绝\n    console.error('请求失败:', error);\n  });</code></pre>\n<br/>\n<h3 class=\"md-h3\">示例 4：Promise.race 实现超时控制</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function fetchWithTimeout(url, timeoutMs) {\n  const fetchPromise = new Promise((resolve) =&gt; {\n    setTimeout(() =&gt; resolve(`从 ${url} 获取的数据`), 2000);\n  });\n\n  const timeoutPromise = new Promise((_, reject) =&gt; {\n    setTimeout(() =&gt; reject(new Error('请求超时')), timeoutMs);\n  });\n\n  // 谁先完成就用谁的结果\n  return Promise.race([fetchPromise, timeoutPromise]);\n}\n\nfetchWithTimeout('/api/data', 1000)\n  .then((data) =&gt; console.log(data))\n  .catch((err) =&gt; console.error(err.message)); // 1 秒后输出: \"请求超时\"</code></pre>\n<br/>\n<h2 class=\"md-h2\">Key Points</h2>\n<br/>\n<p>1. <strong>状态不可逆</strong>：Promise 只能从 <code class=\"inline-code\">pending</code> 变为 <code class=\"inline-code\">fulfilled</code> 或 <code class=\"inline-code\">rejected</code>，一旦改变就永远固定，不可再次变更。</p>\n<p>2. <strong>微任务（microtask）执行</strong>：<code class=\"inline-code\">.then()</code>、<code class=\"inline-code\">.catch()</code> 和 <code class=\"inline-code\">.finally()</code> 的回调在微任务队列中执行，优先级高于宏任务（如 <code class=\"inline-code\">setTimeout</code>）。</p>\n<p>3. <strong>值穿透</strong>：在 <code class=\"inline-code\">.then()</code> 中返回一个普通值（非 Promise），该值会被自动包裹成 <code class=\"inline-code\">Promise.resolve(value)</code>，传递给下一个 <code class=\"inline-code\">.then()</code>。</p>\n<p>4. <strong>错误冒泡</strong>：链式调用中，如果某个 <code class=\"inline-code\">.then()</code> 没有 catch 住错误，错误会一直向下冒泡，直到被 <code class=\"inline-code\">.catch()</code> 捕获。</p>\n<p>5. <strong><code class=\"inline-code\">finally</code> 不接收参数</strong>：<code class=\"inline-code\">.finally()</code> 的回调不接受任何参数，也无法知道 Promise 是兑现还是拒绝，它只用于执行收尾工作。</p>\n<p>6. <strong><code class=\"inline-code\">then</code> 返回新 Promise</strong>：每次调用 <code class=\"inline-code\">.then()</code> 都会返回一个新的 Promise，这是链式调用的基础。</p>\n<br/>\n<h2 class=\"md-h2\">Common Mistakes</h2>\n<br/>\n<p>1. <strong>忘记 <code class=\"inline-code\">return</code> 导致链断裂</strong></p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// ❌ 错误：没有 return，下一个 then 拿到的值是 undefined\nPromise.resolve(1)\n  .then((val) =&gt; {\n    val + 1; // 忘记 return\n  })\n  .then((val) =&gt; {\n    console.log(val); // undefined！\n  });\n\n// ✅ 正确：显式 return\nPromise.resolve(1)\n  .then((val) =&gt; {\n    return val + 1;\n  })\n  .then((val) =&gt; {\n    console.log(val); // 2\n  });</code></pre>\n<br/>\n<p>2. <strong>在 Promise 外部同步抛出错误无法被 catch</strong></p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// ❌ 错误：new Promise 中的同步 throw 不会被外层 try/catch 捕获\ntry {\n  new Promise(() =&gt; {\n    throw new Error('失败');\n  });\n} catch (e) {\n  // 这里捕获不到！\n}\n\n// ✅ 正确：使用 .catch() 或在 executor 中调用 reject()\nnew Promise((_, reject) =&gt; {\n  reject(new Error('失败'));\n}).catch((e) =&gt; {\n  console.error(e.message); // \"失败\"\n});</code></pre>\n<br/>\n<p>3. <strong>在 <code class=\"inline-code\">forEach</code> / <code class=\"inline-code\">for</code> 循环中错误地串行化请求</strong></p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const urls = ['/a', '/b', '/c'];\n\n// ❌ 错误：forEach 不会等待 Promise 完成，所有请求同时发出\nurls.forEach(async (url) =&gt; {\n  const data = await fetch(url);\n  console.log(data);\n});\n\n// ✅ 正确：使用 reduce 链式串行\nawait urls.reduce(async (prevPromise, url) =&gt; {\n  await prevPromise;\n  const data = await fetch(url);\n  console.log(data);\n}, Promise.resolve());\n\n// 或者使用 for...of（推荐）\nfor (const url of urls) {\n  const data = await fetch(url);\n  console.log(data);\n}</code></pre>\n<br/>\n<h2 class=\"md-h2\">Related Concepts</h2>\n<br/>\n<ul><li><span class=\"link-text\">Async/Await</span> —— 基于 Promise 的语法糖，用同步风格编写异步代码</li>\n<li><span class=\"link-text\">异步编程基础</span> —— 事件循环、微任务与宏任务、回调机制</li>\n<li><span class=\"link-text\">函数</span> —— Promise executor 中函数作为一等公民的使用方式</li>\n</ul><br/>\n<h2 class=\"md-h2\">Citations</h2>\n<br/>\n<ul><li><span class=\"link-text\">MDN: Promise</span></li>\n<li><span class=\"link-text\">ECMAScript 2015 (ES6) Specification - Promise Objects</span></li>\n<li><span class=\"link-text\">JavaScript 事件循环: 微任务与宏任务 - HTML Standard</span></li>\n</ul><br/>",
      "resource": "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Promise",

      "id": "patterns/closure",
      "label": "Closure",
      "type": "JS Pattern",
      "description": "闭包：函数记住并访问其词法作用域，即使在当前作用域外部执行。",
      "bodyHtml": "<br/>\n<h2 class=\"md-h2\">概述</h2>\n<br/>\n<p><strong>闭包（Closure）</strong> 是 JavaScript 中最核心也最常被问到的概念之一。简单来说，当一个内层函数引用了外层函数的变量，并且该内层函数被「记住」了（比如被返回或赋值），那么这个内层函数连同它引用的变量一起就构成了一个闭包。闭包让函数可以「记住」它被创建时的环境，即使那个环境已经执行完毕。实际开发中，闭包广泛用于数据私有化、工厂函数、事件回调以及模块模式。</p>\n<br/>\n<h2 class=\"md-h2\">Syntax</h2>\n<br/>\n<p>闭包没有特定的语法关键字，它是一种语言特性。其模式骨架如下：</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function outerFunction(outerParam) {\n  const outerVariable = '...';\n\n  // 内层函数「捕获」了 outerVariable\n  function innerFunction(innerParam) {\n    // 可以访问 outerVariable / outerParam\n    return outerVariable + innerParam;\n  }\n\n  return innerFunction;  // 返回内层函数 —— 闭包诞生\n}</code></pre>\n<br/>\n<p>核心模式是：<strong>在一个函数内部定义另一个函数，并将这个内层函数作为返回值（或参数）传递出去。</strong></p>\n<br/>\n<h2 class=\"md-h2\">Examples</h2>\n<br/>\n<h3 class=\"md-h3\">示例 1：基础闭包 —— 计数器工厂</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function createCounter() {\n  let count = 0;  // 外层函数中的私有变量\n\n  return function() {\n    count += 1;   // 内层函数「捕获」了 count\n    return count;\n  };\n}\n\nconst counter = createCounter();\nconsole.log(counter()); // 1\nconsole.log(counter()); // 2\nconsole.log(counter()); // 3\n\n// createCounter 已执行完毕，但 count 依然存活 —— 闭包在起作用</code></pre>\n<br/>\n<h3 class=\"md-h3\">示例 2：数据私有化 —— 模拟私有属性</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function createPerson(name) {\n  // secret 是私有变量，外部无法直接访问\n  let secret = 'mySecret';\n\n  return {\n    getName: function() {\n      return name;\n    },\n    getSecret: function() {\n      return secret;\n    },\n    setSecret: function(newSecret) {\n      secret = newSecret;\n    }\n  };\n}\n\nconst person = createPerson('Alice');\nconsole.log(person.getName());    // Alice\nconsole.log(person.getSecret());  // mySecret\nperson.setSecret('newSecret');\nconsole.log(person.getSecret());  // newSecret\n// 无法直接访问 secret —— 闭包提供了封装</code></pre>\n<br/>\n<h3 class=\"md-h3\">示例 3：循环中的经典闭包问题（var 陷阱）</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 错误示范（使用 var）\nfor (var i = 0; i &lt; 3; i++) {\n  setTimeout(function() {\n    console.log(i);  // 输出 3, 3, 3 —— 所有闭包共享同一个 i\n  }, 100);\n}\n\n// 修复方式一：IIFE 创建新作用域\nfor (var i = 0; i &lt; 3; i++) {\n  (function(j) {\n    setTimeout(function() {\n      console.log(j);  // 输出 0, 1, 2 —— 每个闭包捕获不同的 j\n    }, 100);\n  })(i);\n}\n\n// 修复方式二：用 let 代替 var（ES6 推荐）\nfor (let i = 0; i &lt; 3; i++) {\n  setTimeout(function() {\n    console.log(i);  // 输出 0, 1, 2 —— let 每次迭代创建新绑定\n  }, 100);\n}</code></pre>\n<br/>\n<h3 class=\"md-h3\">示例 4：高阶函数中的闭包</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function multiply(factor) {\n  // 返回一个「记住了」factor 的新函数\n  return function(number) {\n    return number * factor;\n  };\n}\n\nconst double = multiply(2);\nconst triple = multiply(3);\n\nconsole.log(double(5));   // 10\nconsole.log(triple(5));   // 15</code></pre>\n<br/>\n<h2 class=\"md-h2\">Key Points</h2>\n<br/>\n<p>1. <strong>闭包的三个必要条件</strong>：存在外层函数 → 内层函数引用了外层变量 → 内层函数被传递到其词法作用域之外执行。</p>\n<p>2. <strong>每个闭包绑定的是变量的引用，而非变量的值</strong>。这就是 <code class=\"inline-code\">var</code> 循环陷阱的根源 —— 所有闭包都指向同一个 <code class=\"inline-code\">i</code> 变量。</p>\n<p>3. <strong>闭包不会释放被捕获的变量</strong>，直到该闭包本身被垃圾回收。过度使用闭包可能导致内存泄漏（尤其是在老旧浏览器中）。</p>\n<p>4. <strong>IIFE（Immediately Invoked Function Expression）</strong> 是最经典的闭包应用之一，用于创建隔离作用域、避免全局污染。</p>\n<p>5. <strong>模块模式（Module Pattern）</strong> 利用闭包实现公开 API + 私有状态，是 ES Module 出现前的主流封装方式。</p>\n<p>6. <strong>箭头函数与闭包</strong>：箭头函数也形成闭包，但它不绑定自己的 <code class=\"inline-code\">this</code>，其 <code class=\"inline-code\">this</code> 由外层词法作用域决定。</p>\n<br/>\n<h2 class=\"md-h2\">Common Mistakes</h2>\n<br/>\n<p>1. <strong>误以为闭包会「快照」变量的值</strong></p>\n<p>   - ❌ 认为闭包记录的是创建时的变量值</p>\n<p>   - ✅ 闭包记录的是<strong>变量的引用</strong>，变量后续变化会反映在闭包中</p>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>   let x = 10;\n   const fn = () =&gt; x;\n   x = 20;\n   console.log(fn()); // 20（不是 10）</code></pre>\n<br/>\n<p>2. <strong>在循环中创建闭包时忘记 <code class=\"inline-code\">let</code> 或 IIFE</strong></p>\n<p>   - ❌ 用 <code class=\"inline-code\">var</code> 在循环中创建回调，预期每个回调捕获不同的值</p>\n<p>   - ✅ 用 <code class=\"inline-code\">let</code>（块级作用域）或 IIFE 为每次迭代创建独立作用域</p>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>   // ❌ 错误\n   var buttons = document.querySelectorAll('button');\n   for (var i = 0; i &lt; buttons.length; i++) {\n     buttons[i].onclick = function() {\n       console.log(i); // 始终是 buttons.length\n     };\n   }\n   // ✅ 正确：用 let\n   for (let i = 0; i &lt; buttons.length; i++) {\n     buttons[i].onclick = function() {\n       console.log(i); // 正确索引\n     };\n   }</code></pre>\n<br/>\n<p>3. <strong>闭包造成意外的内存泄漏</strong></p>\n<p>   - ❌ 在事件监听或定时器中滥用闭包，导致 DOM 元素无法被 GC</p>\n<p>   - ✅ 不再需要时及时解除引用（如 <code class=\"inline-code\">removeEventListener</code>）</p>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>   // ❌ 泄漏：闭包持有对 el 的引用\n   function setupHandler(el) {\n     el.addEventListener('click', function() {\n       console.log(el.id); // el 无法被 GC\n     });\n   }\n   // ✅ 防御：使用弱引用或在销毁时清理</code></pre>\n<br/>\n<h2 class=\"md-h2\">Related Concepts</h2>\n<br/>\n<ul><li><span class=\"link-text\">Functions</span> — 函数是一等公民，闭包的底层依赖函数作为值传递的能力</li>\n<li><span class=\"link-text\">Variables</span> — <code class=\"inline-code\">let</code> / <code class=\"inline-code\">const</code> 的块级作用域与 <code class=\"inline-code\">var</code> 的函数作用域深刻影响闭包行为</li>\n<li><span class=\"link-text\">Arrow Functions</span> — 箭头函数的词法 <code class=\"inline-code\">this</code> 绑定与闭包紧密结合</li>\n</ul><br/>\n<h2 class=\"md-h2\">Citations</h2>\n<br/>\n<ul><li><span class=\"link-text\">MDN: Closures</span></li>\n<li><span class=\"link-text\">ECMAScript Specification — Lexical Environments</span></li>\n<li><span class=\"link-text\">MDN: Functions</span></li>\n</ul><br/>",
      "resource": "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Closures",

        "lexical scope",
        "encapsulation",
        "data privacy",

      "type": "JS Syntax",
      "description": "ES6 简洁函数语法，具有词法 this 绑定、隐式返回特性，不能用作构造函数",
      "bodyHtml": "<br/>\n<h2 class=\"md-h2\">概述</h2>\n<br/>\n<p><strong>箭头函数（Arrow Function）</strong> 是 ES6 引入的一种更简洁的函数书写方式，使用 <code class=\"inline-code\">=&gt;</code> 语法。它有两个核心特征：一是语法上比传统函数表达式更精简（支持单行隐式返回）；二是<strong>词法 this 绑定</strong>——它不会创建自己的 <code class=\"inline-code\">this</code>，而是从外层作用域继承 <code class=\"inline-code\">this</code>。箭头函数非常适合用于回调函数、数组方法（<code class=\"inline-code\">map</code>、<code class=\"inline-code\">filter</code>、<code class=\"inline-code\">reduce</code>）以及需要保留外层上下文的场景。但它不能用作构造函数，也没有 <code class=\"inline-code\">arguments</code> 对象和 <code class=\"inline-code\">prototype</code> 属性。</p>\n<br/>\n<h2 class=\"md-h2\">Syntax</h2>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 基础语法\n(param1, param2, …, paramN) =&gt; { statements }\n\n// 单一参数时可省略括号\nsingleParam =&gt; { statements }\n\n// 无参数时必须写空括号\n() =&gt; { statements }\n\n// 单行表达式自动隐式返回（不加 {}）\n(param1, param2) =&gt; expression\n// 等价于 (param1, param2) =&gt; { return expression; }\n\n// 返回对象字面量时，必须用 () 包裹\n(param1, param2) =&gt; ({ key: value })</code></pre>\n<br/>\n<h2 class=\"md-h2\">Examples</h2>\n<br/>\n<h3 class=\"md-h3\">基础用法 — 隐式返回与简化</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 传统函数表达式\nconst numbers = [1, 2, 3, 4];\nconst doubled1 = numbers.map(function(n) {\n  return n * 2;\n});\n\n// 箭头函数：单行隐式返回，极为简洁\nconst doubled2 = numbers.map(n =&gt; n * 2);\n\nconsole.log(doubled2); // [2, 4, 6, 8]</code></pre>\n<br/>\n<h3 class=\"md-h3\">词法 this 绑定 — 解决回调中 this 丢失问题</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function Timer() {\n  this.seconds = 0;\n\n  // 传统函数：setInterval 回调中的 this 指向 window/undefined\n  setInterval(function() {\n    this.seconds++; // ❌ 这里的 this 不是 Timer 实例\n    console.log(this.seconds); // NaN\n  }, 1000);\n\n  // 箭头函数：从外层作用域继承 this\n  setInterval(() =&gt; {\n    this.seconds++; // ✅ this 指向 Timer 实例\n    console.log(this.seconds); // 1, 2, 3...\n  }, 1000);\n}\n\nnew Timer();</code></pre>\n<br/>\n<h3 class=\"md-h3\">与数组方法结合 — 函数式编程风格</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const users = [\n  { name: 'Alice', age: 28 },\n  { name: 'Bob', age: 22 },\n  { name: 'Charlie', age: 32 }\n];\n\n// 链式调用：filter + map + sort\nconst result = users\n  .filter(user =&gt; user.age &gt;= 25)           // 筛选年龄 ≥25\n  .map(user =&gt; ({ name: user.name, age: user.age }))  // 提取字段\n  .sort((a, b) =&gt; a.age - b.age);           // 按年龄升序\n\nconsole.log(result);\n// [{ name: 'Alice', age: 28 }, { name: 'Charlie', age: 32 }]</code></pre>\n<br/>\n<h3 class=\"md-h3\">解构参数与剩余参数</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 参数解构\nconst fullNames = [\n  { first: 'John', last: 'Doe' },\n  { first: 'Jane', last: 'Smith' }\n];\nfullNames.forEach(({ first, last }) =&gt; {\n  console.log(`${first} ${last}`); // John Doe, Jane Smith\n});\n\n// 剩余参数 + 默认值\nconst sum = (base = 0, ...nums) =&gt; nums.reduce((acc, n) =&gt; acc + n, base);\nconsole.log(sum(10, 1, 2, 3)); // 16</code></pre>\n<br/>\n<h2 class=\"md-h2\">Key Points</h2>\n<br/>\n<p>1. <strong>词法 this</strong> — 箭头函数不绑定 <code class=\"inline-code\">this</code>，它从包围它的最近的非箭头函数作用域继承 <code class=\"inline-code\">this</code>。这意味着 <code class=\"inline-code\">call</code>、<code class=\"inline-code\">apply</code>、<code class=\"inline-code\">bind</code> 无法改变箭头函数的 <code class=\"inline-code\">this</code>。</p>\n<p>2. <strong>不能用作构造函数</strong> — 使用 <code class=\"inline-code\">new</code> 调用箭头函数会抛出 <code class=\"inline-code\">TypeError: Foo is not a constructor</code>，因为它没有 <code class=\"inline-code\">[[Construct]]</code> 内部方法。</p>\n<p>3. <strong>没有 <code class=\"inline-code\">arguments</code> 对象</strong> — 箭头函数内部没有 <code class=\"inline-code\">arguments</code>。如需类数组参数，请使用<strong>剩余参数</strong>（<code class=\"inline-code\">...args</code>）语法。</p>\n<p>4. <strong>没有 <code class=\"inline-code\">prototype</code> 属性</strong> — 箭头函数的 <code class=\"inline-code\">prototype</code> 为 <code class=\"inline-code\">undefined</code>，因此无法作为类或构造函数的基础。</p>\n<p>5. <strong>不能用作 generator</strong> — 箭头函数中不能使用 <code class=\"inline-code\">yield</code> 关键字（除非包裹在生成器函数内部）。</p>\n<p>6. <strong>隐式返回规则</strong> — 当函数体为单行表达式（无 <code class=\"inline-code\">{}</code>）时，该表达式的结果会被<strong>自动返回</strong>。返回对象字面量时必须加 <code class=\"inline-code\">()</code> 包裹，否则花括号会被解释为函数体。</p>\n<br/>\n<h2 class=\"md-h2\">Common Mistakes</h2>\n<br/>\n<p>1. <strong>对象方法中使用箭头函数导致 this 指向错误</strong></p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const counter = {\n  count: 0,\n  // ❌ 错误：箭头函数的 this 指向外层（全局/undefined），而非 counter 对象\n  increment: () =&gt; {\n    this.count++; // this 不是 counter\n  },\n  // ✅ 正确：使用传统函数表达式或方法简写\n  increment() {\n    this.count++;\n  }\n};\ncounter.increment();\nconsole.log(counter.count); // 1（正确版本）或 NaN（错误版本）</code></pre>\n<br/>\n<p>2. <strong>忘记给对象字面量加括号导致意外行为</strong></p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const getPerson = () =&gt; { name: 'Alice', age: 28 };\n// ❌ 错误！花括号被视为函数体，'name' 被当作 label，返回 undefined\nconsole.log(getPerson()); // undefined\n\n// ✅ 正确：用括号包裹对象字面量\nconst getPersonFixed = () =&gt; ({ name: 'Alice', age: 28 });\nconsole.log(getPersonFixed()); // { name: 'Alice', age: 28 }</code></pre>\n<br/>\n<p>3. <strong>在需要动态 this 的场景下使用箭头函数</strong></p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// ❌ 错误：箭头函数无法绑定动态 this\nbutton.addEventListener('click', () =&gt; {\n  this.textContent = 'Clicked'; // this 不是 button 元素\n});\n\n// ✅ 正确：使用传统函数获取动态 this\nbutton.addEventListener('click', function() {\n  this.textContent = 'Clicked'; // this 指向 button\n});</code></pre>\n<br/>\n<h2 class=\"md-h2\">Related Concepts</h2>\n<br/>\n<ul><li><span class=\"link-text\">Functions</span> — 函数声明、表达式与箭头函数的对比和区别</li>\n<li><span class=\"link-text\">Closure</span> — 箭头函数的词法 this 本质上是闭包机制的体现</li>\n<li><span class=\"link-text\">Variables</span> — 箭头函数配合 <code class=\"inline-code\">const</code>/<code class=\"inline-code\">let</code> 声明函数变量的最佳实践</li>\n<li><span class=\"link-text\">Array</span> — 箭头函数在 <code class=\"inline-code\">map</code>、<code class=\"inline-code\">filter</code>、<code class=\"inline-code\">reduce</code> 等数组方法中的高频应用</li>\n<li><span class=\"link-text\">Destructuring</span> — 箭头函数参数中配合解构赋值的使用模式</li>\n</ul><br/>\n<h2 class=\"md-h2\">Citations</h2>\n<br/>\n<ul><li><span class=\"link-text\">MDN: Arrow Functions</span></li>\n<li>ECMAScript 2015 (ES6) Specification — Section 14.2: Arrow Function Definitions</li>\n</ul><br/>",
      "resource": "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Functions/Arrow_functions",
      "tags": [
        "ES6",
        "=>",
        "lexical this",
        "implicit return",
        "concise body",
        "arrow function"
      ],

    "data": {
      "id": "syntax/async_await",
      "label": "async / await",
      "type": "JS Syntax",
      "description": "基于 Promise 的同步风格异步语法糖，让异步代码像同步代码一样可读",
      "bodyHtml": "<br/>\n<h2 class=\"md-h2\">概述</h2>\n<br/>\n<p><code class=\"inline-code\">async</code> / <code class=\"inline-code\">await</code> 是 ES2017（ES8）引入的语法糖，建立在 <span class=\"link-text\">Promise</span> 之上，旨在让异步代码像同步代码一样书写和阅读。当一个函数被声明为 <code class=\"inline-code\">async</code>，它始终返回一个 Promise；在函数内部，使用 <code class=\"inline-code\">await</code> 关键字可以暂停执行直到一个 Promise 完成，从而使异步流程摆脱\"回调地狱\"和长链的 <code class=\"inline-code\">.then()</code> 调用。<code class=\"inline-code\">async</code> / <code class=\"inline-code\">await</code> 特别适合需要顺序执行多个异步操作、或需要在异步操作之间传递数据的场景。</p>\n<br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">Syntax</h2>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 1. async 函数声明\nasync function foo() {\n  // ...\n}\n\n// 2. async 函数表达式\nconst foo = async function() {\n  // ...\n};\n\n// 3. async 箭头函数\nconst foo = async () =&gt; {\n  // ...\n};\n\n// 4. 在类方法中使用\nclass MyClass {\n  async myMethod() {\n    // ...\n  }\n}\n\n// 5. await 表达式（只能在 async 函数内部使用）\nconst result = await promiseExpression;</code></pre>\n<br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">Examples</h2>\n<br/>\n<h3 class=\"md-h3\">示例 1：基本用法 — 替代 Promise.then()</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 传统 Promise 链式调用\nfunction fetchUser(id) {\n  return fetch(`https://api.example.com/users/${id}`)\n    .then(response =&gt; response.json());\n}\n\n// 使用 async/await 更直观\nasync function fetchUserAsync(id) {\n  const response = await fetch(`https://api.example.com/users/${id}`);\n  const user = await response.json();\n  return user; // 自动包装成 Promise 返回\n}\n\n// 调用方式完全一致\nfetchUserAsync(1).then(user =&gt; console.log(user));</code></pre>\n<br/>\n<h3 class=\"md-h3\">示例 2：错误处理 — try/catch 捕获异步异常</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>async function getWeather(city) {\n  try {\n    const response = await fetch(`https://api.weather.com/${city}`);\n    if (!response.ok) {\n      throw new Error(`HTTP error! status: ${response.status}`);\n    }\n    const data = await response.json();\n    return data.temperature;\n  } catch (error) {\n    // 既可以捕获 await 中的 Promise rejection，也可以捕获 throw\n    console.error('获取天气失败:', error.message);\n    return null; // 降级返回默认值\n  }\n}\n\n// 等价于 .catch() 方式:\n// getWeather('Beijing').catch(err =&gt; ...)</code></pre>\n<br/>\n<h3 class=\"md-h3\">示例 3：顺序执行 vs 并行执行</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// ❌ 低效：顺序等待，每个请求要等上一个完成\nasync function loadUsersSequential(ids) {\n  const users = [];\n  for (const id of ids) {\n    const user = await fetch(`/users/${id}`).then(r =&gt; r.json());\n    users.push(user);\n  }\n  return users;\n}\n\n// ✅ 高效：并行发起所有请求，使用 Promise.all\nasync function loadUsersParallel(ids) {\n  const promises = ids.map(id =&gt; fetch(`/users/${id}`).then(r =&gt; r.json()));\n  const users = await Promise.all(promises); // 同时等待所有\n  return users;\n}</code></pre>\n<br/>\n<h3 class=\"md-h3\">示例 4：实际业务场景 — 先验证再提交</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>async function submitOrder(cartId, paymentInfo) {\n  try {\n    // Step 1: 验证购物车\n    const cart = await validateCart(cartId);\n    if (cart.items.length === 0) {\n      throw new Error('购物车为空');\n    }\n\n    // Step 2: 计算总价\n    const total = await calculateTotal(cart);\n\n    // Step 3: 处理支付\n    const payment = await processPayment(paymentInfo, total);\n\n    // Step 4: 创建订单\n    const order = await createOrder(cart, payment);\n    return order.id;\n\n  } catch (error) {\n    // 任何一步失败都会跳到这里\n    console.error('订单提交失败:', error);\n    throw error; // 向上传播错误\n  }\n}</code></pre>\n<br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">Key Points</h2>\n<br/>\n<p>1. <strong><code class=\"inline-code\">async</code> 函数始终返回 Promise</strong> — 即使内部显式返回了一个非 Promise 值，也会被 <code class=\"inline-code\">Promise.resolve()</code> 包装。如果函数内部抛出异常，返回的 Promise 会被 reject。</p>\n<p>2. <strong><code class=\"inline-code\">await</code> 只能在 <code class=\"inline-code\">async</code> 函数内部使用</strong> — 在顶层代码（模块顶层除外）或非 async 函数中使用 <code class=\"inline-code\">await</code> 会抛出 SyntaxError。现代浏览器和 Node.js 支持<span class=\"link-text\">Top-level await</span>（ES2022）。</p>\n<p>3. <strong><code class=\"inline-code\">await</code> 会暂停当前 async 函数的执行</strong> — 但不会阻塞事件循环，其他代码（如定时器、UI 事件）可以继续执行。</p>\n<p>4. <strong>没有依赖关系的异步操作应该并行执行</strong> — 使用 <code class=\"inline-code\">Promise.all()</code> 或 <code class=\"inline-code\">Promise.allSettled()</code> 来并发执行，不要盲目地顺序 <code class=\"inline-code\">await</code>。</p>\n<p>5. <strong>await 一个非 Promise 值会直接返回该值</strong> — <code class=\"inline-code\">await 42</code> 等价于 <code class=\"inline-code\">Promise.resolve(42)</code>，是安全的无操作。</p>\n<p>6. <strong>错误传递</strong> — <code class=\"inline-code\">async</code> 函数中的 <code class=\"inline-code\">throw</code> 等价于 reject Promise；<code class=\"inline-code\">try/catch</code> 可以捕获 <code class=\"inline-code\">await</code> 表达式的 rejection 以及 <code class=\"inline-code\">throw</code> 语句。</p>\n<br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">Common Mistakes</h2>\n<br/>\n<p>1. <strong>忘记 await，导致比较的是 Promise 对象而非值</strong></p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// ❌ 错误：条件永远为 true，因为 promise 是 truthy\nasync function isAdmin(userId) {\n  const role = fetchUserRole(userId); // 忘记 await！\n  if (role === 'admin') { /* 永远不会执行 */ }\n}\n\n// ✅ 正确\nasync function isAdmin(userId) {\n  const role = await fetchUserRole(userId);\n  return role === 'admin';\n}</code></pre>\n<br/>\n<p>2. <strong>在 forEach 中 await 不会按预期工作</strong></p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// ❌ 错误：forEach 的回调是同步执行的，await 无效\nasync function processItems(items) {\n  items.forEach(async (item) =&gt; {\n    await process(item); // 这里的 await 不会暂停 forEach 循环\n  });\n  console.log('全部完成？'); // 这行会先执行！\n}\n\n// ✅ 正确：使用 for...of 实现顺序执行\nasync function processItems(items) {\n  for (const item of items) {\n    await process(item);\n  }\n  console.log('全部完成'); // 等所有处理完成才执行\n}</code></pre>\n<br/>\n<p>3. <strong>在 async 函数中捕获错误过于宽泛</strong></p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// ❌ 错误：try/catch 包裹了整块代码，难以定位具体错误\nasync function fragile() {\n  try {\n    const a = await stepA();\n    const b = await stepB(a);\n    const c = await stepC(b);\n    return c;\n  } catch (err) {\n    // 不知道是 A、B 还是 C 出错了\n  }\n}\n\n// ✅ 推荐：对关键步骤单独 try/catch，或利用错误对象区分\nasync function robust() {\n  let a, b;\n  try { a = await stepA(); } catch (e) { throw new Error('StepA失败: ' + e.message); }\n  try { b = await stepB(a); } catch (e) { throw new Error('StepB失败: ' + e.message); }\n  return await stepC(b);\n}</code></pre>\n<br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">Related Concepts</h2>\n<br/>\n<ul><li><span class=\"link-text\">Promise</span> — <code class=\"inline-code\">async</code>/<code class=\"inline-code\">await</code> 的基础，理解 Promise 的状态和链式调用是掌握 async/await 的前提</li>\n<li><span class=\"link-text\">Asynchronous JavaScript</span> — 更广泛的异步编程模型，包含事件循环、回调、微任务等概念</li>\n<li><span class=\"link-text\">Arrow Functions</span> — <code class=\"inline-code\">async</code> 箭头函数是常见写法，注意箭头函数的 <code class=\"inline-code\">this</code> 绑定规则</li>\n<li><span class=\"link-text\">Functions</span> — async 函数本质上仍然是 JavaScript 函数，遵循函数声明、表达式等规则</li>\n</ul><br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">Citations</h2>\n<br/>\n<ul><li><span class=\"link-text\">MDN: async function</span></li>\n<li><span class=\"link-text\">MDN: await</span></li>\n<li><span class=\"link-text\">MDN: Using Promises</span></li>\n<li><span class=\"link-text\">ECMAScript 2017 Language Specification (ES2017)</span></li>\n</ul><br/>",
      "resource": "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Statements/async_function",
      "tags": [
        "ES2017",
        "async",
        "await",
        "Promise",
        "asynchronous"
      ],
      "color": "#4A90D9"
    }

      "type": "JS Syntax",
      "description": "从数组或对象中提取值到独立变量的简洁语法，支持默认值、嵌套解构和rest模式。",
      "bodyHtml": "<br/>\n<h2 class=\"md-h2\">概述</h2>\n<br/>\n<p><strong>解构赋值（Destructuring Assignment）</strong> 是 ES6 引入的一种语法，允许从数组或对象中提取数据并直接赋值给独立的变量。它让数据提取变得更加简洁和声明式，广泛应用于函数参数、变量声明、模块导入等场景。核心特点是：<strong>左侧是解构模式，右侧是要解构的数据源</strong>。</p>\n<br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">Syntax</h2>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 数组解构\nconst [a, b] = array;\n\n// 对象解构\nconst { key1, key2 } = obj;\n\n// 解构 + 默认值\nconst [a = defaultA] = array;\nconst { key = defaultVal } = obj;\n\n// 嵌套解构\nconst { outer: { inner } } = obj;\nconst [a, [b, c]] = nestedArray;\n\n// rest 模式\nconst [head, ...tail] = array;\nconst { a, ...rest } = obj;\n\n// 重命名\nconst { originalName: newName } = obj;</code></pre>\n<br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">Examples</h2>\n<br/>\n<h3 class=\"md-h3\">1. 数组解构 — 交换变量 &amp; 忽略元素</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 经典用法：交换两个变量的值（无需临时变量）\nlet x = 10;\nlet y = 20;\n[x, y] = [y, x];\nconsole.log(x, y); // 20 10\n\n// 使用逗号跳过不需要的元素\nconst rgb = [255, 128, 64];\nconst [, , blue] = rgb;        // 跳过前两个，只取 blue\nconsole.log(blue);             // 64\n\n// 嵌套数组解构\nconst matrix = [[1, 2], [3, 4]];\nconst [[a, b], [c, d]] = matrix;\nconsole.log(a, d); // 1 4</code></pre>\n<br/>\n<h3 class=\"md-h3\">2. 对象解构 — 重命名 &amp; 默认值</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const user = { name: 'Alice', age: 30, email: 'alice@example.com' };\n\n// 解构并重命名\nconst { name: userName, email: userEmail } = user;\nconsole.log(userName);  // Alice\nconsole.log(userEmail); // alice@example.com\n\n// 带默认值（当属性不存在时使用）\nconst { name, age, phone = 'N/A' } = user;\nconsole.log(phone);     // N/A —— user 中没有 phone 属性\n\n// 多层嵌套解构\nconst response = {\n  data: { user: { id: 1, profile: { nickname: 'Ali', avatar: 'url.png' } } },\n  status: 200\n};\nconst { data: { user: { profile: { nickname } } } } = response;\nconsole.log(nickname); // Ali</code></pre>\n<br/>\n<h3 class=\"md-h3\">3. 函数参数中的解构 — 提取配置对象</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 无需在函数体内部逐个取值\nfunction createUser({ name, age = 18, role = 'user' }) {\n  console.log(`创建用户: ${name}, ${age}岁, 角色: ${role}`);\n  // 直接使用 name、age、role 变量\n}\n\ncreateUser({ name: 'Bob', age: 25 });        // 创建用户: Bob, 25岁, 角色: user\ncreateUser({ name: 'Charlie', role: 'admin' }); // 创建用户: Charlie, 18岁, 角色: admin\n\n// 结合 rest 参数 —— 分离已知属性与剩余属性\nfunction logConfig({ url, ...options }) {\n  console.log(`请求地址: ${url}`);\n  console.log('其他选项:', options);\n}\nlogConfig({ url: '/api', method: 'POST', timeout: 3000 });\n// 请求地址: /api\n// 其他选项: { method: 'POST', timeout: 3000 }</code></pre>\n<br/>\n<h3 class=\"md-h3\">4. 循环中解构 &amp; 返回值解构</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 遍历 Map 时直接解构 [key, value]\nconst scoreMap = new Map([\n  ['Alice', 95],\n  ['Bob', 88],\n  ['Charlie', 76]\n]);\nfor (const [name, score] of scoreMap) {\n  console.log(`${name}: ${score}分`);\n}\n// Alice: 95分\n// Bob: 88分\n// Charlie: 76分\n\n// 从函数返回多个值\nfunction getMinMax(arr) {\n  return [Math.min(...arr), Math.max(...arr)];\n}\nconst [min, max] = getMinMax([3, 1, 4, 1, 5, 9]);\nconsole.log(min, max); // 1 9</code></pre>\n<br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">Key Points</h2>\n<br/>\n<p>1. <strong>数组解构按位置匹配</strong>，对象解构按<strong>属性名</strong>匹配。这是两者最核心的区别。</p>\n<p>2. 解构失败时（数组越界或对象属性不存在），变量值为 <code class=\"inline-code\">undefined</code>，务必用<strong>默认值</strong>兜底。</p>\n<p>3. 默认值仅在<strong>严格等于 <code class=\"inline-code\">undefined</code></strong> 时才生效。<code class=\"inline-code\">null</code> 不会触发默认值。</p>\n<p>4. 对象解构的<strong>重命名语法</strong> <code class=\"inline-code\">{ originalName: newVar }</code> 很容易混淆——冒号<strong>左边</strong>是原属性名，<strong>右边</strong>是新变量名。</p>\n<p>5. 如果声明变量时解构已经声明的变量（如交换变量），必须用 <code class=\"inline-code\">let</code> 重新声明或用<strong>不带 <code class=\"inline-code\">const/let</code> 的赋值表达式</strong>，且需要外层加括号 <code class=\"inline-code\">(...)</code> 避免被当作块级作用域。</p>\n<p>6. Rest 模式 <code class=\"inline-code\">...rest</code> <strong>必须位于解构模式的最后</strong>，且只能出现一次。</p>\n<br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">Common Mistakes</h2>\n<br/>\n<p>1. <strong>忘记为函数参数提供默认空对象，导致解构 <code class=\"inline-code\">undefined</code> 报错</strong></p>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>   // ❌ 错误：如果调用 getConfig() 不传参数，会抛出 TypeError\n   function getConfig({ url, timeout }) {\n     console.log(url, timeout);\n   }\n\n   // ✅ 正确：参数默认值设为空对象\n   function getConfig({ url, timeout } = {}) {\n     console.log(url, timeout); // undefined undefined（不会报错）\n   }\n   getConfig();</code></pre>\n<br/>\n<p>2. <strong>对象重命名时搞反冒号左右位置</strong></p>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>   const user = { id: 1, name: 'Alice' };\n\n   // ❌ 错误理解：以为是把 name 改名为 id\n   // const { name: id } = user; ✅ 这才是正确写法\n\n   const { id: userId } = user;\n   console.log(userId); // 1 —— 把 user.id 赋值给 userId</code></pre>\n<br/>\n<p>3. <strong>在 <code class=\"inline-code\">let</code> 声明语句左侧写异步解构或不存在的变量名</strong></p>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>   // ❌ 错误：不能解构 Promise 对象\n   // const { data } = fetch('/api');  // fetch 返回 Promise，不是已解构的对象\n\n   // ✅ 正确：需要 await\n   // const { data } = await fetch('/api').then(r =&gt; r.json());\n\n   // ❌ 错误：变量名与解构模式冲突\n   let a;\n   // { a } = { a: 1 };  // ❌ 花括号被解析为块语句\n   // ✅ 正确：加括号\n   ({ a } = { a: 1 });</code></pre>\n<br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">Related Concepts</h2>\n<br/>\n<ul><li><span class=\"link-text\">Variables</span> — 解构赋值本质上是变量声明和赋值的语法糖</li>\n<li><span class=\"link-text\">Functions</span> — 函数参数中的解构模式是常用实践</li>\n<li><span class=\"link-text\">Template Literals</span> — 常与解构结合构建字符串</li>\n<li><span class=\"link-text\">Array</span> — 数组方法返回的值经常使用解构接收</li>\n<li><span class=\"link-text\">Arrow Functions</span> — 与解构配合写出简洁的回调</li>\n</ul><br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">Citations</h2>\n<br/>\n<ul><li><span class=\"link-text\">MDN: Destructuring Assignment</span></li>\n<li><span class=\"link-text\">ECMAScript 2015 (ES6) Specification — Destructuring Assignment</span></li>\n</ul><br/>",
      "resource": "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Operators/Destructuring_assignment",
      "tags": [
        "ES6",
        "array destructuring",
        "object destructuring",
        "default values",

        "swap"

    "data": {
      "id": "syntax/template_literals",
      "label": "Template Literals",
      "type": "JS Syntax",
      "description": "模板字符串：使用反引号（`）创建的字符串，支持多行文本、嵌入表达式（${}）和标签模板（tagged templates）。",
      "bodyHtml": "<br/>\n<h2 class=\"md-h2\">概述</h2>\n<br/>\n<p><strong>Template Literals（模板字符串）</strong> 是 ES6 引入的一种字符串语法，使用反引号（`<code class=\"inline-code\"> </code> ``）替代传统的单引号或双引号。它解决了三个常见痛点：字符串拼接冗长、多行文本难以书写、以及需要对字符串内容进行自定义处理。核心能力包括 <strong>嵌入表达式（interpolation）</strong>、<strong>多行字符串支持</strong> 以及 <strong>标签模板（tagged templates）</strong>。在现代 JavaScript 项目中，模板字符串已基本取代了传统的字符串拼接操作。</p>\n<br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">Syntax</h2>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 基本模板字符串\n`string text`\n\n// 嵌入表达式\n`string text ${expression} string text`\n\n// 多行字符串\n`line 1\nline 2`\n\n// 标签模板\ntagFunction`string text ${expression} string text`</code></pre>\n<br/>\n<p>其中：</p>\n<ul><li><code class=\"inline-code\">${expression}</code> — 花括号内的任意 JavaScript 表达式会被求值并转为字符串</li>\n<li><code class=\"inline-code\">tagFunction</code> — 一个函数，用于对模板字符串进行自定义处理</li>\n</ul><br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">Examples</h2>\n<br/>\n<h3 class=\"md-h3\">1. 基本字符串插值 — 告别繁琐的 <code class=\"inline-code\">+</code> 拼接</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const name = 'Alice';\nconst age = 30;\n\n// ❌ 传统方式\nconst msg1 = 'My name is ' + name + ', I am ' + age + ' years old.';\n\n// ✅ 模板字符串方式\nconst msg2 = `My name is ${name}, I am ${age} years old.`;\n\nconsole.log(msg2);\n// 输出: My name is Alice, I am 30 years old.</code></pre>\n<br/>\n<h3 class=\"md-h3\">2. 嵌入任意表达式</h3>\n<br/>\n<p><code class=\"inline-code\">${}</code> 中可以是任意 JavaScript 表达式：运算、函数调用、三元运算符等。</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const a = 10;\nconst b = 20;\n\n// 算术表达式\nconsole.log(`${a} + ${b} = ${a + b}`);\n// 输出: 10 + 20 = 30\n\n// 三元运算符\nconst score = 85;\nconsole.log(`成绩: ${score &gt;= 60 ? '及格' : '不及格'}`);\n// 输出: 成绩: 及格\n\n// 方法调用\nconst user = { firstName: 'John', lastName: 'Doe' };\nconsole.log(`Full name: ${user.firstName.toUpperCase()} ${user.lastName}`);\n// 输出: Full name: JOHN Doe</code></pre>\n<br/>\n<h3 class=\"md-h3\">3. 多行字符串 — 保留换行与缩进</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// ✅ 模板字符串天然支持多行\nconst html = `\n  &lt;div class=\"card\"&gt;\n    &lt;h2&gt;${title}&lt;/h2&gt;\n    &lt;p&gt;${description}&lt;/p&gt;\n  &lt;/div&gt;\n`;\n\nconsole.log(html);\n// 输出（保留缩进和换行）:\n//   &lt;div class=\"card\"&gt;\n//     &lt;h2&gt;Hello&lt;/h2&gt;\n//     &lt;p&gt;World&lt;/p&gt;\n//   &lt;/div&gt;\n\n// ❌ 传统方式需要手动加 \\n 和拼接，非常痛苦\nconst oldHtml = '&lt;div class=\"card\"&gt;\\n' +\n  '  &lt;h2&gt;' + title + '&lt;/h2&gt;\\n' +\n  '  &lt;p&gt;' + description + '&lt;/p&gt;\\n' +\n  '&lt;/div&gt;';</code></pre>\n<br/>\n<h3 class=\"md-h3\">4. 标签模板（Tagged Templates）— 自定义字符串处理</h3>\n<br/>\n<p>标签模板允许你用一个函数处理模板字符串的各个部分，常用于 SQL 防注入、国际化、样式化等场景。</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 一个简单的标签函数：将所有嵌入值包裹为 &lt;strong&gt;\nfunction highlight(strings, ...values) {\n  // strings: 静态文本片段数组\n  // values:  所有嵌入表达式的值\n  let result = '';\n  strings.forEach((str, i) =&gt; {\n    result += str;\n    if (i &lt; values.length) {\n      result += `&lt;strong&gt;${values[i]}&lt;/strong&gt;`;\n    }\n  });\n  return result;\n}\n\nconst name = 'TypeScript';\nconst year = 2012;\nconst output = highlight`${name} was first released in ${year}.`;\n\nconsole.log(output);\n// 输出: &lt;strong&gt;TypeScript&lt;/strong&gt; was first released in &lt;strong&gt;2012&lt;/strong&gt;.</code></pre>\n<br/>\n<h3 class=\"md-h3\">5. 嵌套模板 — 动态构建复杂结构</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const items = ['Apple', 'Banana', 'Cherry'];\n\n// 利用模板字符串动态生成 HTML 列表\nconst list = `\n  &lt;ul&gt;\n    ${items.map(item =&gt; `    &lt;li&gt;${item}&lt;/li&gt;`).join('\\n')}\n  &lt;/ul&gt;\n`;\n\nconsole.log(list);\n// 输出:\n//   &lt;ul&gt;\n//     &lt;li&gt;Apple&lt;/li&gt;\n//     &lt;li&gt;Banana&lt;/li&gt;\n//     &lt;li&gt;Cherry&lt;/li&gt;\n//   &lt;/ul&gt;</code></pre>\n<br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">Key Points</h2>\n<br/>\n<p>1. <strong>反引号是关键标识</strong> — 模板字符串必须使用反引号（`<code class=\"inline-code\"> </code> ``），不能用单引号或双引号替代。键盘上通常位于 Esc 键下方。</p>\n<p>2. <strong><code class=\"inline-code\">${}</code> 内可放任意表达式</strong> — 支持变量、运算、函数调用、三元运算符等。但不能直接放语句（如 <code class=\"inline-code\">if</code>、<code class=\"inline-code\">for</code>）。</p>\n<p>3. <strong>多行文本保留格式</strong> — 模板字符串中的换行、空格和缩进都会被保留在输出中，不会再像传统字符串那样报语法错误。</p>\n<p>4. <strong>标签模板不一定要返回字符串</strong> — 标签函数可以返回任何值（如对象、数组、HTML 节点等）。</p>\n<p>5. <strong>原始字符串访问</strong> — 通过 <code class=\"inline-code\">String.raw</code> 标签模板可以获取未处理转义序列的原始字符串：<code class=\"inline-code\">String.raw</code>\\<code class=\"inline-code\">Hello\\\\nWorld\\</code><code class=\"inline-code\"> 会输出 </code>Hello\\\\nWorld`（反斜杠未被转义）。</p>\n<p>6. <strong>性能与普通字符串无异</strong> — 模板字符串在运行时被正确编译，不存在性能劣势，可以放心使用。</p>\n<br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">Common Mistakes</h2>\n<br/>\n<h3 class=\"md-h3\">1. 忘记使用反引号，仍用引号导致插值失效</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const name = 'Alice';\n\n// ❌ 错误：使用了双引号，${name} 不会被解析\nconst msg = \"Hello, ${name}!\";\nconsole.log(msg);\n// 输出: Hello, ${name}!  （原样输出）\n\n// ✅ 正确：使用反引号\nconst msg = `Hello, ${name}!`;\nconsole.log(msg);\n// 输出: Hello, Alice!</code></pre>\n<br/>\n<h3 class=\"md-h3\">2. 在 <code class=\"inline-code\">${}</code> 中放入语句而非表达式</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const items = [1, 2, 3];\n\n// ❌ 错误：if 是语句，不能放在 ${} 中\n// const result = `${if (items.length &gt; 0) 'yes' else 'no'}`;\n// SyntaxError: Unexpected token 'if'\n\n// ✅ 正确：使用三元表达式\nconst result = `${items.length &gt; 0 ? 'yes' : 'no'}`;\n\n// 或者用 IIFE（立即执行函数）\nconst result2 = `${(() =&gt; {\n  if (items.length &gt; 0) return 'yes';\n  return 'no';\n})()}`;</code></pre>\n<br/>\n<h3 class=\"md-h3\">3. 标签模板中忽略 <code class=\"inline-code\">strings.raw</code> 与 <code class=\"inline-code\">strings</code> 的区别</h3>\n<br/>\n<p>传递给标签函数的第一个参数 <code class=\"inline-code\">strings</code> 还有一个 <code class=\"inline-code\">raw</code> 属性，包含原始（未处理转义）的字符串片段。</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function inspect(strings, ...values) {\n  console.log(strings);       // ['Hello\\n', ' world']\n  console.log(strings.raw);   // ['Hello\\\\n', ' world']\n}\n\n// 注意字符串中的 \\n\ninspect`Hello\\n${'and'} world`;</code></pre>\n<br/>\n<p>忘记使用 <code class=\"inline-code\">strings.raw</code> 在处理文件路径或正则表达式时可能导致意外的转义行为。</p>\n<br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">Related Concepts</h2>\n<br/>\n<ul><li><span class=\"link-text\">Variables</span> — 模板字符串中嵌入的变量声明和作用域规则</li>\n<li><span class=\"link-text\">Destructuring</span> — 常与模板字符串搭配使用的解构赋值语法</li>\n<li><span class=\"link-text\">Arrow Functions</span> — 在模板字符串嵌入表达式中常用于回调函数</li>\n<li><span class=\"link-text\">Functions</span> — 标签模板本质上是对函数的调用</li>\n</ul><br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">Citations</h2>\n<br/>\n<ul><li><span class=\"link-text\">MDN: Template literals</span></li>\n<li><span class=\"link-text\">ECMAScript 2015 (ES6) Specification — Template Literal Lexical Components</span></li>\n<li><span class=\"link-text\">MDN: String.raw</span></li>\n</ul><br/>",
      "resource": "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Template_literals",
      "tags": [
        "ES6",

      "label": "Asynchronous JavaScript",
      "type": "JS Topic",
      "description": "事件循环、回调、Promise、async/await 构成的异步编程模型，让 JavaScript 以非阻塞方式处理耗时操作。",
      "bodyHtml": "<br/>\n<h2 class=\"md-h2\">概述</h2>\n<br/>\n<p>JavaScript 是<strong>单线程</strong>语言，但通过异步编程模型实现了非阻塞（non-blocking）并发。核心思想是：将耗时操作（网络请求、文件读写、定时器等）交给宿主环境（浏览器/Node.js）处理，完成后通过<strong>事件循环（Event Loop）</strong> 将回调任务放回主线程执行。从最早的<strong>回调函数（Callback）</strong>，到 ES6 的 <strong>Promise</strong>，再到 ES2017 的 <strong>async/await</strong>，JavaScript 异步编程经历了从\"回调地狱\"到\"同步风格\"的演进。理解事件循环和微任务/宏任务队列是掌握异步编程的关键。</p>\n<br/>\n<h2 class=\"md-h2\">事件循环模型</h2>\n<br/>\n<pre class=\"code-block\" data-lang=\"text\"><code>┌──────────────────────────────┐\n│          Call Stack           │  ← 主线程执行栈\n└────────────┬─────────────────┘\n             │ 空栈时检查\n┌────────────▼─────────────────┐\n│       Microtask Queue         │  ← 微任务队列（Promise.then, MutationObserver）\n└────────────┬─────────────────┘\n             │ 清空微任务后取一个\n┌────────────▼─────────────────┐\n│       Macrotask Queue         │  ← 宏任务队列（setTimeout, setInterval, I/O）\n└──────────────────────────────┘</code></pre>\n<br/>\n<p>事件循环每次迭代：执行一个宏任务 → 清空所有微任务 → 渲染（浏览器）→ 取下一个宏任务。</p>\n<br/>\n<h2 class=\"md-h2\">异步的三种形态</h2>\n<br/>\n<h3 class=\"md-h3\">1. 回调函数（Callback）</h3>\n<br/>\n<p>最早期的异步模式，将函数作为参数传入，在操作完成后调用。</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function fetchData(callback) {\n  setTimeout(() =&gt; {\n    callback('数据已加载');\n  }, 1000);\n}\n\nfetchData((result) =&gt; {\n  console.log(result); // 1秒后输出：数据已加载\n});</code></pre>\n<br/>\n<p><strong>问题</strong>：多层嵌套形成\"回调地狱\"（Callback Hell）。</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// ❌ 回调地狱\ngetUser(id, (user) =&gt; {\n  getPosts(user.id, (posts) =&gt; {\n    getComments(posts[0].id, (comments) =&gt; {\n      console.log(comments);\n    });\n  });\n});</code></pre>\n<br/>\n<h3 class=\"md-h3\">2. Promise（ES6）</h3>\n<br/>\n<p>Promise 是一个代表未来完成值的对象。三种状态：<code class=\"inline-code\">pending</code>（待定）、<code class=\"inline-code\">fulfilled</code>（已完成）、<code class=\"inline-code\">rejected</code>（已拒绝）。</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const fetchData = () =&gt; {\n  return new Promise((resolve, reject) =&gt; {\n    setTimeout(() =&gt; {\n      const success = true;\n      if (success) {\n        resolve('数据已加载');\n      } else {\n        reject(new Error('加载失败'));\n      }\n    }, 1000);\n  });\n};\n\n// 链式调用，告别嵌套\nfetchData()\n  .then(result =&gt; console.log(result))\n  .catch(error =&gt; console.error(error))\n  .finally(() =&gt; console.log('完成'));</code></pre>\n<br/>\n<h3 class=\"md-h3\">3. async/await（ES2017）</h3>\n<br/>\n<p>语法糖，让异步代码写起来像同步代码。</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const fetchData = () =&gt; new Promise(resolve =&gt; {\n  setTimeout(() =&gt; resolve('数据已加载'), 1000);\n});\n\nasync function loadData() {\n  try {\n    const result = await fetchData();\n    console.log(result); // 数据已加载\n  } catch (error) {\n    console.error('出错了:', error);\n  }\n}\n\nloadData();</code></pre>\n<br/>\n<h2 class=\"md-h2\">微任务（Microtask）vs 宏任务（Macrotask）</h2>\n<br/>\n<p>| 类型 | 包含 | 执行时机 |</p>\n<p>|------|------|----------|</p>\n<p>| <strong>宏任务</strong> | <code class=\"inline-code\">setTimeout</code>, <code class=\"inline-code\">setInterval</code>, <code class=\"inline-code\">setImmediate</code>, I/O, UI 渲染 | 每次事件循环取一个 |</p>\n<p>| <strong>微任务</strong> | <code class=\"inline-code\">Promise.then/catch/finally</code>, <code class=\"inline-code\">MutationObserver</code>, <code class=\"inline-code\">queueMicrotask</code> | 当前宏任务结束后、下一个宏任务前，<strong>全部清空</strong> |</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>console.log('1: 同步');\n\nsetTimeout(() =&gt; console.log('2: 宏任务'), 0);\n\nPromise.resolve().then(() =&gt; console.log('3: 微任务'));\n\nconsole.log('4: 同步');\n\n// 输出顺序：1 → 4 → 3 → 2\n// 同步代码最先 → 微任务清空 → 下一个宏任务</code></pre>\n<br/>\n<h2 class=\"md-h2\">并发模式</h2>\n<br/>\n<h3 class=\"md-h3\">并行执行（Promise.all）</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const fetchUser = fetch('/api/user').then(r =&gt; r.json());\nconst fetchPosts = fetch('/api/posts').then(r =&gt; r.json());\n\n// 两个请求同时发起，等待全部完成\nconst [user, posts] = await Promise.all([fetchUser, fetchPosts]);\nconsole.log(user, posts);</code></pre>\n<br/>\n<h3 class=\"md-h3\">竞速模式（Promise.race）</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const timeout = new Promise((_, reject) =&gt;\n  setTimeout(() =&gt; reject(new Error('请求超时')), 3000)\n);\n\nconst request = fetch('/api/data').then(r =&gt; r.json());\n\n// 请求3秒未完成则超时\ntry {\n  const data = await Promise.race([request, timeout]);\n  console.log(data);\n} catch (err) {\n  console.error('超时或失败:', err.message);\n}</code></pre>\n<br/>\n<h3 class=\"md-h3\">顺序执行</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 等上一个完成再执行下一个\nconst ids = [1, 2, 3];\nfor (const id of ids) {\n  const data = await fetch(`/api/item/${id}`).then(r =&gt; r.json());\n  console.log(data); // 依次输出\n}</code></pre>\n<br/>\n<h3 class=\"md-h3\">批量并发（Promise.allSettled）</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const results = await Promise.allSettled([\n  fetch('/api/ok'),\n  fetch('/api/error'),\n  fetch('/api/ok2')\n]);\n\nresults.forEach((r, i) =&gt; {\n  if (r.status === 'fulfilled') {\n    console.log(`请求 ${i} 成功`);\n  } else {\n    console.log(`请求 ${i} 失败:`, r.reason);\n  }\n});</code></pre>\n<br/>\n<h2 class=\"md-h2\">关键要点</h2>\n<br/>\n<ul><li><strong>JavaScript 是单线程的</strong> — 异步并不等于多线程，而是通过事件循环调度任务。</li>\n<li><strong>微任务优先于宏任务</strong> — 每次事件循环先清空微任务队列，再取一个宏任务。</li>\n<li><strong>Promise 状态不可逆</strong> — 一旦 <code class=\"inline-code\">fulfilled</code> 或 <code class=\"inline-code\">rejected</code>，状态永久锁定。</li>\n<li><strong>async 函数永远返回 Promise</strong> — 即使 <code class=\"inline-code\">return 42</code>，外部拿到的是 <code class=\"inline-code\">Promise&lt;42&gt;</code>。</li>\n<li><strong>await 只能在 async 函数内使用</strong> — 顶层 await 仅在 ES2022 模块中支持。</li>\n<li><strong>未捕获的 Promise 错误不会抛出</strong> — 务必用 <code class=\"inline-code\">.catch()</code> 或 <code class=\"inline-code\">try/catch</code> 处理拒绝。</li>\n</ul><br/>\n<h2 class=\"md-h2\">常见错误</h2>\n<br/>\n<h3 class=\"md-h3\">1. 忘记 await 导致拿到 Promise 对象</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// ❌ 错误\nasync function getData() {\n  const result = fetch('/api/data'); // 忘了 await！result 是 Promise\n  console.log(result); // Promise { &lt;pending&gt; }\n}\n\n// ✅ 正确\nasync function getData() {\n  const result = await fetch('/api/data');\n  const data = await result.json();\n  console.log(data);\n}</code></pre>\n<br/>\n<h3 class=\"md-h3\">2. 在 forEach 中使用 async/await 导致并发失控</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// ❌ 错误：forEach 不会等待 Promise\n[1, 2, 3].forEach(async (id) =&gt; {\n  const data = await fetch(`/api/${id}`);\n  console.log(data); // 输出顺序不确定！\n});\n\n// ✅ 正确：顺序执行用 for...of\nfor (const id of [1, 2, 3]) {\n  const data = await fetch(`/api/${id}`);\n  console.log(data);\n}\n\n// ✅ 或真正并行用 Promise.all\nawait Promise.all([1, 2, 3].map(id =&gt; fetch(`/api/${id}`)));</code></pre>\n<br/>\n<h3 class=\"md-h3\">3. 忽略 Promise 错误导致静默失败</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// ❌ 错误：没有错误处理\nasync function risky() {\n  const data = await fetch('/api/might-fail');\n  // 如果 fetch 失败，错误被吞掉\n}\n\n// ✅ 正确：始终处理拒绝\nasync function safe() {\n  try {\n    const res = await fetch('/api/might-fail');\n    if (!res.ok) throw new Error(`HTTP ${res.status}`);\n    return await res.json();\n  } catch (err) {\n    console.error('请求失败:', err);\n    return null; // 返回降级值\n  }\n}</code></pre>\n<br/>\n<h2 class=\"md-h2\">相关概念</h2>\n<br/>\n<ul><li><span class=\"link-text\">Promise</span> — Promise 对象的完整 API 与链式调用模式</li>\n<li><span class=\"link-text\">async/await</span> — async 函数与 await 表达式的语法详解</li>\n<li><span class=\"link-text\">函数</span> — 回调函数作为一等公民的基础知识</li>\n</ul><br/>\n<h2 class=\"md-h2\">引用</h2>\n<br/>\n<ul><li><span class=\"link-text\">MDN: Asynchronous JavaScript</span></li>\n<li><span class=\"link-text\">MDN: Event Loop</span></li>\n<li><span class=\"link-text\">MDN: Using Promises</span></li>\n<li><span class=\"link-text\">MDN: async function</span></li>\n<li><span class=\"link-text\">HTML Standard: Event Loop Processing Model</span></li>\n</ul><br/>",
      "resource": "https://developer.mozilla.org/en-US/docs/Learn/JavaScript/Asynchronous",
      "tags": [
        "event loop",
        "callback",
        "microtask",
        "macrotask",
        "non-blocking",
        "Promise",
        "async/await"
      ],
      "color": "#7B68EE"
    }

      "id": "topics/functions",
      "label": "Functions",
      "type": "JS Topic",
      "description": "函数声明、表达式、箭头函数与高阶函数 — JavaScript 中以函数为第一公民的核心编程范式",
      "bodyHtml": "<br/>\n<h2 class=\"md-h2\">概述</h2>\n<br/>\n<p><strong>Functions（函数）</strong> 是 JavaScript 中最核心的构建块。JavaScript 中的函数是<strong>第一公民（first-class citizens）</strong>，意味着函数可以赋值给变量、作为参数传递给其他函数、作为返回值从其他函数中返回。这种特性让 JavaScript 天然支持<strong>高阶函数（Higher-Order Functions）</strong> 和<strong>回调（callbacks）</strong> 模式。函数定义了可复用的代码块，拥有自己的作用域，并能通过 <code class=\"inline-code\">return</code> 返回值。理解函数的不同定义方式、执行上下文和 <code class=\"inline-code\">this</code> 绑定是掌握 JavaScript 的关键。</p>\n<br/>\n<h2 class=\"md-h2\">Syntax</h2>\n<br/>\n<h3 class=\"md-h3\">1. 函数声明（Function Declaration）</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function functionName(param1, param2, ...) {\n  // 函数体\n  return value; // 可选\n}</code></pre>\n<br/>\n<h3 class=\"md-h3\">2. 函数表达式（Function Expression）</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const functionName = function(param1, param2, ...) {\n  // 函数体\n};\n\n// 具名函数表达式\nconst named = function myName(param) {\n  // myName 仅在函数内部可访问\n};</code></pre>\n<br/>\n<h3 class=\"md-h3\">3. 箭头函数</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const fn = (param1, param2) =&gt; {\n  return param1 + param2;\n};\n\n// 隐式返回（单表达式时）\nconst add = (a, b) =&gt; a + b;\n\n// 单参数可省略括号\nconst double = x =&gt; x * 2;</code></pre>\n<br/>\n<h3 class=\"md-h3\">4. 参数默认值与剩余参数</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function greet(name = 'Guest', ...args) {\n  console.log(name, args);\n}</code></pre>\n<br/>\n<h2 class=\"md-h2\">Examples</h2>\n<br/>\n<h3 class=\"md-h3\">基本示例：多种函数定义方式</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 函数声明——会被提升（hoisted）\nfunction square(x) {\n  return x * x;\n}\n\n// 函数表达式——不会提升\nconst cube = function(x) {\n  return x * x * x;\n};\n\n// 箭头函数——简洁，无 this 绑定\nconst absolute = (x) =&gt; (x &lt; 0 ? -x : x);\n\nconsole.log(square(4));    // 16\nconsole.log(cube(3));      // 27\nconsole.log(absolute(-5)); // 5</code></pre>\n<br/>\n<h3 class=\"md-h3\">高阶函数：函数作为参数与返回值</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 函数作为参数——回调模式\nfunction repeat(n, action) {\n  for (let i = 0; i &lt; n; i++) {\n    action(i);\n  }\n}\n\nrepeat(3, console.log); // 0 1 2\n\n// 函数作为返回值——闭包工厂\nfunction createMultiplier(factor) {\n  return function(number) {\n    return number * factor;\n  };\n}\n\nconst double = createMultiplier(2);\nconst triple = createMultiplier(3);\n\nconsole.log(double(10)); // 20\nconsole.log(triple(10)); // 30</code></pre>\n<br/>\n<h3 class=\"md-h3\">闭包与数据封装</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function createCounter(initial = 0) {\n  let count = initial; // 私有变量\n\n  return {\n    increment: () =&gt; ++count,\n    decrement: () =&gt; --count,\n    getValue: () =&gt; count\n  };\n}\n\nconst counter = createCounter(10);\ncounter.increment(); // 11\ncounter.increment(); // 12\ncounter.decrement(); // 11\nconsole.log(counter.getValue()); // 11\n// count 变量对外不可直接访问，实现了封装</code></pre>\n<br/>\n<h3 class=\"md-h3\">方法与 this 绑定</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const person = {\n  name: 'Alice',\n  // 方法简写 (ES6)\n  greet() {\n    console.log(`Hello, I'm ${this.name}`);\n  },\n  // 箭头函数不会绑定自己的 this\n  greetArrow: () =&gt; {\n    console.log(`Hello, I'm ${this.name}`);\n  }\n};\n\nperson.greet();      // \"Hello, I'm Alice\"\nperson.greetArrow(); // \"Hello, I'm undefined\"（箭头函数的 this 指向外层作用域）\n\n// 使用 call / apply / bind 显式绑定 this\nfunction introduce(prefix) {\n  console.log(`${prefix} ${this.name}`);\n}\n\nintroduce.call(person, 'Hi!');  // \"Hi! Alice\"\nconst boundIntroduce = introduce.bind(person);\nboundIntroduce('Hey!');          // \"Hey! Alice\"</code></pre>\n<br/>\n<h2 class=\"md-h2\">Key Points</h2>\n<br/>\n<p>1. <strong>函数声明会被提升（hoisted）</strong>，可以在声明之前调用；函数表达式则不会，必须先赋值后调用。</p>\n<p>2. <strong>箭头函数没有自己的 <code class=\"inline-code\">this</code>、<code class=\"inline-code\">arguments</code>、<code class=\"inline-code\">super</code> 和 <code class=\"inline-code\">new.target</code></strong>，它从外层作用域继承 <code class=\"inline-code\">this</code>。不适合用作对象方法或构造函数。</p>\n<p>3. <strong>JavaScript 函数总是会返回值</strong>：如果没有 <code class=\"inline-code\">return</code> 语句，默认返回 <code class=\"inline-code\">undefined</code>。箭头函数单表达式形式会隐式返回。</p>\n<p>4. <strong><code class=\"inline-code\">arguments</code> 对象</strong>（类数组）只在普通函数中可用，箭头函数中没有。推荐使用剩余参数 <code class=\"inline-code\">...args</code> 替代。</p>\n<p>5. <strong>函数是对象</strong>，可以拥有属性（如 <code class=\"inline-code\">function.name</code>、<code class=\"inline-code\">function.length</code>），也可以被动态添加属性。</p>\n<p>6. <strong>每个函数在调用时都会创建新的执行上下文</strong>，闭包就是利用这一机制让内部函数\"记住\"外部函数的变量。</p>\n<br/>\n<h2 class=\"md-h2\">Common Mistakes</h2>\n<br/>\n<h3 class=\"md-h3\">在对象方法中使用箭头函数丢失 this</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const user = {\n  name: 'Bob',\n  // ❌ 错误：箭头函数不绑定 this\n  sayHi: () =&gt; `Hi, ${this.name}`,\n  // ✅ 正确：使用普通函数或方法简写\n  sayHiCorrect() {\n    return `Hi, ${this.name}`;\n  }\n};\nconsole.log(user.sayHi());       // \"Hi, undefined\"\nconsole.log(user.sayHiCorrect());// \"Hi, Bob\"</code></pre>\n<br/>\n<h3 class=\"md-h3\">忘记函数默认返回 undefined</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function multiply(a, b) {\n  // ❌ 忘记写 return\n  a * b;\n}\nconsole.log(multiply(3, 4)); // undefined —— 不是 12!\n\n// ✅ 修复\nfunction multiplyFixed(a, b) {\n  return a * b;\n}</code></pre>\n<br/>\n<h3 class=\"md-h3\">混淆函数声明和函数表达式的提升行为</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// ✅ 函数声明可以在定义前调用\nconsole.log(add(2, 3)); // 5\nfunction add(a, b) { return a + b; }\n\n// ❌ 函数表达式在定义前调用会报错\nconsole.log(sub(5, 2)); // TypeError: sub is not a function\nconst sub = function(a, b) { return a - b; };</code></pre>\n<br/>\n<h2 class=\"md-h2\">Related Concepts</h2>\n<br/>\n<ul><li><span class=\"link-text\">箭头函数</span> — 更简洁的函数语法，词法 <code class=\"inline-code\">this</code> 绑定</li>\n<li><span class=\"link-text\">闭包</span> — 函数保留对外部作用域变量引用的能力</li>\n<li><span class=\"link-text\">变量作用域</span> — <code class=\"inline-code\">var</code>、<code class=\"inline-code\">let</code>、<code class=\"inline-code\">const</code> 在函数中的作用域规则</li>\n<li><span class=\"link-text\">异步编程</span> — 回调函数、事件循环与异步函数模式</li>\n<li><span class=\"link-text\">Promise</span> — 基于回调的异步管理模式的演进</li>\n<li><span class=\"link-text\">数组高阶方法</span> — <code class=\"inline-code\">map</code>、<code class=\"inline-code\">filter</code>、<code class=\"inline-code\">reduce</code> 等函数式编程工具</li>\n</ul><br/>\n<h2 class=\"md-h2\">Citations</h2>\n<br/>\n<ul><li><span class=\"link-text\">MDN: Functions guide</span></li>\n<li><span class=\"link-text\">MDN: Function declaration</span></li>\n<li><span class=\"link-text\">MDN: Arrow functions</span></li>\n<li><span class=\"link-text\">MDN: Closures</span></li>\n<li><span class=\"link-text\">ECMAScript® Language Specification — Function Definitions</span></li>\n</ul><br/>",
      "resource": "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Guide/Functions",
      "tags": [
        "function declaration",
        "function expression",

        "first-class",

        "ES5"
      ],

    }

      "id": "topics/variables",
      "label": "Variables & Scope",
      "type": "JS Topic",
      "description": "var/let/const 声明方式与作用域规则，以及提升（hoisting）、暂时性死区（TDZ）等核心机制。",
      "bodyHtml": "<br/>\n<h2 class=\"md-h2\">概述</h2>\n<br/>\n<p>变量声明是 JavaScript 中最基础也最重要的概念之一。JavaScript 提供了三种变量声明方式：<code class=\"inline-code\">var</code>（ES5 及之前）、<code class=\"inline-code\">let</code> 和 <code class=\"inline-code\">const</code>（ES6 引入）。三者在<strong>作用域规则</strong>、<strong>提升（hoisting）行为</strong>、<strong>重复声明限制</strong>以及<strong>全局对象绑定</strong>上有显著差异。理解这些差异是写出可预测、易维护代码的前提。</p>\n<br/>\n<h2 class=\"md-h2\">Syntax</h2>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// var 声明 —— 函数作用域，可重复声明，会被提升\nvar x = 10;\nvar x = 20; // ✅ 允许重复声明\n\n// let 声明 —— 块级作用域，不可重复声明，存在暂时性死区\nlet y = 30;\n// let y = 40; // ❌ SyntaxError: 重复声明\n\n// const 声明 —— 块级作用域，声明时必须初始化，引用不可变\nconst z = 50;\n// z = 60; // ❌ TypeError: 不能重新赋值\n\n// const 对象 —— 引用不可变，但属性可变\nconst obj = { a: 1 };\nobj.a = 2; // ✅ 允许修改属性\n// obj = {}; // ❌ 不能重新赋值给 const</code></pre>\n<br/>\n<h2 class=\"md-h2\">Examples</h2>\n<br/>\n<h3 class=\"md-h3\">1. 作用域对比：函数作用域 vs 块级作用域</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function scopeDemo() {\n  if (true) {\n    var a = '函数作用域';\n    let b = '块级作用域';\n    const c = '块级作用域（常量）';\n  }\n  console.log(a); // ✅ '函数作用域' —— var 不受块作用域限制\n  // console.log(b); // ❌ ReferenceError: b is not defined\n  // console.log(c); // ❌ ReferenceError: c is not defined\n}\nscopeDemo();</code></pre>\n<br/>\n<h3 class=\"md-h3\">2. 提升（Hoisting）与暂时性死区（TDZ）</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>console.log(varValue); // ✅ undefined —— var 被提升但未初始化\n// console.log(letValue); // ❌ ReferenceError: 暂时性死区\n// console.log(constValue); // ❌ ReferenceError: 暂时性死区\n\nvar varValue = 'var 已赋值';\nlet letValue = 'let 已赋值';\nconst constValue = 'const 已赋值';\n\n// 底层解释：var 声明会被提升到作用域顶部并初始化为 undefined\n// let/const 会被提升到顶部但不会初始化，进入 TDZ</code></pre>\n<br/>\n<h3 class=\"md-h3\">3. 全局声明差异</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 在全局作用域下\nvar globalVar = '我是 var';\nlet globalLet = '我是 let';\nconst globalConst = '我是 const';\n\nconsole.log(window.globalVar);  // ✅ '我是 var' —— var 挂载到全局对象\nconsole.log(window.globalLet);   // ✅ undefined —— let 不在全局对象上\nconsole.log(window.globalConst); // ✅ undefined —— const 不在全局对象上</code></pre>\n<br/>\n<h3 class=\"md-h3\">4. const 的\"不可变性\"误解</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const person = { name: 'Alice', hobbies: [] };\n\nperson.name = 'Bob';        // ✅ 修改属性合法\nperson.hobbies.push('JS');  // ✅ 修改嵌套数组合法\n\n// 若要彻底冻结对象，使用 Object.freeze()\nconst frozen = Object.freeze({ name: 'Eve', hobbies: [] });\n// frozen.name = 'Adam'; // ❌ 严格模式下 TypeError\n// frozen.hobbies.push('X'); // ❌ 即使 Object.freeze 也只冻结一层！\n\nfunction deepFreeze(obj) {\n  Object.keys(obj).forEach(key =&gt; {\n    if (typeof obj[key] === 'object' &amp;&amp; obj[key] !== null) {\n      deepFreeze(obj[key]);\n    }\n  });\n  return Object.freeze(obj);\n}</code></pre>\n<br/>\n<h2 class=\"md-h2\">Key Points</h2>\n<br/>\n<p>1. <strong>优先使用 <code class=\"inline-code\">const</code>，其次 <code class=\"inline-code\">let</code>，避免使用 <code class=\"inline-code\">var</code></strong> —— <code class=\"inline-code\">const</code> 表明变量的引用不会被重新赋值，使代码意图更清晰。</p>\n<p>2. <strong><code class=\"inline-code\">let</code> 和 <code class=\"inline-code\">const</code> 存在暂时性死区（TDZ）</strong> —— 从作用域顶部到声明语句之间的区域，访问变量会抛出 <code class=\"inline-code\">ReferenceError</code>。</p>\n<p>3. <strong><code class=\"inline-code\">var</code> 声明被提升并初始化为 <code class=\"inline-code\">undefined</code></strong>，而 <code class=\"inline-code\">let</code>/<code class=\"inline-code\">const</code> 仅被提升但不初始化，这是 TDZ 的根本原因。</p>\n<p>4. <strong><code class=\"inline-code\">var</code> 是函数作用域，<code class=\"inline-code\">let</code>/<code class=\"inline-code\">const</code> 是块级作用域</strong> —— <code class=\"inline-code\">if</code>、<code class=\"inline-code\">for</code>、<code class=\"inline-code\">while</code> 等花括号会为 <code class=\"inline-code\">let</code>/<code class=\"inline-code\">const</code> 创建独立的作用域。</p>\n<p>5. <strong><code class=\"inline-code\">const</code> 保证的是\"引用不可变\"而非\"值不可变\"</strong> —— 基本类型值确实不可变，但对象和数组的内部属性可以被修改。</p>\n<p>6. <strong>在 <code class=\"inline-code\">for</code> 循环中，<code class=\"inline-code\">var</code> 和 <code class=\"inline-code\">let</code> 的行为截然不同</strong> —— <code class=\"inline-code\">let</code> 每次迭代都会创建一个新的绑定，这对闭包场景至关重要。</p>\n<br/>\n<h2 class=\"md-h2\">Common Mistakes</h2>\n<br/>\n<p>1. <strong>误以为 <code class=\"inline-code\">const</code> 声明不可修改任何值</strong></p>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>   const arr = [1, 2, 3];\n   arr.push(4);     // ✅ 合法，数组被修改了\n   // arr = [5, 6]; // ❌ 这才是 const 禁止的操作</code></pre>\n<p>   <strong>解决方案</strong>：如果需要彻底不可变，使用 <code class=\"inline-code\">Object.freeze()</code> 或考虑 TypeScript/Immer 等工具。</p>\n<br/>\n<p>2. <strong>在循环中使用 <code class=\"inline-code\">var</code> 导致闭包陷阱</strong></p>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>   // ❌ 错误：所有 setTimeout 都输出 3\n   for (var i = 0; i &lt; 3; i++) {\n     setTimeout(() =&gt; console.log(i), 100);\n   }\n   // ✅ 正确：每个迭代有自己的 i\n   for (let i = 0; i &lt; 3; i++) {\n     setTimeout(() =&gt; console.log(i), 100);\n   }</code></pre>\n<p>   <strong>解决方案</strong>：用 <code class=\"inline-code\">let</code> 替换 <code class=\"inline-code\">var</code>，或使用 IIFE（立即执行函数表达式）创建闭包。</p>\n<br/>\n<p>3. <strong>重复声明变量</strong></p>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>   let count = 10;\n   // let count = 20; // ❌ SyntaxError: 标识符 'count' 已被声明\n   \n   // 但在不同作用域中可以重复命名\n   function outer() {\n     let value = '外部';\n     function inner() {\n       let value = '内部'; // ✅ 不同作用域，允许\n       console.log(value);\n     }\n     inner();\n   }</code></pre>\n<p>   <strong>解决方案</strong>：使用 linter（如 ESLint）可以在编码时捕捉此类错误。</p>\n<br/>\n<h2 class=\"md-h2\">Related Concepts</h2>\n<br/>\n<ul><li><span class=\"link-text\">箭头函数与作用域</span> —— 箭头函数不绑定 <code class=\"inline-code\">this</code>，继承外层作用域的 <code class=\"inline-code\">this</code> 值</li>\n<li><span class=\"link-text\">解构赋值</span> —— 从数组或对象中快速提取值到变量</li>\n<li><span class=\"link-text\">模板字面量</span> —— 使用反引号和 <code class=\"inline-code\">${}</code> 在字符串中嵌入变量</li>\n<li><span class=\"link-text\">闭包</span> —— 函数与其词法作用域的捆绑，依赖于变量的作用域规则</li>\n<li><span class=\"link-text\">函数与提升</span> —— 函数声明同样存在提升行为</li>\n</ul><br/>\n<h2 class=\"md-h2\">Citations</h2>\n<br/>\n<ul><li><span class=\"link-text\">MDN: Grammar and types — Declarations</span></li>\n<li><span class=\"link-text\">MDN: let</span></li>\n<li><span class=\"link-text\">MDN: const</span></li>\n<li><span class=\"link-text\">MDN: var</span></li>\n<li><span class=\"link-text\">MDN: Temporal Dead Zone</span></li>\n</ul><br/>",
      "resource": "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Guide/Grammar_and_types#declarations",

// ── 文档面板逻辑 ──────────────────────────────────────────────────────────
const docPanel = document.getElementById('doc-panel');
const docType  = document.getElementById('doc-type');
const docTitle = document.getElementById('doc-title');
const docDesc  = document.getElementById('doc-desc');
const docTags  = document.getElementById('doc-tags');
const docMeta  = document.getElementById('doc-meta');
const docBody  = document.getElementById('doc-body');

function showDoc(d) {
  docType.textContent = d.type;
  docType.style.background = d.color + '22';
  docType.style.color = d.color;
  docType.style.border = '1px solid ' + d.color + '55';

  docTitle.textContent = d.label;
  docDesc.textContent  = d.description;
  docBody.innerHTML    = d.bodyHtml;

  docTags.innerHTML = (d.tags || []).map(t =>
    '<span class="tag">' + t + '</span>'
  ).join('');

  docMeta.innerHTML = d.resource
    ? '<a href="' + d.resource + '" target="_blank" rel="noopener">' + d.resource + '</a>'
    : 'id: ' + d.id;

  docPanel.style.display = 'flex';
  docBody.scrollTop = 0;
}

document.getElementById('close-btn').addEventListener('click', () => {
  docPanel.style.display = 'none';
  cy.elements().removeClass('highlighted faded');
});

// ── 节点点击：展示文档 + 高亮相邻节点 ──────────────────────────────────
cy.on('tap', 'node', (e) => {
  const node = e.target;
  const d = node.data();
  showDoc(d);

  // 高亮当前节点及相邻边/节点
  cy.elements().removeClass('highlighted faded');
  node.addClass('highlighted');
  const connected = node.connectedEdges();
  connected.addClass('highlighted');
  connected.connectedNodes().addClass('highlighted');
  cy.elements().not(node).not(connected).not(connected.connectedNodes()).addClass('faded');
});

// ── 点击空白：取消高亮 ────────────────────────────────────────────────
cy.on('tap', (e) => {
  if (e.target === cy) {
    cy.elements().removeClass('highlighted faded');
  }
});
</script>
