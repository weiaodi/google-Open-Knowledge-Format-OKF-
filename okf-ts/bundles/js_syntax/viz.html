const elements = [
  {
    "data": {
      "id": "builtin/promise",
      "label": "Promise",
      "type": "JS Builtin",
      "description": "代表异步操作最终完成或失败的对象，是 async/await 的底层机制",
      "bodyHtml": "<br/>\n<br/>\n<h2 class=\"md-h2\">概述</h2>\n<br/>\n<p>Promise 是 ES6 引入的异步编程核心机制，代表一个尚未完成但<strong>未来会确定</strong>的值。它有三种状态：<code class=\"inline-code\">pending</code>（待定）、<code class=\"inline-code\">fulfilled</code>（已完成）和 <code class=\"inline-code\">rejected</code>（已拒绝）。Promise 的出现解决了传统回调嵌套（Callback Hell）的问题，提供了链式调用的优雅语法，同时也是 <code class=\"inline-code\">async/await</code> 语法的底层基石。当你需要处理网络请求、文件读取、定时器或其他异步操作时，Promise 是标准的选择。</p>\n<br/>\n<h2 class=\"md-h2\">Syntax</h2>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 创建一个 Promise\nnew Promise(executor);\n\n// executor 签名\nfunction(resolve, reject) {\n  // 异步操作\n  // 成功时调用 resolve(value)\n  // 失败时调用 reject(reason)\n}</code></pre>\n<br/>\n<p><strong>Promise 实例方法：</strong></p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>promise.then(onFulfilled, onRejected);\npromise.catch(onRejected);\npromise.finally(onFinally);</code></pre>\n<br/>\n<p><strong>静态方法：</strong></p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>Promise.all(iterable);\nPromise.allSettled(iterable);\nPromise.race(iterable);\nPromise.any(iterable);\nPromise.resolve(value);\nPromise.reject(reason);\nPromise.try(callback);     // ES2025 — 包装任意回调（同步/异步）为 Promise\nPromise.withResolvers();   // ES2024 — 返回 { promise, resolve, reject }</code></pre>\n<br/>\n<h2 class=\"md-h2\">Examples</h2>\n<br/>\n<h3 class=\"md-h3\">基础用法：模拟网络请求</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 模拟一个异步 API 请求\nfunction fetchUser(id) {\n  return new Promise((resolve, reject) =&gt; {\n    setTimeout(() =&gt; {\n      if (id &gt; 0) {\n        resolve({ id, name: '张三', age: 25 });\n      } else {\n        reject(new Error('无效的用户 ID'));\n      }\n    }, 1000);\n  });\n}\n\n// 使用 Promise\nfetchUser(1)\n  .then(user =&gt; console.log('用户:', user))\n  .catch(err =&gt; console.error('错误:', err.message));\n// 1 秒后输出: 用户: { id: 1, name: '张三', age: 25 }</code></pre>\n<br/>\n<h3 class=\"md-h3\">Promise 链式调用</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 链式调用避免回调地狱\nfunction step1(value) {\n  return Promise.resolve(value + 1);\n}\n\nfunction step2(value) {\n  return Promise.resolve(value * 2);\n}\n\nfunction step3(value) {\n  return Promise.resolve(value - 3);\n}\n\nstep1(5)\n  .then(result =&gt; step2(result))  // 6 → 12\n  .then(result =&gt; step3(result))  // 12 → 9\n  .then(final =&gt; console.log('最终结果:', final))  // 输出: 9\n  .catch(err =&gt; console.error('出错了:', err));</code></pre>\n<br/>\n<h3 class=\"md-h3\">Promise.all 与 Promise.race</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 模拟多个并发的 API 请求\nconst fetchUser = Promise.resolve({ id: 1, name: 'Alice' });\nconst fetchPosts = new Promise(resolve =&gt;\n  setTimeout(() =&gt; resolve(['post1', 'post2']), 500)\n);\nconst fetchComments = new Promise(resolve =&gt;\n  setTimeout(() =&gt; resolve(['comment1']), 1000)\n);\n\n// Promise.all: 等待所有 Promise 完成（一个失败则整体失败）\nPromise.all([fetchUser, fetchPosts, fetchComments])\n  .then(([user, posts, comments]) =&gt; {\n    console.log('全部完成:', { user, posts, comments });\n  })\n  .catch(err =&gt; console.error('有请求失败:', err));\n\n// Promise.race: 返回最先完成的 Promise（无论成功或失败）\nPromise.race([fetchPosts, fetchComments])\n  .then(first =&gt; console.log('最快返回的数据:', first));\n// 输出: 最快返回的数据: ['post1', 'post2'] (因为 500ms &lt; 1000ms)</code></pre>\n<br/>\n<h3 class=\"md-h3\">错误处理的最佳实践</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 在链式末尾统一处理错误\nfetch('https://api.example.com/data')\n  .then(response =&gt; {\n    if (!response.ok) {\n      throw new Error(`HTTP 错误! 状态码: ${response.status}`);\n    }\n    return response.json();\n  })\n  .then(data =&gt; console.log('数据:', data))\n  // 一个 catch 捕获链中任何位置的错误\n  .catch(err =&gt; console.error('请求失败:', err.message))\n  // finally 总会执行（无论成功/失败），适合做清理工作\n  .finally(() =&gt; console.log('请求结束，关闭加载状态'));</code></pre>\n<br/>\n<h3 class=\"md-h3\">浮空 Promise 问题（Floating Promises）</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// ❌ 错误：没有 return，下一个 then 无法追踪结果\ndoSomething()\n  .then((url) =&gt; {\n    fetch(url);  // 缺少 return！\n  })\n  .then((result) =&gt; {\n    console.log(result); // undefined — fetch 的结果丢失了\n  });\n\n// ✅ 正确：始终 return Promise\ndoSomething()\n  .then((url) =&gt; {\n    return fetch(url);\n  })\n  .then((result) =&gt; {\n    console.log(result); // Response 对象\n  });</code></pre>\n<br/>\n<h3 class=\"md-h3\">使用 thenable 互操作</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// thenable 是具有 .then() 方法的对象，可与原生 Promise 互操作\nconst thenable = {\n  then(onFulfilled, onRejected) {\n    onFulfilled(42);\n  },\n};\n\nPromise.resolve(thenable); // 解析为 Promise fulfilled with 42</code></pre>\n<br/>\n<h3 class=\"md-h3\">使用 Promise.withResolvers（ES2024）</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 无需在构造函数中嵌套，可直接从外部控制\nconst { promise, resolve, reject } = Promise.withResolvers();\n\nsetTimeout(() =&gt; resolve('完成!'), 1000);\nawait promise; // 1 秒后返回 '完成!'</code></pre>\n<br/>\n<h2 class=\"md-h2\">并发组合方法</h2>\n<br/>\n<p>Promise 提供了四种并发工具来组合多个异步操作：</p>\n<br/>\n<p>| 方法 | 完成条件 | 失败条件 |</p>\n<p>|------|----------|----------|</p>\n<p>| <code class=\"inline-code\">Promise.all()</code> | 所有 Promise 完成 | 任意一个拒绝 |</p>\n<p>| <code class=\"inline-code\">Promise.allSettled()</code> | 所有 Promise 敲定（settled） | 永不拒绝 |</p>\n<p>| <code class=\"inline-code\">Promise.any()</code> | 任意一个完成 | 全部拒绝 |</p>\n<p>| <code class=\"inline-code\">Promise.race()</code> | 任意一个敲定（settled） | 任意一个拒绝 |</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 顺序执行：用 reduce 构建链式调用\n[func1, func2, func3]\n  .reduce((p, f) =&gt; p.then(f), Promise.resolve())\n  .then((result3) =&gt; { /* use result3 */ });</code></pre>\n<br/>\n<h2 class=\"md-h2\">Promise 拒绝事件</h2>\n<br/>\n<p>Web 平台会在全局作用域派发两种事件，用于捕获未处理的 Promise 拒绝：</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 捕获未被 catch 的拒绝\nwindow.addEventListener('unhandledrejection', (event) =&gt; {\n  console.error('未处理的 Promise 拒绝:', event.reason);\n  event.preventDefault(); // 阻止默认的控制台警告\n});\n\n// 当拒绝被延迟处理时触发\nwindow.addEventListener('rejectionhandled', (event) =&gt; {\n  console.log('拒绝已被处理:', event.reason);\n});</code></pre>\n<br/>\n<p>Node.js 中对应 <code class=\"inline-code\">process.on('unhandledRejection', ...)</code>。</p>\n<br/>\n<h2 class=\"md-h2\">Key Points</h2>\n<br/>\n<p>1. <strong>状态不可逆</strong>：Promise 一旦从 <code class=\"inline-code\">pending</code> 变为 <code class=\"inline-code\">fulfilled</code> 或 <code class=\"inline-code\">rejected</code>，就<strong>永久锁定</strong>在该状态，无法再次改变。</p>\n<p>2. <strong>then/catch 始终返回新 Promise</strong>：每次调用 <code class=\"inline-code\">.then()</code> 或 <code class=\"inline-code\">.catch()</code> 都会创建并返回一个新的 Promise，这才是链式调用的基础。</p>\n<p>3. <strong>微任务执行</strong>：<code class=\"inline-code\">then/catch/finally</code> 的回调在<strong>微任务队列</strong>中执行，优先级高于 <code class=\"inline-code\">setTimeout</code> 等宏任务。</p>\n<p>4. <strong>错误穿透</strong>：链式调用中，如果某个 <code class=\"inline-code\">.then()</code> 没有提供 <code class=\"inline-code\">onRejected</code> 处理器，异常会<strong>自动传递</strong>到下一个 <code class=\"inline-code\">.catch()</code>。</p>\n<p>5. <strong>值透传</strong>：如果 <code class=\"inline-code\">.then()</code> 传入的不是函数（如 <code class=\"inline-code\">null</code>），Promise 会把接收到的值<strong>直接透传</strong>到下一个 <code class=\"inline-code\">.then()</code>。</p>\n<p>6. <strong><code class=\"inline-code\">new Promise</code> 内的代码会同步执行</strong>：executor 函数是<strong>立即执行</strong>的（synchronous），只有 <code class=\"inline-code\">.then()</code> 的回调才是异步执行的。</p>\n<p>7. <strong>回调保证</strong>：<code class=\"inline-code\">.then()</code> 的回调永远不会在当前同步代码完成前被调用，即使 Promise 已经 settled——这避免了一致性问题（Zalgo 状态）。</p>\n<br/>\n<h2 class=\"md-h2\">Common Mistakes</h2>\n<br/>\n<p>1. <strong>忘记 return Promise 导致链式断裂</strong></p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// ❌ 错误：忘记 return，下一个 then 收到的值是 undefined\nfetchUser(1)\n  .then(data =&gt; {\n    processUser(data);  // 这里没有 return\n  })\n  .then(result =&gt; {\n    console.log(result); // undefined!\n  });\n\n// ✅ 正确：始终 return Promise\nfetchUser(1)\n  .then(data =&gt; {\n    return processUser(data); // 返回 Promise\n  })\n  .then(result =&gt; {\n    console.log(result); // 正确处理结果\n  });</code></pre>\n<br/>\n<p>2. <strong>在 Promise 中抛出非 Error 对象</strong></p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// ❌ 错误：抛出普通字符串，丢失调用栈信息\nnew Promise((_, reject) =&gt; {\n  reject('出错了'); // 字符串，非 Error 对象\n}).catch(err =&gt; {\n  console.log(err.name); // undefined\n  console.log(err.stack); // undefined\n});\n\n// ✅ 正确：始终 reject Error 对象\nnew Promise((_, reject) =&gt; {\n  reject(new Error('出错了')); // Error 对象，保留调用栈\n}).catch(err =&gt; {\n  console.log(err.message); // '出错了'\n  console.log(err.stack);   // 完整的堆栈追踪\n});</code></pre>\n<br/>\n<p>3. <strong>没有 catch 导致未捕获的 Promise 异常</strong></p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// ❌ 危险：rejected 的 Promise 没有被捕获\nnew Promise((_, reject) =&gt; {\n  reject(new Error('失败'));\n})\n  .then(data =&gt; console.log(data));\n// UnhandledPromiseRejectionWarning! 在 Node.js 中会导致进程退出\n\n// ✅ 正确：始终添加 catch 处理器\nnew Promise((_, reject) =&gt; {\n  reject(new Error('失败'));\n})\n  .then(data =&gt; console.log(data))\n  .catch(err =&gt; console.error('已处理:', err.message));</code></pre>\n<br/>\n<h2 class=\"md-h2\">Related Concepts</h2>\n<br/>\n<ul><li><span class=\"link-text\">Async/Await 参考</span> — <code class=\"inline-code\">async function</code> 声明语法与执行模型</li>\n<li><span class=\"link-text\">异步编程</span> —— 深入理解事件循环、微任务与宏任务</li>\n<li><span class=\"link-text\">箭头函数</span> —— 常用在 Promise 链中保持 <code class=\"inline-code\">this</code> 绑定</li>\n</ul><br/>\n<h2 class=\"md-h2\">Citations</h2>\n<br/>\n<ul><li><span class=\"link-text\">MDN: Promise</span></li>\n<li><span class=\"link-text\">MDN: Using promises</span></li>\n<li><span class=\"link-text\">MDN: async function</span></li>\n<li><span class=\"link-text\">ECMAScript 2015 (ES6) Specification — Promise Objects</span></li>\n</ul><br/>",
      "resource": "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Promise",

      "id": "patterns/closure",
      "label": "闭包 (Closure)",
      "type": "JS Pattern",
      "description": "闭包是函数与其词法作用域的绑定，允许函数记住并访问外部函数的变量，即使外部函数已经执行完毕。",
      "bodyHtml": "<br/>\n<br/>\n<h2 class=\"md-h2\">概述</h2>\n<br/>\n<p><strong>闭包（Closure）</strong> 是 JavaScript 中最核心也最强大的特性之一。当一个内部函数被定义在外部函数内部，并且内部函数引用了外部函数的变量时，就形成了一个闭包。闭包使得内部函数能够 <strong>记住并访问</strong> 其创建时的词法作用域（lexical scope），即使外部函数已经执行结束并返回。闭包广泛用于 <strong>数据封装与私有变量</strong>、<strong>工厂函数</strong>、<strong>事件处理器</strong> 和 <strong>函数柯里化</strong> 等场景。理解闭包是掌握 JavaScript 高阶用法的关键一步。</p>\n<br/>\n<h2 class=\"md-h2\">Syntax</h2>\n<br/>\n<p>闭包没有专属的语法关键字，它是由嵌套函数（nested function）配合作用域引用自然产生的模式。</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function outerFunction(outerVariable) {\n  // 内部函数持有对外部变量 outerVariable 的引用\n  function innerFunction(innerVariable) {\n    // 这里可以同时访问 outerVariable 和 innerVariable\n    return outerVariable + innerVariable;\n  }\n  // 返回内部函数，闭包随之形成\n  return innerFunction;\n}</code></pre>\n<br/>\n<p>更简洁的写法（内部函数作为返回值）：</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function createCounter() {\n  let count = 0;\n  return function() {\n    count += 1;\n    return count;\n  };\n}</code></pre>\n<br/>\n<h2 class=\"md-h2\">Examples</h2>\n<br/>\n<h3 class=\"md-h3\">示例一：计数器（基本闭包）</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function createCounter() {\n  let count = 0;          // count 是私有变量，外部无法直接访问\n\n  return {\n    increment: function() {\n      count++;\n      return count;\n    },\n    decrement: function() {\n      count--;\n      return count;\n    },\n    getCount: function() {\n      return count;\n    }\n  };\n}\n\nconst counter = createCounter();\nconsole.log(counter.increment()); // 1\nconsole.log(counter.increment()); // 2\nconsole.log(counter.decrement()); // 1\nconsole.log(counter.getCount());  // 1\n// console.log(counter.count);    // undefined — count 是私有的！</code></pre>\n<br/>\n<h3 class=\"md-h3\">示例二：数据封装与私有变量（模块模式）</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function createPerson(name, age) {\n  // name 和 age 通过闭包变为私有，提供受控的访问接口\n  return {\n    getName: function() {\n      return name;\n    },\n    getAge: function() {\n      return age;\n    },\n    setAge: function(newAge) {\n      if (newAge &gt; 0 &amp;&amp; newAge &lt; 150) {\n        age = newAge;\n      } else {\n        console.error('Invalid age');\n      }\n    }\n  };\n}\n\nconst person = createPerson('张三', 30);\nconsole.log(person.getName());      // 张三\nperson.setAge(35);\nconsole.log(person.getAge());       // 35\n// person.name = '李四';            // 不生效，name 不受外部影响</code></pre>\n<br/>\n<h3 class=\"md-h3\">示例三：使用 IIFE 模拟私有方法</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const counter = (function () {\n  let privateCounter = 0;\n  function changeBy(val) {\n    privateCounter += val;\n  }\n\n  return {\n    increment() {\n      changeBy(1);\n    },\n    decrement() {\n      changeBy(-1);\n    },\n    value() {\n      return privateCounter;\n    },\n  };\n})();\n\nconsole.log(counter.value()); // 0\ncounter.increment();\nconsole.log(counter.value()); // 1\n// counter.changeBy(5); — TypeError, changeBy 是私有的</code></pre>\n<br/>\n<h3 class=\"md-h3\">示例四：循环中的闭包问题与修复</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// ❌ 经典问题：var 声明的 i 被所有闭包共享\nfor (var i = 0; i &lt; 3; i++) {\n  setTimeout(function() {\n    console.log(i); // 3, 3, 3 —— 循环结束时 i 已经是 3\n  }, 100);\n}\n\n// ✅ 修复方式 1：使用 let（块级作用域）\nfor (let i = 0; i &lt; 3; i++) {\n  setTimeout(function() {\n    console.log(i); // 0, 1, 2 —— 每个迭代绑定独立的 i\n  }, 100);\n}\n\n// ✅ 修复方式 2：使用 IIFE 创建独立闭包\nfor (var i = 0; i &lt; 3; i++) {\n  (function(j) {\n    setTimeout(function() {\n      console.log(j); // 0, 1, 2\n    }, 100);\n  })(i);\n}</code></pre>\n<br/>\n<h3 class=\"md-h3\">示例五：函数工厂与柯里化</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function multiply(factor) {\n  // 闭包捕获 factor 参数\n  return function(number) {\n    return number * factor;\n  };\n}\n\nconst double = multiply(2);\nconst triple = multiply(3);\n\nconsole.log(double(5));  // 10\nconsole.log(triple(5));  // 15\n\n// 实际应用：税率计算函数工厂\nfunction createTaxCalculator(taxRate) {\n  return function(amount) {\n    return amount * (1 + taxRate);\n  };\n}\n\nconst calcVAT = createTaxCalculator(0.13);    // 13% VAT\nconst calcGST = createTaxCalculator(0.07);    // 7% GST\n\nconsole.log(calcVAT(100)); // 113\nconsole.log(calcGST(100)); // 107</code></pre>\n<br/>\n<h3 class=\"md-h3\">示例六：闭包与模块作用域</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// myModule.js\nlet x = 5;\nexport const getX = () =&gt; x;\nexport const setX = (val) =&gt; { x = val; };\n\n// 闭包捕获了模块作用域的变量 x，外部只能通过 getter/setter 访问</code></pre>\n<br/>\n<h3 class=\"md-h3\">示例七：闭包作用域链</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const e = 10;\nfunction sum(a) {\n  return function (b) {\n    return function (c) {\n      return function (d) {\n        // 可以访问外部所有作用域的变量 a, b, c, d, e\n        return a + b + c + d + e;\n      };\n    };\n  };\n}\n\nconsole.log(sum(1)(2)(3)(4)); // 20</code></pre>\n<br/>\n<h2 class=\"md-h2\">Key Points</h2>\n<br/>\n<p>1. <strong>闭包的本质</strong>：闭包不是开发者手动\"创建\"的，而是 JavaScript 词法作用域规则的自然产物——每个函数在定义时都会记住它所在的作用域链。</p>\n<p>2. <strong>内存管理</strong>：闭包会保持对外部变量的引用，导致这些变量无法被垃圾回收（GC），直到闭包本身不再被引用。过度使用闭包可能导致 <strong>内存泄漏</strong>。</p>\n<p>3. <strong><code class=\"inline-code\">var</code> 与 <code class=\"inline-code\">let</code> 的区别</strong>：用 <code class=\"inline-code\">var</code> 声明的变量只有函数作用域，在循环中使用闭包容易产生\"共享变量\"问题；使用 <code class=\"inline-code\">let</code>（块级作用域）或 IIFE 可以轻松解决。</p>\n<p>4. <strong>闭包与 <code class=\"inline-code\">this</code></strong>：闭包中的 <code class=\"inline-code\">this</code> 指向调用时的上下文，而非定义时的上下文。箭头函数（<span class=\"link-text\">Arrow Functions</span>）没有自己的 <code class=\"inline-code\">this</code>，它会捕获外层词法作用域的 <code class=\"inline-code\">this</code>。</p>\n<p>5. <strong>模块模式</strong>：闭包是实现 JavaScript 模块化的基础，通过返回一个包含方法的对象，可以对外暴露有限接口，隐藏内部实现细节。</p>\n<p>6. <strong>性能考虑</strong>：每个闭包都会占用额外内存来存储其引用的外部变量。在高频调用场景中，避免在热路径中不必要地创建闭包。更好的做法是将方法定义在原型上而非构造函数内部。</p>\n<p>7. <strong>闭包可以捕获块作用域和模块作用域</strong>：ES6 的 <code class=\"inline-code\">let</code>/<code class=\"inline-code\">const</code> 让闭包能捕获块级变量，ES2015 的模块系统也让闭包能捕获模块级变量。</p>\n<p>8. <strong>闭包可以捕获 import 的实时绑定</strong>：模块中 export 的变量是 live binding，闭包捕获 import 的值会随原模块变化。</p>\n<br/>\n<h2 class=\"md-h2\">Common Mistakes</h2>\n<br/>\n<p>1. <strong>循环中误用 <code class=\"inline-code\">var</code> 导致所有闭包共享同一个变量</strong></p>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>   // ❌ 错误\n   for (var i = 0; i &lt; 5; i++) {\n     buttons[i].onclick = function() {\n       console.log(i); // 无论点哪个按钮，都输出 5\n     };\n   }\n   // ✅ 正确：使用 let 或 IIFE\n   for (let i = 0; i &lt; 5; i++) {\n     buttons[i].onclick = function() {\n       console.log(i); // 输出对应的 0, 1, 2, 3, 4\n     };\n   }</code></pre>\n<br/>\n<p>2. <strong>误以为闭包会\"捕获\"变量的值，而不是变量本身</strong></p>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>   let funcs = [];\n   for (var i = 0; i &lt; 3; i++) {\n     funcs.push(function() { return i; });\n   }\n   console.log(funcs[0]()); // 3 —— 不是 0！\n   // 闭包捕获的是变量 i 的引用，而非创建时的值 0。</code></pre>\n<br/>\n<p>3. <strong>闭包造成意外的内存泄漏</strong></p>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>   // ❌ 大型对象被闭包意外持有，无法被 GC\n   function setupHandler() {\n     let hugeData = new Array(1000000).fill('data');\n     let element = document.getElementById('myButton');\n     element.onclick = function() {\n       console.log('clicked'); // 虽然没有引用 hugeData，\n       // 但闭包保留了整个作用域，hugeData 无法被回收\n     };\n   }\n   // ✅ 解决：只捕获需要的变量\n   function setupHandlerFixed() {\n     let element = document.getElementById('myButton');\n     element.onclick = function() {\n       console.log('clicked');\n     };\n     // hugeData 不再在闭包的作用域链中，可被 GC\n   }</code></pre>\n<br/>\n<h2 class=\"md-h2\">Related Concepts</h2>\n<br/>\n<ul><li><span class=\"link-text\">箭头函数 (Arrow Functions)</span> — 箭头函数没有自己的 <code class=\"inline-code\">this</code> 和 <code class=\"inline-code\">arguments</code>，其闭包行为与传统函数不同</li>\n<li><span class=\"link-text\">异步编程 (Async)</span> — 回调函数和 Promise 中广泛使用闭包来保持上下文状态</li>\n</ul><br/>\n<h2 class=\"md-h2\">Citations</h2>\n<br/>\n<ul><li><span class=\"link-text\">MDN: Closures</span></li>\n<li><span class=\"link-text\">MDN: Lexical scoping</span></li>\n<li><span class=\"link-text\">MDN: Closures Guide</span></li>\n<li>ECMAScript Language Specification — Lexical Environments (Section 8.1)</li>\n</ul><br/>",
      "resource": "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Closures",

      "id": "references/async_function",
      "label": "async function",
      "type": "Reference",
      "description": "声明一个异步函数，该函数隐式返回 Promise 并允许在函数体中使用 await 关键字。",
      "bodyHtml": "<br/>\n<br/>\n<h2 class=\"md-h2\">概述</h2>\n<br/>\n<p><code class=\"inline-code\">async function</code> 声明创建一个异步函数，该函数始终返回一个 <span class=\"link-text\"><code class=\"inline-code\">Promise</code></span>。在函数体内可以使用 <code class=\"inline-code\">await</code> 关键字来暂停执行，等待 Promise 解决后再继续，从而以同步风格编写异步代码。</p>\n<br/>\n<h2 class=\"md-h2\">语法</h2>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>async function name(param0) {\n  statements\n}\nasync function name(param0, param1, /* …, */ paramN) {\n  statements\n}</code></pre>\n<br/>\n<p><strong>注意：</strong> <code class=\"inline-code\">async</code> 和 <code class=\"inline-code\">function</code> 之间不能有换行符，否则自动分号插入会导致 <code class=\"inline-code\">async</code> 成为独立标识符。</p>\n<br/>\n<h2 class=\"md-h2\">行为</h2>\n<br/>\n<h3 class=\"md-h3\">返回值</h3>\n<br/>\n<p>异步函数始终返回一个 Promise：</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>async function foo() {\n  return 1;\n}\n// 等价于：\nfunction foo() {\n  return Promise.resolve(1);\n}</code></pre>\n<br/>\n<p><strong>重要差异：</strong> 如果返回一个已有的 Promise，<code class=\"inline-code\">async</code> 函数返回的是一个新的引用（不同于 <code class=\"inline-code\">Promise.resolve</code> 的同一引用复用）：</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const p = new Promise((res) =&gt; res(1));\n\nasync function asyncReturn() {\n  return p;\n}\n\nfunction basicReturn() {\n  return Promise.resolve(p);\n}\n\nconsole.log(p === basicReturn()); // true — 同一引用\nconsole.log(p === asyncReturn()); // false — 不同引用</code></pre>\n<br/>\n<h3 class=\"md-h3\">执行模型</h3>\n<br/>\n<p>异步函数的执行体被 <code class=\"inline-code\">await</code> 表达式分割成多个阶段：</p>\n<br/>\n<p>1. <strong>同步阶段</strong>：从函数开始到第一个 <code class=\"inline-code\">await</code> 之前的代码同步执行</p>\n<p>2. <strong>异步阶段</strong>：每个 <code class=\"inline-code\">await</code> 之后的部分相当于 <code class=\"inline-code\">.then()</code> 回调</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>async function foo() {\n  const result1 = await new Promise((resolve) =&gt;\n    setTimeout(() =&gt; resolve('1'))\n  );\n  const result2 = await new Promise((resolve) =&gt;\n    setTimeout(() =&gt; resolve('2'))\n  );\n}</code></pre>\n<br/>\n<h3 class=\"md-h3\">并发与顺序</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// ❌ 危险：分别 await 并发启动的 Promise 可能导致未捕获拒绝\nasync function risky() {\n  const p1 = fetch('/api/a');\n  const p2 = fetch('/api/b'); // 可能在 p1 await 之前就拒绝\n  return [await p1, await p2];\n}\n\n// ✅ 安全：使用 Promise.all\nasync function safe() {\n  return Promise.all([fetch('/api/a'), fetch('/api/b')]);\n}</code></pre>\n<br/>\n<h2 class=\"md-h2\">与 Promise 链的对比</h2>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// Promise 链风格\nfunction getProcessedData(url) {\n  return downloadData(url)\n    .catch((e) =&gt; downloadFallbackData(url))\n    .then((v) =&gt; processDataInWorker(v));\n}\n\n// async/await 风格\nasync function getProcessedData(url) {\n  let v;\n  try {\n    v = await downloadData(url);\n  } catch (e) {\n    v = await downloadFallbackData(url);\n  }\n  return processDataInWorker(v);\n}</code></pre>\n<br/>\n<h2 class=\"md-h2\">参见</h2>\n<br/>\n<ul><li><span class=\"link-text\"><code class=\"inline-code\">await</code></span> — 暂停异步函数执行直到 Promise 解决</li>\n<li><span class=\"link-text\"><code class=\"inline-code\">AsyncFunction</code></span> — 异步函数的构造函数</li>\n<li><span class=\"link-text\">异步编程</span> — 事件循环与异步模型</li>\n</ul><br/>\n<h2 class=\"md-h2\">引用来源</h2>\n<br/>\n<ul><li><span class=\"link-text\">MDN: async function</span></li>\n<li><span class=\"link-text\">ECMAScript Specification — sec-async-function-definitions</span></li>\n</ul><br/>",
      "resource": "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Statements/async_function",

  {
    "data": {
      "id": "syntax/arrow_function",
      "label": "Arrow Functions",
      "type": "JS Syntax",
      "description": "ES6 引入的简洁函数语法，具备词法 this 绑定，不能用作构造函数。",
      "bodyHtml": "<br/>\n<br/>\n<h2 class=\"md-h2\">概述</h2>\n<br/>\n<p><strong>箭头函数（Arrow Function）</strong> 是 ES6 引入的一种更简洁的函数书写方式，使用 <code class=\"inline-code\">=&gt;</code> 语法。与传统的 <code class=\"inline-code\">function</code> 关键字不同，箭头函数不绑定自己的 <code class=\"inline-code\">this</code>、<code class=\"inline-code\">arguments</code>、<code class=\"inline-code\">super</code> 或 <code class=\"inline-code\">new.target</code>，它会从外围（封闭的）作用域捕获 <code class=\"inline-code\">this</code> 值（即<strong>词法 this 绑定</strong>）。箭头函数最适合用于简短的回调函数、数组方法（如 <code class=\"inline-code\">map</code>、<code class=\"inline-code\">filter</code>、<code class=\"inline-code\">reduce</code>）以及需要保留外部上下文 <code class=\"inline-code\">this</code> 的场景。但要注意，箭头函数<strong>不能</strong>用作构造函数，也没有 <code class=\"inline-code\">prototype</code> 属性。</p>\n<br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">语法</h2>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 1. 无参数 —— 必须使用空括号\n() =&gt; { ... }\n\n// 2. 单个参数 —— 括号可以省略\nparam =&gt; { ... }\n\n// 3. 多个参数 —— 括号必须保留\n(param1, param2) =&gt; { ... }\n\n// 4. 函数体为单个表达式 —— 隐式返回（省略 return 和花括号）\n(param1, param2) =&gt; expression\n\n// 5. 返回对象字面量 —— 需要用括号包裹\n(param1, param2) =&gt; ({ key: value })</code></pre>\n<br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">示例</h2>\n<br/>\n<h3 class=\"md-h3\">示例 1：基本用法与隐式返回</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 传统函数\nconst squares1 = [1, 2, 3].map(function (x) {\n  return x * x;\n});\n\n// 箭头函数 —— 同一逻辑，更简洁\nconst squares2 = [1, 2, 3].map(x =&gt; x * x);\n\nconsole.log(squares2); // [1, 4, 9]</code></pre>\n<br/>\n<h3 class=\"md-h3\">示例 2：词法 this 绑定 —— 解决经典问题</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function Timer() {\n  this.seconds = 0;\n\n  // 传统函数：this 指向全局对象（或 undefined 严格模式）\n  setInterval(function () {\n    this.seconds++; // ❌ this 不是 Timer 实例\n  }, 1000);\n\n  // 箭头函数：this 继承自外围 Timer 函数\n  setInterval(() =&gt; {\n    this.seconds++; // ✅ this 正确指向 Timer 实例\n  }, 1000);\n}\n\nconst t = new Timer();\n// 1 秒后 t.seconds 为 1</code></pre>\n<br/>\n<h3 class=\"md-h3\">示例 3：回调与数组方法</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const users = [\n  { name: 'Alice', age: 28 },\n  { name: 'Bob', age: 35 },\n  { name: 'Charlie', age: 22 },\n];\n\n// 使用箭头函数链式操作\nconst names = users\n  .filter(user =&gt; user.age &gt;= 25) // 过滤出年龄 &gt;= 25 的用户\n  .map(user =&gt; user.name)          // 提取名字\n  .sort((a, b) =&gt; a.localeCompare(b)); // 按字母排序\n\nconsole.log(names); // ['Alice', 'Bob']</code></pre>\n<br/>\n<h3 class=\"md-h3\">示例 4：返回对象字面量</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// ❌ 错误写法：花括号被解析为函数体\n// const getPerson = (name, age) =&gt; { name, age };\n\n// ✅ 正确写法：用圆括号包裹对象字面量\nconst getPerson = (name, age) =&gt; ({ name, age });\n\nconsole.log(getPerson('Dave', 42));\n// { name: 'Dave', age: 42 }</code></pre>\n<br/>\n<h3 class=\"md-h3\">示例 5：箭头函数作为类字段（auto-bound methods）</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>class C {\n  a = 1;\n  // 箭头函数类字段：每个实例创建时获得自己的函数副本\n  autoBoundMethod = () =&gt; {\n    console.log(this.a);\n  };\n}\n\nconst c = new C();\nc.autoBoundMethod(); // 1\n\n// 即使解构出来使用，this 仍然指向实例\nconst { autoBoundMethod } = c;\nautoBoundMethod(); // 1（普通方法在此场景会丢失 this）\n\n// 注意：类字段定义在实例上而非原型上，每个实例创建新的闭包</code></pre>\n<br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">关键点</h2>\n<br/>\n<p>1. <strong>词法 this 绑定</strong>：箭头函数没有自己的 <code class=\"inline-code\">this</code>，它使用封闭执行上下文中的 <code class=\"inline-code\">this</code>。<code class=\"inline-code\">call()</code>、<code class=\"inline-code\">apply()</code>、<code class=\"inline-code\">bind()</code> 对箭头函数的 <code class=\"inline-code\">this</code> 无效。</p>\n<p>2. <strong>不能用作构造函数</strong>：使用 <code class=\"inline-code\">new</code> 调用箭头函数会抛出 <code class=\"inline-code\">TypeError: arrow_function is not a constructor</code>。</p>\n<p>3. <strong>无 <code class=\"inline-code\">arguments</code> 对象</strong>：箭头函数内访问 <code class=\"inline-code\">arguments</code> 会引用外围函数的 <code class=\"inline-code\">arguments</code>。如果需要类数组参数，请使用 rest 参数 <code class=\"inline-code\">(...args)</code>。</p>\n<p>4. <strong>不能作为生成器</strong>：箭头函数中不能使用 <code class=\"inline-code\">yield</code> 关键字（除非在外围函数内）。</p>\n<p>5. <strong>隐式返回</strong>：当函数体是单个表达式时，自动返回该表达式的值，无需 <code class=\"inline-code\">return</code> 关键字和 <code class=\"inline-code\">{}</code>。</p>\n<p>6. <strong>方法定义中的陷阱</strong>：在对象方法中使用箭头函数，<code class=\"inline-code\">this</code> 不会指向该对象，而是指向对象所在的外围作用域（通常是全局或 undefined）。</p>\n<p>7. <strong>箭头前后不能换行</strong>：参数和 <code class=\"inline-code\">=&gt;</code> 之间不能有换行符，否则会触发自动分号插入导致语法错误。</p>\n<p>8. <strong>优先级问题</strong>：<code class=\"inline-code\">=&gt;</code> 优先级低于大多数运算符，将箭头函数作为表达式值时需要用括号包裹，例如 <code class=\"inline-code\">callback = callback || (() =&gt; {})</code>。</p>\n<br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">常见错误</h2>\n<br/>\n<h3 class=\"md-h3\">错误 1：在对象方法中误用箭头函数</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const counter = {\n  count: 0,\n  // ❌ 错误：this 不指向 counter\n  increment: () =&gt; {\n    this.count++; // this → 全局对象（或 undefined）\n  },\n  // ✅ 正确：使用传统函数或方法简写\n  increment() {\n    this.count++;\n  },\n};\n\ncounter.increment();\nconsole.log(counter.count); // 0（错误用法下未改变）</code></pre>\n<br/>\n<h3 class=\"md-h3\">错误 2：试图用 <code class=\"inline-code\">new</code> 调用箭头函数</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>const Person = (name) =&gt; {\n  this.name = name;\n};\n\n// ❌ TypeError: Person is not a constructor\nconst p = new Person('Alice');\n\n// ✅ 正确：使用传统函数定义构造函数\nfunction Person(name) {\n  this.name = name;\n}\nconst p = new Person('Alice');</code></pre>\n<br/>\n<h3 class=\"md-h3\">错误 3：箭头函数内使用 <code class=\"inline-code\">arguments</code></h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>function outer() {\n  const innerArrow = () =&gt; {\n    // ❌ 这里的 arguments 是 outer 函数的 arguments，不是 innerArrow 的参数\n    console.log(arguments);\n  };\n\n  // ✅ 正确：使用 rest 参数\n  const innerRest = (...args) =&gt; {\n    console.log(args);\n  };\n\n  innerArrow(1, 2); // 输出 outer 的 arguments\n  innerRest(1, 2);  // 输出 [1, 2]\n}\n\nouter('a', 'b');</code></pre>\n<br/>\n<h3 class=\"md-h3\">错误 4：箭头函数与运算符优先级</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>let callback;\n\n// ❌ SyntaxError: 解析为 callback || () 作为参数列表\n// callback = callback || () =&gt; {};\n\n// ✅ 正确：用括号包裹箭头函数\ncallback = callback || (() =&gt; {});</code></pre>\n<br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">相关概念</h2>\n<br/>\n<ul><li><span class=\"link-text\">闭包（Closure）</span> —— 箭头函数与闭包常结合使用，理解作用域链对掌握箭头函数的 <code class=\"inline-code\">this</code> 行为至关重要。</li>\n<li><span class=\"link-text\">Promise</span> —— 箭头函数广泛用于 Promise 链式调用（<code class=\"inline-code\">.then()</code>、<code class=\"inline-code\">.catch()</code>）中，使代码更简洁。</li>\n</ul><br/>\n<p>---</p>\n<br/>\n<h2 class=\"md-h2\">参考资料</h2>\n<br/>\n<ul><li><span class=\"link-text\">MDN: Arrow Functions</span></li>\n<li><span class=\"link-text\">ECMAScript 2015 (ES6) Specification — Arrow Function Definitions</span></li>\n</ul><br/>",
      "resource": "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Functions/Arrow_functions",

    "data": {
      "id": "topics/async",
      "label": "Asynchronous JavaScript",
      "type": "JS Topic",
      "description": "事件循环、回调、Promise、async/await 构成的 JS 异步编程模型",
      "bodyHtml": "<br/>\n<br/>\n<h2 class=\"md-h2\">概述</h2>\n<br/>\n<p>JavaScript 是一门<strong>单线程</strong>语言，但通过事件循环（Event Loop）机制实现了非阻塞的异步编程。异步编程是 JavaScript 的核心能力，涵盖从传统的回调函数（Callback）到 Promise，再到现代的 async/await 语法，让开发者能够优雅地处理 I/O 操作、网络请求、定时器等耗时任务，而不会阻塞主线程。</p>\n<br/>\n<p>理解异步 JavaScript 的关键在于掌握<strong>调用栈（Call Stack）</strong>、<strong>任务队列（Task Queue）</strong> 和 <strong>事件循环（Event Loop）</strong> 三者的协作关系。</p>\n<br/>\n<h2 class=\"md-h2\">核心机制：事件循环（Event Loop）</h2>\n<br/>\n<p>事件循环是 JS 运行时的调度引擎，其基本工作流程如下：</p>\n<br/>\n<p>1. 执行调用栈中的同步代码。</p>\n<p>2. 遇到异步操作（如 <code class=\"inline-code\">setTimeout</code>、<code class=\"inline-code\">fetch</code>），将其回调交给 Web API 处理，继续执行后续代码。</p>\n<p>3. 当异步操作完成，回调被放入任务队列。</p>\n<p>4. 当调用栈清空后，事件循环从任务队列取出回调执行。</p>\n<p>5. <strong>微任务（Microtask）</strong> 优先于<strong>宏任务（Macrotask）</strong> 执行。</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"text\"><code>调用栈 (Call Stack)\n    ↓\n微任务队列 (Microtask Queue) — Promise.then / MutationObserver / queueMicrotask\n    ↓\n宏任务队列 (Macrotask Queue) — setTimeout / setInterval / I/O / UI 渲染</code></pre>\n<br/>\n<h2 class=\"md-h2\">异步编程的三种方式</h2>\n<br/>\n<h3 class=\"md-h3\">1. 回调函数（Callback）—— 最传统的方式</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 回调方式：将后续逻辑作为参数传入\nfunction loadData(url, onSuccess, onError) {\n  const xhr = new XMLHttpRequest()\n  xhr.open('GET', url)\n  xhr.onload = () =&gt; {\n    if (xhr.status === 200) {\n      onSuccess(xhr.responseText) // 成功时调用回调\n    } else {\n      onError(new Error(`HTTP ${xhr.status}`))\n    }\n  }\n  xhr.onerror = () =&gt; onError(new Error('Network error'))\n  xhr.send()\n}\n\n// 使用回调 — 嵌套过深会形成\"回调地狱\"（callback hell）\nloadData('/api/user', (userData) =&gt; {\n  console.log('用户数据:', userData)\n  // 需要继续嵌套下一个请求...\n}, (err) =&gt; {\n  console.error('加载失败:', err)\n})</code></pre>\n<br/>\n<h3 class=\"md-h3\">2. Promise —— 链式调用的革命</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 使用 Promise 封装异步操作\nfunction loadDataPromise(url) {\n  return new Promise((resolve, reject) =&gt; {\n    const xhr = new XMLHttpRequest()\n    xhr.open('GET', url)\n    xhr.onload = () =&gt; {\n      xhr.status === 200\n        ? resolve(xhr.responseText)  // 成功态\n        : reject(new Error(`HTTP ${xhr.status}`))  // 失败态\n    }\n    xhr.onerror = () =&gt; reject(new Error('Network error'))\n    xhr.send()\n  })\n}\n\n// Promise 链式调用 — 扁平化，不再嵌套\nloadDataPromise('/api/user')\n  .then((user) =&gt; {\n    console.log('用户:', user)\n    return loadDataPromise(`/api/orders/${user.id}`)\n  })\n  .then((orders) =&gt; {\n    console.log('订单:', orders)\n    return loadDataPromise(`/api/details/${orders[0].id}`)\n  })\n  .then((detail) =&gt; console.log('详情:', detail))\n  .catch((err) =&gt; console.error('任何步骤出错都会被捕获:', err))\n  .finally(() =&gt; console.log('无论成功失败都执行'))</code></pre>\n<br/>\n<h3 class=\"md-h3\">3. async/await —— 同步风格的异步代码</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// async/await 让异步代码看起来像同步代码\nasync function loadUserOrders() {\n  try {\n    const user = await loadDataPromise('/api/user')\n    console.log('用户:', user)\n\n    const orders = await loadDataPromise(`/api/orders/${user.id}`)\n    console.log('订单:', orders)\n\n    const detail = await loadDataPromise(`/api/details/${orders[0].id}`)\n    console.log('详情:', detail)\n\n    return detail  // async 函数始终返回一个 Promise\n  } catch (err) {\n    console.error('出错:', err)\n    throw err  // 可以重新抛出，让调用方继续 catch\n  }\n}\n\n// 调用 async 函数得到的是 Promise\nloadUserOrders().then((result) =&gt; {\n  console.log('最终结果:', result)\n})</code></pre>\n<br/>\n<h2 class=\"md-h2\">微任务 vs 宏任务 —— 执行顺序的关键</h2>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>console.log('1 — 同步')\n\nsetTimeout(() =&gt; console.log('2 — 宏任务'), 0)\n\nPromise.resolve().then(() =&gt; console.log('3 — 微任务'))\n\nqueueMicrotask(() =&gt; console.log('4 — 微任务 (queueMicrotask)'))\n\nconsole.log('5 — 同步')\n\n// 输出顺序：\n// 1 — 同步\n// 5 — 同步\n// 3 — 微任务\n// 4 — 微任务 (queueMicrotask)\n// 2 — 宏任务</code></pre>\n<br/>\n<p>关键规则：<strong>同步代码 → 所有微任务 → 一个宏任务 → 所有微任务 → 下一个宏任务...</strong></p>\n<br/>\n<h2 class=\"md-h2\">常见异步模式</h2>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 并行执行 — Promise.all（所有成功才成功）\nasync function loadAllUsers() {\n  const urls = ['/api/user/1', '/api/user/2', '/api/user/3']\n  // 三个请求同时发出，等待所有完成\n  const results = await Promise.all(urls.map(loadDataPromise))\n  console.log('所有用户:', results)\n  return results\n}\n\n// 竞速执行 — Promise.race（谁先到用谁）\nasync function fetchWithTimeout(url, ms = 3000) {\n  const timeout = new Promise((_, reject) =&gt;\n    setTimeout(() =&gt; reject(new Error('请求超时')), ms)\n  )\n  // 请求和超时谁先触发就取谁的结果\n  return Promise.race([loadDataPromise(url), timeout])\n}\n\n// 顺序执行 — 用 for...of 配合 await\nasync function processSequentially(items) {\n  const results = []\n  for (const item of items) {\n    // 注意：这里每次 await 都会等待上一个完成\n    const result = await processItem(item)\n    results.push(result)\n  }\n  return results\n}\n\n// 并发启动 + 顺序等待结果\nasync function concurrentWait() {\n  // 两个 Promise 同时启动\n  const slow = resolveAfter2Seconds()\n  const fast = resolveAfter1Second()\n\n  // 按 await 的顺序拿结果，但总耗时 = max(2s, 1s) = 2s\n  console.log(await slow)  // 2 秒后输出\n  console.log(await fast)  // 立即输出（已经完成）\n}</code></pre>\n<br/>\n<h2 class=\"md-h2\">未处理的 Promise 拒绝</h2>\n<br/>\n<p>如果一个 Promise 被拒绝但没有对应的 <code class=\"inline-code\">.catch()</code> 处理器，浏览器或 Node.js 会触发全局事件：</p>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 浏览器中监听未处理的拒绝\nwindow.addEventListener('unhandledrejection', (event) =&gt; {\n  console.error('未处理拒绝:', event.reason)\n  event.preventDefault()\n})\n\n// Node.js 中\nprocess.on('unhandledRejection', (reason, promise) =&gt; {\n  console.error('未处理拒绝:', reason)\n})</code></pre>\n<br/>\n<h2 class=\"md-h2\">关键要点</h2>\n<br/>\n<p>1. <strong><code class=\"inline-code\">async</code> 函数始终返回 Promise</strong> — 即使你 return 一个普通值，它也会被包装成 <code class=\"inline-code\">Promise.resolve(value)</code>。</p>\n<p>2. <strong><code class=\"inline-code\">await</code> 只能在 <code class=\"inline-code\">async</code> 函数内部使用</strong>（顶层 await 在 ES2022 模块中可用）。</p>\n<p>3. <strong>微任务（Microtask）优先于宏任务（Macrotask）</strong> — 包括 <code class=\"inline-code\">Promise.then</code>、<code class=\"inline-code\">queueMicrotask</code>、<code class=\"inline-code\">MutationObserver</code>。</p>\n<p>4. <strong><code class=\"inline-code\">setTimeout(fn, 0)</code> 不是立即执行</strong> — 它至少会被延迟到当前所有同步代码和微任务执行完毕。</p>\n<p>5. <strong>错误处理必须显式</strong> — 在 async 函数中用 <code class=\"inline-code\">try/catch</code>，在 Promise 链中用 <code class=\"inline-code\">.catch()</code>，否则错误会被静默吞掉。</p>\n<p>6. <strong><code class=\"inline-code\">Promise.all</code> 是\"全有或全无\"</strong> — 任何一个 Promise rejected，整个 <code class=\"inline-code\">Promise.all</code> 立即 rejected。</p>\n<p>7. <strong>并发启动 vs 串行等待</strong> — 同时启动多个 Promise 再分别 <code class=\"inline-code\">await</code> 比串行 <code class=\"inline-code\">await</code> 更快，但要注意未捕获拒绝的风险。</p>\n<br/>\n<h2 class=\"md-h2\">常见错误</h2>\n<br/>\n<h3 class=\"md-h3\">❌ 在 forEach 中使用 await 不会等待</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 错误：forEach 中的回调是同步执行的，await 不起作用\nasync function badProcess(items) {\n  items.forEach(async (item) =&gt; {\n    await processItem(item)  // 不会等待！所有 processItem 同时触发\n  })\n  console.log('这里的代码会在所有 processItem 完成之前执行')\n}\n\n// 正确：使用 for...of\nasync function goodProcess(items) {\n  for (const item of items) {\n    await processItem(item)  // 每次等待上一个完成\n  }\n}\n\n// 或使用 Promise.all（如果不需要顺序执行）\nasync function parallelProcess(items) {\n  await Promise.all(items.map(processItem))\n}</code></pre>\n<br/>\n<h3 class=\"md-h3\">❌ 忘记 async 函数返回的是 Promise</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 错误：认为 async 函数返回值是普通值\nasync function getUserName() {\n  return 'Alice'\n}\n\nconst name = getUserName() // name 是 Promise，不是 'Alice'\nconsole.log(name)          // Promise { 'Alice' }\nconsole.log(name.length)   // undefined — Promise 没有 .length\n\n// 正确：用 await 或 .then 获取值\nconst name = await getUserName()\nconsole.log(name)          // 'Alice'\nconsole.log(name.length)   // 5</code></pre>\n<br/>\n<h3 class=\"md-h3\">❌ Promise 错误未被捕获</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 错误：没有 catch，错误被静默吞掉\nasync function risky() {\n  throw new Error('出错了')\n}\nrisky()  // UnhandledPromiseRejection — Node.js 会打印警告，未来版本可能崩溃\n\n// 正确：始终处理错误\nasync function safe() {\n  try {\n    await risky()\n  } catch (err) {\n    console.error('捕获到错误:', err.message)\n  }\n}</code></pre>\n<br/>\n<h3 class=\"md-h3\">❌ 并发启动 Promise 时未处理中间拒绝</h3>\n<br/>\n<pre class=\"code-block\" data-lang=\"javascript\"><code>// 危险模式：同时启动两个 Promise 再分别 await\nasync function risky() {\n  const p1 = new Promise((resolve) =&gt; setTimeout(() =&gt; resolve('1'), 1000))\n  const p2 = new Promise((_, reject) =&gt;\n    setTimeout(() =&gt; reject(new Error('失败')), 500)\n  )\n  const results = [await p1, await p2] // p2 在 500ms 拒绝时 p1 尚未 await!\n  // 可能导致 UnhandledPromiseRejection\n}\n\n// 安全模式：使用 Promise.all\nasync function safe() {\n  const results = await Promise.all([\n    new Promise((resolve) =&gt; setTimeout(() =&gt; resolve('1'), 1000)),\n    new Promise((_, reject) =&gt;\n      setTimeout(() =&gt; reject(new Error('失败')), 500)\n    ),\n  ])\n}</code></pre>\n<br/>\n<h2 class=\"md-h2\">相关概念</h2>\n<br/>\n<ul><li><span class=\"link-text\">Promise</span> — 异步操作的标准化容器，支持链式调用和错误冒泡。</li>\n<li><span class=\"link-text\">Async/Await 参考</span> — <code class=\"inline-code\">async function</code> 声明语法、执行模型与常见陷阱。</li>\n<li><span class=\"link-text\">闭包</span> — 回调函数中常用的变量保持机制，捕获外部作用域。</li>\n<li><span class=\"link-text\">箭头函数</span> — 回调函数中常用的简写语法，且不绑定 <code class=\"inline-code\">this</code>。</li>\n</ul><br/>\n<h2 class=\"md-h2\">引用来源</h2>\n<br/>\n<ul><li><span class=\"link-text\">MDN: Asynchronous JavaScript</span> — 异步编程概述与教程。</li>\n<li><span class=\"link-text\">MDN: Event Loop</span> // ── 文档面板逻辑 ──────────────────────────────────────────────────────────
const docPanel = document.getElementById('doc-panel');
const docType  = document.getElementById('doc-type');
const docTitle = document.getElementById('doc-title');
const docDesc  = document.getElementById('doc-desc');
const docTags  = document.getElementById('doc-tags');
const docMeta  = document.getElementById('doc-meta');
const docBody  = document.getElementById('doc-body');

function showDoc(d) {
  docType.textContent = d.type;
  docType.style.background = d.color + '22';
  docType.style.color = d.color;
  docType.style.border = '1px solid ' + d.color + '55';

  docTitle.textContent = d.label;
  docDesc.textContent  = d.description;
  docBody.innerHTML    = d.bodyHtml;

  docTags.innerHTML = (d.tags || []).map(t =>
    '<span class="tag">' + t + '</span>'
  ).join('');

  docMeta.innerHTML = d.resource
    ? '<a href="' + d.resource + '" target="_blank" rel="noopener">' + d.resource + '</a>'
    : 'id: ' + d.id;

  docPanel.style.display = 'flex';
  docBody.scrollTop = 0;
}

document.getElementById('close-btn').addEventListener('click', () => {
  docPanel.style.display = 'none';
  cy.elements().removeClass('highlighted faded');
});

// ── 节点点击：展示文档 + 高亮相邻节点 ──────────────────────────────────
cy.on('tap', 'node', (e) => {
  const node = e.target;
  const d = node.data();
  showDoc(d);

  // 高亮当前节点及相邻边/节点
  cy.elements().removeClass('highlighted faded');
  node.addClass('highlighted');
  const connected = node.connectedEdges();
  connected.addClass('highlighted');
  connected.connectedNodes().addClass('highlighted');
  cy.elements().not(node).not(connected).not(connected.connectedNodes()).addClass('faded');
});

// ── 点击空白：取消高亮 ────────────────────────────────────────────────
cy.on('tap', (e) => {
  if (e.target === cy) {
    cy.elements().removeClass('highlighted faded');
  }
});
</script>
