<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty {
  text-align: center;
  margin-top: 40px;
}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  font-size: 18px;
  margin: 4px 0 2px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {
  border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px;
}
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }

#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

ync__syntax/async_await", "source": "topics/async", "target": "syntax/async_await"}}, {"data": {"id": "topics/async__patterns/async_patterns", "source": "topics/async", "target": "patterns/async_patterns"}}, {"data": {"id": "topics/async__topics/functions", "source": "topics/async", "target": "topics/functions"}}, {"data": {"id": "topics/functions__syntax/arrow_function", "source": "topics/functions", "target": "syntax/arrow_function"}}, {"data": {"id": "topics/functions__syntax/default_params", "source": "topics/functions", "target": "syntax/default_params"}}, {"data": {"id": "topics/functions__topics/variables", "source": "topics/functions", "target": "topics/variables"}}, {"data": {"id": "topics/functions__patterns/closure", "source": "topics/functions", "target": "patterns/closure"}}, {"data": {"id": "topics/functions__topics/async", "source": "topics/functions", "target": "topics/async"}}, {"data": {"id": "topics/objects_and_classes__syntax/class", "source": "topics/objects_and_classes", "target": "syntax/class"}}, {"data": {"id": "topics/objects_and_classes__patterns/prototype_chain", "source": "topics/objects_and_classes", "target": "patterns/prototype_chain"}}, {"data": {"id": "topics/objects_and_classes__syntax/destructuring", "source": "topics/objects_and_classes", "target": "syntax/destructuring"}}, {"data": {"id": "topics/objects_and_classes__syntax/spread_rest", "source": "topics/objects_and_classes", "target": "syntax/spread_rest"}}, {"data": {"id": "topics/objects_and_classes__topics/variables", "source": "topics/objects_and_classes", "target": "topics/variables"}}, {"data": {"id": "topics/variables__syntax/let_const", "source": "topics/variables", "target": "syntax/let_const"}}, {"data": {"id": "topics/variables__syntax/var", "source": "topics/variables", "target": "syntax/var"}}, {"data": {"id": "topics/variables__patterns/closure", "source": "topics/variables", "target": "patterns/closure"}}, {"data": {"id": "topics/variables__syntax/template_literals", "source": "topics/variables", "target": "syntax/template_literals"}}, {"data": {"id": "topics/variables__topics/functions", "source": "topics/variables", "target": "topics/functions"}}], "bodies": {"builtin/array": "## \u6982\u8ff0\n\n**Array\uff08\u6570\u7ec4\uff09** \u662f JavaScript \u4e2d\u6700\u6838\u5fc3\u7684\u6709\u5e8f\u96c6\u5408\u7c7b\u578b\uff0c\u7528\u4e8e\u5b58\u50a8\u548c\u64cd\u4f5c\u4e00\u7ec4\u6309\u7d22\u5f15\u6392\u5217\u7684\u6570\u636e\u3002\u6570\u7ec4\u4ece ES1 \u8d77\u5c31\u5df2\u5b58\u5728\uff0c\u5386\u7ecf ES5 \u7684\u51fd\u6570\u5f0f\u65b9\u6cd5\uff08`map`\u3001`filter`\u3001`reduce`\uff09\u5230 ES2015+ \u7684\u6269\u5c55\u7b97\u5b50\uff08`...`\u3001`flat`\u3001`flatMap`\uff09\uff0c\u9010\u6b65\u6210\u4e3a\u6570\u636e\u7ba1\u7ebf\u7684\u57fa\u77f3\u3002\u51e0\u4e4e\u6240\u6709\u6d89\u53ca\u5217\u8868\u3001\u96c6\u5408\u6216\u5e8f\u5217\u7684\u573a\u666f\u90fd\u5e94\u9996\u5148\u8003\u8651 Array\uff0c\u800c\u4e0d\u662f\u624b\u52a8\u7ba1\u7406\u5bf9\u8c61\u5c5e\u6027\u3002\u6570\u7ec4\u662f\u96f6\u7d22\u5f15\u7684\uff08zero-indexed\uff09\uff0c\u4e14\u957f\u5ea6\u53ef\u52a8\u6001\u53d8\u5316\u3002\n\n## Syntax\n\n```javascript\n// \u5b57\u9762\u91cf\u521b\u5efa\uff08\u63a8\u8350\uff09\nconst arr = [1, 2, 3];\n\n// \u6784\u9020\u51fd\u6570\u521b\u5efa\uff08\u5c11\u7528\uff0c\u6709\u9677\u9631\uff09\nconst arr2 = new Array(3);       // \u521b\u5efa\u4e00\u4e2a\u957f\u5ea6\u4e3a 3 \u7684\u7a7a\u6570\u7ec4\nconst arr3 = new Array(1, 2, 3); // \u521b\u5efa [1, 2, 3]\n\n// \u9759\u6001\u5de5\u5382\u65b9\u6cd5\nconst arr4 = Array.from('hello');          // ['h', 'e', 'l', 'l', 'o']\nconst arr5 = Array.of(1, 2, 3);            // [1, 2, 3]\n\n// \u8bbf\u95ee\u5143\u7d20\narr[0];   // 1 \u2014 \u7b2c\u4e00\u4e2a\u5143\u7d20\narr[arr.length - 1]; // 3 \u2014 \u6700\u540e\u4e00\u4e2a\u5143\u7d20\n\n// \u4fee\u6539\u5143\u7d20\narr[1] = 42; // arr \u2192 [1, 42, 3]\n\n// \u5e38\u89c1\u64cd\u4f5c\narr.length;       // 3\narr.push(4);      // \u672b\u5c3e\u8ffd\u52a0\uff0c\u8fd4\u56de\u65b0\u957f\u5ea6 4\narr.pop();        // \u79fb\u9664\u672b\u5c3e\u5143\u7d20\uff0c\u8fd4\u56de 4\narr.unshift(0);   // \u5934\u90e8\u63d2\u5165\uff0c\u8fd4\u56de\u65b0\u957f\u5ea6\narr.shift();      // \u79fb\u9664\u5934\u90e8\u5143\u7d20\n```\n\n## Examples\n\n### 1. \u57fa\u672c\u589e\u5220\u6539\u67e5\n\n```javascript\nconst fruits = ['apple', 'banana', 'cherry'];\n\n// \u67e5\nconsole.log(fruits.indexOf('banana'));  // 1\nconsole.log(fruits.includes('grape'));  // false\n\n// \u589e\nfruits.push('date');            // ['apple', 'banana', 'cherry', 'date']\nfruits.splice(1, 0, 'blueberry'); // \u5728\u7d22\u5f151\u5904\u63d2\u5165\uff1a['apple', 'blueberry', 'banana', 'cherry', 'date']\n\n// \u5220\nfruits.splice(2, 1);            // \u5220\u9664\u7d22\u5f152\u7684'banana'\nconsole.log(fruits);            // ['apple', 'blueberry', 'cherry', 'date']\n```\n\n### 2. \u51fd\u6570\u5f0f\u7ba1\u9053\uff1amap \u2192 filter \u2192 reduce\n\n```javascript\nconst orders = [\n  { id: 1, amount: 350, paid: true },\n  { id: 2, amount: 120, paid: false },\n  { id: 3, amount: 580, paid: true },\n  { id: 4, amount: 90,  paid: true },\n];\n\n// \u94fe\u5f0f\u8c03\u7528\uff1a\u627e\u51fa\u6240\u6709\u5df2\u652f\u4ed8\u8ba2\u5355\u7684\u91d1\u989d\u603b\u548c\nconst totalPaid = orders\n  .filter(order => order.paid)        // \u7b2c\u4e00\u6b65\uff1a\u7b5b\u9009\u5df2\u652f\u4ed8\n  .map(order => order.amount)         // \u7b2c\u4e8c\u6b65\uff1a\u53ea\u53d6\u91d1\u989d\n  .reduce((sum, amt) => sum + amt, 0); // \u7b2c\u4e09\u6b65\uff1a\u7d2f\u52a0\n\nconsole.log(totalPaid); // 350 + 580 + 90 = 1020\n```\n\n### 3. \u590d\u6742\u6570\u636e\u8f6c\u6362\n\n```javascript\nconst students = [\n  { name: 'Alice', scores: [88, 92, 75] },\n  { name: 'Bob',   scores: [65, 70, 80] },\n  { name: 'Carol', scores: [95, 98, 100] },\n];\n\n// flatMap\uff1a\u5148\u6620\u5c04\u518d\u6253\u5e73\uff0c\u4e00\u6b65\u5b8c\u6210\nconst allScores = students.flatMap(s => s.scores);\nconsole.log(allScores);\n// [88, 92, 75, 65, 70, 80, 95, 98, 100]\n\n// \u627e\u51fa\u6240\u6709\u5e73\u5747\u5206 >= 90 \u7684\u5b66\u751f\nconst topStudents = students\n  .map(s => ({\n    name: s.name,\n    avg: s.scores.reduce((a, b) => a + b, 0) / s.scores.length,\n  }))\n  .filter(s => s.avg >= 90);\n\nconsole.log(topStudents);\n// [{ name: 'Carol', avg: 97.666... }]\n```\n\n### 4. \u5c55\u5f00\u8fd0\u7b97\u7b26\u4e0e\u89e3\u6784\n\n```javascript\n// \u6d45\u62f7\u8d1d\nconst original = [1, 2, 3];\nconst copy = [...original];\ncopy.push(4);\nconsole.log(original); // [1, 2, 3] \u2014 \u539f\u6570\u7ec4\u4e0d\u53d7\u5f71\u54cd\n\n// \u5408\u5e76\u6570\u7ec4\nconst a = [1, 2];\nconst b = [3, 4];\nconst merged = [...a, ...b]; // [1, 2, 3, 4]\n\n// \u89e3\u6784\u8d4b\u503c\nconst [first, second, ...rest] = [10, 20, 30, 40, 50];\nconsole.log(first);  // 10\nconsole.log(second); // 20\nconsole.log(rest);   // [30, 40, 50]\n```\n\n## Key Points\n\n1. **\u6570\u7ec4\u662f\u5bf9\u8c61\uff0c`typeof []` \u8fd4\u56de `'object'`** \u2014 \u7528 `Array.isArray(arr)` \u6765\u5224\u65ad\u662f\u5426\u4e3a\u6570\u7ec4\uff0c\u4e0d\u8981\u7528 `typeof`\u3002\n2. **`map` / `filter` / `reduce` \u8fd4\u56de\u65b0\u6570\u7ec4\uff0c\u4e0d\u4fee\u6539\u539f\u6570\u7ec4**\uff1b\u800c `push` / `pop` / `splice` / `sort` \u4f1a\u4fee\u6539\u539f\u6570\u7ec4\uff08\u53d8\u5f02\u65b9\u6cd5\uff09\u3002\n3. **`forEach` \u65e0\u6cd5\u88ab `break` \u6216 `return` \u63d0\u524d\u9000\u51fa** \u2014 \u9700\u8981\u63d0\u524d\u9000\u51fa\u65f6\u7528 `for...of`\u3001`some()` \u6216 `every()`\u3002\n4. **\u7a00\u758f\u6570\u7ec4\uff08sparse array\uff09\u5bb9\u6613\u5e26\u6765\u610f\u5916**\uff1a`const arr = [1,,3]` \u6709\u7a7a\u6d1e\uff0c`forEach` \u4f1a\u8df3\u8fc7\u7a7a\u4f4d\uff0c\u4f46 `Array.from` \u4f1a\u586b\u5145 `undefined`\u3002\n5. **`sort()` \u9ed8\u8ba4\u6309\u5b57\u7b26\u4e32\u5b57\u5178\u5e8f\u6392\u5e8f** \u2014 \u5bf9\u6570\u5b57\u6392\u5e8f\u5fc5\u987b\u4f20\u5165\u6bd4\u8f83\u51fd\u6570\uff1a`arr.sort((a, b) => a - b)`\u3002\n6. **`Array(length)` \u6784\u9020\u51fd\u6570\u4ec5\u4f20\u4e00\u4e2a\u6570\u5b57\u65f6\u521b\u5efa\u7a7a\u69fd\u6570\u7ec4**\uff0c\u5e76\u975e `[length]`\uff1b\u7528 `Array.from({length}, () => val)` \u6216 `Array(length).fill(val)` \u6765\u521d\u59cb\u5316\u3002\n\n## Common Mistakes\n\n1. **\u6df7\u6dc6 `find()` \u4e0e `filter()`** \u2014 `find()` \u8fd4\u56de\u7b2c\u4e00\u4e2a\u5339\u914d\u7684**\u5143\u7d20**\uff08\u6216 `undefined`\uff09\uff0c`filter()` \u8fd4\u56de\u6240\u6709\u5339\u914d\u7684**\u65b0\u6570\u7ec4**\u3002\n   ```javascript\n   const nums = [10, 20, 30, 40];\n   const found = nums.find(n => n > 25);  // 30\n   const filtered = nums.filter(n => n > 25); // [30, 40]\n   ```\n\n2. **\u76f4\u63a5\u7ed9 `length` \u8d4b\u503c\u622a\u65ad\u6570\u7ec4\uff0c\u800c\u4e0d\u662f\u5220\u9664\u5143\u7d20**\u3002\n   ```javascript\n   let arr = [1, 2, 3, 4, 5];\n   arr.length = 3;   // arr \u2192 [1, 2, 3] \u2014 \u5143\u7d20\u88ab\u6c38\u4e45\u4e22\u5f03\uff01\n   // \u6b63\u786e\u505a\u6cd5\uff1aarr.splice(3) \u6216 arr.pop() \u9010\u4e2a\u79fb\u9664\n   ```\n\n3. **\u5728 `map` \u7684\u56de\u8c03\u4e2d\u5fd8\u8bb0\u8fd4\u56de\u503c** \u2014 \u5982\u679c\u7bad\u5934\u51fd\u6570\u7528\u4e86\u82b1\u62ec\u53f7 `{}`\uff0c\u5fc5\u987b\u663e\u5f0f `return`\uff0c\u5426\u5219\u8fd4\u56de `undefined`\u3002\n   ```javascript\n   const nums = [1, 2, 3];\n   const bad = nums.map(n => { n * 2 });   // [undefined, undefined, undefined]\n   const good = nums.map(n => n * 2);      // [2, 4, 6] \u2014 \u65e0\u82b1\u62ec\u53f7\u65f6\u9690\u5f0f\u8fd4\u56de\n   ```\n\n## Related Concepts\n\n- [Arrays and Iteration\uff08\u6570\u7ec4\u4e0e\u8fed\u4ee3\uff09](../topics/arrays_and_iteration.md) \u2014 \u66f4\u6df1\u5165\u7684\u8fed\u4ee3\u5668\u534f\u8bae\u4e0e for...of \u5faa\u73af\n- [Destructuring\uff08\u89e3\u6784\u8d4b\u503c\uff09](../syntax/destructuring.md) \u2014 \u4ece\u6570\u7ec4\u4e2d\u63d0\u53d6\u503c\u5230\u53d8\u91cf\n- [Spread / Rest\uff08\u5c55\u5f00\u4e0e\u5269\u4f59\u8fd0\u7b97\u7b26\uff09](../syntax/spread_rest.md) \u2014 \u6570\u7ec4\u7684\u6d45\u62f7\u8d1d\u3001\u5408\u5e76\u4e0e\u53c2\u6570\u6536\u96c6\n- [Map / Set\uff08\u6620\u5c04\u4e0e\u96c6\u5408\uff09](../builtin/map_set.md) \u2014 \u4e0e Array \u4e92\u8865\u7684\u96c6\u5408\u7c7b\u578b\n- [Functions\uff08\u51fd\u6570\uff09](../topics/functions.md) \u2014 \u56de\u8c03\u51fd\u6570\u4e0e\u9ad8\u9636\u51fd\u6570\u7684\u57fa\u7840\n\n## Citations\n\n- MDN: [Array - JavaScript](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Array)\n- ECMAScript Specification: [Array Objects](https://tc39.es/ecma262/#sec-array-objects)", "builtin/map_set": "## \u6982\u8ff0\n\n**Map** \u548c **Set** \u662f ES2015\uff08ES6\uff09\u5f15\u5165\u7684\u4e24\u79cd\u5168\u65b0\u96c6\u5408\u7c7b\u578b\u3002`Map` \u662f\u952e\u503c\u5bf9\u96c6\u5408\uff0c\u4e0e\u666e\u901a\u5bf9\u8c61\uff08Object\uff09\u6700\u5927\u7684\u533a\u522b\u5728\u4e8e**\u952e\u53ef\u4ee5\u662f\u4efb\u610f\u6570\u636e\u7c7b\u578b**\uff08\u5305\u62ec\u5bf9\u8c61\u3001\u51fd\u6570\u3001NaN\uff09\uff0c\u800c\u4e0d\u4ec5\u662f\u5b57\u7b26\u4e32\u6216 Symbol\u3002`Set` \u662f\u503c\uff08\u975e\u91cd\u590d\uff09\u7684\u96c6\u5408\uff0c\u81ea\u52a8\u4fdd\u8bc1\u6bcf\u4e2a\u5143\u7d20\u552f\u4e00\u3002\u76f8\u6bd4\u4f20\u7edf Object \u548c Array\uff0c\u4e24\u8005\u5728\u9891\u7e41\u589e\u5220\u67e5\u3001\u9700\u8981\u8fed\u4ee3\u987a\u5e8f\u4fdd\u969c\u3001\u4ee5\u53ca\u5904\u7406\u975e\u5b57\u7b26\u4e32\u952e\u7684\u573a\u666f\u4e0b\u6709\u663e\u8457\u6027\u80fd\u548c\u8bed\u4e49\u4f18\u52bf\u3002\n\n---\n\n## Syntax\n\n### Map\n\n```javascript\n// \u521b\u5efa\nnew Map()\nnew Map(iterable)     // [[key, value], ...] \u5f62\u5f0f\u7684\u53ef\u8fed\u4ee3\u5bf9\u8c61\n\n// \u5b9e\u4f8b\u65b9\u6cd5\nmap.set(key, value)   // \u6dfb\u52a0/\u66f4\u65b0\u952e\u503c\u5bf9\uff0c\u8fd4\u56de map \u672c\u8eab\uff08\u652f\u6301\u94fe\u5f0f\u8c03\u7528\uff09\nmap.get(key)          // \u8bfb\u53d6\u952e\u5bf9\u5e94\u7684\u503c\uff0c\u4e0d\u5b58\u5728\u8fd4\u56de undefined\nmap.has(key)          // \u68c0\u67e5\u952e\u662f\u5426\u5b58\u5728\uff0c\u8fd4\u56de boolean\nmap.delete(key)       // \u5220\u9664\u6307\u5b9a\u952e\uff0c\u8fd4\u56de boolean \u8868\u793a\u662f\u5426\u6210\u529f\u5220\u9664\nmap.clear()           // \u6e05\u7a7a\u6240\u6709\u952e\u503c\u5bf9\n\n// \u5b9e\u4f8b\u5c5e\u6027\nmap.size              // \u8fd4\u56de\u952e\u503c\u5bf9\u7684\u6570\u91cf\n\n// \u8fed\u4ee3\u65b9\u6cd5\nmap.keys()            // \u8fd4\u56de\u952e\u7684\u8fed\u4ee3\u5668\nmap.values()          // \u8fd4\u56de\u503c\u7684\u8fed\u4ee3\u5668\nmap.entries()         // \u8fd4\u56de [key, value] \u7684\u8fed\u4ee3\u5668\uff08\u9ed8\u8ba4\u8fed\u4ee3\u5668\uff09\nmap.forEach(callbackFn, thisArg?)  // \u6309\u63d2\u5165\u987a\u5e8f\u904d\u5386\n```\n\n### Set\n\n```javascript\n// \u521b\u5efa\nnew Set()\nnew Set(iterable)     // \u4ece\u53ef\u8fed\u4ee3\u5bf9\u8c61\u521b\u5efa\uff08\u91cd\u590d\u503c\u81ea\u52a8\u53bb\u91cd\uff09\n\n// \u5b9e\u4f8b\u65b9\u6cd5\nset.add(value)        // \u6dfb\u52a0\u503c\uff0c\u8fd4\u56de set \u672c\u8eab\uff08\u652f\u6301\u94fe\u5f0f\u8c03\u7528\uff09\nset.has(value)        // \u68c0\u67e5\u503c\u662f\u5426\u5b58\u5728\uff0c\u8fd4\u56de boolean\nset.delete(value)     // \u5220\u9664\u6307\u5b9a\u503c\uff0c\u8fd4\u56de boolean\nset.clear()           // \u6e05\u7a7a\u6240\u6709\u503c\n\n// \u5b9e\u4f8b\u5c5e\u6027\nset.size              // \u8fd4\u56de\u5143\u7d20\u6570\u91cf\n\n// \u8fed\u4ee3\u65b9\u6cd5\nset.values()          // \u8fd4\u56de\u503c\u7684\u8fed\u4ee3\u5668\uff08keys() \u662f values() \u7684\u522b\u540d\uff09\nset.entries()         // \u8fd4\u56de [value, value] \u7684\u8fed\u4ee3\u5668\uff08\u4fdd\u6301\u4e0e Map \u63a5\u53e3\u4e00\u81f4\uff09\nset.forEach(callbackFn, thisArg?)  // \u6309\u63d2\u5165\u987a\u5e8f\u904d\u5386\n```\n\n### WeakMap & WeakSet\n\n```javascript\n// \u521b\u5efa\nnew WeakMap()         // \u952e\u5fc5\u987b\u662f\u5bf9\u8c61\uff08\u4e0d\u80fd\u662f\u539f\u59cb\u7c7b\u578b\uff09\uff0c\u5f31\u5f15\u7528\uff0c\u4e0d\u53ef\u8fed\u4ee3\nnew WeakSet()         // \u503c\u5fc5\u987b\u662f\u5bf9\u8c61\uff0c\u5f31\u5f15\u7528\uff0c\u4e0d\u53ef\u8fed\u4ee3\n\n// WeakMap \u65b9\u6cd5\uff08\u6ca1\u6709 size\u3001clear\u3001\u8fed\u4ee3\u65b9\u6cd5\uff09\nweakMap.set(key, value)\nweakMap.get(key)\nweakMap.has(key)\nweakMap.delete(key)\n\n// WeakSet \u65b9\u6cd5\uff08\u6ca1\u6709 size\u3001clear\u3001\u8fed\u4ee3\u65b9\u6cd5\uff09\nweakSet.add(value)\nweakSet.has(value)\nweakSet.delete(value)\n```\n\n---\n\n## Examples\n\n### 1. Map \u57fa\u672c\u7528\u6cd5 \u2014 \u4efb\u610f\u7c7b\u578b\u952e\n\n```javascript\nconst map = new Map();\n\n// \u952e\u53ef\u4ee5\u662f\u5404\u79cd\u7c7b\u578b\nconst objKey = { id: 1 };\nconst funcKey = () => {};\nconst nanKey = NaN;\n\nmap.set('name', 'Alice');\nmap.set(objKey, 'object value');\nmap.set(funcKey, 'function value');\nmap.set(nanKey, 'NaN is a valid key');\nmap.set(undefined, 'undefined is also valid');\n\nconsole.log(map.get('name'));        // 'Alice'\nconsole.log(map.get(objKey));        // 'object value'\nconsole.log(map.get(nanKey));        // 'NaN is a valid key' \u2014 NaN \u88ab\u89c6\u4e3a\u540c\u4e00\u4e2a\u952e\nconsole.log(map.has(funcKey));       // true\nconsole.log(map.size);               // 5\n\n// \u94fe\u5f0f\u8c03\u7528\nmap.set('a', 1).set('b', 2).set('c', 3);\n```\n\n### 2. Map vs Object \u2014 \u771f\u6b63\u7684\u5b57\u5178\n\n```javascript\n// Object \u7684\u9650\u5236\uff1a\u952e\u4f1a\u88ab\u8f6c\u4e3a\u5b57\u7b26\u4e32\nconst obj = {};\nobj[true] = 1;\nobj[{}] = 2;\nconsole.log(Object.keys(obj));   // ['true', '[object Object]']\n\n// Map \u4fdd\u7559\u952e\u7684\u539f\u59cb\u7c7b\u578b\nconst map = new Map();\nmap.set(true, 1);\nmap.set({}, 2);\nconsole.log([...map.keys()]);    // [true, {}] \u2014 \u952e\u7c7b\u578b\u4fdd\u7559\n\n// Object \u6ca1\u6709\u987a\u5e8f\u4fdd\u969c\uff08ES6 \u867d\u7136\u5b9a\u4e49\u4e86\u679a\u4e3e\u987a\u5e8f\uff0c\u4f46\u6709\u9677\u9631\uff09\n// Map \u4e25\u683c\u4fdd\u8bc1\u63d2\u5165\u987a\u5e8f\nconst m = new Map();\nm.set('z', 1);\nm.set('a', 2);\nm.set('b', 3);\nconsole.log([...m.keys()]);      // ['z', 'a', 'b'] \u2014 \u4e25\u683c\u6309\u63d2\u5165\u987a\u5e8f\n```\n\n### 3. Set \u57fa\u672c\u7528\u6cd5 \u2014 \u53bb\u91cd\u4e0e\u96c6\u5408\u8fd0\u7b97\n\n```javascript\n// \u6570\u7ec4\u53bb\u91cd\nconst numbers = [1, 2, 2, 3, 4, 4, 5];\nconst unique = [...new Set(numbers)];\nconsole.log(unique);  // [1, 2, 3, 4, 5]\n\n// Set \u5143\u7d20\u7684\u552f\u4e00\u6027\u4f7f\u7528 SameValueZero \u6bd4\u8f83\nconst set = new Set();\nset.add(1);\nset.add('1');     // \u4e0d\u540c\u7c7b\u578b\uff0c\u4e0d\u7b97\u91cd\u590d\nset.add(1);       // \u91cd\u590d\uff0c\u88ab\u5ffd\u7565\nset.add(NaN);\nset.add(NaN);     // NaN \u88ab\u89c6\u4e3a\u76f8\u7b49\uff0c\u88ab\u5ffd\u7565\nconsole.log(set.size);  // 3 \u2014 1, '1', NaN\n\n// \u96c6\u5408\u64cd\u4f5c\uff1a\u4ea4\u96c6\u3001\u5dee\u96c6\u3001\u5e76\u96c6\nconst setA = new Set([1, 2, 3, 4]);\nconst setB = new Set([3, 4, 5, 6]);\n\n// \u5e76\u96c6\nconst union = new Set([...setA, ...setB]);\nconsole.log([...union]);  // [1, 2, 3, 4, 5, 6]\n\n// \u4ea4\u96c6\nconst intersection = new Set([...setA].filter(x => setB.has(x)));\nconsole.log([...intersection]);  // [3, 4]\n\n// \u5dee\u96c6\uff08A - B\uff09\nconst difference = new Set([...setA].filter(x => !setB.has(x)));\nconsole.log([...difference]);  // [1, 2]\n```\n\n### 4. WeakMap \u2014 \u5185\u5b58\u5b89\u5168\u7684\u5bf9\u8c61\u952e\u6620\u5c04\n\n```javascript\n// WeakMap \u907f\u514d\u5185\u5b58\u6cc4\u9732\uff1a\u5f53\u952e\u5bf9\u8c61\u88ab\u56de\u6536\u65f6\uff0c\u5173\u8054\u503c\u4e5f\u88ab\u56de\u6536\nlet user = { name: 'Bob' };\nconst cache = new WeakMap();\n\ncache.set(user, { lastLogin: Date.now() });\nconsole.log(cache.get(user));  // { lastLogin: ... }\n\nuser = null;  // \u4e0d\u518d\u5f15\u7528\u8be5\u5bf9\u8c61\n// WeakMap \u4e2d\u7684\u6761\u76ee\u4f1a\u5728\u4e0b\u6b21 GC \u65f6\u81ea\u52a8\u6e05\u9664 \u2014 \u65e0\u9700\u624b\u52a8 delete\n\n// \u5178\u578b\u5e94\u7528\uff1a\u4e3a DOM \u5143\u7d20\u5173\u8054\u79c1\u6709\u6570\u636e\n// const elementMap = new WeakMap();\n// elementMap.set(buttonElement, { clickCount: 0 });\n// \u5f53 buttonElement \u4ece DOM \u4e2d\u79fb\u9664\u540e\uff0c\u6570\u636e\u81ea\u52a8\u91ca\u653e\n```\n\n### 5. \u8fed\u4ee3 Map \u548c Set\n\n```javascript\nconst map = new Map([['a', 1], ['b', 2], ['c', 3]]);\n\n// for...of \u9ed8\u8ba4\u8fed\u4ee3 entries\nfor (const [key, value] of map) {\n  console.log(`${key} = ${value}`);\n}\n// a = 1\n// b = 2\n// c = 3\n\n// \u8f6c\u4e3a\u6570\u7ec4\nconsole.log([...map]);          // [['a', 1], ['b', 2], ['c', 3]]\nconsole.log([...map.keys()]);   // ['a', 'b', 'c']\nconsole.log([...map.values()]); // [1, 2, 3]\n\n// Set \u7684 for...of \u8fed\u4ee3 values\nconst set = new Set(['x', 'y', 'z']);\nfor (const val of set) {\n  console.log(val);  // 'x', 'y', 'z'\n}\n\n// \u8f6c\u6362\u4e3a\u6570\u7ec4\nconsole.log([...set]);  // ['x', 'y', 'z']\n```\n\n---\n\n## Key Points\n\n- **Map \u7684\u952e\u53ef\u4ee5\u662f\u4efb\u610f\u7c7b\u578b**\uff1a\u5305\u62ec\u5bf9\u8c61\u3001\u51fd\u6570\u3001NaN\u3001undefined\u3002\u8fd9\u4e0e Object\uff08\u952e\u53ea\u80fd\u662f string/Symbol\uff09\u5b8c\u5168\u4e0d\u540c\u3002\n- **\u4e25\u683c\u4fdd\u6301\u63d2\u5165\u987a\u5e8f**\uff1aMap \u548c Set \u904d\u5386\u65f6\u4e00\u5b9a\u6309\u5143\u7d20\u63d2\u5165\u7684\u5148\u540e\u987a\u5e8f\u8fdb\u884c\u3002Object \u7684\u679a\u4e3e\u987a\u5e8f\u5219\u53d7\u5230\u6574\u6570\u952e\u548c\u5176\u4ed6\u952e\u6392\u5e8f\u89c4\u5219\u5f71\u54cd\u3002\n- **SameValueZero \u6bd4\u8f83**\uff1aMap \u7684\u952e\u76f8\u7b49\u6027\u548c Set \u7684\u503c\u552f\u4e00\u6027\u4f7f\u7528 SameValueZero \u7b97\u6cd5\uff08`===` \u7684\u53d8\u4f53\uff0c\u4f46 `NaN === NaN` \u89c6\u4e3a true\uff0c`+0 === -0` \u89c6\u4e3a true\uff09\u3002\n- **`map.size` \u548c `set.size` \u662f\u5c5e\u6027\uff0c\u4e0d\u662f\u65b9\u6cd5**\uff1a\u76f4\u63a5\u8bfb `.size` \u800c\u4e0d\u662f `.size()`\uff0c\u8fd9\u70b9\u4e0e\u6570\u7ec4 `.length` \u4e00\u81f4\u3002\n- **WeakMap/WeakSet \u7684\u952e/\u503c\u5fc5\u987b\u662f\u5bf9\u8c61**\uff1a\u4e0d\u80fd\u4f7f\u7528\u539f\u59cb\u7c7b\u578b\uff08number/string/boolean\uff09\uff0c\u5426\u5219\u629b `TypeError`\u3002\n- **WeakMap/WeakSet \u4e0d\u53ef\u8fed\u4ee3**\uff1a\u6ca1\u6709 `keys()`\u3001`values()`\u3001`entries()` \u65b9\u6cd5\uff0c\u4e5f\u6ca1\u6709 `size` \u5c5e\u6027\u548c `forEach`\u3002\u8fd9\u662f\u56e0\u5176\u5f31\u5f15\u7528\u7279\u6027\u51b3\u5b9a\u7684\u3002\n- **`Map` \u6bd4 `Object` \u66f4\u9002\u5408\u9891\u7e41\u589e\u5220\u7684\u573a\u666f**\uff1aMap \u7684 `set/get` \u64cd\u4f5c\u5728\u5f15\u64ce\u7ea7\u522b\u505a\u4e86\u4f18\u5316\uff0c\u5c24\u5176\u5728\u952e\u6570\u91cf\u8f83\u591a\u65f6\u6027\u80fd\u4f18\u4e8e Object\u3002\n\n---\n\n## Common Mistakes\n\n### \u274c \u7528 Object \u505a Map \u7528\u9014\uff0c\u952e\u88ab\u9690\u5f0f\u8f6c\u5b57\u7b26\u4e32\n\n```javascript\nconst obj = {};\nobj[true] = 'yes';\nobj[1] = 'number';\n// obj['true'] \u548c obj['1'] \u2014 \u952e\u5168\u88ab\u8f6c\u6210\u4e86 string\nconsole.log(obj[true]);   // 'number' \u2014 \u4e0e\u9884\u671f\u4e0d\u7b26\nconsole.log(Object.keys(obj));  // ['1', 'true']\n\n// \u2705 \u6b63\u786e\u505a\u6cd5\uff1a\u4f7f\u7528 Map\nconst map = new Map();\nmap.set(true, 'yes');\nmap.set(1, 'number');\nconsole.log(map.get(true));  // 'yes' \u2014 \u6b63\u786e\u533a\u5206\n```\n\n### \u274c \u8ba4\u4e3a `map.size()` \u662f\u65b9\u6cd5\n\n```javascript\nconst m = new Map([['a', 1]]);\nconsole.log(m.size());  // TypeError: m.size is not a function\n\n// \u2705 size \u662f\u5c5e\u6027\uff0c\u4e0d\u662f\u65b9\u6cd5\nconsole.log(m.size);    // 1\n```\n\n### \u274c \u7528\u5f15\u7528\u5bf9\u8c61\u76f4\u63a5\u67e5\u8be2 Map\uff0c\u5fd8\u8bb0\u5fc5\u987b\u662f\u540c\u4e00\u4e2a\u5f15\u7528\n\n```javascript\nconst map = new Map();\nmap.set({ id: 1 }, 'metadata');\n\n// \u867d\u7136\u5185\u5bb9\u76f8\u540c\uff0c\u4f46\u8fd9\u662f\u53e6\u4e00\u4e2a\u5bf9\u8c61\u5f15\u7528\nconsole.log(map.get({ id: 1 }));  // undefined\n\n// \u2705 \u6b63\u786e\u505a\u6cd5\uff1a\u4fdd\u5b58\u5f15\u7528\nconst key = { id: 1 };\nmap.set(key, 'metadata');\nconsole.log(map.get(key));  // 'metadata'\n```\n\n---\n\n## Related Concepts\n\n- [Array\uff08\u6570\u7ec4\uff09](../builtin/array.md) \u2014 `[...map]` \u548c `[...set]` \u53ef\u4ee5\u8f7b\u677e\u5728\u96c6\u5408\u548c\u6570\u7ec4\u95f4\u8f6c\u6362\n- [\u6570\u7ec4\u4e0e\u8fed\u4ee3](../topics/arrays_and_iteration.md) \u2014 `for...of` \u8fed\u4ee3\u3001\u89e3\u6784 Map \u6761\u76ee\n- [\u5bf9\u8c61\u4e0e\u7c7b](../topics/objects_and_classes.md) \u2014 Object \u4f5c\u4e3a\u952e\u503c\u5bf9\u7684\u9650\u5236\uff0c\u5bf9\u6bd4 Map \u7684\u4f18\u52bf\n- [\u5c55\u5f00\u8bed\u6cd5](../syntax/spread_rest.md) \u2014 `[...set]` \u5feb\u901f\u5c06 Set \u8f6c\u4e3a\u6570\u7ec4\n- [\u89e3\u6784\u8bed\u6cd5](../syntax/destructuring.md) \u2014 `for (const [k, v] of map)` \u89e3\u6784 Map \u6761\u76ee\n\n---\n\n## Citations\n\n- [MDN: Map](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Map)\n- [MDN: Set](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Set)\n- [MDN: WeakMap](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/WeakMap)\n- [MDN: WeakSet](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/WeakSet)\n- [ECMAScript\u00ae 2025 Language Specification \u2014 Map Objects](https://tc39.es/ecma262/#sec-map-objects)\n- [ECMAScript\u00ae 2025 Language Specification \u2014 Set Objects](https://tc39.es/ecma262/#sec-set-objects)", "builtin/promise": "**Promise** \u662f ES2015\uff08ES6\uff09\u5f15\u5165\u7684\u5185\u5efa\u5bf9\u8c61\uff0c\u7528\u4e8e\u8868\u793a\u4e00\u4e2a\u5f02\u6b65\u64cd\u4f5c\u7684\u6700\u7ec8\u5b8c\u6210\uff08\u6216\u5931\u8d25\uff09\u53ca\u5176\u7ed3\u679c\u503c\u3002\u5b83\u53d6\u4ee3\u4e86\u4f20\u7edf\u7684\u56de\u8c03\u5d4c\u5957\uff08Callback Hell\uff09\uff0c\u63d0\u4f9b\u4e86\u4e00\u79cd\u53ef\u94fe\u5f0f\u8c03\u7528\u3001\u9519\u8bef\u5904\u7406\u7edf\u4e00\u7684\u5f02\u6b65\u7f16\u7a0b\u6a21\u578b\u3002Promise \u7684\u672c\u8d28\u662f\u4e00\u4e2a**\u72b6\u6001\u673a**\uff1a\u521d\u59cb\u4e3a `pending`\uff08\u5f85\u5b9a\uff09\uff0c\u53ef\u53d8\u4e3a `fulfilled`\uff08\u5df2\u5151\u73b0\uff09\u6216 `rejected`\uff08\u5df2\u62d2\u7edd\uff09\uff0c\u4e00\u65e6\u72b6\u6001\u53d8\u66f4\u5c31\u4e0d\u53ef\u518d\u9006\u8f6c\u3002\u4ece ES2017 \u8d77\uff0c`async/await` \u8bed\u6cd5\u8fdb\u4e00\u6b65\u7b80\u5316\u4e86 Promise \u7684\u4f7f\u7528\uff0c\u4f46\u5e95\u5c42\u673a\u5236\u4ecd\u7136\u662f Promise\u3002\n\n## Syntax\n\n```javascript\n// \u6784\u9020\u4e00\u4e2a Promise\nnew Promise((resolve, reject) => {\n  // \u6267\u884c\u5f02\u6b65\u64cd\u4f5c\n  if (/* \u64cd\u4f5c\u6210\u529f */) {\n    resolve(value);   // \u5c06\u72b6\u6001\u5207\u6362\u4e3a fulfilled\n  } else {\n    reject(reason);   // \u5c06\u72b6\u6001\u5207\u6362\u4e3a rejected\n  }\n});\n\n// \u5b9e\u4f8b\u65b9\u6cd5\u94fe\npromise\n  .then(onFulfilled, onRejected)   // \u6ce8\u518c\u5151\u73b0/\u62d2\u7edd\u56de\u8c03\n  .catch(onRejected)               // \u6ce8\u518c\u62d2\u7edd\u56de\u8c03\uff08\u8bed\u6cd5\u7cd6\uff09\n  .finally(onFinally)              // \u65e0\u8bba\u6210\u8d25\u90fd\u4f1a\u6267\u884c\uff08ES2018\uff09\n\n// \u9759\u6001\u65b9\u6cd5\nPromise.resolve(value)\nPromise.reject(reason)\nPromise.all(iterable)              // \u5168\u90e8\u5151\u73b0\u6216\u4efb\u4e00\u62d2\u7edd\nPromise.allSettled(iterable)       // ES2020\uff1a\u7b49\u5f85\u6240\u6709 Promise \u5b8c\u6210\uff08\u65e0\u8bba\u6210\u529f/\u5931\u8d25\uff09\nPromise.race(iterable)             // \u7ade\u901f\uff1a\u8fd4\u56de\u7b2c\u4e00\u4e2a\u5b8c\u6210\u7684 Promise\nPromise.any(iterable)              // ES2021\uff1a\u8fd4\u56de\u7b2c\u4e00\u4e2a\u5151\u73b0\u7684 Promise\n```\n\n## Examples\n\n### \u57fa\u7840\uff1a\u5c06\u56de\u8c03\u5305\u88c5\u4e3a Promise\n\n```javascript\n// \u4f20\u7edf\u56de\u8c03\u65b9\u5f0f\nfunction readFileCallback(path, callback) {\n  // \u6a21\u62df\u5f02\u6b65\u6587\u4ef6\u8bfb\u53d6\n  setTimeout(() => {\n    if (path) {\n      callback(null, `\u5185\u5bb9\u6765\u81ea ${path}`);\n    } else {\n      callback(new Error('\u8def\u5f84\u4e0d\u80fd\u4e3a\u7a7a'));\n    }\n  }, 100);\n}\n\n// Promise \u5316 \u2014 \u5c06\u57fa\u4e8e\u56de\u8c03\u7684 API \u8f6c\u6362\u4e3a\u8fd4\u56de Promise \u7684\u7248\u672c\nfunction readFilePromise(path) {\n  return new Promise((resolve, reject) => {\n    setTimeout(() => {\n      if (path) {\n        resolve(`\u5185\u5bb9\u6765\u81ea ${path}`);\n      } else {\n        reject(new Error('\u8def\u5f84\u4e0d\u80fd\u4e3a\u7a7a'));\n      }\n    }, 100);\n  });\n}\n\nreadFilePromise('/data/file.txt')\n  .then(content => console.log(content))   // \"\u5185\u5bb9\u6765\u81ea /data/file.txt\"\n  .catch(err => console.error(err.message));\n```\n\n### \u94fe\u5f0f\u8c03\u7528\u4e0e\u503c\u4f20\u9012\n\n```javascript\n// then \u8fd4\u56de\u4e00\u4e2a\u65b0\u7684 Promise\uff0c\u5b9e\u73b0\u94fe\u5f0f\u8c03\u7528\nfetch('/api/user/1')\n  .then(response => response.json())       // \u8fd4\u56de\u4e00\u4e2a Promise\uff08\u89e3\u6790 JSON\uff09\n  .then(user => user.id)                   // \u4e0a\u4e00\u4e2a then \u7684\u8fd4\u56de\u503c { id: 42, ... } \u2192 42\n  .then(id => `User ID is ${id}`)\n  .then(msg => console.log(msg))           // \"User ID is 42\"\n  .catch(err => console.error('\u8bf7\u6c42\u5931\u8d25:', err));\n```\n\n### Promise.all \u2014 \u5e76\u53d1\u7b49\u5f85\u591a\u4e2a\u5f02\u6b65\u4efb\u52a1\n\n```javascript\nconst fetchUser = fetch('/api/user/1').then(r => r.json());\nconst fetchPosts = fetch('/api/user/1/posts').then(r => r.json());\nconst fetchFriends = fetch('/api/user/1/friends').then(r => r.json());\n\n// \u4e09\u4e2a\u8bf7\u6c42\u5e76\u884c\u53d1\u51fa\uff0c\u7b49\u5168\u90e8\u5b8c\u6210\u540e\u7edf\u4e00\u5904\u7406\nPromise.all([fetchUser, fetchPosts, fetchFriends])\n  .then(([user, posts, friends]) => {\n    console.log(user.name, `\u6709 ${posts.length} \u7bc7\u6587\u7ae0`, `${friends.length} \u4f4d\u597d\u53cb`);\n  })\n  .catch(err => {\n    // \u53ea\u8981\u6709\u4e00\u4e2a Promise \u88ab reject\uff0c\u6574\u4e2a Promise.all \u5c31\u4f1a reject\n    console.error('\u81f3\u5c11\u4e00\u4e2a\u8bf7\u6c42\u5931\u8d25\u4e86:', err);\n  });\n```\n\n### Promise.allSettled \u2014 \u7b49\u5f85\u6240\u6709\u4efb\u52a1\u5b8c\u6210\uff0c\u4e0d\u5173\u5fc3\u7ed3\u679c\n\n```javascript\nconst tasks = [\n  fetch('/api/data/1').then(r => r.json()),\n  fetch('/api/data/2').then(r => r.json()),\n  fetch('/api/data/3').then(r => r.json()),\n];\n\n// \u65e0\u8bba\u6210\u529f\u8fd8\u662f\u5931\u8d25\uff0c\u90fd\u7b49\u6240\u6709\u8bf7\u6c42\u5b8c\u6210\nPromise.allSettled(tasks).then(results => {\n  // results \u662f\u4e00\u4e2a\u5bf9\u8c61\u6570\u7ec4\uff0c\u6bcf\u4e2a\u5bf9\u8c61\u6709 status \u548c value/reason \u5b57\u6bb5\n  results.forEach((result, index) => {\n    if (result.status === 'fulfilled') {\n      console.log(`\u4efb\u52a1 ${index} \u6210\u529f:`, result.value);\n    } else {\n      console.warn(`\u4efb\u52a1 ${index} \u5931\u8d25:`, result.reason);\n    }\n  });\n});\n```\n\n### Promise.race \u2014 \u7ade\u901f\uff08\u53ef\u7528\u4e8e\u8d85\u65f6\u63a7\u5236\uff09\n\n```javascript\nfunction withTimeout(promise, ms) {\n  const timeout = new Promise((_, reject) =>\n    setTimeout(() => reject(new Error('\u8bf7\u6c42\u8d85\u65f6')), ms)\n  );\n  return Promise.race([promise, timeout]);\n}\n\n// \u5982\u679c API \u5728 3 \u79d2\u5185\u6ca1\u6709\u54cd\u5e94\uff0c\u5219\u629b\u51fa\u8d85\u65f6\u9519\u8bef\nwithTimeout(fetch('https://api.example.com/data'), 3000)\n  .then(response => console.log('\u8bf7\u6c42\u6210\u529f'))\n  .catch(err => console.error(err.message));  // \"\u8bf7\u6c42\u8d85\u65f6\" \u6216\u7f51\u7edc\u9519\u8bef\n```\n\n### Promise.any \u2014 \u53d6\u7b2c\u4e00\u4e2a\u6210\u529f\u7684 Promise\n\n```javascript\n// \u591a\u4e2a\u5907\u7528\u670d\u52a1\u5668\uff0c\u53d6\u6700\u5feb\u6210\u529f\u54cd\u5e94\u7684\u90a3\u4e2a\nconst servers = [\n  fetch('https://cdn1.example.com/data'),\n  fetch('https://cdn2.example.com/data'),\n  fetch('https://cdn3.example.com/data'),\n];\n\nPromise.any(servers)\n  .then(\u6700\u5feb\u54cd\u5e94 => console.log('\u6700\u5feb\u6210\u529f\u54cd\u5e94\u6765\u81ea:', \u6700\u5feb\u54cd\u5e94.url))\n  .catch(err => {\n    // \u53ea\u6709\u6240\u6709 Promise \u90fd\u62d2\u7edd\u4e86\u624d\u4f1a\u8d70\u5230\u8fd9\u91cc\n    console.error('\u6240\u6709\u5907\u7528\u670d\u52a1\u5668\u90fd\u4e0d\u53ef\u7528:', err.errors); // errors \u662f\u6240\u6709\u62d2\u7edd\u539f\u56e0\u7684\u6570\u7ec4\n  });\n```\n\n## Key Points\n\n- **\u72b6\u6001\u4e0d\u53ef\u9006**\uff1aPromise \u4e00\u65e6\u4ece `pending` \u53d8\u4e3a `fulfilled` \u6216 `rejected`\uff0c\u72b6\u6001\u5c31\u6c38\u4e45\u9501\u5b9a\uff0c\u4e0d\u4f1a\u518d\u6b21\u6539\u53d8\u3002\u4efb\u4f55\u5bf9 `resolve` \u6216 `reject` \u7684\u540e\u7eed\u8c03\u7528\u90fd\u4f1a\u88ab\u5ffd\u7565\u3002\n- **then \u59cb\u7ec8\u8fd4\u56de\u65b0 Promise**\uff1a`.then()` \u548c `.catch()` \u90fd\u8fd4\u56de\u4e00\u4e2a\u65b0\u7684 Promise\uff0c\u800c\u975e\u539f Promise\uff0c\u8fd9\u624d\u4f7f\u5f97\u94fe\u5f0f\u8c03\u7528\u6210\u4e3a\u53ef\u80fd\u3002\n- **\u503c\u7a7f\u900f & \u9690\u5f0f\u8fd4\u56de**\uff1a\u5982\u679c `.then()` \u4f20\u5165\u7684\u4e0d\u662f\u51fd\u6570\uff08\u4f8b\u5982 `null` \u6216\u666e\u901a\u503c\uff09\uff0c\u8be5\u503c\u4f1a\u900f\u4f20\u5230\u4e0b\u4e00\u4e2a `.then()`\uff1b\u5982\u679c `onFulfilled` \u8fd4\u56de\u4e00\u4e2a\u975e Promise \u503c\uff0c\u5b83\u4f1a\u88ab\u81ea\u52a8\u5305\u88c5\u4e3a `Promise.resolve()`\u3002\n- **\u5fae\u4efb\u52a1\uff08Microtask\uff09**\uff1aPromise \u7684\u56de\u8c03\uff08`then`/`catch`/`finally`\uff09\u5728**\u5fae\u4efb\u52a1\u961f\u5217**\u4e2d\u6267\u884c\uff0c\u4f18\u5148\u7ea7\u9ad8\u4e8e `setTimeout`\u3001`setInterval` \u7b49\u5b8f\u4efb\u52a1\u3002\u8fd9\u610f\u5473\u7740 Promise \u56de\u8c03\u4f1a\u5728 DOM \u6e32\u67d3\u4e4b\u524d\u6267\u884c\u3002\n- **\u9519\u8bef\u5192\u6ce1**\uff1a\u94fe\u5f0f\u8c03\u7528\u4e2d\uff0c\u5982\u679c\u4e00\u4e2a `.then()` \u6ca1\u6709\u63d0\u4f9b `onRejected` \u53c2\u6570\uff0c\u9519\u8bef\u4f1a\u4e00\u76f4\u5411\u540e\u5192\u6ce1\u5230\u6700\u8fd1\u7684 `.catch()`\u3002\u8fd9\u7c7b\u4f3c\u4e8e\u540c\u6b65\u4ee3\u7801\u4e2d `try/catch` \u7684\u5f02\u5e38\u4f20\u64ad\u884c\u4e3a\u3002\n- **`finally` \u4e0d\u6539\u53d8\u503c**\uff1a`finally` \u7684\u56de\u8c03\u4e0d\u63a5\u53d7\u53c2\u6570\uff0c\u4e14\u5b83\u7684\u8fd4\u56de\u503c\u4e0d\u4f1a\u88ab\u4e0b\u4e00\u4e2a `.then()` \u63a5\u6536\uff08\u9664\u975e\u8fd4\u56de\u4e00\u4e2a rejected Promise\uff09\u3002\u5b83\u6700\u5e38\u7528\u4e8e\u6e05\u7406\u64cd\u4f5c\uff08\u5982\u5173\u95ed\u52a0\u8f7d\u72b6\u6001\uff09\u3002\n- **\u9759\u6001\u65b9\u6cd5\u90fd\u662f Promise \u5b9e\u4f8b\u5de5\u5382**\uff1a`Promise.resolve()` \u5c06\u4efb\u610f\u503c\u5305\u88c5\u4e3a\u5df2\u5151\u73b0\u7684 Promise\uff1b`Promise.reject()` \u521b\u5efa\u4e00\u4e2a\u7acb\u5373\u62d2\u7edd\u7684 Promise\u3002\u5b83\u4eec\u5e38\u7528\u4e8e\u5c06\u975e Promise \u503c\u7edf\u4e00\u4e3a Promise \u5f62\u5f0f\u3002\n\n## Common Mistakes\n\n- **\u5fd8\u8bb0 return Promise**\uff1a\u5728 `.then()` \u4e2d\u6267\u884c\u5f02\u6b65\u64cd\u4f5c\u65f6\u5fd8\u8bb0 `return`\uff0c\u5bfc\u81f4\u4e0b\u4e00\u4e2a `.then()` \u62ff\u4e0d\u5230\u9884\u671f\u7684\u503c\u3002\n  ```javascript\n  // \u274c \u9519\u8bef\uff1a\u6ca1\u6709 return fetch \u8fd4\u56de\u7684 Promise\n  fetch('/api/data')\n    .then(response => {\n      fetch('/api/log');       // \u8fd9\u53ea\u662f\u4e00\u4e2a fetch \u8c03\u7528\uff0c\u4f46\u6ca1\u6709\u8fd4\u56de\n    })\n    .then(logResult => {\n      console.log(logResult);  // undefined\uff0c\u4e0d\u662f\u671f\u671b\u7684\u54cd\u5e94\u6570\u636e\n    });\n\n  // \u2705 \u6b63\u786e\uff1areturn \u8fd4\u56de Promise\n  fetch('/api/data')\n    .then(response => {\n      return fetch('/api/log');\n    })\n    .then(logResult => {\n      console.log(logResult);  // \u2705 \u5b9e\u9645\u7684\u54cd\u5e94\u5bf9\u8c61\n    });\n  ```\n\n- **\u5728 Promise \u5916\u90e8\u4f7f\u7528 try/catch \u6355\u83b7\u62d2\u7edd**\uff1aPromise \u7684\u5f02\u6b65\u7279\u6027\u610f\u5473\u7740\u5b83\u629b\u51fa\u7684\u9519\u8bef\u65e0\u6cd5\u88ab\u5916\u90e8\u7684\u540c\u6b65 `try/catch` \u6355\u83b7\u3002\n  ```javascript\n  // \u274c \u9519\u8bef\uff1atry/catch \u65e0\u6cd5\u6355\u83b7\u5f02\u6b65\u629b\u51fa\u7684\u9519\u8bef\n  try {\n    new Promise((_, reject) => reject(new Error('\u5931\u8d25\u4e86')));\n  } catch (e) {\n    console.log('\u6c38\u8fdc\u4e0d\u4f1a\u6267\u884c\u5230\u8fd9\u91cc');\n  }\n\n  // \u2705 \u6b63\u786e\uff1a\u4f7f\u7528 .catch() \u6216 await + try/catch\n  new Promise((_, reject) => reject(new Error('\u5931\u8d25\u4e86')))\n    .catch(e => console.log(e.message));  // \"\u5931\u8d25\u4e86\"\n\n  // \u6216\u8005\u5728 async \u51fd\u6570\u4e2d\u7528 try/catch\n  async function handleIt() {\n    try {\n      await new Promise((_, reject) => reject(new Error('\u5931\u8d25\u4e86')));\n    } catch (e) {\n      console.log(e.message); // \"\u5931\u8d25\u4e86\"\n    }\n  }\n  ```\n\n- **\u5728 `forEach` \u4e2d\u4e32\u884c\u6267\u884c\u5f02\u6b65\u64cd\u4f5c**\uff1a\u7528 `forEach` \u904d\u5386 Promise \u6570\u7ec4\u65f6\uff0c\u6240\u6709 Promise \u5b9e\u9645\u4e0a\u4f1a\u5e76\u53d1\u542f\u52a8\uff0c\u800c\u975e\u6309\u987a\u5e8f\u6267\u884c\u3002\n  ```javascript\n  const urls = ['/api/1', '/api/2', '/api/3'];\n\n  // \u274c \u9519\u8bef\uff1a\u4e09\u4e2a\u8bf7\u6c42\u51e0\u4e4e\u540c\u65f6\u53d1\u51fa\uff08\u5e76\u53d1\uff09\uff0c\u4e0d\u662f\u4e32\u884c\n  urls.forEach(async url => {\n    const data = await fetch(url);\n    console.log(data);\n  });\n\n  // \u2705 \u6b63\u786e\uff1a\u4f7f\u7528 reduce \u6216 for...of \u5b9e\u73b0\u4e32\u884c\n  async function sequentialFetch() {\n    for (const url of urls) {\n      const data = await fetch(url);\n      console.log(data);\n    }\n  }\n  ```\n\n- **\u672a\u5904\u7406\u7684 Promise \u62d2\u7edd\uff08Unhandled Rejection\uff09**\uff1a\u521b\u5efa\u4e86\u4e00\u4e2a Promise \u4f46\u6ca1\u6709\u6302\u8f7d `.catch()`\uff0c\u5f53\u5b83\u88ab\u62d2\u7edd\u65f6\u4f1a\u5728\u5168\u5c40\u629b\u51fa\u4e00\u4e2a `unhandledrejection` \u4e8b\u4ef6\uff0cNode.js \u751a\u81f3\u4f1a\u5bfc\u81f4\u8fdb\u7a0b\u9000\u51fa\u3002\u59cb\u7ec8\u4e3a Promise \u94fe\u6dfb\u52a0\u9519\u8bef\u5904\u7406\u3002\n\n## Related Concepts\n\n- [Async/Await \u8bed\u6cd5](../syntax/async_await.md) \u2014 \u57fa\u4e8e Promise \u7684\u8bed\u6cd5\u7cd6\uff0c\u7528\u540c\u6b65\u98ce\u683c\u5199\u5f02\u6b65\u4ee3\u7801\n- [\u5f02\u6b65\u7f16\u7a0b\u6982\u8ff0](../topics/async.md) \u2014 JavaScript \u5f02\u6b65\u6a21\u578b\u548c\u4e8b\u4ef6\u5faa\u73af\u7684\u5b8c\u6574\u4ecb\u7ecd\n- [\u5f02\u6b65\u7f16\u7a0b\u6a21\u5f0f](../patterns/async_patterns.md) \u2014 Promise.all\u3001Promise.allSettled\u3001Promise.race \u7b49\u5e76\u53d1\u6a21\u5f0f\u7684\u6700\u4f73\u5b9e\u8df5\n- [Array](../builtin/array.md) \u2014 \u5e38\u4e0e Promise.all \u914d\u5408\u5904\u7406\u6279\u91cf\u5f02\u6b65\u4efb\u52a1\n- [Arrow Functions](../syntax/arrow_function.md) \u2014 \u5728 Promise \u94fe\u4e2d\u5e38\u7528\uff0c\u7b80\u6d01\u4e14\u81ea\u52a8\u7ed1\u5b9a `this`\n- [Template Literals](../syntax/template_literals.md) \u2014 \u7528\u4e8e\u6784\u5efa Promise \u94fe\u4e2d\u7684\u52a8\u6001\u5b57\u7b26\u4e32\u8f93\u51fa\n\n## Citations\n\n- [MDN: Promise](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Promise)\n- [MDN: Using Promises](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Guide/Using_promises)\n- [ECMAScript\u00ae 2015 Specification: Promise Objects](https://262.ecma-international.org/6.0/#sec-promise-objects)", "patterns/async_patterns": "\u5728\u73b0\u4ee3 JavaScript \u4e2d\uff0c\u5f02\u6b65\u64cd\u4f5c\uff08\u5982\u7f51\u7edc\u8bf7\u6c42\u3001\u6587\u4ef6\u8bfb\u5199\u3001\u6570\u636e\u5e93\u67e5\u8be2\uff09\u65e0\u5904\u4e0d\u5728\u3002\u4ec5\u638c\u63e1 `Promise` \u548c `async/await` \u7684\u57fa\u7840\u7528\u6cd5\u8fd8\u4e0d\u591f\uff0c\u771f\u6b63\u751f\u4ea7\u7ea7\u7684\u4ee3\u7801\u9700\u8981**\u5bf9\u5f02\u6b65\u4efb\u52a1\u8fdb\u884c\u7f16\u6392**\uff1a\u54ea\u4e9b\u4efb\u52a1\u5e76\u884c\u6267\u884c\uff1f\u54ea\u4e9b\u9700\u8981\u4e32\u884c\u7b49\u5f85\uff1f\u5982\u679c\u67d0\u4e2a\u4efb\u52a1\u8d85\u65f6\u600e\u4e48\u529e\uff1f\u5931\u8d25\u4e86\u662f\u5426\u81ea\u52a8\u91cd\u8bd5\uff1f\n\n**Async Patterns** \u5c31\u662f\u9488\u5bf9\u8fd9\u4e9b\u573a\u666f\u603b\u7ed3\u51fa\u7684\u51e0\u79cd\u53ef\u590d\u7528\u7684\u7ec4\u5408\u6a21\u5f0f\u3002\u5b83\u4eec\u901a\u5e38\u57fa\u4e8e `Promise.all`\u3001`Promise.allSettled`\u3001`Promise.race` \u7b49\u9759\u6001\u65b9\u6cd5\u5b9e\u73b0\uff0c\u8ba9\u4f60\u80fd\u4ee5\u58f0\u660e\u5f0f\u7684\u65b9\u5f0f\u63a7\u5236\u5f02\u6b65\u6d41\u7a0b\uff0c\u4ece\u800c\u5199\u51fa\u66f4\u53ef\u8bfb\u3001\u66f4\u5065\u58ee\u7684\u4ee3\u7801\u3002\n\n## Syntax\n\n\u4ee5\u4e0b\u662f\u4e94\u79cd\u6838\u5fc3\u5f02\u6b65\u6a21\u5f0f\u7684\u51fd\u6570\u7b7e\u540d\u4e0e\u4f7f\u7528\u793a\u610f\uff1a\n\n```javascript\n// 1. \u5e76\u884c\u6267\u884c \u2014\u2014 \u6240\u6709 Promise \u540c\u65f6\u542f\u52a8\uff0c\u5168\u90e8\u6210\u529f\u624d resolve\nPromise.all(iterable);\n\n// 2. \u5e26\u5bb9\u9519\u7684\u5e76\u884c \u2014\u2014 \u7b49\u5f85\u6240\u6709\u5b8c\u6210\uff0c\u4e0d\u56e0\u67d0\u4e2a\u5931\u8d25\u800c\u4e2d\u65ad\nPromise.allSettled(iterable);\n\n// 3. \u7ade\u901f \u2014\u2014 \u8fd4\u56de\u7b2c\u4e00\u4e2a settle\uff08resolve/reject\uff09\u7684\u7ed3\u679c\nPromise.race(iterable);\n\n// 4. \u9996\u4e2a fulfilled \u2014\u2014 \u53ea\u53d6\u7b2c\u4e00\u4e2a\u6210\u529f\u7684\u7ed3\u679c\uff0c\u5168\u90e8\u5931\u8d25\u624d reject\nPromise.any(iterable);\n\n// 5. \u4e32\u884c\u6267\u884c \u2014\u2014 \u9010\u4e2a await\uff08\u65e0\u5185\u7f6e API\uff0c\u901a\u8fc7\u5faa\u73af\u6216 reduce \u5b9e\u73b0\uff09\nasync function serial(tasks) { /* \u89c1\u793a\u4f8b */ }\n```\n\n## Examples\n\n### \u793a\u4f8b 1\uff1a\u5e76\u884c\u6267\u884c\u591a\u4e2a API \u8bf7\u6c42\n\n```javascript\nconst fetchUser = fetch('/api/user').then(res => res.json());\nconst fetchPosts = fetch('/api/posts').then(res => res.json());\nconst fetchComments = fetch('/api/comments').then(res => res.json());\n\n// \u4e09\u4e2a\u8bf7\u6c42\u540c\u65f6\u53d1\u51fa\uff0c\u6240\u6709\u5b8c\u6210\u540e\u7edf\u4e00\u5904\u7406\nconst [user, posts, comments] = await Promise.all([\n  fetchUser, fetchPosts, fetchComments\n]);\nconsole.log(user, posts, comments);\n// \u5982\u679c\u4efb\u4e00\u4e2a\u8bf7\u6c42\u5931\u8d25\uff0cPromise.all \u4f1a\u7acb\u5373 reject\n```\n\n### \u793a\u4f8b 2\uff1aPromise.allSettled \u2014\u2014 \u90e8\u5206\u5931\u8d25\u4e5f\u4e0d\u5f71\u54cd\u6574\u4f53\n\n```javascript\nconst promises = urls.map(url => fetch(url).then(res => res.json()));\n\nconst results = await Promise.allSettled(promises);\n\n// \u5206\u522b\u5904\u7406\u6210\u529f\u4e0e\u5931\u8d25\u7684\u7ed3\u679c\nconst fulfilled = results\n  .filter(r => r.status === 'fulfilled')\n  .map(r => r.value);\n\nconst rejected = results\n  .filter(r => r.status === 'rejected')\n  .map(r => r.reason);\n\nconsole.log(`\u6210\u529f ${fulfilled.length} \u4e2a\uff0c\u5931\u8d25 ${rejected.length} \u4e2a`);\n```\n\n### \u793a\u4f8b 3\uff1aPromise.race \u2014\u2014 \u5b9e\u73b0\u8d85\u65f6\u63a7\u5236\n\n```javascript\n/**\n * \u7ed9\u4e00\u4e2a Promise \u8bbe\u7f6e\u8d85\u65f6\n * @param {Promise} promise   - \u5b9e\u9645\u4efb\u52a1\n * @param {number}  ms        - \u8d85\u65f6\u6beb\u79d2\u6570\n * @returns {Promise}         - \u8c01\u5148 settle \u5c31\u8fd4\u56de\u8c01\n */\nfunction withTimeout(promise, ms) {\n  const timeout = new Promise((_, reject) =>\n    setTimeout(() => reject(new Error(`Operation timed out after ${ms}ms`)), ms)\n  );\n  return Promise.race([promise, timeout]);\n}\n\n// \u4f7f\u7528\uff1a\u5982\u679c 3 \u79d2\u5185\u672a\u8fd4\u56de\uff0c\u5219\u629b\u51fa\u8d85\u65f6\u9519\u8bef\ntry {\n  const data = await withTimeout(fetch('/api/slow'), 3000);\n  console.log(data);\n} catch (err) {\n  console.error(err.message); // \"Operation timed out after 3000ms\"\n}\n```\n\n### \u793a\u4f8b 4\uff1a\u4e32\u884c\u6267\u884c \u2014\u2014 \u9010\u4e2a await\n\n```javascript\n// \u573a\u666f\uff1a\u9010\u4e2a\u4e0a\u4f20\u6587\u4ef6\uff0c\u6bcf\u4e2a\u4f9d\u8d56\u524d\u4e00\u4e2a\u7684\u7ed3\u679c\nasync function uploadSequentially(files) {\n  const results = [];\n  for (const file of files) {\n    // \u4e0a\u4e00\u4e2a\u4e0a\u4f20\u5b8c\u6210\u4e4b\u540e\uff0c\u624d\u5f00\u542f\u4e0b\u4e00\u4e2a\n    const result = await uploadFile(file);\n    results.push(result);\n    console.log(`\u5df2\u4e0a\u4f20\uff1a${file.name}`);\n  }\n  return results;\n}\n\n// \u6216\u7528 reduce \u5b9e\u73b0\uff08\u66f4\u51fd\u6570\u5f0f\uff09\nasync function serial(tasks) {\n  return tasks.reduce((chain, task) =>\n    chain.then(result =>\n      task().then(next => [...result, next])\n    ), Promise.resolve([]));\n}\n```\n\n### \u793a\u4f8b 5\uff1a\u5e26\u91cd\u8bd5\u673a\u5236\u7684\u5f02\u6b65\u8c03\u7528\n\n```javascript\n/**\n * \u5f02\u6b65\u8c03\u7528\u5931\u8d25\u540e\u81ea\u52a8\u91cd\u8bd5\n * @param {Function} fn       - \u8fd4\u56de Promise \u7684\u5f02\u6b65\u51fd\u6570\n * @param {number}   retries  - \u6700\u5927\u91cd\u8bd5\u6b21\u6570\n * @param {number}   delayMs  - \u91cd\u8bd5\u95f4\u9694\uff08\u6beb\u79d2\uff09\n */\nasync function retryAsync(fn, retries = 3, delayMs = 1000) {\n  for (let i = 0; i <= retries; i++) {\n    try {\n      return await fn();\n    } catch (err) {\n      if (i === retries) throw err; // \u6700\u540e\u4e00\u6b21\u4ecd\u5931\u8d25\uff0c\u5411\u4e0a\u629b\u51fa\n      console.warn(`\u7b2c ${i + 1} \u6b21\u5931\u8d25\uff0c${delayMs}ms \u540e\u91cd\u8bd5...`);\n      await new Promise(r => setTimeout(r, delayMs));\n    }\n  }\n}\n\n// \u4f7f\u7528\nconst data = await retryAsync(() => fetch('/api/unstable').then(r => r.json()));\n```\n\n## Key Points\n\n- **`Promise.all` \u9075\u5faa\"\u5168\u6709\u6216\u5168\u65e0\"\u539f\u5219**\uff1a\u53ea\u8981\u4e00\u4e2a Promise \u88ab reject\uff0c\u6574\u4e2a `Promise.all` \u7acb\u5373 reject\uff0c\u4e0d\u4f1a\u7b49\u5f85\u5176\u4ed6\u4efb\u52a1\u5b8c\u6210\u3002\u5982\u679c\u5173\u5fc3\u90e8\u5206\u7ed3\u679c\uff0c\u7528 `Promise.allSettled`\u3002\n- **`Promise.race` \u5173\u6ce8\u7684\u662f\"\u7b2c\u4e00\u4e2a settle\"**\uff0c\u65e0\u8bba resolve \u8fd8\u662f reject\u3002\u800c `Promise.any` \u53ea\u5173\u5fc3\"\u7b2c\u4e00\u4e2a resolve\"\uff0c\u5168\u90e8 reject \u624d\u629b\u51fa `AggregateError`\u3002\n- **\u5e76\u884c \u2260 \u65e0\u5e8f**\uff1a`Promise.all` \u8fd4\u56de\u7684\u7ed3\u679c\u6570\u7ec4\u987a\u5e8f\u4e0e\u8f93\u5165 iterable \u7684\u987a\u5e8f\u4e00\u81f4\uff0c\u4e0d\u7ba1\u5404\u4efb\u52a1\u5b9e\u9645\u5b8c\u6210\u5148\u540e\u3002\n- **\u4e32\u884c\u6267\u884c\u6ca1\u6709\u5185\u7f6e API**\uff0c\u9700\u8981\u901a\u8fc7 `for...of` + `await` \u6216 `reduce` + Promise \u94fe\u624b\u52a8\u5b9e\u73b0\u3002\u4e32\u884c\u7684\u603b\u8017\u65f6 = \u5404\u4efb\u52a1\u8017\u65f6\u4e4b\u548c\u3002\n- **\u8d85\u65f6\u63a7\u5236\u4e0d\u4f1a\u53d6\u6d88\u5e95\u5c42\u4efb\u52a1**\uff1a`Promise.race` \u8fd4\u56de\u540e\uff0c\u88ab\u8d85\u65f6\u629b\u5f03\u7684 Promise \u4ecd\u4f1a\u7ee7\u7eed\u6267\u884c\uff08\u53ef\u80fd\u8fd8\u4f1a\u4fee\u6539\u5916\u90e8\u72b6\u6001\uff09\uff0c\u8981\u6ce8\u610f\u907f\u514d\u526f\u4f5c\u7528\u6cc4\u6f0f\u3002\n- **\u91cd\u8bd5\u65f6\u8981\u8003\u8651\u5e42\u7b49\u6027**\uff1a\u53ea\u6709\u5bf9\u53ef\u91cd\u8bd5\u7684\uff08\u5e42\u7b49\u7684\uff09\u64cd\u4f5c\u624d\u5e94\u81ea\u52a8\u91cd\u8bd5\uff0c\u4f8b\u5982 GET \u8bf7\u6c42\uff1bPOST \u7b49\u975e\u5e42\u7b49\u64cd\u4f5c\u91cd\u8bd5\u53ef\u80fd\u5bfc\u81f4\u91cd\u590d\u63d0\u4ea4\u3002\n\n## Common Mistakes\n\n- **\u8bef\u7528 `Promise.all` \u505a\u4e32\u884c**\uff1a\u628a `await` \u653e\u5728 `map` \u56de\u8c03\u91cc\uff0c\u770b\u8d77\u6765\u50cf\u5e76\u884c\uff0c\u5b9e\u9645\u4e0a\u6bcf\u6b21\u8fed\u4ee3\u90fd await \u7b49\u5f85\uff0c\u53d8\u6210\u4e86\u4e32\u884c\u4e14\u4ee3\u7801\u5197\u4f59\u3002\n  ```javascript\n  // \u274c \u9519\u8bef\uff1a\u5b9e\u9645\u662f\u4e32\u884c\n  const results = urls.map(async url => {\n    const res = await fetch(url);\n    return res.json();\n  });\n  // \u8fd9\u91cc results \u662f Promise \u6570\u7ec4\uff0c\u6839\u672c\u6ca1\u6709 await \u5b83\u4eec\uff01\n\n  // \u2705 \u6b63\u786e\uff1a\u5148\u542f\u52a8\u6240\u6709\u8bf7\u6c42\uff0c\u518d\u7edf\u4e00 await\n  const promises = urls.map(url => fetch(url).then(res => res.json()));\n  const results = await Promise.all(promises);\n  ```\n\n- **\u5fd8\u8bb0\u5904\u7406 `Promise.all` \u7684\u6574\u4f53 reject**\uff1a`Promise.all` \u629b\u51fa\u7684\u662f\u7b2c\u4e00\u4e2a reject \u7684\u539f\u56e0\uff0c\u5176\u4ed6 Promise \u53ef\u80fd\u8fd8\u6709\u672a\u6355\u83b7\u7684 rejection\uff0c\u5bfc\u81f4 \"unhandled rejection\" \u8b66\u544a\u3002\n  ```javascript\n  // \u2705 \u6dfb\u52a0\u6574\u4f53\u7684 catch\n  try {\n    await Promise.all([riskyTask1(), riskyTask2()]);\n  } catch (err) {\n    console.error('\u81f3\u5c11\u4e00\u4e2a\u4efb\u52a1\u5931\u8d25:', err);\n  }\n  ```\n\n- **\u8bef\u4ee5\u4e3a `Promise.race` \u4f1a\u7ec8\u6b62\u5176\u4ed6\u4efb\u52a1**\uff1a`Promise.race` \u53ea\u662f\"\u8c01\u5148\u5230\u542c\u8c01\u7684\"\uff0c\u8d85\u65f6\u540e\u6162\u4efb\u52a1\u4ecd\u5728\u540e\u53f0\u8fd0\u884c\uff0c\u53ef\u80fd\u5f15\u53d1\u610f\u6599\u4e4b\u5916\u7684\u72b6\u6001\u53d8\u66f4\u3002\u9700\u8981\u7ed3\u5408 `AbortController` \u624d\u80fd\u771f\u6b63\u53d6\u6d88\u3002\n\n## Related Concepts\n\n- [Promise\uff08\u5185\u7f6e\u5bf9\u8c61\uff09](../builtin/promise.md) \u2014 `Promise.all`\u3001`Promise.race` \u7b49\u9759\u6001\u65b9\u6cd5\u7684\u5e95\u5c42\u5b9e\u73b0\n- [async/await \u8bed\u6cd5](../syntax/async_await.md) \u2014 \u5f02\u6b65\u6a21\u5f0f\u7684\u8bed\u6cd5\u57fa\u7840\uff0c\u6240\u6709\u6a21\u5f0f\u5747\u4f9d\u8d56 async/await \u7f16\u5199\n- [\u5f02\u6b65\u7f16\u7a0b\u603b\u89c8](../topics/async.md) \u2014 JavaScript \u5f02\u6b65\u7f16\u7a0b\u7684\u5b8f\u89c2\u7406\u89e3\uff0c\u5305\u62ec\u4e8b\u4ef6\u5faa\u73af\u4e0e\u5fae\u4efb\u52a1\n\n## Citations\n\n- [MDN: Using Promises](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Guide/Using_promises)\n- [MDN: Promise.all()](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Promise/all)\n- [MDN: Promise.allSettled()](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Promise/allSettled)\n- [MDN: Promise.race()](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Promise/race)\n- [MDN: Promise.any()](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Promise/any)", "patterns/closure": "## \u6982\u8ff0\n\n**\u95ed\u5305\uff08Closure\uff09** \u662f JavaScript \u4e2d\u6700\u6838\u5fc3\u3001\u6700\u5f3a\u5927\u7684\u7279\u6027\u4e4b\u4e00\u3002\u5f53\u4e00\u4e2a\u51fd\u6570\u80fd\u591f\"\u8bb0\u4f4f\"\u5e76\u8bbf\u95ee\u5b83\u88ab\u521b\u5efa\u65f6\u6240\u5904\u7684\u8bcd\u6cd5\u4f5c\u7528\u57df\uff08Lexical Scope\uff09\u2014\u2014\u5373\u4f7f\u8be5\u51fd\u6570\u5728\u4f5c\u7528\u57df\u4e4b\u5916\u6267\u884c\u2014\u2014\u8fd9\u4e2a\u51fd\u6570\u53ca\u5176\u5f15\u7528\u7684\u53d8\u91cf\u73af\u5883\u5171\u540c\u6784\u6210\u4e86\u4e00\u4e2a\u95ed\u5305\u3002\u7b80\u5355\u6765\u8bf4\uff1a**\u95ed\u5305 = \u51fd\u6570 + \u5b83\u521b\u5efa\u65f6\u6240\u80fd\u8bbf\u95ee\u7684\u5916\u90e8\u53d8\u91cf**\u3002\n\n\u95ed\u5305\u7684\u5b9e\u9645\u5e94\u7528\u65e0\u5904\u4e0d\u5728\uff1a\u6570\u636e\u79c1\u6709\u5316\uff08\u5c01\u88c5\uff09\u3001\u5de5\u5382\u51fd\u6570\u3001\u6a21\u5757\u6a21\u5f0f\u3001\u4e8b\u4ef6\u56de\u8c03\u3001\u8bb0\u5fc6\u5316\uff08Memoization\uff09\u7b49\u3002\u7406\u89e3\u95ed\u5305\u662f\u638c\u63e1 JavaScript \u7684\u5173\u952e\u91cc\u7a0b\u7891\u3002\n\n## \u8bed\u6cd5\n\n\u95ed\u5305\u4e0d\u662f\u4e00\u79cd\u663e\u5f0f\u7684\u8bed\u6cd5\u7ed3\u6784\uff0c\u800c\u662f\u51fd\u6570\u5d4c\u5957\u5f15\u7528\u5916\u90e8\u53d8\u91cf\u65f6\u81ea\u7136\u4ea7\u751f\u7684\u884c\u4e3a\u3002\u5176\"\u6a21\u5f0f\"\u5982\u4e0b\uff1a\n\n```javascript\nfunction outer(outerParam) {\n  const outerVar = '\u6211\u5728\u5916\u5c42\u4f5c\u7528\u57df';\n\n  // \u5185\u90e8\u51fd\u6570\u5f15\u7528\u4e86\u5916\u90e8\u53d8\u91cf \u2192 \u5f62\u6210\u95ed\u5305\n  function inner(innerParam) {\n    // inner \u53ef\u4ee5\u8bbf\u95ee\uff1ainnerParam\u3001outerParam\u3001outerVar\n    return `${outerVar} + ${outerParam} + ${innerParam}`;\n  }\n\n  return inner;  // \u5c06\u95ed\u5305\u8fd4\u56de\u7ed9\u5916\u90e8\u4f7f\u7528\n}\n```\n\n\u6838\u5fc3\u8981\u70b9\uff1a\u5d4c\u5957\u51fd\u6570 + \u5f15\u7528\u5916\u90e8\u53d8\u91cf + \u5728\u5916\u90e8\u4f5c\u7528\u57df\u4e2d\u88ab\u8c03\u7528 = \u95ed\u5305\u3002\n\n## \u793a\u4f8b\n\n### \u793a\u4f8b 1\uff1a\u8ba1\u6570\u5668\u5de5\u5382\u51fd\u6570\uff08\u6570\u636e\u5c01\u88c5\uff09\n\n```javascript\nfunction createCounter(initialValue = 0) {\n  let count = initialValue;  // \u88ab\u95ed\u5305\u6355\u83b7\u7684\u79c1\u6709\u53d8\u91cf\n\n  return {\n    increment() {\n      count++;\n      return count;\n    },\n    decrement() {\n      count--;\n      return count;\n    },\n    getValue() {\n      return count;\n    }\n  };\n}\n\nconst counter = createCounter(10);\nconsole.log(counter.increment());  // 11\nconsole.log(counter.increment());  // 12\nconsole.log(counter.decrement());  // 11\nconsole.log(counter.getValue());   // 11\n// \u5916\u90e8\u65e0\u6cd5\u76f4\u63a5\u8bbf\u95ee count \u53d8\u91cf\u2014\u2014\u5b83\u662f\u771f\u6b63\"\u79c1\u6709\"\u7684\n```\n\n### \u793a\u4f8b 2\uff1a\u51fd\u6570\u8bb0\u5fc6\u5316\uff08\u6027\u80fd\u4f18\u5316\uff09\n\n```javascript\nfunction memoize(fn) {\n  const cache = {};  // \u7f13\u5b58\u5bf9\u8c61\u88ab\u95ed\u5305\u6355\u83b7\n\n  return function(...args) {\n    const key = JSON.stringify(args);\n\n    // \u5982\u679c\u5df2\u6709\u7f13\u5b58\u7ed3\u679c\uff0c\u76f4\u63a5\u8fd4\u56de\uff0c\u907f\u514d\u91cd\u590d\u8ba1\u7b97\n    if (key in cache) {\n      console.log(`\u547d\u4e2d\u7f13\u5b58: ${key}`);\n      return cache[key];\n    }\n\n    const result = fn(...args);\n    cache[key] = result;\n    return result;\n  };\n}\n\n// \u8017\u65f6\u7684\u8ba1\u7b97\u51fd\u6570\nfunction expensiveComputation(n) {\n  console.log(`\u8ba1\u7b97: ${n}`);\n  return n * n;\n}\n\nconst memoizedCompute = memoize(expensiveComputation);\nconsole.log(memoizedCompute(5));  // \u8ba1\u7b97: 5 \u2192 25\nconsole.log(memoizedCompute(5));  // \u547d\u4e2d\u7f13\u5b58: [5] \u2192 25 \uff08\u4e0d\u91cd\u590d\u8ba1\u7b97\uff09\nconsole.log(memoizedCompute(10)); // \u8ba1\u7b97: 10 \u2192 100\n```\n\n### \u793a\u4f8b 3\uff1a\u5faa\u73af\u4e2d\u7684\u95ed\u5305\u9677\u9631\u4e0e let \u89e3\u6cd5\n\n```javascript\n// \u274c \u9519\u8bef\u5199\u6cd5\uff1a\u4f7f\u7528 var \uff08\u51fd\u6570\u4f5c\u7528\u57df\uff09\nfor (var i = 0; i < 3; i++) {\n  setTimeout(function() {\n    console.log(i);  // \u8f93\u51fa 3, 3, 3  \u2014\u2014 \u6240\u6709\u56de\u8c03\u5171\u4eab\u540c\u4e00\u4e2a i\n  }, 100);\n}\n\n// \u2705 \u6b63\u786e\u5199\u6cd5\uff1a\u4f7f\u7528 let \uff08\u5757\u7ea7\u4f5c\u7528\u57df\uff0c\u6bcf\u6b21\u8fed\u4ee3\u521b\u5efa\u72ec\u7acb\u7ed1\u5b9a\uff09\nfor (let j = 0; j < 3; j++) {\n  setTimeout(function() {\n    console.log(j);  // \u8f93\u51fa 0, 1, 2 \u2014\u2014 \u6bcf\u4e2a\u95ed\u5305\u6355\u83b7\u4e0d\u540c\u7684 j\n  }, 100);\n}\n\n// \u2705 \u53e6\u4e00\u79cd\u89e3\u6cd5\uff1aIIFE \u521b\u5efa\u65b0\u4f5c\u7528\u57df\nfor (var k = 0; k < 3; k++) {\n  (function(lockedK) {\n    setTimeout(function() {\n      console.log(lockedK);  // \u8f93\u51fa 0, 1, 2\n    }, 100);\n  })(k);\n}\n```\n\n### \u793a\u4f8b 4\uff1a\u6a21\u5757\u6a21\u5f0f\uff08\u4fe1\u606f\u9690\u85cf\uff09\n\n```javascript\nconst UserModule = (function() {\n  // \u79c1\u6709\u53d8\u91cf\u548c\u65b9\u6cd5\uff08\u5916\u90e8\u4e0d\u53ef\u8bbf\u95ee\uff09\n  const users = [];\n  let nextId = 1;\n\n  function validateUser(name) {\n    return typeof name === 'string' && name.trim().length > 0;\n  }\n\n  // \u8fd4\u56de\u516c\u5171 API \u2014\u2014 \u8fd9\u4e9b\u65b9\u6cd5\u901a\u8fc7\u95ed\u5305\u8bbf\u95ee\u79c1\u6709\u6210\u5458\n  return {\n    add(name) {\n      if (!validateUser(name)) {\n        throw new Error('\u65e0\u6548\u7684\u7528\u6237\u540d');\n      }\n      const user = { id: nextId++, name: name.trim() };\n      users.push(user);\n      return user;\n    },\n    getAll() {\n      // \u8fd4\u56de\u526f\u672c\u9632\u6b62\u5916\u90e8\u7be1\u6539\u5185\u90e8\u6570\u636e\n      return [...users];\n    },\n    findById(id) {\n      return users.find(u => u.id === id) || null;\n    }\n  };\n})();\n\nUserModule.add('Alice');\nUserModule.add('Bob');\nconsole.log(UserModule.getAll());   // [{id:1, name:'Alice'}, {id:2, name:'Bob'}]\nconsole.log(UserModule.users);      // undefined \u2014\u2014 \u5916\u90e8\u65e0\u6cd5\u76f4\u63a5\u8bbf\u95ee\u79c1\u6709\u6570\u636e\n```\n\n## \u5173\u952e\u8981\u70b9\n\n- **\u95ed\u5305\u6355\u83b7\u7684\u662f\u53d8\u91cf\u7684\u5f15\u7528\uff0c\u800c\u975e\u53d8\u91cf\u7684\u503c**\u3002\u8fd9\u610f\u5473\u7740\u95ed\u5305\u770b\u5230\u7684\u662f\u53d8\u91cf\u7684\u6700\u65b0\u503c\uff0c\u800c\u4e0d\u662f\u521b\u5efa\u65f6\u7684\u5feb\u7167\uff08\u8fd9\u4e5f\u662f\u5faa\u73af\u9677\u9631\u7684\u6839\u6e90\uff09\u3002\n- **\u6bcf\u6b21\u51fd\u6570\u8c03\u7528\u90fd\u4f1a\u521b\u5efa\u65b0\u7684\u95ed\u5305**\u3002`createCounter()` \u8fd4\u56de\u7684\u4e24\u4e2a\u8ba1\u6570\u5668\u5b9e\u4f8b\u5404\u81ea\u6301\u6709\u72ec\u7acb\u7684 `count` \u53d8\u91cf\u3002\n- **\u5783\u573e\u56de\u6536\u4e0e\u5185\u5b58**\uff1a\u5982\u679c\u4e00\u4e2a\u95ed\u5305\u8fd8\u5728\u88ab\u5f15\u7528\uff0c\u5b83\u6240\u6355\u83b7\u7684\u6574\u4e2a\u4f5c\u7528\u57df\u94fe\u4e0a\u7684\u53d8\u91cf\u90fd\u4e0d\u4f1a\u88ab GC \u56de\u6536\u3002\u8fc7\u5ea6\u4f7f\u7528\u95ed\u5305\u53ef\u80fd\u5bfc\u81f4\u5185\u5b58\u6cc4\u6f0f\u3002\n- **`let` \u548c `const` \u7684\u5757\u7ea7\u4f5c\u7528\u57df**\u8ba9\u5faa\u73af\u4e2d\u521b\u5efa\u95ed\u5305\u66f4\u5b89\u5168\u2014\u2014\u6bcf\u6b21\u8fed\u4ee3\u90fd\u521b\u5efa\u72ec\u7acb\u7684\u8bcd\u6cd5\u73af\u5883\u3002\n- **\u95ed\u5305\u4e0d\u4e00\u5b9a\u8981\u8fd4\u56de\u51fd\u6570**\u2014\u2014\u4f5c\u4e3a\u53c2\u6570\u4f20\u9012\u7ed9 `setTimeout`\u3001\u4e8b\u4ef6\u76d1\u542c\u5668\u6216 Promise \u56de\u8c03\u65f6\u4e5f\u4f1a\u5f62\u6210\u95ed\u5305\u3002\n- **`this` \u4e0d\u662f\u95ed\u5305\u7684\u4e00\u90e8\u5206**\u3002\u95ed\u5305\u6355\u83b7\u7684\u662f\u53d8\u91cf\u73af\u5883\uff08VariableEnvironment\uff09\uff0c\u800c `this` \u662f\u51fd\u6570\u8c03\u7528\u65f6\u7ed1\u5b9a\u7684\u3002\u7bad\u5934\u51fd\u6570\u901a\u8fc7\u8bcd\u6cd5 `this` \uff08\u672c\u8d28\u4e0a\u4e5f\u662f\u95ed\u5305\u673a\u5236\uff09\u89e3\u51b3\u4e86\u8fd9\u4e00\u95ee\u9898\u3002\n\n## \u5e38\u89c1\u9519\u8bef\n\n- **\u5faa\u73af\u4e2d\u4f7f\u7528 `var` \u521b\u5efa\u95ed\u5305**\uff1a\u6240\u6709\u56de\u8c03\u6355\u83b7\u7684\u662f\u540c\u4e00\u4e2a `i`\uff0c\u5faa\u73af\u7ed3\u675f\u540e\u7684\u503c\u4e3a\u6700\u7ec8\u503c\u3002**\u89e3\u51b3\u65b9\u6848**\uff1a\u4f7f\u7528 `let`\u3001IIFE \u6216\u5728 `forEach` \u7b49\u62e5\u6709\u72ec\u7acb\u56de\u8c03\u4f5c\u7528\u57df\u7684\u65b9\u6cd5\u4e2d\u5904\u7406\u3002\n- **\u65e0\u610f\u4e2d\u521b\u5efa\u5927\u95ed\u5305\u5bfc\u81f4\u5185\u5b58\u6cc4\u6f0f**\uff1a\u4e00\u4e2a\u95ed\u5305\u5f15\u7528\u4e86\u5927\u578b\u5bf9\u8c61\uff08\u5982 DOM \u8282\u70b9\u3001\u5927\u6570\u636e\u6570\u7ec4\uff09\uff0c\u5373\u4f7f\u95ed\u5305\u53ea\u9700\u8981\u5176\u4e2d\u7684\u4e00\u4e2a\u5c0f\u5b57\u6bb5\uff0c\u6574\u4e2a\u5bf9\u8c61\u4e5f\u65e0\u6cd5\u88ab\u56de\u6536\u3002**\u89e3\u51b3\u65b9\u6848**\uff1a\u53ea\u66b4\u9732\u5fc5\u8981\u7684\u6570\u636e\uff0c\u6216\u53ca\u65f6\u5c06\u5927\u578b\u5f15\u7528\u8bbe\u4e3a `null`\u3002\n- **\u6df7\u6dc6\u95ed\u5305\u4e0e `this` \u7ed1\u5b9a**\uff1a\u5728\u5bf9\u8c61\u65b9\u6cd5\u4e2d\u5d4c\u5957\u51fd\u6570\u65f6\uff0c\u5d4c\u5957\u51fd\u6570\u7684 `this` \u9ed8\u8ba4\u6307\u5411\u5168\u5c40\u5bf9\u8c61\uff08\u975e\u4e25\u683c\u6a21\u5f0f\uff09\u6216 `undefined`\uff08\u4e25\u683c\u6a21\u5f0f\uff09\u3002**\u89e3\u51b3\u65b9\u6848**\uff1a\u4f7f\u7528\u7bad\u5934\u51fd\u6570\uff08\u7ee7\u627f\u5916\u5c42 `this`\uff09\uff0c\u6216\u7528 `const self = this` \u4fdd\u5b58\u5f15\u7528\u3002\n\n## \u76f8\u5173\u6982\u5ff5\n\n- [\u53d8\u91cf\u4f5c\u7528\u57df](../topics/variables.md) \u2014\u2014 \u95ed\u5305\u7684\u57fa\u7840\uff1a\u7406\u89e3\u8bcd\u6cd5\u4f5c\u7528\u57df\n- [\u51fd\u6570](../topics/functions.md) \u2014\u2014 \u51fd\u6570\u662f\u7b2c\u4e00\u7b49\u516c\u6c11\uff0c\u95ed\u5305\u7684\u5b58\u5728\u524d\u63d0\n- [let \u4e0e const](../syntax/let_const.md) \u2014\u2014 \u5757\u7ea7\u4f5c\u7528\u57df\u53d8\u91cf\u8ba9\u95ed\u5305\u884c\u4e3a\u66f4\u53ef\u9884\u6d4b\n- [\u7bad\u5934\u51fd\u6570](../syntax/arrow_function.md) \u2014\u2014 \u8bcd\u6cd5 `this` \u7ed1\u5b9a\uff0c\u5185\u90e8\u901a\u8fc7\u95ed\u5305\u5b9e\u73b0\n\n## \u5f15\u7528\n\n- [MDN: Closures](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Closures)\n- [MDN: Lexical Scoping](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Guide/Functions#function_scope)\n- [ECMAScript Specification \u2014 Lexical Environments](https://tc39.es/ecma262/#sec-lexical-environments)", "patterns/prototype_chain": "## \u6982\u8ff0\n\n**Prototype Chain\uff08\u539f\u578b\u94fe\uff09** \u662f JavaScript \u5b9e\u73b0\u7ee7\u627f\u7684\u6838\u5fc3\u673a\u5236\u3002\u6bcf\u4e2a JavaScript \u5bf9\u8c61\u90fd\u6709\u4e00\u4e2a\u5185\u90e8\u94fe\u63a5\u6307\u5411\u53e6\u4e00\u4e2a\u5bf9\u8c61\u2014\u2014\u5b83\u7684 **prototype\uff08\u539f\u578b\uff09**\u3002\u5f53\u8bbf\u95ee\u4e00\u4e2a\u5bf9\u8c61\u7684\u5c5e\u6027\u65f6\uff0c\u5982\u679c\u8be5\u5bf9\u8c61\u81ea\u8eab\u6ca1\u6709\u8fd9\u4e2a\u5c5e\u6027\uff0cJavaScript \u5f15\u64ce\u4f1a\u6cbf\u7740 `__proto__` \u94fe\u5411\u4e0a\u67e5\u627e\uff0c\u76f4\u5230\u627e\u5230\u8be5\u5c5e\u6027\u6216\u5230\u8fbe `null` \u4e3a\u6b62\u3002\u7406\u89e3\u539f\u578b\u94fe\u662f\u638c\u63e1 JS \u5bf9\u8c61\u7cfb\u7edf\u3001\u7f16\u5199\u9ad8\u6548\u7ee7\u627f\u4ee3\u7801\u7684\u57fa\u7840\uff0c\u4e5f\u662f\u7406\u89e3 `class` \u8bed\u6cd5\u7cd6\u80cc\u540e\u539f\u7406\u7684\u5173\u952e\u3002\n\n## Syntax\n\n\u539f\u578b\u94fe\u5e76\u6ca1\u6709\u56fa\u5b9a\u7684\"\u8bed\u6cd5\"\uff0c\u800c\u662f\u901a\u8fc7\u4ee5\u4e0b\u4e09\u79cd\u65b9\u5f0f\u5efa\u7acb\u5bf9\u8c61\u4e4b\u95f4\u7684\u539f\u578b\u5173\u7cfb\uff1a\n\n```javascript\n// \u65b9\u5f0f\u4e00\uff1a\u901a\u8fc7\u6784\u9020\u51fd\u6570 prototype \u5c5e\u6027\uff08\u4f20\u7edf\u65b9\u5f0f\uff09\nfunction Constructor() {}\nConstructor.prototype.method = function() {};\nconst obj = new Constructor();\n// obj.__proto__ === Constructor.prototype\n\n// \u65b9\u5f0f\u4e8c\uff1aObject.create()\uff08ES5\uff0c\u63a8\u8350\uff09\nconst parent = { greet() { return 'Hi'; } };\nconst child = Object.create(parent);\n// child.__proto__ === parent\n\n// \u65b9\u5f0f\u4e09\uff1aclass extends \u8bed\u6cd5\u7cd6\uff08ES6\uff09\nclass Animal {}\nclass Dog extends Animal {}\n```\n\n## Examples\n\n### \u793a\u4f8b 1\uff1a\u7406\u89e3\u539f\u578b\u94fe\u67e5\u627e\u8fc7\u7a0b\n\n```javascript\nconst animal = { eat: true };\nconst dog = Object.create(animal);  // dog \u2192 animal \u2192 Object.prototype \u2192 null\ndog.bark = true;\n\nconsole.log(dog.bark);  // true\uff08\u81ea\u8eab\u5c5e\u6027\uff09\nconsole.log(dog.eat);   // true\uff08\u6cbf\u539f\u578b\u94fe\u627e\u5230 animal.eat\uff09\nconsole.log(dog.toString); // \u6cbf\u539f\u578b\u94fe\u627e\u5230 Object.prototype.toString\nconsole.log(dog.nonexistent); // undefined\uff08\u6574\u6761\u94fe\u90fd\u627e\u4e0d\u5230\uff09\n\n// \u4f7f\u7528 hasOwnProperty \u533a\u5206\u81ea\u8eab\u5c5e\u6027\u4e0e\u7ee7\u627f\u5c5e\u6027\nconsole.log(dog.hasOwnProperty('bark')); // true\nconsole.log(dog.hasOwnProperty('eat'));  // false\n```\n\n### \u793a\u4f8b 2\uff1a\u6784\u9020\u51fd\u6570 + prototype \u5b9e\u73b0\u5171\u4eab\u65b9\u6cd5\n\n```javascript\nfunction Person(name) {\n  this.name = name;  // \u5b9e\u4f8b\u72ec\u6709\u5c5e\u6027\n}\n\n// \u65b9\u6cd5\u6302\u8f7d\u5728 prototype \u4e0a\uff0c\u6240\u6709\u5b9e\u4f8b\u5171\u4eab\u540c\u4e00\u4e2a\u51fd\u6570\nPerson.prototype.sayHi = function() {\n  return `Hi, I'm ${this.name}`;\n};\n\nconst alice = new Person('Alice');\nconst bob = new Person('Bob');\n\nconsole.log(alice.sayHi());           // \"Hi, I'm Alice\"\nconsole.log(alice.sayHi === bob.sayHi); // true \u2014\u2014 \u5171\u4eab\u540c\u4e00\u4e2a\u65b9\u6cd5\nconsole.log(alice.__proto__ === Person.prototype); // true\n```\n\n### \u793a\u4f8b 3\uff1a\u539f\u578b\u94fe\u7684\u5c42\u7ea7\u7ee7\u627f\n\n```javascript\nfunction Animal(type) {\n  this.type = type;\n}\nAnimal.prototype.getType = function() { return this.type; };\n\nfunction Dog(name) {\n  Animal.call(this, 'mammal');  // \u8c03\u7528\u7236\u6784\u9020\u51fd\u6570\u521d\u59cb\u5316\n  this.name = name;\n}\n\n// \u5efa\u7acb\u7ee7\u627f\uff1aDog.prototype \u2192 Animal.prototype \u2192 Object.prototype\nDog.prototype = Object.create(Animal.prototype);\nDog.prototype.constructor = Dog;  // \u4fee\u590d constructor \u5f15\u7528\n\nDog.prototype.bark = function() {\n  return `${this.name} says woof!`;\n};\n\nconst d = new Dog('Buddy');\nconsole.log(d.bark());      // \"Buddy says woof!\" \u2014\u2014 Dog.prototype\nconsole.log(d.getType());   // \"mammal\" \u2014\u2014 Animal.prototype\nconsole.log(d.toString());  // \"[object Object]\" \u2014\u2014 Object.prototype\n```\n\n### \u793a\u4f8b 4\uff1a\u4f7f\u7528 class \u8bed\u6cd5\u7cd6\uff08\u672c\u8d28\u4ecd\u662f\u539f\u578b\u94fe\uff09\n\n```javascript\nclass Vehicle {\n  constructor(speed) {\n    this.speed = speed;\n  }\n  move() { return `Moving at ${this.speed} km/h`; }\n}\n\nclass Car extends Vehicle {\n  constructor(speed, brand) {\n    super(speed);\n    this.brand = brand;\n  }\n  honk() { return `${this.brand} beeps!`; }\n}\n\nconst myCar = new Car(120, 'Toyota');\nconsole.log(myCar.move());  // \"Moving at 120 km/h\" \u2014\u2014 \u539f\u578b\u94fe\u67e5\u627e\nconsole.log(myCar.honk());  // \"Toyota beeps!\"\n\n// \u9a8c\u8bc1\u539f\u578b\u94fe\u5173\u7cfb\nconsole.log(myCar.__proto__ === Car.prototype);            // true\nconsole.log(Car.prototype.__proto__ === Vehicle.prototype); // true\nconsole.log(Vehicle.prototype.__proto__ === Object.prototype); // true\nconsole.log(Object.prototype.__proto__);                   // null \u2014\u2014 \u94fe\u7684\u7ec8\u70b9\n```\n\n## Key Points\n\n- **\u539f\u578b\u94fe\u7684\u7ec8\u70b9\u662f `null`**\uff1a`Object.prototype.__proto__` \u4e3a `null`\uff0c\u5982\u679c\u4e00\u76f4\u627e\u5230 `null` \u4ecd\u672a\u627e\u5230\u5c5e\u6027\uff0c\u8fd4\u56de `undefined`\u3002\n- **`hasOwnProperty` \u662f\u533a\u5206\u81ea\u8eab\u5c5e\u6027\u4e0e\u7ee7\u627f\u5c5e\u6027\u7684\u552f\u4e00\u53ef\u9760\u65b9\u5f0f**\uff1a`for...in` \u5faa\u73af\u4f1a\u904d\u5386\u7ee7\u627f\u7684\u53ef\u679a\u4e3e\u5c5e\u6027\uff0c\u914d\u5408 `hasOwnProperty` \u4f7f\u7528\u624d\u80fd\u8fc7\u6ee4\u3002\n- **`Object.create(null)` \u521b\u5efa\u65e0\u539f\u578b\u7684\u7eaf\u51c0\u5bf9\u8c61**\uff1a\u8fd9\u79cd\u5bf9\u8c61\u6ca1\u6709 `toString`\u3001`hasOwnProperty` \u7b49\u65b9\u6cd5\uff0c\u9002\u5408\u7528\u4f5c\u7eaf\u5b57\u5178\uff08Map \u51fa\u73b0\u4e4b\u524d\u7684\u66ff\u4ee3\u65b9\u6848\uff09\u3002\n- **`instanceof` \u8fd0\u7b97\u7b26\u904d\u5386\u539f\u578b\u94fe\u505a\u5224\u65ad**\uff1a`obj instanceof Constructor` \u68c0\u67e5 `Constructor.prototype` \u662f\u5426\u51fa\u73b0\u5728 `obj` \u7684\u539f\u578b\u94fe\u4e0a\u3002\n- **`class` \u8bed\u6cd5\u53ea\u662f\u8bed\u6cd5\u7cd6**\uff1aES6 \u7684 `class` / `extends` \u5e95\u5c42\u4ecd\u7136\u662f\u539f\u578b\u94fe\uff0c`typeof` \u4e00\u4e2a class \u4ecd\u7136\u662f `\"function\"`\u3002\n- **\u4fee\u6539 `prototype` \u4f1a\u5f71\u54cd\u6240\u6709\u5df2\u521b\u5efa\u7684\u5b9e\u4f8b**\uff1a\u56e0\u4e3a\u5b9e\u4f8b\u53ea\u6301\u6709\u5bf9 prototype \u5bf9\u8c61\u7684\u5f15\u7528\uff0c\u4fee\u6539 prototype \u4e0a\u7684\u5c5e\u6027\u4f1a\u7acb\u5373\u53cd\u6620\u5230\u6240\u6709\u5b9e\u4f8b\u3002\n\n## Common Mistakes\n\n- **\u8bef\u7528 `__proto__` \u76f4\u63a5\u4fee\u6539\u539f\u578b**\uff1a`__proto__` \u662f\u5386\u53f2\u9057\u7559\u7684\u975e\u6807\u51c6\u5c5e\u6027\uff08\u90e8\u5206\u73af\u5883\u751a\u81f3\u4e0d\u652f\u6301\uff09\uff0c\u5e94\u4f7f\u7528 `Object.getPrototypeOf()` \u8bfb\u53d6\u539f\u578b\uff0c\u4f7f\u7528 `Object.setPrototypeOf()` \u6216 `Object.create()` \u8bbe\u7f6e\u539f\u578b\u3002\n  ```javascript\n  // \u274c \u4e0d\u63a8\u8350\n  obj.__proto__ = parent;\n\n  // \u2705 \u63a8\u8350\n  const obj = Object.create(parent);\n  // \u6216\uff08\u6027\u80fd\u5f00\u9500\u5927\uff0c\u907f\u514d\u5728\u8fd0\u884c\u65f6\u4f7f\u7528\uff09\n  Object.setPrototypeOf(obj, parent);\n  ```\n\n- **\u5fd8\u8bb0\u4fee\u590d constructor \u5f15\u7528**\uff1a\u5f53\u7528 `Child.prototype = Object.create(Parent.prototype)` \u91cd\u5199 prototype \u65f6\uff0c`Child.prototype.constructor` \u4f1a\u6307\u5411 `Parent`\uff0c\u5bfc\u81f4 `instanceof` \u548c\u884c\u4e3a\u5f02\u5e38\u3002\n  ```javascript\n  function Parent() {}\n  function Child() {}\n  Child.prototype = Object.create(Parent.prototype);\n  // \u274c Child.prototype.constructor === Parent\n  // \u2705 \u4fee\u590d\n  Child.prototype.constructor = Child;\n  ```\n\n- **\u8bef\u4ee5\u4e3a `prototype` \u662f\u5b9e\u4f8b\u7684\u5c5e\u6027**\uff1a`prototype` \u662f**\u6784\u9020\u51fd\u6570**\u7684\u5c5e\u6027\uff0c\u4e0d\u662f\u5b9e\u4f8b\u7684\u5c5e\u6027\u3002\u5b9e\u4f8b\u901a\u8fc7 `__proto__`\uff08\u6216 `Object.getPrototypeOf(instance)`\uff09\u8bbf\u95ee\u5176\u539f\u578b\u3002\n  ```javascript\n  function Foo() {}\n  const f = new Foo();\n  // \u274c f.prototype \u2192 undefined\n  // \u2705 f.__proto__ \u2192 Foo.prototype\n  // \u2705 Object.getPrototypeOf(f) \u2192 Foo.prototype\n  ```\n\n## Related Concepts\n\n- [\u5bf9\u8c61\u4e0e\u7c7b (Objects & Classes)](../topics/objects_and_classes.md) \u2014 \u539f\u578b\u94fe\u662f JS \u5bf9\u8c61\u7cfb\u7edf\u7684\u5e95\u5c42\u673a\u5236\n- [class \u8bed\u6cd5](../syntax/class.md) \u2014 `class` / `extends` \u662f\u539f\u578b\u94fe\u7684\u8bed\u6cd5\u7cd6\u5c01\u88c5\n- [\u95ed\u5305 (Closure)](../patterns/closure.md) \u2014 \u53e6\u4e00\u79cd\u5b9e\u73b0\u6570\u636e\u5c01\u88c5\u548c\"\u79c1\u6709\"\u5c5e\u6027\u7684\u6a21\u5f0f\n\n## Citations\n\n- [MDN: Inheritance and the prototype chain](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Inheritance_and_the_prototype_chain)\n- [MDN: Object.create()](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Object/create)\n- [MDN: instanceof](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Operators/instanceof)\n- [ECMAScript Spec: Object Internal Methods and Internal Slots](https://tc39.es/ecma262/#sec-ordinary-object-internal-methods-and-internal-slots)", "syntax/arrow_function": "## \u6982\u8ff0\n\n\u7bad\u5934\u51fd\u6570\uff08Arrow Function\uff09\u662f ES2015 (ES6) \u5f15\u5165\u7684\u4e00\u79cd\u66f4\u7b80\u6d01\u7684\u51fd\u6570\u5b9a\u4e49\u8bed\u6cd5\uff0c\u4f7f\u7528 `=>` \u4ee3\u66ff `function` \u5173\u952e\u5b57\u3002\u5b83\u6700\u6838\u5fc3\u7684\u7279\u6027\u662f**\u8bcd\u6cd5 this \u7ed1\u5b9a**\u2014\u2014\u7bad\u5934\u51fd\u6570\u672c\u8eab\u4e0d\u7ed1\u5b9a `this`\uff0c\u800c\u662f\u4ece\u5916\u56f4\u4f5c\u7528\u57df\u7ee7\u627f `this`\uff0c\u8fd9\u89e3\u51b3\u4e86\u4f20\u7edf\u51fd\u6570\u4e2d `this` \u6307\u5411\u968f\u8c03\u7528\u65b9\u5f0f\u53d8\u5316\u800c\u5f15\u53d1\u7684\u5e38\u89c1\u95ee\u9898\u3002\u7bad\u5934\u51fd\u6570\u5e38\u7528\u4e8e\u56de\u8c03\u3001\u6570\u7ec4\u8fed\u4ee3\u65b9\u6cd5\uff08`map`\u3001`filter`\u3001`reduce`\uff09\u4ee5\u53ca\u9700\u8981\u4fdd\u6301\u5916\u5c42 `this` \u7684\u573a\u666f\uff0c\u4f46**\u4e0d\u80fd\u7528\u4f5c\u6784\u9020\u51fd\u6570**\uff0c\u4e5f\u4e0d\u9002\u7528\u4e8e\u9700\u8981 `arguments` \u5bf9\u8c61\u6216\u52a8\u6001 `this` \u7684\u573a\u5408\u3002\n\n## Syntax\n\n```javascript\n// 1. \u65e0\u53c2\u6570\uff1a\u5fc5\u987b\u4f7f\u7528\u7a7a\u62ec\u53f7\n() => { ... }\n\n// 2. \u5355\u53c2\u6570\uff1a\u62ec\u53f7\u53ef\u9009\nparam => { ... }\n(param) => { ... }\n\n// 3. \u591a\u53c2\u6570\uff1a\u5fc5\u987b\u7528\u62ec\u53f7\n(param1, param2) => { ... }\n\n// 4. \u7b80\u6d01\u4f53\uff08\u8868\u8fbe\u5f0f\u4f53\uff09\uff1a\u7701\u7565 return \u548c\u82b1\u62ec\u53f7\uff0c\u9690\u5f0f\u8fd4\u56de\u8868\u8fbe\u5f0f\u7ed3\u679c\n(param1, param2) => expression\n// \u7b49\u4ef7\u4e8e (param1, param2) => { return expression; }\n\n// 5. \u8fd4\u56de\u5bf9\u8c61\u5b57\u9762\u91cf\uff1a\u5fc5\u987b\u7528\u62ec\u53f7\u5305\u88f9\u5bf9\u8c61\n() => ({ key: value })\n\n// 6. \u4e0e\u89e3\u6784\u53c2\u6570\u7ed3\u5408\n({ name, age }) => { ... }\n([first, second]) => { ... }\n\n// 7. \u5f02\u6b65\u7bad\u5934\u51fd\u6570\nasync () => { ... }\nasync param => { ... }\n```\n\n## Examples\n\n### \u57fa\u7840\u7528\u6cd5\uff1a\u4f20\u7edf\u51fd\u6570 vs \u7bad\u5934\u51fd\u6570\n\n```javascript\n// \u4f20\u7edf\u51fd\u6570\u8868\u8fbe\u5f0f\nconst add = function(a, b) {\n  return a + b;\n};\n\n// \u7bad\u5934\u51fd\u6570 \u2014\u2014 \u4e00\u884c\u641e\u5b9a\nconst addArrow = (a, b) => a + b;\n\nconsole.log(addArrow(3, 4)); // 7\n```\n\n### \u6570\u7ec4\u8fed\u4ee3\u4e2d\u7684\u4f18\u96c5\u5e94\u7528\n\n```javascript\nconst numbers = [1, 2, 3, 4, 5];\n\n// map\uff1a\u6bcf\u4e2a\u5143\u7d20\u52a0\u500d\nconst doubled = numbers.map(n => n * 2);\nconsole.log(doubled); // [2, 4, 6, 8, 10]\n\n// filter\uff1a\u7b5b\u9009\u5076\u6570\nconst evens = numbers.filter(n => n % 2 === 0);\nconsole.log(evens); // [2, 4]\n\n// reduce\uff1a\u6c42\u548c\uff0c\u591a\u53c2\u6570\u65f6\u5fc5\u987b\u7528\u62ec\u53f7\nconst sum = numbers.reduce((acc, cur) => acc + cur, 0);\nconsole.log(sum); // 15\n```\n\n### \u8bcd\u6cd5 this \u7ed1\u5b9a \u2014\u2014 \u6700\u5173\u952e\u7684\u7528\u9014\n\n```javascript\n// \u4f20\u7edf\u51fd\u6570\u7684\u95ee\u9898\uff1asetTimeout \u4e2d this \u4e22\u5931\nfunction Timer() {\n  this.seconds = 0;\n\n  // \u274c \u4f20\u7edf\u51fd\u6570\u4e2d this \u6307\u5411 window/undefined\n  setInterval(function() {\n    this.seconds++; // this \u4e0d\u662f Timer \u5b9e\u4f8b\uff01\n    console.log(this.seconds); // NaN \u6216 undefined\n  }, 1000);\n}\n\n// \u2705 \u7bad\u5934\u51fd\u6570\u4fee\u590d\uff1athis \u7ee7\u627f\u81ea\u5916\u56f4\u4f5c\u7528\u57df\nfunction TimerFixed() {\n  this.seconds = 0;\n\n  setInterval(() => {\n    this.seconds++; // this \u6b63\u786e\u5730\u6307\u5411 TimerFixed \u5b9e\u4f8b\n    console.log(this.seconds); // 1, 2, 3...\n  }, 1000);\n}\n\n// \u7c7b\u65b9\u6cd5\u4e2d\u7684\u573a\u666f\u66f4\u5e38\u89c1\nclass Counter {\n  constructor() {\n    this.count = 0;\n  }\n\n  start() {\n    // \u2705 \u7bad\u5934\u51fd\u6570\u81ea\u52a8\u6355\u83b7\u5916\u56f4\u7684 this\uff08\u5373 Counter \u5b9e\u4f8b\uff09\n    setInterval(() => {\n      console.log(this.count++);\n    }, 1000);\n  }\n}\n```\n\n### \u8fd4\u56de\u5bf9\u8c61\u5b57\u9762\u91cf\u7684\u6ce8\u610f\u70b9\n\n```javascript\n// \u274c \u9519\u8bef\uff1a\u82b1\u62ec\u53f7\u88ab\u89e3\u6790\u4e3a\u51fd\u6570\u4f53\nconst getObj = () => { name: 'Alice', age: 25 };\nconsole.log(getObj()); // undefined \u2014\u2014 \u5b9e\u9645\u6267\u884c\u4e86\u7a7a\u51fd\u6570\u4f53\n\n// \u2705 \u6b63\u786e\uff1a\u7528\u62ec\u53
