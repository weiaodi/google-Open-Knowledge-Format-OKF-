f7\u5305\u88f9\u5bf9\u8c61\u5b57\u9762\u91cf\nconst getObjFixed = () => ({ name: 'Alice', age: 25 });\nconsole.log(getObjFixed()); // { name: 'Alice', age: 25 }\n```\n\n## Key Points\n\n1. **\u8bcd\u6cd5 `this`**\uff1a\u7bad\u5934\u51fd\u6570\u6ca1\u6709\u81ea\u5df1\u7684 `this`\uff0c\u5b83\u4f1a\u6355\u83b7\u5b9a\u4e49\u65f6\u6240\u5728\u5916\u5c42\u4f5c\u7528\u57df\u7684 `this` \u503c\uff0c\u4e14\u4e00\u65e6\u7ed1\u5b9a\u65e0\u6cd5\u901a\u8fc7 `call()`\u3001`apply()` \u6216 `bind()` \u6539\u53d8\u3002\n2. **\u4e0d\u80fd\u7528\u4f5c\u6784\u9020\u51fd\u6570**\uff1a\u7bad\u5934\u51fd\u6570\u6ca1\u6709 `[[Construct]]` \u5185\u90e8\u65b9\u6cd5\uff0c\u4f7f\u7528 `new` \u8c03\u7528\u4f1a\u629b\u51fa `TypeError: xxx is not a constructor`\u3002\n3. **\u6ca1\u6709 `arguments` \u5bf9\u8c61**\uff1a\u7bad\u5934\u51fd\u6570\u4e0d\u7ed1\u5b9a `arguments`\uff0c\u82e5\u9700\u8981\u53ef\u53d8\u53c2\u6570\u5e94\u4f7f\u7528 rest \u53c2\u6570 `(...args) => { ... }`\u3002\n4. **\u4e0d\u80fd\u7528\u4f5c generator**\uff1a\u7bad\u5934\u51fd\u6570\u4f53\u5185\u4e0d\u80fd\u4f7f\u7528 `yield` \u5173\u952e\u5b57\uff08\u9664\u975e\u5d4c\u5957\u5728 generator \u51fd\u6570\u5185\uff09\u3002\n5. **\u7b80\u6d01\u4f53\u4e0e\u9690\u5f0f\u8fd4\u56de**\uff1a\u5f53\u51fd\u6570\u4f53\u53ea\u6709\u5355\u4e2a\u8868\u8fbe\u5f0f\u65f6\uff0c\u53ef\u7701\u7565\u82b1\u62ec\u53f7\u548c `return`\uff0c\u8868\u8fbe\u5f0f\u7ed3\u679c\u81ea\u52a8\u8fd4\u56de\uff1b\u591a\u8bed\u53e5\u4f53\u5fc5\u987b\u4f7f\u7528\u82b1\u62ec\u53f7\u5e76\u663e\u5f0f `return`\u3002\n6. **\u8fd4\u56de\u5bf9\u8c61\u5b57\u9762\u91cf\u5fc5\u987b\u52a0\u62ec\u53f7**\uff1a`() => ({ key: value })`\uff0c\u5426\u5219\u82b1\u62ec\u53f7\u4f1a\u88ab\u89e3\u6790\u4e3a\u51fd\u6570\u4f53\u5757\u3002\n\n## Common Mistakes\n\n1. **\u5728\u5bf9\u8c61\u65b9\u6cd5\u4e2d\u4f7f\u7528\u7bad\u5934\u51fd\u6570\u5bfc\u81f4 `this` \u9519\u8bef**\n\n```javascript\n// \u274c \u9519\u8bef\uff1a\u7bad\u5934\u51fd\u6570\u8ba9 this \u6307\u5411\u5bf9\u8c61\u5916\u7684\u5168\u5c40\u4f5c\u7528\u57df\nconst user = {\n  name: 'Alice',\n  greet: () => {\n    return `Hello, ${this.name}`; // this \u662f window/undefined\uff0c\u4e0d\u662f user\n  }\n};\n\n// \u2705 \u6b63\u786e\uff1a\u5bf9\u8c61\u65b9\u6cd5\u5e94\u4f7f\u7528\u4f20\u7edf\u51fd\u6570\u8868\u8fbe\u5f0f\nconst userFixed = {\n  name: 'Alice',\n  greet() {\n    return `Hello, ${this.name}`; // this \u6b63\u786e\u5730\u6307\u5411 user\n  }\n};\n```\n\n2. **\u5728 DOM \u4e8b\u4ef6\u76d1\u542c\u4e2d\u4e22\u5931 event \u76ee\u6807**\n\n```javascript\n// \u274c \u9519\u8bef\uff1a\u7bad\u5934\u51fd\u6570\u4e2d this \u4e0d\u6307\u5411\u89e6\u53d1\u4e8b\u4ef6\u7684\u5143\u7d20\nbutton.addEventListener('click', () => {\n  this.textContent = 'Clicked'; // this !== button\n  this.classList.add('active');  // \u4e0d\u4f1a\u751f\u6548\n});\n\n// \u2705 \u6b63\u786e\uff1a\u4f7f\u7528\u4f20\u7edf\u51fd\u6570\uff0c\u6216\u901a\u8fc7 event.target\nbutton.addEventListener('click', function() {\n  this.textContent = 'Clicked'; // this \u6307\u5411 button\n});\n// \u6216\u4f7f\u7528 event \u53c2\u6570\nbutton.addEventListener('click', (e) => {\n  e.target.textContent = 'Clicked';\n});\n```\n\n3. **\u9700\u8981\u52a8\u6001 `this` \u7684\u573a\u666f\u9519\u8bef\u4f7f\u7528\u7bad\u5934\u51fd\u6570**\n\n```javascript\n// \u274c \u9519\u8bef\uff1a\u7bad\u5934\u51fd\u6570\u7684 this \u65e0\u6cd5\u88ab bind \u6539\u53d8\nfunction greet() {\n  return this.name;\n}\n\nconst obj1 = { name: 'Alice' };\nconst obj2 = { name: 'Bob' };\n\nconst boundGreet = greet.bind(obj1);\nconsole.log(boundGreet()); // 'Alice' \u2705 \u4f20\u7edf\u51fd\u6570 bind \u6709\u6548\n\nconst arrowGreet = () => this.name;\nconst boundArrow = arrowGreet.bind(obj1);\nconsole.log(boundArrow()); // \u274c \u4ecd\u7136\u662f\u5168\u5c40 this\uff0cbind \u65e0\u6548\n```\n\n## Related Concepts\n\n- [Functions](../topics/functions.md) \u2014\u2014 JavaScript \u51fd\u6570\u4f53\u7cfb\u603b\u89c8\uff0c\u7bad\u5934\u51fd\u6570\u4e0e\u4f20\u7edf\u51fd\u6570\u7684\u5bf9\u6bd4\n- [Default Parameters](../syntax/default_params.md) \u2014\u2014 \u7bad\u5934\u51fd\u6570\u540c\u6837\u652f\u6301\u9ed8\u8ba4\u53c2\u6570\u8bed\u6cd5\n- [Closure](../patterns/closure.md) \u2014\u2014 \u7bad\u5934\u51fd\u6570\u4e0e\u8bcd\u6cd5\u4f5c\u7528\u57df\u7ed3\u5408\u5b9e\u73b0\u6570\u636e\u5c01\u88c5\n- [Async/Await](../syntax/async_await.md) \u2014\u2014 `async` \u7bad\u5934\u51fd\u6570\u7684\u5199\u6cd5\u4e0e\u5f02\u6b65\u56de\u8c03\n- [Destructuring](../syntax/destructuring.md) \u2014\u2014 \u7bad\u5934\u51fd\u6570\u53c2\u6570\u4e2d\u5e38\u7528\u89e3\u6784\u6a21\u5f0f\u63d0\u53d6\u5bf9\u8c61/\u6570\u7ec4\u503c\n- [Spread/Rest](../syntax/spread_rest.md) \u2014\u2014 \u4f7f\u7528 rest \u53c2\u6570 `(...args)` \u66ff\u4ee3 `arguments` \u5bf9\u8c61\n- [Variables](../topics/variables.md) \u2014\u2014 `const`/`let` \u5b9a\u4e49\u7bad\u5934\u51fd\u6570\u53d8\u91cf\u7684\u4f5c\u7528\u57df\u89c4\u5219\n- [Arrays and Iteration](../topics/arrays_and_iteration.md) \u2014\u2014 `map`/`filter`/`reduce` \u4e2d\u7bad\u5934\u51fd\u6570\u7684\u5178\u578b\u5e94\u7528\n\n## Citations\n\n- [MDN: Arrow Functions](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Functions/Arrow_functions)\n- [ECMAScript 2015 Specification: Arrow Function Definitions](https://262.ecma-international.org/6.0/#sec-arrow-function-definitions)", "syntax/async_await": "`async/await` \u662f ES2017 \u5f15\u5165\u7684\u8bed\u6cd5\u7cd6\uff0c\u5efa\u7acb\u5728 Promise \u4e4b\u4e0a\u3002\u5b83\u5141\u8bb8\u4f60\u4ee5\u7f16\u5199\u540c\u6b65\u4ee3\u7801\u7684\u65b9\u5f0f\u7f16\u5199\u5f02\u6b65\u903b\u8f91\uff0c\u4f7f\u4ee3\u7801\u66f4\u6613\u8bfb\u3001\u66f4\u6613\u7ef4\u62a4\u3002\u6838\u5fc3\u601d\u60f3\u662f\uff1a\u7528 `async` \u58f0\u660e\u4e00\u4e2a\u5f02\u6b65\u51fd\u6570\uff0c\u5728\u51fd\u6570\u5185\u90e8\u7528 `await` \u7b49\u5f85\u4e00\u4e2a Promise \u7684\u51b3\u8bae\uff08resolve/reject\uff09\uff0c\u671f\u95f4\u4e0d\u4f1a\u963b\u585e\u4e3b\u7ebf\u7a0b\u3002\n\n## Syntax\n\n```javascript\n// async \u51fd\u6570\u58f0\u660e\nasync function functionName(param1, param2) {\n  // \u51fd\u6570\u4f53\n  const result = await somePromise;\n  return result;\n}\n\n// async \u7bad\u5934\u51fd\u6570\nconst functionName = async (param1, param2) => {\n  const result = await somePromise;\n  return result;\n}\n\n// async \u4f5c\u4e3a\u5bf9\u8c61\u65b9\u6cd5\nconst obj = {\n  async method() {\n    return await fetchData();\n  }\n};\n\n// async \u4f5c\u4e3a class \u65b9\u6cd5\nclass MyClass {\n  async fetchData() {\n    return await api.call();\n  }\n}\n```\n\n**\u8981\u70b9**\uff1a\n- `async` \u5173\u952e\u5b57\u653e\u5728\u51fd\u6570\u5b9a\u4e49\u4e4b\u524d\n- `await` \u53ea\u80fd\u5728 `async` \u51fd\u6570\u5185\u90e8\u4f7f\u7528\uff08\u9876\u5c42 await \u9664\u5916\uff0c\u67d0\u4e9b\u73af\u5883\u652f\u6301\uff09\n- `await` \u540e\u9762\u901a\u5e38\u8ddf\u4e00\u4e2a Promise \u5bf9\u8c61\uff0c\u4f46\u4e5f\u53ef\u4ee5\u8ddf\u4efb\u610f\u503c\uff08\u4f1a\u88ab\u81ea\u52a8\u5305\u88c5\u4e3a resolved Promise\uff09\n\n## Examples\n\n### \u57fa\u672c\u7528\u6cd5 \u2014 \u4ee3\u66ff Promise.then \u94fe\n\n```javascript\n// \u6a21\u62df\u4e00\u4e2a\u5f02\u6b65\u64cd\u4f5c\nfunction delay(ms) {\n  return new Promise(resolve => setTimeout(resolve, ms));\n}\n\nasync function greet() {\n  console.log('\u51c6\u5907\u6253\u62db\u547c...');\n  await delay(1000);          // \u7b49\u5f85 1 \u79d2\uff0c\u4e0d\u4f1a\u963b\u585e\u4e3b\u7ebf\u7a0b\n  console.log('\u4f60\u597d\uff0c\u4e16\u754c\uff01');\n  return '\u5b8c\u6210';\n}\n\ngreet().then(msg => console.log(msg));\n// \u8f93\u51fa\uff08\u95f4\u9694 1 \u79d2\uff09\uff1a\n// \u51c6\u5907\u6253\u62db\u547c...\n// \u4f60\u597d\uff0c\u4e16\u754c\uff01\n// \u5b8c\u6210\n```\n\n### \u9519\u8bef\u5904\u7406 \u2014 try/catch \u6355\u83b7\u5f02\u6b65\u5f02\u5e38\n\n```javascript\nasync function fetchUserData(userId) {\n  try {\n    const response = await fetch(`https://api.example.com/users/${userId}`);\n    if (!response.ok) {\n      throw new Error(`HTTP \u9519\u8bef: ${response.status}`);\n    }\n    const userData = await response.json();  // \u7b49\u5f85 JSON \u89e3\u6790\n    return userData;\n  } catch (error) {\n    // \u7f51\u7edc\u9519\u8bef\u3001HTTP \u9519\u8bef\u3001JSON \u89e3\u6790\u9519\u8bef\u90fd\u4f1a\u88ab\u6355\u83b7\u5230\u8fd9\u91cc\n    console.error('\u83b7\u53d6\u7528\u6237\u6570\u636e\u5931\u8d25:', error.message);\n    return null;  // \u8fd4\u56de\u4e00\u4e2a\u5b89\u5168\u7684\u9ed8\u8ba4\u503c\n  }\n}\n\n// \u8c03\u7528\nconst user = await fetchUserData(42);\n```\n\n### \u5e76\u53d1\u6267\u884c \u2014 \u4e0d\u9700\u8981\u9010\u4e2a\u7b49\u5f85\n\n```javascript\nasync function loadDashboard() {\n  // \u274c \u9519\u8bef\u505a\u6cd5\uff1a\u9010\u4e2a\u7b49\u5f85\uff0c\u603b\u8017\u65f6 = \u6240\u6709\u8bf7\u6c42\u65f6\u95f4\u4e4b\u548c\n  // const user = await fetchUser();\n  // const posts = await fetchPosts();\n  // const notifications = await fetchNotifications();\n\n  // \u2705 \u6b63\u786e\u505a\u6cd5\uff1a\u7528 Promise.all \u5e76\u53d1\u6267\u884c\n  const [user, posts, notifications] = await Promise.all([\n    fetchUser(),\n    fetchPosts(),\n    fetchNotifications()\n  ]);\n  // \u603b\u8017\u65f6 \u2248 \u6700\u6162\u7684\u90a3\u4e2a\u8bf7\u6c42\u7684\u8017\u65f6\n\n  return { user, posts, notifications };\n}\n\n// \u8f85\u52a9\u51fd\u6570\nfunction fetchUser() {\n  return new Promise(resolve => setTimeout(() => resolve({ id: 1, name: 'Alice' }), 500));\n}\nfunction fetchPosts() {\n  return new Promise(resolve => setTimeout(() => resolve([{ title: 'Post 1' }]), 300));\n}\nfunction fetchNotifications() {\n  return new Promise(resolve => setTimeout(() => resolve([{ text: 'Hello!' }]), 400));\n}\n```\n\n### \u4e32\u884c vs \u5e76\u884c \u2014 \u7406\u89e3\u6267\u884c\u987a\u5e8f\n\n```javascript\nasync function sequentialDemo() {\n  console.time('\u4e32\u884c');\n  const a = await delayAndReturn(500, 'A');   // \u7b49\u5f85 500ms\n  const b = await delayAndReturn(300, 'B');   // \u518d\u7b49\u5f85 300ms \u2192 \u603b\u8ba1 800ms\n  console.timeEnd('\u4e32\u884c');                     // ~800ms\n  return [a, b];\n}\n\nasync function parallelDemo() {\n  console.time('\u5e76\u884c');\n  const [a, b] = await Promise.all([\n    delayAndReturn(500, 'A'),                  // \u540c\u65f6\u5f00\u59cb\n    delayAndReturn(300, 'B')                   // \u540c\u65f6\u5f00\u59cb\n  ]);                                          // \u603b\u8ba1 ~500ms\uff08\u53d6\u6700\u5927\u503c\uff09\n  console.timeEnd('\u5e76\u884c');\n  return [a, b];\n}\n\nfunction delayAndReturn(ms, value) {\n  return new Promise(resolve => setTimeout(() => resolve(value), ms));\n}\n```\n\n## Key Points\n\n1. **`async` \u51fd\u6570\u603b\u662f\u8fd4\u56de\u4e00\u4e2a Promise** \u2014 \u5373\u4f7f\u4f60 `return 42`\uff0c\u5916\u90e8\u62ff\u5230\u7684\u4e5f\u662f\u4e00\u4e2a resolved \u503c\u4e3a `42` \u7684 Promise\u3002\u5982\u679c\u51fd\u6570\u5185\u629b\u51fa\u5f02\u5e38\uff0c\u8fd4\u56de\u7684\u662f\u4e00\u4e2a rejected Promise\u3002\n2. **`await` \u6682\u505c\u5f53\u524d `async` \u51fd\u6570\u7684\u6267\u884c** \u2014 \u5b83\u4e0d\u4f1a\u963b\u585e\u4e8b\u4ef6\u5faa\u73af\u6216\u4e3b\u7ebf\u7a0b\uff0c\u53ea\u662f\u8ba9\u51fa\u6267\u884c\u6743\uff0cPromise \u51b3\u8bae\u540e\u6062\u590d\u6267\u884c\u3002\n3. **`await` \u53ea\u80fd\u5728 `async` \u51fd\u6570\u5185\u90e8\u4f7f\u7528** \u2014 \u5728\u666e\u901a\u51fd\u6570\u4e2d\u4f7f\u7528 `await` \u4f1a\u629b\u51fa `SyntaxError`\u3002\u9876\u5c42 await \u4ec5\u5728 ES2022 \u6a21\u5757\u4e2d\u652f\u6301\u3002\n4. **`await` \u540e\u9762\u8ddf\u975e Promise \u503c\u65f6\u81ea\u52a8\u5305\u88c5** \u2014 `await 42` \u7b49\u4ef7\u4e8e `await Promise.resolve(42)`\uff0c\u7acb\u5373\u8fd4\u56de 42\u3002\n5. **`async/await` \u672c\u8d28\u662f Promise \u7684\u8bed\u6cd5\u7cd6** \u2014 `.then()`\u3001`.catch()`\u3001`.finally()` \u65b9\u6cd5\u4f9d\u7136\u53ef\u7528\uff0c\u4e14\u53ef\u4ee5\u6df7\u5408\u4f7f\u7528\u3002\n6. **\u591a\u4e2a\u72ec\u7acb\u7684 `await` \u9ed8\u8ba4\u662f\u4e32\u884c\u7684** \u2014 \u5982\u679c B \u4e0d\u4f9d\u8d56 A \u7684\u7ed3\u679c\uff0c\u5e94\u8be5\u7528 `Promise.all` \u5e76\u884c\u6267\u884c\uff0c\u5426\u5219\u4f1a\u6d6a\u8d39\u7b49\u5f85\u65f6\u95f4\u3002\n\n## Common Mistakes\n\n1. **\u5fd8\u8bb0 `await`\uff0c\u5bfc\u81f4\u5f97\u5230\u7684\u662f Promise \u5bf9\u8c61\u800c\u975e\u503c**\n   ```javascript\n   async function main() {\n     const data = fetchData();    // \u274c \u6ca1\u6709 await\uff01data \u662f\u4e00\u4e2a Promise\uff0c\u4e0d\u662f\u5b9e\u9645\u6570\u636e\n     console.log(data.length);    // undefined\uff08Promise \u6ca1\u6709 .length \u5c5e\u6027\uff09\n     \n     const data2 = await fetchData();  // \u2705 \u6b63\u786e\uff1adata2 \u662f\u5b9e\u9645\u7684\u503c\n     console.log(data2.length);        // \u6b63\u5e38\u5de5\u4f5c\n   }\n   ```\n\n2. **\u5728\u5faa\u73af\u4e2d\u5bf9\u72ec\u7acb\u64cd\u4f5c\u4f7f\u7528 `await`\uff0c\u5bfc\u81f4\u4e0d\u5fc5\u8981\u7684\u4e32\u884c\u6267\u884c**\n   ```javascript\n   // \u274c \u4f4e\u6548\uff1a\u9010\u4e2a\u53d1\u9001\u8bf7\u6c42\n   async function fetchAll(urls) {\n     const results = [];\n     for (const url of urls) {\n       const res = await fetch(url);   // \u7b49\u4e0a\u4e00\u4e2a\u5b8c\u6210\u624d\u53d1\u4e0b\u4e00\u4e2a\n       results.push(await res.json());\n     }\n     return results;\n   }\n\n   // \u2705 \u9ad8\u6548\uff1a\u5168\u90e8\u5e76\u53d1\n   async function fetchAll(urls) {\n     const promises = urls.map(url => fetch(url).then(r => r.json()));\n     return Promise.all(promises);\n   }\n   ```\n\n3. **\u5728 `async` \u51fd\u6570\u4e2d\u4e0d\u7528 try/catch\uff0c\u5bfc\u81f4\u672a\u5904\u7406\u7684 Promise rejection**\n   ```javascript\n   async function risky() {\n     const data = await mightReject();  // \u274c \u5982\u679c reject\uff0c\u9519\u8bef\u4f1a\u53d8\u6210\u672a\u6355\u83b7\u7684 Promise rejection\n     return data;\n   }\n\n   // \u2705 \u6b63\u786e\u505a\u6cd5\uff1a\u7528 try/catch \u5305\u88f9\n   async function safe() {\n     try {\n       const data = await mightReject();\n       return data;\n     } catch (error) {\n       console.error('\u53d1\u751f\u9519\u8bef:', error);\n       throw error;  // \u53ef\u4ee5\u91cd\u65b0\u629b\u51fa\uff0c\u8ba9\u8c03\u7528\u65b9\u7ee7\u7eed\u5904\u7406\n     }\n   }\n   ```\n\n## Related Concepts\n\n- [Promise](../builtin/promise.md) \u2014 async/await \u7684\u5e95\u5c42\u57fa\u7840\uff0c\u7406\u89e3 Promise \u80fd\u5e2e\u4f60\u66f4\u597d\u5730\u638c\u63e1 async/await\n- [\u5f02\u6b65\u7f16\u7a0b](../topics/async.md) \u2014 JavaScript \u5f02\u6b65\u7f16\u7a0b\u7684\u5168\u9762\u6982\u89c8\uff0c\u5305\u62ec\u4e8b\u4ef6\u5faa\u73af\u3001\u56de\u8c03\u3001Promise \u7b49\n- [\u5f02\u6b65\u6a21\u5f0f](../patterns/async_patterns.md) \u2014 \u9ad8\u7ea7\u5f02\u6b65\u6a21\u5f0f\uff1aPromise.all\u3001Promise.race\u3001\u8d85\u65f6\u63a7\u5236\u7b49\n\n## Citations\n\n- [MDN: async function](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Statements/async_function)\n- [MDN: await](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Operators/await)\n- [MDN: Using Promises](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Guide/Using_promises)\n- ECMAScript 2017 (ES8) Specification \u2014 Async Functions", "syntax/class": "## \u6982\u8ff0\n\n`class` \u662f ES2015 (ES6) \u5f15\u5165\u7684\u8bed\u6cd5\u7cd6\uff0c\u5e95\u5c42\u4ecd\u662f\u57fa\u4e8e\u539f\u578b\u94fe\uff08prototype chain\uff09\u7684\u7ee7\u627f\u673a\u5236\u3002\u5b83\u63d0\u4f9b\u4e86\u4e00\u79cd\u66f4\u6e05\u6670\u3001\u66f4\u63a5\u8fd1\u4f20\u7edf OOP \u8bed\u8a00\u7684\u65b9\u5f0f\u6765\u5b9a\u4e49\u6784\u9020\u51fd\u6570\u548c\u539f\u578b\u65b9\u6cd5\u3002class \u8bed\u6cd5**\u4e0d\u4f1a\u521b\u5efa\u65b0\u7684\u9762\u5411\u5bf9\u8c61\u6a21\u578b**\uff0c\u800c\u662f\u8ba9\u539f\u578b\u7ee7\u627f\u7684\u5199\u6cd5\u66f4\u76f4\u89c2\u3002\u5f53\u4f60\u9700\u8981\u521b\u5efa\u5177\u6709\u5171\u4eab\u65b9\u6cd5\u548c\u5c42\u6b21\u7ed3\u6784\u7684\u5bf9\u8c61\u65f6\uff0cclass \u662f\u9996\u9009\u7684\u8868\u8fbe\u65b9\u5f0f\u3002\n\n## Syntax\n\n```javascript\n// \u57fa\u672c\u7c7b\u58f0\u660e\nclass ClassName {\n  constructor(param1, param2) {\n    this.property1 = param1;\n    this.property2 = param2;\n  }\n\n  method1() { /* \u539f\u578b\u65b9\u6cd5 */ }\n  static staticMethod() { /* \u9759\u6001\u65b9\u6cd5 */ }\n  get getterName() { /* getter */ }\n  set setterName(value) { /* setter */ }\n}\n\n// \u7c7b\u8868\u8fbe\u5f0f\uff08\u533f\u540d\u6216\u5177\u540d\uff09\nconst MyClass = class { /* ... */ };\nconst NamedClass = class Named { /* ... */ };\n\n// \u7ee7\u627f\nclass ChildClass extends ParentClass {\n  constructor(...args) {\n    super(...args);  // \u5fc5\u987b\u5148\u8c03\u7528 super()\n    this.childProp = '\u989d\u5916\u5c5e\u6027';\n  }\n\n  // \u91cd\u5199\u7236\u7c7b\u65b9\u6cd5\n  overriddenMethod() {\n    super.overriddenMethod(); // \u8c03\u7528\u7236\u7c7b\u7248\u672c\n    // \u5b50\u7c7b\u903b\u8f91\n  }\n}\n```\n\n## Examples\n\n### \u57fa\u672c\u7528\u6cd5 \u2014 \u5b9e\u4f8b\u5c5e\u6027\u4e0e\u65b9\u6cd5\n\n```javascript\nclass User {\n  constructor(name, email) {\n    this.name = name;\n    this.email = email;\n    this.createdAt = new Date();\n  }\n\n  // \u539f\u578b\u65b9\u6cd5\uff0c\u6240\u6709\u5b9e\u4f8b\u5171\u4eab\n  greet() {\n    return `\u4f60\u597d\uff0c\u6211\u662f ${this.name}`;\n  }\n\n  // getter\n  get emailDomain() {\n    return this.email.split('@')[1];\n  }\n\n  // setter\n  set emailDomain(domain) {\n    this.email = this.email.replace(/@.+$/, `@${domain}`);\n  }\n}\n\nconst user = new User('Alice', 'alice@example.com');\nconsole.log(user.greet());       // \"\u4f60\u597d\uff0c\u6211\u662f Alice\"\nconsole.log(user.emailDomain);   // \"example.com\"\nuser.emailDomain = 'company.org';\nconsole.log(user.email);         // \"alice@company.org\"\n```\n\n### \u9759\u6001\u6210\u5458\u4e0e\u79c1\u6709\u5b57\u6bb5 (ES2022+)\n\n```javascript\nclass Counter {\n  // \u79c1\u6709\u5b57\u6bb5 \u2014 \u4ee5 # \u5f00\u5934\uff0c\u7c7b\u5916\u90e8\u65e0\u6cd5\u8bbf\u95ee\n  #count = 0;\n\n  // \u9759\u6001\u79c1\u6709\u5b57\u6bb5\n  static #totalCounters = 0;\n\n  constructor() {\n    Counter.#totalCounters++;\n  }\n\n  increment() {\n    this.#count++;\n  }\n\n  get value() {\n    return this.#count;\n  }\n\n  // \u9759\u6001\u65b9\u6cd5\n  static get totalCreated() {\n    return Counter.#totalCounters;\n  }\n}\n\nconst a = new Counter();\nconst b = new Counter();\na.increment();\na.increment();\nb.increment();\nconsole.log(a.value);            // 2\nconsole.log(Counter.totalCreated); // 2\n// console.log(a.#count);        // SyntaxError: \u79c1\u6709\u5b57\u6bb5\u4e0d\u53ef\u5728\u7c7b\u5916\u8bbf\u95ee\n```\n\n### \u7ee7\u627f\u4e0e super\n\n```javascript\nclass Animal {\n  constructor(name) {\n    this.name = name;\n  }\n\n  speak() {\n    return `${this.name} \u53d1\u51fa\u58f0\u97f3`;\n  }\n\n  static classify() {\n    return '\u52a8\u7269';\n  }\n}\n\nclass Dog extends Animal {\n  constructor(name, breed) {\n    super(name);  // \u5fc5\u987b\u8c03\u7528 super() \u624d\u80fd\u4f7f\u7528 this\n    this.breed = breed;\n  }\n\n  // \u91cd\u5199 speak \u65b9\u6cd5\n  speak() {\n    // \u5148\u8c03\u7528\u7236\u7c7b\u7248\u672c\uff0c\u518d\u8ffd\u52a0\u5b50\u7c7b\u903b\u8f91\n    return `${super.speak()} \u2014 \u6c6a\u6c6a\uff01`;\n  }\n\n  static classify() {\n    return `\u72ac\u79d1 (${super.classify()})`;\n  }\n}\n\nconst dog = new Dog('\u65fa\u8d22', '\u67f4\u72ac');\nconsole.log(dog.speak());          // \"\u65fa\u8d22 \u53d1\u51fa\u58f0\u97f3 \u2014 \u6c6a\u6c6a\uff01\"\nconsole.log(Dog.classify());       // \"\u72ac\u79d1 (\u52a8\u7269)\"\nconsole.log(dog instanceof Animal); // true\nconsole.log(dog instanceof Dog);    // true\n```\n\n### \u7c7b\u8868\u8fbe\u5f0f\u4e0e\u6df7\u5165 (Mixin) \u6a21\u5f0f\n\n```javascript\n// \u7c7b\u8868\u8fbe\u5f0f\uff1a\u52a8\u6001\u521b\u5efa\u7c7b\nfunction createLogger(BaseClass) {\n  return class extends BaseClass {\n    log(message) {\n      console.log(`[${new Date().toISOString()}] ${message}`);\n    }\n  };\n}\n\nclass Person {\n  constructor(name) { this.name = name; }\n}\n\n// \u6df7\u5165\uff1a\u7ec4\u5408\u591a\u4e2a\u7c7b\u7684\u80fd\u529b\nclass Employee extends createLogger(Person) {\n  constructor(name, role) {\n    super(name);\n    this.role = role;\n  }\n}\n\nconst emp = new Employee('Bob', '\u5de5\u7a0b\u5e08');\nemp.log('\u4e0a\u73ed\u6253\u5361'); // \"[2025-01-01T08:00:00.000Z] \u4e0a\u73ed\u6253\u5361\"\n```\n\n## Key Points\n\n- **`class` \u672c\u8d28\u662f\u51fd\u6570**\uff1a`typeof MyClass === 'function'`\uff0c`class` \u58f0\u660e\u7684\u6784\u9020\u51fd\u6570\u5c31\u662f `constructor` \u65b9\u6cd5\u672c\u8eab\u3002\n- **\u5fc5\u987b\u5148\u8c03\u7528 `super()` \u624d\u80fd\u8bbf\u95ee `this`**\uff1a\u5728\u6d3e\u751f\u7c7b\u7684\u6784\u9020\u51fd\u6570\u4e2d\uff0c\u8c03\u7528 `super()` \u4e4b\u524d\u4f7f\u7528 `this` \u4f1a\u629b\u51fa `ReferenceError`\u3002\n- **class \u65b9\u6cd5\u4e0d\u53ef\u679a\u4e3e**\uff1aclass \u7684\u539f\u578b\u65b9\u6cd5\u9ed8\u8ba4 `enumerable: false`\uff0c\u8fd9\u4e0e\u4f20\u7edf\u6784\u9020\u51fd\u6570\u4e0d\u540c\uff08\u4f20\u7edf\u65b9\u6cd5\u5199\u5728 prototype \u4e0a\u662f\u53ef\u679a\u4e3e\u7684\uff09\u3002\n- **class \u58f0\u660e\u4e0d\u4f1a\u63d0\u5347**\uff1a\u4e0e `function` \u4e0d\u540c\uff0c`class` \u58f0\u660e\u5b58\u5728\u6682\u65f6\u6027\u6b7b\u533a\uff08TDZ\uff09\uff0c\u5fc5\u987b\u5728\u58f0\u660e\u540e\u624d\u80fd\u4f7f\u7528\u3002\n- **\u79c1\u6709\u5b57\u6bb5 `#` \u662f\u771f\u6b63\u7684\u786c\u79c1\u5bc6**\uff1aES2022 \u6b63\u5f0f\u652f\u6301\u7684 `#field` \u8bed\u6cd5\u5728\u8bed\u8a00\u5c42\u9762\u4fdd\u8bc1\u4e0d\u53ef\u4ece\u5916\u90e8\u8bbf\u95ee\uff0c\u65e0\u6cd5\u901a\u8fc7 `Object.keys()` \u6216 `Reflect` \u83b7\u53d6\u3002\n- **`static` \u6210\u5458\u5c5e\u4e8e\u7c7b\u672c\u8eab**\uff1a\u9759\u6001\u65b9\u6cd5\u548c\u5c5e\u6027\u53ea\u80fd\u901a\u8fc7\u7c7b\u540d\u8c03\u7528\uff0c\u5b9e\u4f8b\u65e0\u6cd5\u8bbf\u95ee\u3002\u9759\u6001\u65b9\u6cd5\u4e2d\u7684 `this` \u6307\u5411\u7c7b\u672c\u8eab\u3002\n\n## Common Mistakes\n\n- **\u5fd8\u8bb0\u8c03\u7528 `super()` \u6216\u653e\u9519\u987a\u5e8f**\uff1a\u6d3e\u751f\u7c7b\u6784\u9020\u51fd\u6570\u4e2d\uff0c`super()` \u5fc5\u987b\u662f\u7b2c\u4e00\u884c\uff08\u5728 `this` \u4f7f\u7528\u4e4b\u524d\uff09\u3002\u5fd8\u8bb0\u8c03\u7528\u4f1a\u629b\u51fa `ReferenceError`\u3002\n  ```javascript\n  // \u274c \u9519\u8bef\n  class Child extends Parent {\n    constructor(x, y) {\n      this.x = x;  // ReferenceError: \u5fc5\u987b\u5148\u8c03\u7528 super()\n      super(y);\n    }\n  }\n  ```\n\n- **\u7bad\u5934\u51fd\u6570\u5728 class \u4e2d\u4f5c\u4e3a\u65b9\u6cd5\u7684\u8bef\u89e3**\uff1a\u7bad\u5934\u51fd\u6570\u5b9a\u4e49\u5728\u5b57\u6bb5\u4e2d\uff08\u5982 `method = () => {}`\uff09\u4f1a\u4e3a**\u6bcf\u4e2a\u5b9e\u4f8b**\u521b\u5efa\u72ec\u7acb\u51fd\u6570\u526f\u672c\u3002\u82e5\u5e0c\u671b\u5c06\u65b9\u6cd5\u653e\u5728\u539f\u578b\u4e0a\u5171\u4eab\uff0c\u5e94\u4f7f\u7528\u6807\u51c6\u65b9\u6cd5\u8bed\u6cd5\u3002\n  ```javascript\n  class MyClass {\n    // \u6bcf\u4e2a\u5b9e\u4f8b\u72ec\u7acb\u521b\u5efa\uff0c\u5360\u7528\u66f4\u591a\u5185\u5b58\n    arrowMethod = () => { /* ... */ };\n    // \u539f\u578b\u4e0a\u7684\u5171\u4eab\u65b9\u6cd5\n    standardMethod() { /* ... */ };\n  }\n  ```\n\n- **\u8bef\u4ee5\u4e3a class \u662f\u503c\u7c7b\u578b**\uff1aclass \u4ecd\u7136\u662f\u5f15\u7528\u7c7b\u578b\uff0c\u6bd4\u8f83\u4e24\u4e2a\u5b9e\u4f8b\u5fc5\u987b\u6bd4\u8f83\u5f15\u7528\u6216\u81ea\u5b9a\u4e49 `equals` \u65b9\u6cd5\uff0c\u4e0d\u8981\u4f7f\u7528 `===`\u3002\n  ```javascript\n  new User('a') === new User('a'); // false\uff0c\u4e24\u4e2a\u4e0d\u540c\u5bf9\u8c61\n  ```\n\n## Related Concepts\n\n- [\u5bf9\u8c61\u4e0e\u7c7b](../topics/objects_and_classes.md) \u2014 class \u7684\u5e95\u5c42\u673a\u5236\uff0c\u5bf9\u8c61\u521b\u5efa\u4e0e\u5c5e\u6027\u63cf\u8ff0\u7b26\n- [\u539f\u578b\u94fe\u6a21\u5f0f](../patterns/prototype_chain.md) \u2014 class \u80cc\u540e\u7684\u539f\u578b\u7ee7\u627f\u539f\u7406\n- [\u51fd\u6570](../topics/functions.md) \u2014 \u6784\u9020\u51fd\u6570\u4e0e\u666e\u901a\u51fd\u6570\u7684\u533a\u522b\n- [\u53d8\u91cf\u58f0\u660e](../topics/variables.md) \u2014 let/const \u7684\u6682\u65f6\u6027\u6b7b\u533a (TDZ) \u4e0e class \u7684\u63d0\u5347\u884c\u4e3a\u4e00\u81f4\n\n## Citations\n\n- [MDN: Classes](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Classes)\n- [ECMAScript 2015: Class Definitions](https://262.ecma-international.org/6.0/#sec-class-definitions)\n- [ECMAScript 2022: Private Class Fields](https://tc39.es/ecma262/#sec-private-static-methods-and-accessors)", "syntax/default_params": "## \u6982\u8ff0\n\n\u9ed8\u8ba4\u53c2\u6570\uff08Default Parameters\uff09\u662f ES2015\uff08ES6\uff09\u5f15\u5165\u7684\u7279\u6027\uff0c\u5141\u8bb8\u5728\u51fd\u6570\u58f0\u660e\u65f6\u4e3a\u5f62\u53c2\u6307\u5b9a\u4e00\u4e2a\u9ed8\u8ba4\u503c\u3002\u5f53\u8c03\u7528\u51fd\u6570\u65f6\uff0c\u5982\u679c\u67d0\u4e2a\u53c2\u6570\u672a\u4f20\u5165\u6216\u663e\u5f0f\u4f20\u5165 `undefined`\uff0c\u5219\u9ed8\u8ba4\u503c\u4f1a\u88ab\u4f7f\u7528\u3002\u8fd9\u4e00\u7279\u6027\u6781\u5927\u7b80\u5316\u4e86\u65e7\u65f6\u4ee3\u624b\u52a8\u68c0\u6d4b `typeof arg === 'undefined'` \u7684\u6837\u677f\u4ee3\u7801\uff0c\u8ba9\u51fd\u6570\u7b7e\u540d\u66f4\u6e05\u6670\u3001\u53ef\u8bfb\u6027\u66f4\u5f3a\u3002\n\n\u4f7f\u7528\u9ed8\u8ba4\u53c2\u6570\u7684\u573a\u666f\u5305\u62ec\uff1a\u4e3a\u914d\u7f6e\u5bf9\u8c61\u7684\u53ef\u9009\u5c5e\u6027\u63d0\u4f9b\u515c\u5e95\u503c\u3001\u8bbe\u7f6e\u5206\u9875\u67e5\u8be2\u7684\u9ed8\u8ba4\u9875\u7801\u4e0e\u6761\u6570\u3001\u4e3a\u56de\u8c03\u51fd\u6570\u63d0\u4f9b\u7a7a\u64cd\u4f5c\u7684\u9ed8\u8ba4\u5b9e\u73b0\u7b49\u3002\n\n## \u8bed\u6cd5\n\n```javascript\nfunction name(param1 = defaultValue1, param2 = defaultValue2, ...) {\n  // function body\n}\n```\n\n- \u9ed8\u8ba4\u503c\u53ef\u4ee5\u662f\u4efb\u610f JavaScript \u8868\u8fbe\u5f0f\uff0c\u751a\u81f3\u662f\u51fd\u6570\u8c03\u7528\u3002\n- \u9ed8\u8ba4\u503c\u4ec5\u5728**\u5b9e\u53c2\u4e3a `undefined`** \u65f6\u751f\u6548\u2014\u2014`null`\u3001`false`\u3001`0` \u7b49 falsy \u503c\u4e0d\u4f1a\u89e6\u53d1\u9ed8\u8ba4\u503c\u3002\n- \u9ed8\u8ba4\u53c2\u6570\u4f1a\u6309\u4ece\u5de6\u5230\u53f3\u7684\u987a\u5e8f\u6c42\u503c\uff0c\u524d\u9762\u7684\u53c2\u6570\u53ef\u4ee5\u5728\u540e\u9762\u53c2\u6570\u7684\u9ed8\u8ba4\u503c\u8868\u8fbe\u5f0f\u4e2d\u5f15\u7528\u3002\n\n## \u793a\u4f8b\n\n### \u57fa\u7840\u7528\u6cd5\n\n```javascript\n// \u57fa\u672c\u573a\u666f\uff1a\u8bbe\u7f6e\u9ed8\u8ba4\u503c\nfunction greet(name = '\u8bbf\u5ba2') {\n  return `\u4f60\u597d\uff0c${name}\uff01`;\n}\n\nconsole.log(greet('\u5c0f\u660e'));   // \"\u4f60\u597d\uff0c\u5c0f\u660e\uff01\"\nconsole.log(greet());        // \"\u4f60\u597d\uff0c\u8bbf\u5ba2\uff01\" \u2014 \u672a\u4f20\u53c2\uff0c\u4f7f\u7528\u9ed8\u8ba4\u503c\nconsole.log(greet(undefined)); // \"\u4f60\u597d\uff0c\u8bbf\u5ba2\uff01\" \u2014 undefined \u89e6\u53d1\u9ed8\u8ba4\u503c\nconsole.log(greet(null));    // \"\u4f60\u597d\uff0cnull\uff01\" \u2014 null \u4e0d\u4f1a\u89e6\u53d1\u9ed8\u8ba4\u503c\uff01\n```\n\n### \u5206\u9875\u51fd\u6570\u4e2d\u7684\u5b9e\u9645\u5e94\u7528\n\n```javascript\n// \u5b9e\u9645\u5f00\u53d1\u573a\u666f\uff1a\u5206\u9875\u67e5\u8be2\nfunction fetchUsers(page = 1, pageSize = 20) {\n  console.log(`\u6b63\u5728\u8bf7\u6c42\u7b2c ${page} \u9875\uff0c\u6bcf\u9875 ${pageSize} \u6761`);\n  // \u6a21\u62df API \u8c03\u7528\n  return { page, pageSize, data: [] };\n}\n\nfetchUsers();           // \u7b2c 1 \u9875\uff0c\u6bcf\u9875 20 \u6761\nfetchUsers(3);          // \u7b2c 3 \u9875\uff0c\u6bcf\u9875 20 \u6761\nfetchUsers(2, 50);      // \u7b2c 2 \u9875\uff0c\u6bcf\u9875 50 \u6761\n```\n\n### \u5f15\u7528\u524d\u9762\u7684\u53c2\u6570\u4f5c\u4e3a\u9ed8\u8ba4\u503c\n\n```javascript\n// \u540e\u9762\u7684\u53c2\u6570\u53ef\u4ee5\u5f15\u7528\u524d\u9762\u7684\u53c2\u6570\nfunction createRectangle(width, height = width) {\n  // \u5982\u679c height \u672a\u4f20\uff0c\u89c6\u4e3a\u6b63\u65b9\u5f62\n  return { width, height };\n}\n\nconsole.log(createRectangle(10));     // { width: 10, height: 10 }\nconsole.log(createRectangle(10, 20)); // { width: 10, height: 20 }\n```\n\n### \u4f7f\u7528\u51fd\u6570\u8c03\u7528\u4f5c\u4e3a\u9ed8\u8ba4\u503c\n\n```javascript\n// \u9ed8\u8ba4\u503c\u53ef\u4ee5\u662f\u51fd\u6570\u8c03\u7528\u7684\u7ed3\u679c\uff08\u6309\u9700\u6c42\u503c\uff09\nfunction getDefaultId() {\n  console.log('\u8ba1\u7b97\u9ed8\u8ba4 ID...');\n  return Math.floor(Math.random() * 10000);\n}\n\nfunction createUser(name, id = getDefaultId()) {\n  return { name, id };\n}\n\n// \u53ea\u6709\u5f53 id \u672a\u4f20\u5165\u65f6\uff0cgetDefaultId \u624d\u4f1a\u88ab\u8c03\u7528\nconsole.log(createUser('Alice'));        // getDefaultId \u88ab\u8c03\u7528\nconsole.log(createUser('Bob', 9999));    // getDefaultId \u4e0d\u88ab\u8c03\u7528\n```\n\n## \u5173\u952e\u8981\u70b9\n\n- **\u9ed8\u8ba4\u503c\u53ea\u5bf9 `undefined` \u751f\u6548**\uff1a`null`\u3001`NaN`\u3001`false`\u3001`0`\u3001`''` \u7b49 falsy \u503c\u90fd\u4e0d\u4f1a\u89e6\u53d1\u9ed8\u8ba4\u503c\u66ff\u6362\uff0c\u8fd9\u4e00\u70b9\u4e0e\u8bb8\u591a\u4eba\u76f4\u89c9\u76f8\u53cd\u3002\n- **\u9ed8\u8ba4\u503c**\u5728\u6bcf\u6b21\u51fd\u6570\u8c03\u7528\u65f6**\u60f0\u6027\u6c42\u503c**\uff1a\u5982\u679c\u9ed8\u8ba4\u503c\u662f\u4e00\u4e2a\u8868\u8fbe\u5f0f\u6216\u51fd\u6570\u8c03\u7528\uff0c\u5b83\u53ea\u4f1a\u5728\u9700\u8981\u65f6\uff08\u53c2\u6570\u4e3a `undefined`\uff09\u6267\u884c\u4e00\u6b21\uff0c\u4e0d\u662f\u5b9a\u4e49\u65f6\u6c42\u503c\u3002\n- **\u9ed8\u8ba4\u53c2\u6570\u4f1a\u521b\u5efa\u4e00\u4e2a\u65b0\u7684\u4f5c\u7528\u57df**\uff08\u79f0\u4e3a\u300c\u53c2\u6570\u4f5c\u7528\u57df\u300d\uff09\uff0c\u4e0e\u51fd\u6570\u4f53\u4f5c\u7528\u57df\u9694\u79bb\u3002\u8fd9\u610f\u5473\u7740\u51fd\u6570\u4f53\u5185\u7528 `var` \u58f0\u660e\u7684\u53d8\u91cf\u4e0d\u4f1a\u5f71\u54cd\u53c2\u6570\u9ed8\u8ba4\u503c\u4e2d\u7684\u540c\u540d\u53d8\u91cf\u3002\n- **\u9ed8\u8ba4\u53c2\u6570\u4f1a\u6539\u53d8\u51fd\u6570\u7684 `length` \u5c5e\u6027**\uff1a`function.length` \u8fd4\u56de\u7684\u662f\u6ca1\u6709\u9ed8\u8ba4\u503c\u7684\u53c2\u6570\u4e2a\u6570\uff08\u4ece\u7b2c\u4e00\u4e2a\u6709\u9ed8\u8ba4\u503c\u7684\u53c2\u6570\u5f00\u59cb\uff0c\u540e\u7eed\u53c2\u6570\u4e0d\u8ba1\u5165\uff09\u3002\n- **\u9ed8\u8ba4\u53c2\u6570\u53ef\u4ee5\u4e0e\u89e3\u6784\uff08Destructuring\uff09\u7ed3\u5408\u4f7f\u7528**\uff1a\u4e3a\u89e3\u6784\u51fa\u7684\u5c5e\u6027\u8bbe\u7f6e\u9ed8\u8ba4\u503c\uff0c\u6216\u4e3a\u6574\u4e2a\u89e3\u6784\u53c2\u6570\u8bbe\u7f6e\u7a7a\u5bf9\u8c61\u515c\u5e95\u3002\n- **\u9ed8\u8ba4\u53c2\u6570\u4e0d\u5f71\u54cd arguments \u5bf9\u8c61**\uff1a`arguments` \u5bf9\u8c61\u4ecd\u7136\u53cd\u6620\u5b9e\u9645\u4f20\u5165\u7684\u503c\uff0c\u800c\u4e0d\u662f\u9ed8\u8ba4\u503c\u586b\u5145\u540e\u7684\u503c\uff08\u4e25\u683c\u6a21\u5f0f\u4e0b\uff09\u3002\n\n## \u5e38\u89c1\u9519\u8bef\n\n- **\u5c06 `null` \u8bef\u8ba4\u4e3a\u80fd\u89e6\u53d1\u9ed8\u8ba4\u503c**\n  ```javascript\n  function setVolume(level = 50) {\n    console.log(level);\n  }\n  setVolume(null); // \u8f93\u51fa null\uff0c\u4e0d\u662f 50\uff01\n  // \u4fee\u6b63\uff1a\u5982\u679c\u9700\u8981\u5c06 null \u4e5f\u89c6\u4e3a\u672a\u4f20\u5165\uff0c\u624b\u52a8\u68c0\u67e5\uff1a\n  function setVolumeFixed(level = 50) {\n    if (level === null) level = 50;\n    console.log(level);\n  }\n  ```\n\n- **\u9ed8\u8ba4\u53c2\u6570\u653e\u5728\u4e2d\u95f4\u5bfc\u81f4\u65e0\u6cd5\u7701\u7565\u540e\u7eed\u5fc5\u4f20\u53c2\u6570**\n  ```javascript\n  function log(message, level = 'INFO', timestamp) {\n    console.log(`[${level}] ${timestamp}: ${message}`);\n  }\n  // \u5982\u679c\u60f3\u7528\u9ed8\u8ba4 level \u4f46\u6307\u5b9a timestamp\uff0c\u5fc5\u987b\u4f20 undefined\uff1a\n  log('\u51fa\u9519\u5566', undefined, new Date()); // \u53ef\u884c\u4f46\u4e11\u964b\n  // \u6700\u4f73\u5b9e\u8df5\uff1a\u5c06\u5fc5\u4f20\u53c2\u6570\u653e\u5728\u524d\u9762\uff0c\u6709\u9ed8\u8ba4\u503c\u7684\u53c2\u6570\u653e\u5728\u540e\u9762\n  function logBetter(message, timestamp, level = 'INFO') {\n    console.log(`[${level}] ${timestamp}: ${message}`);\n  }\n  ```\n\n- **\u9ed8\u8ba4\u503c\u4e2d\u4f7f\u7528\u524d\u9762\u7684\u53c2\u6570\u4f46\u5ffd\u7565\u4e86\u53c2\u6570\u6c42\u503c\u987a\u5e8f**\n  ```javascript\n  function badExample(a = b, b = 1) {\n    return [a, b];\n  }\n  // ReferenceError: Cannot access 'b' before initialization\n  // \u539f\u56e0\uff1aa \u7684\u9ed8\u8ba4\u503c\u6c42\u503c\u65f6\uff0cb \u8fd8\u672a\u521d\u59cb\u5316\uff08TDZ\uff09\n  // \u4fee\u6b63\uff1a\u786e\u4fdd\u5f15\u7528\u987a\u5e8f\u6b63\u786e\u2014\u2014\u88ab\u5f15\u7528\u7684\u53c2\u6570\u5fc5\u987b\u5148\u58f0\u660e\n  ```\n\n## \u76f8\u5173\u6982\u5ff5\n\n- [\u51fd\u6570 (Functions)](../topics/functions.md) \u2014 \u51fd\u6570\u7684\u5b8c\u6574\u6307\u5357\uff0c\u5305\u62ec\u58f0\u660e\u3001\u8868\u8fbe\u5f0f\u4e0e\u8c03\u7528\n- [\u7bad\u5934\u51fd\u6570 (Arrow Functions)](../syntax/arrow_function.md) \u2014 \u7bad\u5934\u51fd\u6570\u540c\u6837\u652f\u6301\u9ed8\u8ba4\u53c2\u6570\u8bed\u6cd5\n- [\u89e3\u6784\u8d4b\u503c (Destructuring)](../syntax/destructuring.md) \u2014 \u7ed3\u5408\u89e3\u6784\u4e0e\u9ed8\u8ba4\u503c\u5904\u7406\u5d4c\u5957\u5bf9\u8c61\n- [\u53d8\u91cf (Variables)](../topics/variables.md) \u2014 \u7406\u89e3\u5757\u7ea7\u4f5c\u7528\u57df\u4e0e TDZ\uff0c\u6709\u52a9\u4e8e\u7406\u89e3\u9ed8\u8ba4\u53c2\u6570\u7684\u53c2\u6570\u4f5c\u7528\u57df\n\n## \u53c2\u8003\u8d44\u6e90\n\n- MDN: [Default parameters](https://developer.mozilla.org/zh-CN/docs/Web/JavaScript/Reference/Functions/Default_parameters)\n- ECMAScript 2015 (ES6) Specification \u2014 Function Definitions", "syntax/destructuring": "\u89e3\u6784\u8d4b\u503c\uff08Destructuring Assignment\uff09\u5141\u8bb8\u4f60\u4ece**\u6570\u7ec4**\u6216**\u5bf9\u8c61**\u4e2d\u63d0\u53d6\u503c\uff0c\u5e76\u4ee5\u4e00\u79cd\u7b80\u6d01\u7684\u8bed\u6cd5\u76f4\u63a5\u8d4b\u503c\u7ed9\u53d8\u91cf\u3002\u5b83\u672c\u8d28\u4e0a\u662f ES2015\uff08ES6\uff09\u5f15\u5165\u7684\u8bed\u6cd5\u7cd6\uff0c\u8ba9\u6570\u636e\u63d0\u53d6\u7684\u4ee3\u7801\u66f4\u6e05\u6670\u3001\u66f4\u5c11\u6837\u677f\u3002\u89e3\u6784\u5728\u51fd\u6570\u53c2\u6570\u3001\u53d8\u91cf\u58f0\u660e\u3001\u5faa\u73af\u548c\u6a21\u5757\u5bfc\u5165\u7b49\u573a\u666f\u4e2d\u90fd\u975e\u5e38\u5b9e\u7528\u3002\n\n## Syntax\n\n### \u6570\u7ec4\u89e3\u6784\n\n```javascript\n// \u57fa\u672c\u6570\u7ec4\u89e3\u6784\nconst [a, b] = array;\n\n// \u8df3\u8fc7\u5143\u7d20\nconst [a, , c] = array;\n\n// \u5269\u4f59\u5143\u7d20\uff08rest pattern\uff09\nconst [first, ...rest] = array;\n\n// \u8bbe\u7f6e\u9ed8\u8ba4\u503c\nconst [a = defaultA, b = defaultB] = array;\n\n// \u4ea4\u6362\u53d8\u91cf\uff08\u65e0\u9700\u4e34\u65f6\u53d8\u91cf\uff09\n[a, b] = [b, a];\n```\n\n### \u5bf9\u8c61\u89e3\u6784\n\n```javascript\n// \u57fa\u672c\u5bf9\u8c61\u89e3\u6784\uff08\u53d8\u91cf\u540d\u4e0e\u5c5e\u6027\u540d\u4e00\u81f4\uff09\nconst { name, age } = obj;\n\n// \u91cd\u547d\u540d\uff08\u63d0\u53d6 age \u5e76\u8d4b\u7ed9\u53d8\u91cf years\uff09\nconst { age: years } = obj;\n\n// \u8bbe\u7f6e\u9ed8\u8ba4\u503c\nconst { name = 'Anonymous' } = obj;\n\n// \u91cd\u547d\u540d + \u9ed8\u8ba4\u503c\nconst { age: years = 18 } = obj;\n\n// \u5d4c\u5957\u89e3\u6784\nconst { address: { city, zip } } = obj;\n\n// \u5269\u4f59\u5c5e\u6027\uff08rest\uff0cES2018+\uff09\nconst { name, ...otherProps } = obj;\n```\n\n### \u51fd\u6570\u53c2\u6570\u89e3\u6784\n\n```javascript\n// \u5bf9\u8c61\u53c2\u6570\u89e3\u6784\nfunction print({ name, age }) { ... }\n\n// \u6570\u7ec4\u53c2\u6570\u89e3\u6784\nfunction sum([a, b, c]) { ... }\n\n// \u53c2\u6570\u89e3\u6784 + \u9ed8\u8ba4\u503c\nfunction connect({ host = 'localhost', port = 8080 } = {}) { ... }\n```\n\n## Examples\n\n```javascript\n// ----- \u793a\u4f8b 1\uff1a\u57fa\u672c\u6570\u7ec4\u89e3\u6784\u4e0e\u53d8\u91cf\u4ea4\u6362 -----\nconst colors = ['red', 'green', 'blue'];\nconst [first, second, third] = colors;\nconsole.log(first, second, third); // 'red' 'green' 'blue'\n\n// \u7ecf\u5178\u7684\u53d8\u91cf\u4ea4\u6362 \u2014\u2014 \u65e0\u9700\u4e34\u65f6\u53d8\u91cf\nlet x = 1, y = 2;\n[x, y] = [y, x];\nconsole.log(x, y); // 2 1\n```\n\n```javascript\n// ----- \u793a\u4f8b 2\uff1a\u4ece API \u54cd\u5e94\u5bf9\u8c61\u4e2d\u5b89\u5168\u63d0\u53d6\u6570\u636e -----\nconst response = {\n  status: 200,\n  data: {\n    user: {\n      id: 42,\n      name: 'Alice',\n      email: 'alice@example.com'\n    },\n    meta: { page: 1 }\n  }\n};\n\n// \u4ece\u6df1\u5c42\u5d4c\u5957\u7ed3\u6784\u4e2d\u63d0\u53d6\u6570\u636e\uff0c\u540c\u65f6\u8bbe\u7f6e\u9ed8\u8ba4\u503c\u4ee5\u9632\u7f3a\u5931\nconst {\n  status,\n  data: {\n    user: { name, email, role = 'guest' },  // role \u4e0d\u5b58\u5728\uff0c\u4f7f\u7528\u9ed8\u8ba4\u503c 'guest'\n    meta: { page }\n  }\n} = response;\n\nconsole.log(`${name} (${email}), role: ${role}, page: ${page}`); \n// 'Alice (alice@example.com), role: guest, page: 1'\n```\n\n```javascript\n// ----- \u793a\u4f8b 3\uff1a\u51fd\u6570\u53c2\u6570\u89e3\u6784 \u2014\u2014 \u547d\u540d\u53c2\u6570\u6a21\u62df -----\n// \u4f20\u7edf\u7684\u53c2\u6570\u987a\u5e8f\u5bb9\u6613\u51fa\u9519\n// function createUser(name, age, email, role) { ... }\n// createUser('Bob', 25, 'bob@test.com', 'admin');  // \u53c2\u6570\u987a\u5e8f\u5fc5\u987b\u51c6\u786e\n\n// \u4f7f\u7528\u5bf9\u8c61\u89e3\u6784\u6a21\u62df\u547d\u540d\u53c2\u6570\uff1a\u987a\u5e8f\u65e0\u5173\uff0c\u8c03\u7528\u65f6\u53ef\u8bfb\u6027\u9ad8\nfunction createUser({ name, age, email, role = 'viewer' }) {\n  return { name, age, email, role, createdAt: new Date() };\n}\n\nconst user1 = createUser({ email: 'bob@test.com', name: 'Bob', age: 25, role: 'admin' });\nconst user2 = createUser({ name: 'Charlie', age: 30, email: 'charlie@test.com' });\nconsole.log(user2.role); // 'viewer'\uff08\u9ed8\u8ba4\u503c\u751f\u6548\uff09\n```\n\n```javascript\n// ----- \u793a\u4f8b 4\uff1afor...of \u5faa\u73af\u4e2d\u7684\u89e3\u6784 + \u6570\u7ec4 rest \u5143\u7d20 -----\nconst entries = [\n  ['apple', 1, 'fruit'],\n  ['carrot', 2, 'vegetable'],\n  ['banana', 3, 'fruit']\n];\n\n// \u5728\u5faa\u73af\u4e2d\u76f4\u63a5\u89e3\u6784\u6570\u7ec4\u5143\u7d20\nfor (const [name, quantity, category] of entries) {\n  console.log(`${name}: ${quantity} kg (${category})`);\n}\n\n// \u4f7f\u7528 rest \u6a21\u5f0f\u6536\u96c6\u5269\u4f59\u5143\u7d20\nconst [firstItem, ...otherItems] = entries;\nconsole.log(otherItems.length); // 2\n```\n\n## Key Points\n\n1. **\u6570\u7ec4\u89e3\u6784\u6309\u4f4d\u7f6e\u5339\u914d\uff0c\u5bf9\u8c61\u89e3\u6784\u6309\u5c5e\u6027\u540d\u5339\u914d\u3002** \u6570\u7ec4\u89e3\u6784\u4f9d\u8d56\u5143\u7d20\u7684\u4f4d\u7f6e\u987a\u5e8f\uff1b\u5bf9\u8c61\u89e3\u6784\u4f9d\u8d56\u5c5e\u6027\u540d\uff0c\u4e0e\u987a\u5e8f\u65e0\u5173\u3002\n2. **\u89e3\u6784\u4e2d\u7684 rest \u6a21\u5f0f\uff08`...rest`\uff09\u5fc5\u987b\u662f\u6700\u540e\u4e00\u4e2a\u5143\u7d20\u3002** \u5bf9\u4e8e\u6570\u7ec4\uff0c\u5269\u4f59\u5143\u7d20\u6536\u96c6\u4e3a**\u65b0\u6570\u7ec4**\uff1b\u5bf9\u4e8e\u5bf9\u8c61\uff08ES2018+\uff09\uff0c\u6536\u96c6\u5269\u4f59\u5c5e\u6027\u4e3a**\u65b0\u5bf9\u8c61**\u3002\n3. **\u9ed8\u8ba4\u503c\u4ec5\u5728\u76ee\u6807\u503c\u4e3a `undefined` \u65f6\u751f\u6548\u3002** \u5982\u679c\u503c\u4e3a `null`\u3001`0`\u3001`''` \u6216 `false`\uff0c\u9ed8\u8ba4\u503c\u4e0d\u4f1a\u88ab\u5e94\u7528\u3002\n4. **\u89e3\u6784\u53ef\u4ee5\u5d4c\u5957\u4efb\u610f\u6df1\u5ea6\u3002** \u9002\u7528\u4e8e\u591a\u5c42\u5d4c\u5957\u7684\u5bf9\u8c61\u6216\u6570\u7ec4\uff0c\u4f46\u4ee3\u7801\u53ef\u8bfb\u6027\u4f1a\u968f\u5d4c\u5957\u6df1\u5ea6\u4e0b\u964d\u3002\n5. **\u51fd\u6570\u53c2\u6570\u89e3\u6784\u5efa\u8bae\u914d\u5408\u9ed8\u8ba4\u7a7a\u5bf9\u8c61/\u6570\u7ec4\u3002** \u5982 `function foo({ x } = {})`\uff0c\u9632\u6b62\u8c03\u7528\u65f6\u4f20 `undefined` \u5bfc\u81f4 TypeError\u3002\n6. **`const` \u4e0e `let` \u90fd\u9002\u7528\u4e8e\u89e3\u6784\uff0c\u4f46\u53d8\u91cf\u4e0d\u80fd\u91cd\u590d\u58f0\u660e\u3002** \u5df2\u58f0\u660e\u7684\u53d8\u91cf\u89e3\u6784\u8d4b\u503c\u9700\u8981\u7528 `let` \u6216\u4e0d\u7528\u58f0\u660e\u5173\u952e\u5b57\uff08\u666e\u901a\u8d4b\u503c\uff09\u3002\n\n## Common Mistakes\n\n1. **\u89e3\u6784\u4e0d\u5b58\u5728\u7684\u5c5e\u6027\u5374\u5fd8\u8bb0\u9ed8\u8ba4\u503c\uff0c\u5bfc\u81f4 `undefined` \u6216\u62a5\u9519\u3002**\n\n   ```javascript\n   const user = { name: 'Alice' };\n   const { name, age } = user;\n   console.log(age); // undefined \u2014\u2014 \u4f46\u4e0d\u4f1a\u62a5\u9519\uff08\u4ec5\u53d8\u91cf\u4e3a undefined\uff09\n\n   // \u4ece undefined \u6216 null \u4e2d\u89e3\u6784\u4f1a\u76f4\u63a5\u629b\u51fa TypeError\n   const { x } = null; // TypeError: Cannot destructure property 'x' of 'null'\n   // \u2705 \u4fee\u590d\uff1a\u786e\u4fdd\u88ab\u89e3\u6784\u7684\u503c\u4e0d\u662f null/undefined\n   const { x } = (someValue ?? {});  // \u4f7f\u7528 ?? \u63d0\u4f9b\u56de\u9000\n   ```\n\n2. **\u8bd5\u56fe\u7528 `{}` \u89e3\u6784\u6570\u7ec4\u7684 `length` \u5c5e\u6027\u2014\u2014\u672c\u8eab\u662f\u53ef\u4ee5\u7684\uff0c\u4f46\u8bef\u89e3\u4e86\u89e3\u6784\u673a\u5236\u3002**\n\n   ```javascript\n   const arr = [1, 2, 3];\n   // \u4ee5\u4e0b\u4ee3\u7801\u5b9e\u9645\u4e0a\u53ef\u4ee5\u8fd0\u884c\uff08\u6570\u7ec4\u4e5f\u662f\u5bf9\u8c61\uff09\uff0c\u4f46\u901a\u5e38\u4e0d\u662f\u4f60\u7684\u610f\u56fe\n   const { length } = arr;\n   console.log(length); // 3\n\n   // \u2705 \u901a\u5e38\u662f\u60f3\u8981\u6570\u7ec4\u5143\u7d20\uff1a\n   const [a, b, c] = arr;  // \u8fd9\u624d\u662f\u6570\u7ec4\u89e3\u6784\u7684\u6b63\u786e\u7528\u6cd5\n   ```\n\n3. **\u51fd\u6570\u53c2\u6570\u89e3\u6784\u65f6\u5fd8\u8bb0\u63d0\u4f9b\u9ed8\u8ba4\u53c2\u6570\u503c\uff0c\u5bfc\u81f4\u8c03\u7528\u65f6\u5d29\u6e83\u3002**\n\n   ```javascript\n   function greet({ name }) {\n     console.log(`Hello, ${name}!`);\n   }\n   greet(); // TypeError: Cannot destructure property 'name' of 'undefined'\n   \n   // \u2705 \u4fee\u590d\uff1a\u53c2\u6570\u9ed8\u8ba4\u503c = {}\n   function greet({ name } = {}) {\n     console.log(`Hello, ${name}!`);\n   }\n   greet(); // Hello, undefined!\uff08\u81f3\u5c11\u4e0d\u62a5\u9519\u4e86\uff09\n   ```\n\n## Related Concepts\n\n- [Arrays and Iteration](../topics/arrays_and_iteration.md) \u2014 \u6570\u7ec4\u89e3\u6784\u5e38\u7528\u4e8e for...of \u5faa\u73af\u548c array \u65b9\u6cd5\u4e2d\u63d0\u53d6\u5143\u7d20\n- [Objects and Classes](../topics/objects_and_classes.md) \u2014 \u5bf9\u8c61\u89e3\u6784\u662f\u5904\u7406\u5bf9\u8c61\u6570\u636e\u7684\u6838\u5fc3\u6a21\u5f0f\n- [Spread / Rest Syntax](../syntax/spread_rest.md) \u2014 spread\uff08\u5c55\u5f00\uff09\u4e0e rest\uff08\u5269\u4f59\uff09\u64cd\u4f5c\u7b26\u548c\u89e3\u6784\u7d27\u5bc6\u914d\u5408\n- [Default Parameters](../syntax/default_params.md) \u2014 \u9ed8\u8ba4\u53c2\u6570\u4e0e\u89e3\u6784\u7ed3\u5408\uff0c\u5904\u7406\u51fd\u6570\u53c2\u6570\u7684\u7f3a\u5931\u573a\u666f\n- [Variables](../topics/variables.md) \u2014 \u89e3\u6784\u8d4b\u503c\u5e95\u5c42\u4f9d\u8d56\u53d8\u91cf\u7684\u58f0\u660e\u4e0e\u7ed1\u5b9a\u89c4\u5219\n- [Functions](../topics/functions.md) \u2014 \u51fd\u6570\u53c2\u6570\u89e3\u6784\u662f\u5e38\u89c1\u7684\u5b9e\u9645\u5e94\u7528\u573a\u666f\n\n## Citations\n\n- MDN: Destructuring assignment \u2014 [https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Operators/Destructuring_assignment](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Operators/Destructuring_assignment)\n- ECMAScript 2015 (ES6) Specification, Section 13.3.3: Destructuring Assignment Patterns\n- MDN: Rest/Spread Properties (ES2018) \u2014 [https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Operators/Spread_syntax](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Operators/Spread_syntax)", "syntax/let_const": "## \u6982\u8ff0\n\n`let` \u548c `const` \u662f ES2015\uff08ES6\uff09\u5f15\u5165\u7684\u4e24\u79cd\u73b0\u4ee3\u53d8\u91cf\u58f0\u660e\u65b9\u5f0f\uff0c\u4ece\u6839\u672c\u4e0a\u89e3\u51b3\u4e86 `var` \u957f\u671f\u5b58\u5728\u7684**\u51fd\u6570\u4f5c\u7528\u57df**\u548c**\u53d8\u91cf\u63d0\u5347\uff08hoisting\uff09** \u5e26\u6765\u7684\u8bf8\u591a\u95ee\u9898\u3002`let` \u7528\u4e8e\u58f0\u660e\u53ef\u91cd\u65b0\u8d4b\u503c\u7684\u53d8\u91cf\uff0c`const` \u7528\u4e8e\u58f0\u660e\u4e0d\u53ef\u91cd\u65b0\u7ed1\u5b9a\u7684\u5e38\u91cf\u7ed1\u5b9a\u3002\u4e24\u8005\u90fd\u5177\u6709**\u5757\u7ea7\u4f5c\u7528\u57df\uff08block scope\uff09**\uff0c\u5e76\u4e14\u5b58\u5728**\u6682\u65f6\u6027\u6b7b\u533a\uff08Temporal Dead Zone, TDZ\uff09**\uff0c\u5373\u5728\u58f0\u660e\u4e4b\u524d\u8bbf\u95ee\u53d8\u91cf\u4f1a\u629b\u51fa `ReferenceError`\u3002\u5728\u73b0\u4ee3 JavaScript \u5f00\u53d1\u4e2d\uff0c\u5e94\u9ed8\u8ba4\u4f7f\u7528 `const`\uff0c\u4ec5\u5728\u9700\u8981\u91cd\u65b0\u8d4b\u503c\u65f6\u4f7f\u7528 `let`\uff0c\u5f7b\u5e95\u6452\u5f03 `var`\u3002\n\n## Syntax\n\n```javascript\n// let \u58f0\u660e \u2014\u2014 \u53ef\u4ee5\u58f0\u660e\u65f6\u4e0d\u521d\u59cb\u5316\nlet name;\nlet name = value;\nlet name1 = value1, name2 = value2; // \u4e0d\u63a8\u8350\u9017\u53f7\u5206\u9694\uff0c\u5efa\u8bae\u5206\u5f00\u58f0\u660e\n\n// const \u58f0\u660e \u2014\u2014 \u5fc5\u987b\u7acb\u5373\u521d\u59cb\u5316\uff08\u58f0\u660e\u5373\u8d4b\u503c\uff09\nconst NAME = value;\n// const NAME;            // SyntaxError: Missing initializer in const declaration\n\n// \u5757\u7ea7\u4f5c\u7528\u57df\u793a\u4f8b\n{\n  let x = 10;\n  const Y = 20;\n  console.log(x, Y);     // \u2705 \u5757\u5185\u53ef\u8bbf\u95ee\n}\n// console.log(x);        // ReferenceError: x is not defined\n// console.log(Y);        // ReferenceError: Y is not defined\n```\n\n## Examples\n\n### \u57fa\u672c\u7528\u6cd5\uff1a\u5757\u7ea7\u4f5c\u7528\u57df vs \u51fd\u6570\u4f5c\u7528\u57df\n\n```javascript\n// var \u662f\u51fd\u6570\u4f5c\u7528\u57df \u2014\u2014 for \u5faa\u73af\u7ed3\u675f\u540e i \u4ecd\u7136\u5b58\u5728\u4e14\u88ab\u5171\u4eab\nfor (var i = 0; i < 3; i++) {\n  // \u5faa\u73af\u4f53\n}\nconsole.log(i); // 3\uff0cvar \u6cc4\u9732\u5230\u5faa\u73af\u5916\u90e8\uff0c\u6c61\u67d3\u4e86\u5916\u90e8\u4f5c\u7528\u57df\n\n// let \u662f\u5757\u7ea7\u4f5c\u7528\u57df \u2014\u2014 \u5faa\u73af\u7ed3\u675f\u540e\u53d8\u91cf\u88ab\u56de\u6536\nfor (let j = 0; j < 3; j++) {\n  // \u5faa\u73af\u4f53\n}\n// console.log(j); // ReferenceError: j is not defined\n\n// \u72ec\u7acb\u5757\u8bed\u53e5\u540c\u6837\u9002\u7528\u5757\u7ea7\u4f5c\u7528\u57df\n{\n  let blockScoped = '\u4ec5\u5728\u6b64\u5757\u5185\u53ef\u89c1';\n  var functionScoped = '\u5168\u5c40\u53ef\u89c1';\n}\n// console.log(blockScoped); // ReferenceError\nconsole.log(functionScoped); // '\u5168\u5c40\u53ef\u89c1'\n```\n\n### const \u7684\u4e0d\u53ef\u91cd\u65b0\u7ed1\u5b9a\u4e0e\u53ef\u53d8\u6027\u9677\u9631\n\n```javascript\nconst PI = 3.14159;\n// PI = 3;            // TypeError: Assignment to constant variable\n\n// \u2705 const \u5bf9\u8c61\u7684\u5185\u5bb9\u53ef\u4ee5\u88ab\u4fee\u6539 \u2014\u2014 const \u53ea\u7981\u6b62\u91cd\u65b0\u7ed1\u5b9a\uff0c\u4e0d\u7981\u6b62\u5185\u5bb9\u53d8\u66f4\nconst user = { name: 'Alice', age: 30 };\nuser.age = 31;        // \u2705 \u5c5e\u6027\u4fee\u6539\u662f\u5141\u8bb8\u7684\nconsole.log(user);    // { name: 'Alice', age: 31 }\n\n// user = {};         // TypeError: \u91cd\u65b0\u8d4b\u503c\u6574\u4e2a\u5bf9\u8c61\u662f\u4e0d\u5141\u8bb8\u7684\n\n// \u4f7f\u7528 Object.freeze() \u5b9e\u73b0\u6d45\u5c42\u4e0d\u53ef\u53d8\nconst frozen = Object.freeze({ name: 'Bob', address: { city: 'NYC' } });\n// frozen.name = 'Charlie'; // \u4e25\u683c\u6a21\u5f0f\u4e0b TypeError\uff0c\u975e\u4e25\u683c\u6a21\u5f0f\u9759\u9ed8\u5931\u8d25\n// \u6ce8\u610f\uff1afreeze \u662f\u6d45\u5c42\u7684\uff0c\u5d4c\u5957\u5bf9\u8c61\u4ecd\u53ef\u4fee\u6539\nfrozen.address.city = 'LA';  // \u2705 \u6df1\u5c42\u5bf9\u8c61\u672a\u88ab\u51bb\u7ed3\uff01\n```\n\n### \u6682\u65f6\u6027\u6b7b\u533a\uff08TDZ\uff09\u6f14\u793a\n\n```javascript\n// \u7406\u89e3 TDZ\uff1a\u4ece\u4f5c\u7528\u57df\u9876\u90e8\u5230\u58f0\u660e\u8bed\u53e5\u4e4b\u95f4\u7684\u533a\u57df\n{\n  // TDZ \u5f00\u59cb \u2014\u2014 \u4f5c\u7528\u57df\u9876\u90e8\u5230\u58f0\u660e\u8bed\u53e5\u4e4b\u95f4\n  // console.log(x);  // ReferenceError: Cannot access 'x' before initialization\n  // console.log(y);  // ReferenceError: Cannot access 'y' before initialization\n\n  let x = 'after TDZ';\n  const y = 'also after TDZ';\n\n  console.log(x); // \u2705 'after TDZ'\n  console.log(y); // \u2705 'also after TDZ'\n}\n\n// typeof \u5728 TDZ \u4e2d\u4e5f\u4f1a\u629b\u51fa\u9519\u8bef\uff08\u4e0e var \u4e0d\u540c\uff09\n// console.log(typeof undeclaredVar);        // 'undefined' \u2014\u2014 \u672a\u58f0\u660e\u7684\u53d8\u91cf\n// console.log(typeof myLet);               // ReferenceError: \u5728 TDZ \u4e2d\nlet myLet = 42;\n```\n\n### \u5faa\u73af\u4e2d let \u7684\u6bcf\u6b21\u8fed\u4ee3\u72ec\u7acb\u7ed1\u5b9a\n\n```javascript\n// \u7ecf\u5178\u9762\u8bd5\u9898\uff1avar \u5728 setTimeout \u56de\u8c03\u4e2d\u6355\u83b7\u540c\u4e00\u4e2a\u53d8\u91cf\u5f15\u7528\nfor (var i = 0; i < 3; i++) {\n  setTimeout(() => console.log('var:', i), 100);\n}\n// \u8f93\u51fa: var: 3, var: 3, var: 3\n// \u539f\u56e0\uff1a\u6240\u6709\u56de\u8c03\u5171\u4eab\u540c\u4e00\u4e2a i \u53d8\u91cf\uff0c\u5faa\u73af\u7ed3\u675f\u65f6 i = 3\n\n// let \u4e3a\u6bcf\u6b21\u5faa\u73af\u521b\u5efa\u72ec\u7acb\u7684\u8bcd\u6cd5\u7ed1\u5b9a\nfor (let j = 0; j < 3; j++) {\n  setTimeout(() => console.log('let:', j), 100);\n}\n// \u8f93\u51fa: let: 0, let: 1, let: 2\n// \u539f\u56e0\uff1a\u6bcf\u6b21\u8fed\u4ee3\u90fd\u4f1a\u521b\u5efa\u65b0\u7684 j \u7ed1\u5b9a\uff0c\u56de\u8c03\u6355\u83b7\u7684\u662f\u5f53\u524d\u8fed\u4ee3\u7684\u503c\n```\n\n### \u5168\u5c40\u58f0\u660e\u4e0d\u521b\u5efa window \u5c5e\u6027\n\n```javascript\nvar globalVar = '\u901a\u8fc7 var \u58f0\u660e';\nlet globalLet = '\u901a\u8fc7 let \u58f0\u660e';\nconst globalConst = '\u901a\u8fc7 const \u58f0\u660e';\n\nconsole.log(window.globalVar);   // '\u901a\u8fc7 var \u58f0\u660e' \u2014\u2014 var \u4f1a\u6302\u8f7d\u5230 window\nconsole.log(window.globalLet);   // undefined \u2014\u2014 let \u4e0d\u4f1a\nconsole.log(window.globalConst); // undefined \u2014\u2014 const \u4e0d\u4f1a\n```\n\n## Key Points\n\n- **\u5757\u7ea7\u4f5c\u7528\u57df**\uff1a`let` \u548c `const` \u53ea\u5728\u58f0\u660e\u6240\u5728\u7684 `{ }` \u5757\u5185\u6709\u6548\uff0c\u5305\u62ec `if`\u3001`for`\u3001`while`\u3001`switch` \u4ee5\u53ca\u72ec\u7acb\u7684\u5757\u8bed\u53e5\u3002\u8fd9\u662f\u4e0e `var`\uff08\u51fd\u6570\u4f5c\u7528\u57df\uff09\u6700\u6839\u672c\u7684\u533a\u522b\u3002\n- **\u6682\u65f6\u6027\u6b7b\u533a\uff08TDZ\uff09**\uff1a\u4ece\u4f5c\u7528\u57df\u9876\u90e8\u5230\u58f0\u660e\u8bed\u53e5\u4e4b\u95f4\u7684\u533a\u57df\u79f0\u4e3a TDZ\uff0c\u5728\u6b64\u533a\u57df\u5185\u8bbf\u95ee\u53d8\u91cf\u4f1a\u629b\u51fa `ReferenceError`\uff0c\u5305\u62ec\u4f7f\u7528 `typeof` \u8fd0\u7b97\u7b26\u4e5f\u4f1a\u62a5\u9519\u3002`var` \u5728\u6b64\u533a\u57df\u5185\u5219\u8fd4\u56de `undefined`\u3002\n- **const \u4e0d\u662f\u4e0d\u53ef\u53d8**\uff1a`const` \u7981\u6b62\u7684\u662f**\u91cd\u65b0\u7ed1\u5b9a**\uff08\u5373\u4e0d\u80fd\u91cd\u65b0\u8d4b\u503c\uff09\uff0c\u4f46\u4e0d\u4fdd\u8bc1\u503c\u672c\u8eab\u4e0d\u53ef\u53d8\u3002\u5bf9\u8c61\u7684\u5c5e\u6027\u3001\u6570\u7ec4\u7684\u5143\u7d20\u4ecd\u7136\u53ef\u4ee5\u88ab\u4fee\u6539\u3002\u82e5\u9700\u6df1\u5c42\u4e0d\u53ef\u53d8\uff0c\u8bf7\u4f7f\u7528 `Object.freeze()`\uff08\u6d45\u5c42\uff09\u6216 immutable \u5e93\u3002\n- **\u5fc5\u987b\u521d\u59cb\u5316**\uff1a`const` \u58f0\u660e\u65f6\u5fc5\u987b\u540c\u65f6\u8d4b\u503c\uff0c\u4e0d\u80fd\u5148\u58f0\u660e\u540e\u8d4b\u503c\uff1b`let` \u53ef\u4ee5\u58f0\u660e\u800c\u4e0d\u8d4b\u503c\uff08\u503c\u4e3a `undefined`\uff09\u3002\n- **\u5168\u5c40\u58f0\u660e\u4e0d\u521b\u5efa window \u5c5e\u6027**\uff1a\u5728\u5168\u5c40\u4f5c\u7528\u57df\u4e2d\u7528 `let` \u6216 `const` \u58f0\u660e\u7684\u53d8\u91cf\u4e0d\u4f1a\u6210\u4e3a `window` \u5bf9\u8c61\u7684\u5c5e\u6027\uff08`var` \u5219\u4f1a\uff09\uff0c\u8fd9\u907f\u514d\u4e86\u5168\u5c40\u547d\u540d\u7a7a\u95f4\u7684\u610f\u5916\u6c61\u67d3\u3002\n- **\u4e0d\u5141\u8bb8\u91cd\u590d\u58f0\u660e**\uff1a\u5728\u540c\u4e00\u4f5c\u7528\u57df\u5185\u7528 `let` \u6216 `const` \u91cd\u590d\u58f0\u660e\u540c\u4e00\u53d8\u91cf\u4f1a\u629b\u51fa `SyntaxError`\uff0c\u800c `var` \u5141\u8bb8\u91cd\u590d\u58f0\u660e\uff08\u540e\u8005\u8986\u76d6\u524d\u8005\uff09\u3002\n- **\u63a8\u8350\u5b9e\u8df5**\uff1a\u9ed8\u8ba4\u4f7f\u7528 `const`\uff0c\u53ea\u5728\u786e\u5b9a\u9700\u8981\u91cd\u65b0\u8d4b\u503c\u65f6\u4f7f\u7528 `let`\u3002\u907f\u514d\u4f7f\u7528 `var`\u3002\u8fd9\u80fd\u51cf\u5c11\u610f\u5916\u526f\u4f5c\u7528\uff0c\u8ba9\u4ee3\u7801\u610f\u56fe\u66f4\u6e05\u6670\u3002\n\n## Common Mistakes\n\n- **\u6df7\u6dc6 const \u7684\"\u4e0d\u53ef\u53d8\"\u542b\u4e49**\uff1a\u8ba4\u4e3a `const` \u58f0\u660e\u7684\u5bf9\u8c61\u6216\u6570\u7ec4\u5b8c\u5168\u4e0d\u53ef\u53d8\u3002\u8bb0\u4f4f `const` \u53ea\u4fdd\u8bc1\u7ed1\u5b9a\u4e0d\u53ef\u53d8\uff0c\u4e0d\u4fdd\u8bc1\u503c\u4e0d\u53ef\u53d8\u3002\u82e5\u9700\u8981\u771f\u6b63\u7684\u5e38\u91cf\uff0c\u8003\u8651 `Object.freeze()` \u6216 TypeScript \u7684 `as const`\u3002\n  ```javascript\n  const arr = [1, 2, 3];\n  arr.push(4);        // \u2705 \u5141\u8bb8 \u2014\u2014 \u6570\u7ec4\u88ab\u4fee\u6539\u4e86\n  // arr = [5, 6, 7]; // TypeError\n\n  const obj = {};\n  obj.key = 'value';  // \u2705 \u5141\u8bb8\n  ```\n\n- **\u5728 TDZ \u4e2d\u8bbf\u95ee\u53d8\u91cf**\uff1a\u7279\u522b\u662f\u5728\u6709\u590d\u6742\u4f9d\u8d56\u987a\u5e8f\u7684\u6a21\u5757\u4e2d\uff0c\u5bb9\u6613\u5728 `let`/`const` \u58f0\u660e\u4e4b\u524d\u610f\u5916\u5f15\u7528\u5b83\u4eec\u3002\u4f7f\u7528 `class` \u58f0\u660e\u4e5f\u4f1a\u4ea7\u751f\u6682\u65f6\u6027\u6b7b\u533a\u3002\n  ```javascript\n  function foo() {\n    console.log(value);   // ReferenceError\uff08TDZ \u5185\u8bbf\u95ee\uff09\n    let value = 42;\n  }\n\n  // \u53e6\u4e00\u4e2a\u5e38\u89c1\u573a\u666f\uff1a\u76f8\u4e92\u4f9d\u8d56\u7684\u521d\u59cb\u5316\n  const a = b + 1;  // ReferenceError: Cannot access 'b' before initialization\n  const b = a + 1;\n  ```\n\n- **switch \u8bed\u53e5\u4e2d\u7684\u5757\u7ea7\u4f5c\u7528\u57df\u9677\u9631**\uff1a`switch` \u7684\u6bcf\u4e2a `case` \u5171\u4eab\u540c\u4e00\u4e2a\u5757\uff0c\u76f4\u63a5\u7528 `let`/`const` \u58f0\u660e\u4f1a\u5bfc\u81f4\u91cd\u590d\u58f0\u660e\u9519\u8bef\u3002\n  ```javascript\n  switch (x) {\n    case 1:\n      let msg = 'one';   // SyntaxError: \u91cd\u590d\u58f0\u660e\n      break;\n    case 2:\n      let msg = 'two';   // \u540c\u4e0a\uff0cmsg \u5df2\u5728\u540c\u4e00\u5757\u4e2d\u58f0\u660e\n      break;\n  }\n  // \u4fee\u590d\uff1a\u4e3a\u6bcf\u4e2a case \u6dfb\u52a0\u82b1\u62ec\u53f7\uff0c\u521b\u5efa\u72ec\u7acb\u4f5c\u7528\u57df\n  switch (x) {\n    case 1: { let msg = 'one'; console.log(msg); break; }\n    case 2: { let msg = 'two'; console.log(msg); break; }\n  }\n  ```\n\n## Related Concepts\n\n- [var](../syntax/var.md) \u2014 \u51fd\u6570\u4f5c\u7528\u57df\u3001\u53d8\u91cf\u63d0\u5347\u7684\u65e7\u5f0f\u58f0\u660e\u65b9\u5f0f\uff0c\u4e86\u89e3\u5176\u4e0e `let`/`const` \u7684\u533a\u522b\u81f3\u5173\u91cd\u8981\u3002\n- [\u53d8\u91cf](../topics/variables.md) \u2014 JavaScript \u53d8\u91cf\u4f53\u7cfb\u7684\u5168\u9762\u6982\u8ff0\uff0c\u6db5\u76d6\u58f0\u660e\u3001\u4f5c\u7528\u57df\u548c\u547d\u540d\u89c4\u5219\u3002\n- [\u95ed\u5305](../patterns/closure.md) \u2014 `let` \u7684\u5757\u7ea7\u4f5c\u7528\u57df\u4e0e\u6bcf\u6b21\u8fed\u4ee3\u72ec\u7acb\u7ed1\u5b9a\u7279\u6027\uff0c\u4e3a\u95ed\u5305\u5e94\u7528\u5e26\u6765\u66f4\u76f4\u89c2\u7684\u884c\u4e3a\u3002\n- [\u6a21\u677f\u5b57\u9762\u91cf](../syntax/template_literals.md) \u2014 \u5e38\u4e0e `const` \u914d\u5408\u4f7f\u7528\uff0c\u58f0\u660e\u4e0d\u53ef\u53d8\u7684\u6a21\u677f\u5b57\u7b26\u4e32\u3002\n- [\u89e3\u6784\u8d4b\u503c](../syntax/destructuring.md) \u2014 \u4e0e `let` \u548c `const` \u914d\u5408\u4f7f\u7528\uff0c\u4ece\u6570\u7ec4\u6216\u5bf9\u8c61\u4e2d\u63d0\u53d6\u503c\u3002\n- [async/await](../syntax/async_await.md) \u2014 \u5f02\u6b65\u51fd\u6570\u4e2d\u5e38\u4f7f\u7528 `const` \u58f0\u660e Promise \u7ed3\u679c\u53d8\u91cf\u3002\n\n## Citations\n\n- [MDN: let](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Statements/let)\n- [MDN: const](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Statements/const)\n- [ECMAScript 2015 Specification \u2014 Let and Const Declarations](https://262.ecma-international.org/6.0/#sec-let-and-const-declarations)\n- [You Don't Know JS: Scope & Closures \u2014 Chapter 5](https://github.com/getify/You-Dont-Know-JS/blob/1st-ed/scope%20%26%20closures/ch5.md)", "syntax/spread_rest": "## \u6982\u8ff0\n\n**Spread \u5c55\u5f00\u8fd0\u7b97\u7b26**\uff08`...`\uff09\u5141\u8bb8\u5c06\u53ef\u8fed\u4ee3\u5bf9\u8c61\uff08\u5982\u6570\u7ec4\u3001\u5b57\u7b26\u4e32\u3001`Set`\u3001`Map`\uff09\u5728\u9700\u8981\u96f6\u4e2a\u6216\u591a\u4e2a\u5143\u7d20\u7684\u4f4d\u7f6e\"\u5c55\u5f00\"\uff0c\u4e5f\u652f\u6301\u5728 ES2018+ \u4e2d\u5c06\u5bf9\u8c61\u7684\u53ef\u679a\u4e3e\u5c5e\u6027\u5c55\u5f00\u3002**Rest \u5269\u4f59\u53c2\u6570**\u4f7f\u7528\u540c\u6837\u7684 `...` \u8bed\u6cd5\uff0c\u4f46\u5728\u51fd\u6570\u53c2\u6570\u58f0\u660e\u4e2d\u626e\u6f14\u76f8\u53cd\u7684\u89d2\u8272\u2014\u2014\u5b83\u5c06\u591a\u4f59\u7684\u53c2\u6570\u6536\u96c6\u5230\u4e00\u4e2a\u6570\u7ec4\u4e2d\u3002\u4e24\u8005\u672c\u8d28\u4e0a\u662f\u4e92\u8865\u7684\uff1aSpread \u5c06 iterable **\u62c6\u5f00**\uff0cRest \u5c06\u53c2\u6570**\u6536\u62e2**\u3002\n\n\u5b9e\u9645\u5f00\u53d1\u4e2d\uff0cSpread \u5e38\u7528\u4e8e\u6570\u7ec4\u590d\u5236\u4e0e\u5408\u5e76\u3001\u5bf9\u8c61\u6d45\u62f7\u8d1d\u3001\u51fd\u6570\u4f20\u53c2\u89e3\u5305\uff1bRest \u5219\u7528\u4e8e\u5904\u7406\u53ef\u53d8\u53c2\u6570\u51fd\u6570\uff08variadic functions\uff09\u548c\u89e3\u6784\u5269\u4f59\u5143\u7d20\u3002\n\n## Syntax\n\n### Spread \u5c55\u5f00 \u2014\u2014 \u5728\u6570\u7ec4/\u51fd\u6570\u8c03\u7528/\u5bf9\u8c61\u4e2d\u4f7f\u7528\n\n```javascript\n// \u6570\u7ec4\u5c55\u5f00\nconst newArray = [...iterable];\n\n// \u51fd\u6570\u8c03\u7528\u5c55\u5f00\nfunc(...iterable);\n\n// \u5bf9\u8c61\u5c55\u5f00 (ES2018+)\nconst newObj = { ...obj };\n```\n\n### Rest \u5269\u4f59\u53c2\u6570 \u2014\u2014 \u5728\u51fd\u6570\u5f62\u53c2\u4e2d\u4f7f\u7528\n\n```javascript\n// \u6536\u96c6\u5269\u4f59\u53c2\u6570\u4e3a\u6570\u7ec4\nfunction func(first, ...rest) {}\n\n// \u89e3\u6784\u4e2d\u7684\u5269\u4f59\u5143\u7d20\nconst [first, ...rest] = array;\nconst { a, ...rest } = obj;\n```\n\n## Examples\n\n### 1. \u6570\u7ec4\u590d\u5236\u4e0e\u5408\u5e76\uff08\u6d45\u62f7\u8d1d\uff09\n\n```javascript\nconst arr1 = [1, 2, 3];\nconst arr2 = [4, 5, 6];\n\n// \u6d45\u62f7\u8d1d\u6570\u7ec4 \u2014\u2014 \u6bd4 slice() \u66f4\u76f4\u89c2\nconst copy = [...arr1];\nconsole.log(copy); // [1, 2, 3]\n\n// \u5408\u5e76\u6570\u7ec4 \u2014\u2014 \u66ff\u4ee3 concat()\nconst merged = [...arr1, ...arr2];\nconsole.log(merged); // [1, 2, 3, 4, 5, 6]\n\n// \u5728\u4e2d\u95f4\u63d2\u5165\u5143\u7d20\nconst withMiddle = [0, ...arr1, 10];\nconsole.log(withMiddle); // [0, 1, 2, 3, 10]\n```\n\n### 2. \u5bf9\u8c61\u5c55\u5f00\uff08\u6d45\u5408\u5e76\uff09\n\n```javascript\nconst base = { name: 'Alice', role: 'admin' };\nconst extras = { age: 30, active: true };\n\n// \u5bf9\u8c61\u5408\u5e76 \u2014\u2014 \u540e\u5c55\u5f00\u7684\u5c5e\u6027\u8986\u76d6\u524d\u5c55\u5f00\u7684\nconst user = { ...base, ...extras };\nconsole.log(user);\n// { name: 'Alice', role: 'admin', age: 30, active: true }\n\n// \u63d0\u4f9b\u9ed8\u8ba4\u503c\uff1a\u5c06\u9ed8\u8ba4\u503c\u653e\u5728\u540e\u9762\uff0c\u524d\u9762\u7684\u503c\u4e0d\u4f1a\u88ab\u8986\u76d6\nconst config = { ...{ timeout: 1000, retry: 3 }, timeout: 5000 };\nconsole.log(config); // { timeout: 5000, retry: 3 }\n// \uff01\u6ce8\u610f\uff1a\u540e\u9762\u7684 timeout \u8986\u76d6\u4e86\u524d\u9762\u7684\n\n// \u4e0d\u53ef\u53d8\u66f4\u65b0\u5bf9\u8c61\nconst oldUser = { name: 'Bob', age: 25, city: 'NYC' };\nconst updatedUser = { ...oldUser, age: 26 }; // \u53ea\u66f4\u65b0 age\nconsole.log(updatedUser); // { name: 'Bob', age: 26, city: 'NYC' }\n```\n\n### 3. Rest \u5269\u4f59\u53c2\u6570 \u2014\u2014 \u53ef\u53d8\u53c2\u6570\u51fd\u6570\n\n```javascript\n// \u6536\u96c6\u6240\u6709\u591a\u4f59\u53c2\u6570\u4e3a\u6570\u7ec4\nfunction sum(prefix, ...numbers) {\n  // numbers \u662f\u771f\u6b63\u7684 Array \u5b9e\u4f8b\uff0c\u4e0d\u662f arguments \u5bf9\u8c61\n  const total = numbers.reduce((acc, n) => acc + n, 0);\n  return `${prefix}: ${total}`;\n}\n\nconsole.log(sum('Total', 1, 2, 3, 4)); // \"Total: 10\"\n\n// \u4e0e\u7bad\u5934\u51fd\u6570\u914d\u5408\nconst logAll = (...args) => console.log(args);\nlogAll('a', 'b', 'c'); // ['a', 'b', 'c']\n```\n\n### 4. \u89e3\u6784\u4e2d\u7684 Rest \u6a21\u5f0f\n\n```javascript\nconst [first, second, ...rest] = [10, 20, 30, 40, 50];\nconsole.log(first);  // 10\nconsole.log(second); // 20\nconsole.log(rest);   // [30, 40, 50]\n\nconst { title, ...metadata } = { title: 'Doc', author: 'Alice', year: 2024 };\nconsole.log(title);    // 'Doc'\nconsole.log(metadata); // { author: 'Alice', year: 2024 }\n```\n\n### 5. \u5b57\u7b26\u4e32\u8f6c\u6570\u7ec4 & NodeList \u8f6c\u771f\u6570\u7ec4\n\n```javascript\n// \u5b57\u7b26\u4e32\u5c55\u5f00\u4e3a\u5b57\u7b26\u6570\u7ec4\nconst chars = [...'hello'];\nconsole.log(chars); // ['h', 'e', 'l', 'l', 'o']\n\n// DOM \u64cd\u4f5c\uff1aNodeList \u2192 \u771f\u6570\u7ec4\n// document.querySelectorAll('div') \u8fd4\u56de NodeList\uff0c\u4e0d\u662f Array\n// const divs = [...document.querySelectorAll('div')]; // \u73b0\u5728 divs \u662f\u771f\u6570\u7ec4\n```\n\n## Key Points\n\n- **Rest \u53c2\u6570\u5fc5\u987b\u662f\u5f62\u53c2\u5217\u8868\u7684\u6700\u540e\u4e00\u4e2a**\uff1a`function(a, ...rest, b)` \u662f\u8bed\u6cd5\u9519\u8bef\u3002\n- **Spread \u6267\u884c\u6d45\u62f7\u8d1d\uff08shallow copy\uff09**\uff1a\u5d4c\u5957\u5bf9\u8c61\u6216\u6570\u7ec4\u4ecd\u7136\u662f\u5f15\u7528\u5171\u4eab\uff0c\u4fee\u6539\u5d4c\u5957\u5185\u5bb9\u4f1a\u5f71\u54cd\u539f\u59cb\u6570\u636e\u3002\n- **Spread \u53ea\u80fd\u5c55\u5f00\u53ef\u8fed\u4ee3\u5bf9\u8c61\uff08iterable\uff09**\uff1a\u666e\u901a\u5bf9\u8c61\uff08plain object\uff09\u4e0d\u80fd\u76f4\u63a5\u7528 `[...obj]` \u5c55\u5f00\uff08\u4f1a\u629b\u51fa TypeError\uff09\uff0c\u4f46\u5bf9\u8c61\u5b57\u9762\u91cf\u4e2d `{...obj}` \u662f ES2018 \u7279\u6027\uff0c\u4f7f\u7528\u679a\u4e3e\u5c5e\u6027\uff08enumerable own properties\uff09\u800c\u975e\u8fed\u4ee3\u534f\u8bae\u3002\n- **Rest \u53c2\u6570\u751f\u6210\u771f\u6b63\u7684 `Array` \u5b9e\u4f8b**\uff1a\u4e0e\u65e7\u7684 `arguments` \u5bf9\u8c61\u4e0d\u540c\uff0c`...rest` \u62e5\u6709 `Array.prototype` \u4e0a\u7684\u6240\u6709\u65b9\u6cd5\uff08\u5982 `map`, `filter`, `reduce`\uff09\u3002\n- **`...null` \u6216 `...undefined` \u5728\u5bf9\u8c61 Spread \u4e2d\u9759\u9ed8\u5ffd\u7565**\uff1a`{ ...null, ...undefined }` \u8fd4\u56de `{}`\uff0c\u4e0d\u4f1a\u62a5\u9519\u3002\n- **Spread \u7684\u5c55\u5f00\u987a\u5e8f\u51b3\u5b9a\u6700\u7ec8\u503c**\uff1a\u5728\u5bf9\u8c61\u5408\u5e76\u65f6\uff0c\u540e\u51fa\u73b0\u7684\u540c\u540d\u5c5e\u6027\u4f1a\u8986\u76d6\u5148\u51fa\u73b0\u7684\u5c5e\u6027\u3002\n\n## Common Mistakes\n\n- **\u8bef\u4ee5\u4e3a Spread \u662f\u6df1\u62f7\u8d1d\uff08deep clone\uff09**\uff1a`const copy = { ...original }` \u53ea\u62f7\u8d1d\u7b2c\u4e00\u5c42\u5c5e\u6027\u3002\u82e5 `original` \u5305\u542b\u5d4c\u5957\u5bf9\u8c61\uff0c\u4fee\u6539 `copy.nested.prop` \u4f1a\u5f71\u54cd `original.nested.prop`\u3002\u6df1\u62f7\u8d1d\u9700\u8981\u4f7f\u7528 `structuredClone()` \u6216\u9012\u5f52\u5de5\u5177\u3002\n  \n  ```javascript\n  const original = { a: 1, nested: { b: 2 } };\n  const copy = { ...original };\n  copy.nested.b = 999;\n  console.log(original.nested.b); // 999 \u274c \u88ab\u610f\u5916\u4fee\u6539\n  ```\n\n- **\u5728\u51fd\u6570\u5f62\u53c2\u4e2d\u6df7\u7528\u4e86 Spread \u800c\u975e Rest**\uff1a`function foo(...args) {}` \u6b63\u786e\uff08Rest\uff09\uff1b\u4f46 `function foo(...[a, b]) {}` \u867d\u7136\u8bed\u6cd5\u5141\u8bb8\u5374\u4e0d\u63a8\u8350\uff0c\u76f4\u63a5\u5199 `function foo(a, b) {}` \u66f4\u6e05\u6670\u3002\n\n- **\u5728\u5bf9\u8c61\u4e2d\u5c1d\u8bd5 `[...obj]` \u5c55\u5f00\u975e iterable \u5bf9\u8c61**\uff1a\u666e\u901a\u5bf9\u8c61\u4e0d\u662f iterable\uff0c\u4f1a\u629b\u51fa `TypeError: obj is not iterable`\u3002\u8981\u7528 `{...obj}` \u5c55\u5f00\u5bf9\u8c61\u5c5e\u6027\uff0c\u6216\u7528 `Object.keys()` / `Object.entries()` \u904d\u5386\u3002\n\n- **Rest \u8bed\u6cd5\u8ddf\u4f20\u7edf `arguments` \u6df7\u7528**\uff1a\u7bad\u5934\u51fd\u6570\u6ca1\u6709 `arguments` \u5bf9\u8c61\uff0c\u5fc5\u987b\u7528 Rest \u53c2\u6570\uff1b\u540c\u65f6\u5728\u666e\u901a\u51fd\u6570\u4e2d\uff0c`...rest` \u548c `arguments` \u90fd\u53ef\u4ee5\u8bbf\u95ee\u53c2\u6570\uff0c\u4f46 Rest \u66f4\u7075\u6d3b\uff08\u53ef\u547d\u540d\u3001\u53ef\u90e8\u5206\u6536\u96c6\uff09\u3002\n\n## Related Concepts\n\n- [\u6570\u7ec4\u4e0e\u8fed\u4ee3](../topics/arrays_and_iteration.md) \u2014 Spread \u5e38\u7528\u4e8e\u6570\u7ec4\u64cd\u4f5c\uff0c\u4e0e `map`\u3001`filter` \u7b49\u8fed\u4ee3\u65b9\u6cd5\u914d\u5408\u4f7f\u7528\n- [\u89e3\u6784\u8d4b\u503c (Destructuring)](./destructuring.md) \u2014 Rest \u6a21\u5f0f\u662f\u89e3\u6784\u7684\u6838\u5fc3\u7ec4\u6210\u90e8\u5206\uff0c\u4e0e Spread \u8bed\u6cd5\u5bc6\u5207\u914d\u5408\n- [\u51fd\u6570 (Functions)](../topics/functions.md) \u2014 Rest \u53c2\u6570\u7528\u4e8e\u53ef\u53d8\u53c2\u6570\u51fd\u6570\uff0c\u66ff\u4ee3\u4f20\u7edf\u7684 `arguments` \u5bf9\u8c61\n- [\u5bf9\u8c61\u4e0e\u7c7b](../topics/objects_and_classes.md) \u2014 \u5bf9\u8c61 Spread \u7528\u4e8e\u4e0d\u53ef\u53d8\u66f4\u65b0\u548c\u6d45\u5408\u5e76\u5bf9\u8c61\n- [Array \u5185\u7f6e\u5bf9\u8c61](../builtin/array.md) \u2014 \u5e38\u7528 `Array.from()` \u4e0e Spread \u505a\u5bf9\u6bd4\uff0c\u4e24\u8005\u90fd\u53ef\u8f6c\u6362 iterable \u4e3a\u6570\u7ec4\n\n## Citations\n\n- MDN \u2014 Spread syntax: https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Operators/Spread_syntax\n- MDN \u2014 Rest parameters: https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Functions/rest_parameters\n- ECMAScript 2015 (ES6) \u2014 Rest & Spread: https://262.ecma-international.org/6.0/\n- ECMAScript 2018 (ES9) \u2014 Object Rest/Spread Properties: https://github.com/tc39/proposal-object-rest-spread", "syntax/template_literals": "## \u6982\u8ff0\n\nTemplate Literals\uff08\u6a21\u677f\u5b57\u9762\u91cf\uff09\u662f ES2015\uff08ES6\uff09\u5f15\u5165\u7684\u4e00\u79cd\u65b0\u578b\u5b57\u7b26\u4e32\u8bed\u6cd5\uff0c\u4f7f\u7528\u53cd\u5f15\u53f7\uff08`` ` ``\uff09\u66ff\u4ee3\u4f20\u7edf\u7684\u5355\u5f15\u53f7\u6216\u53cc\u5f15\u53f7\u3002\u5b83\u89e3\u51b3\u4e86\u4e09\u4e2a\u6838\u5fc3\u75db\u70b9\uff1a\u5b57\u7b26\u4e32\u63d2\u503c\uff08\u65e0\u9700 `+` \u62fc\u63a5\uff09\u3001\u591a\u884c\u6587\u672c\uff08\u65e0\u9700 `\\n` \u6362\u884c\u7b26\uff09\u548c\u6807\u7b7e\u6a21\u677f\uff08\u81ea\u5b9a\u4e49\u5b57\u7b26\u4e32\u5904\u7406\u51fd\u6570\uff09\u3002\u5728\u73b0\u4ee3 JavaScript \u9879\u76ee\u4e2d\uff0cTemplate Literals \u5df2\u57fa\u672c\u53d6\u4ee3\u4f20\u7edf\u5b57\u7b26\u4e32\u62fc\u63a5\uff0c\u662f\u65e5\u5e38\u5f00\u53d1\u4e2d\u6700\u5e38\u7528\u7684 ES6 \u7279\u6027\u4e4b\u4e00\u3002\n\n## Syntax\n\n```javascript\n// \u57fa\u672c\u8bed\u6cd5\uff1a\u53cd\u5f15\u53f7\u5305\u88f9\n`\u5b57\u7b26\u4e32\u5185\u5bb9`\n\n// \u63d2\u503c\u8868\u8fbe\u5f0f\uff1a${expression}\n`Hello, ${name}!`\n\n// \u591a\u884c\u5b57\u7b26\u4e32\uff1a\u76f4\u63a5\u6362\u884c\n`\u7b2c\u4e00\u884c\n\u7b2c\u4e8c\u884c\n\u7b2c\u4e09\u884c`\n\n// \u6807\u7b7e\u6a21\u677f\ntagFunction`\u5b57\u7b26\u4e32 ${expr} \u5185\u5bb9`\n\n// \u539f\u59cb\u5b57\u7b26\u4e32\uff08String.raw\uff09\nString.raw`C:\\path\\to\\file`\n```\n\n- \u63d2\u503c\u8868\u8fbe\u5f0f `\\${...}` \u4e2d\u53ef\u4ee5\u653e\u7f6e\u4efb\u610f\u5408\u6cd5\u7684 JavaScript \u8868\u8fbe\u5f0f\uff08\u53d8\u91cf\u3001\u8fd0\u7b97\u3001\u51fd\u6570\u8c03\u7528\u3001\u4e09\u5143\u8868\u8fbe\u5f0f\u7b49\uff09\n- \u6807\u7b7e\u6a21\u677f\uff08Tagged Template\uff09\u662f Template Literal \u524d\u7d27\u8ddf\u4e00\u4e2a\u51fd\u6570\u540d\uff0c\u8be5\u51fd\u6570\u63a5\u6536\u5b57\u7b26\u4e32\u7247\u6bb5\u548c\u63d2\u503c\u8868\u8fbe\u5f0f\u4f5c\u4e3a\u53c2\u6570\n\n## Examples\n\n### 1. \u57fa\u672c\u63d2\u503c \u2014 \u544a\u522b\u5b57\u7b26\u4e32\u62fc\u63a5\n\n```javascript\nconst name = 'Alice';\nconst age = 30;\n\n// \u4f20\u7edf\u65b9\u5f0f\uff08\u96be\u4ee5\u9605\u8bfb\uff09\nconst msg1 = '\u6211\u53eb ' + name + '\uff0c\u4eca\u5e74 ' + age + ' \u5c81\u3002';\n\n// Template Literal\uff08\u6e05\u6670\u76f4\u89c2\uff09\nconst msg2 = `\u6211\u53eb ${name}\uff0c\u4eca\u5e74 ${age} \u5c81\u3002`;\n\nconsole.log(msg2); // \u8f93\u51fa\uff1a\u6211\u53eb Alice\uff0c\u4eca\u5e74 30 \u5c81\u3002\n```\n\n### 2. \u5d4c\u5165\u4efb\u610f\u8868\u8fbe\u5f0f\n\n```javascript\nconst price = 29.99;\nconst quantity = 3;\nconst taxRate = 0.08;\n\n// \u652f\u6301\u8fd0\u7b97\u3001\u4e09\u5143\u8868\u8fbe\u5f0f\u3001\u65b9\u6cd5\u8c03\u7528\nconst invoice = `\u603b\u4ef7\uff1a\u00a5${(price * quantity).toFixed(2)}\n\u7a0e\u8d39\uff1a\u00a5${(price * quantity * taxRate).toFixed(2)}\n\u5e94\u4ed8\uff1a\u00a5${(price * quantity * (1 + taxRate)).toFixed(2)}`;\n\nconsole.log(invoice);\n// \u8f93\u51fa\uff1a\n// \u603b\u4ef7\uff1a\u00a589.97\n// \u7a0e\u8d39\uff1a\u00a57.20\n// \u5e94\u4ed8\uff1a\u00a597.17\n```\n\n### 3. \u591a\u884c\u6a21\u677f\u5b57\u7b26\u4e32 \u2014 \u751f\u6210 HTML \u6216 SQL\n\n```javascript\nconst user = { name: '\u5f20\u4e09', role: '\u7ba1\u7406\u5458' };\n\n// \u65e0\u9700 \\n\uff0c\u76f4\u63a5\u6362\u884c\uff0c\u4fdd\u7559\u7f29\u8fdb\nconst card = `\n  <div class=\"user-card\">\n    <h2>${user.name}</h2>\n    <span class=\"role\">${user.role}</span>\n  </div>\n`.trim(); // .trim() \u53bb\u6389\u9996\u5c3e\u7a7a\u767d\n\nconsole.log(card);\n// <div class=\"user-card\">\n//   <h2>\u5f20\u4e09</h2>\n//   <span class=\"role\">\u7ba1\u7406\u5458</span>\n// </div>\n```\n\n### 4. \u6807\u7b7e\u6a21\u677f \u2014 \u81ea\u5b9a\u4e49\u5b57\u7b26\u4e32\u5904\u7406\n\n```javascript\n// \u6807\u7b7e\u51fd\u6570\uff1a\u63a5\u6536\u5b57\u7b26\u4e32\u7247\u6bb5\u6570\u7ec4\u548c\u63d2\u503c\u53c2\u6570\nfunction highlight(strings, ...values) {\n  return strings.reduce((result, str, i) => {\n    const value = values[i] ? `<strong>${values[i]}</strong>` : '';\n    return result + str + value;\n  }, '');\n}\n\nconst product = '\u7b14\u8bb0\u672c\u7535\u8111';\nconst price = 5999;\n\nconst result = highlight`\u4eca\u65e5\u7279\u60e0\uff1a${product}\uff0c\u4ec5\u9700 \u00a5${price}\uff01`;\nconsole.log(result);\n// \u8f93\u51fa\uff1a\u4eca\u65e5\u7279\u60e0\uff1a<strong>\u7b14\u8bb0\u672c\u7535\u8111</strong>\uff0c\u4ec5\u9700 \u00a5<strong>5999</strong>\uff01\n```\n\n### 5. \u5d4c\u5957\u6a21\u677f \u2014 \u52a8\u6001\u6784\u5efa\u590d\u6742\u5b57\u7b26\u4e32\n\n```javascript\nconst items = ['\u82f9\u679c', '\u9999\u8549', '\u6a58\u5b50'];\n\n// \u5728\u6a21\u677f\u4e2d\u5d4c\u5957 map \u8c03\u7528\nconst list = `\n  <ul>\n    ${items.map(item => `    <li>${item}</li>`).join('\\n')}\n  </ul>\n`;\n\nconsole.log(list);\n// <ul>\n//   <li>\u82f9\u679c</li>\n//   <li>\u9999\u8549</li>\n//   <li>\u6a58\u5b50</li>\n// </ul>\n```\n\n## Key Points\n\n1. **\u53cd\u5f15\u53f7\uff08`` ` ``\uff09\u662f\u552f\u4e00\u7684\u5206\u9694\u7b26** \u2014 \u4e0d\u80fd\u5728 Template Literal \u5185\u90e8\u4f7f\u7528\u53cd\u5f15\u53f7\u800c\u4e0d\u8f6c\u4e49\uff08\u7528 `\\`` \u8f6c\u4e49\uff09\u3002\n2. **\u63d2\u503c\u652f\u6301\u4efb\u610f\u8868\u8fbe\u5f0f** \u2014 `\\${...}` \u5185\u90e8\u53ef\u4ee5\u662f\u53d8\u91cf\u3001\u8fd0\u7b97\u3001\u4e09\u5143\u8868\u8fbe\u5f0f\u3001\u51fd\u6570\u8c03\u7528\u3001\u751a\u81f3\u5d4c\u5957 Template Literal\u3002\n3. **\u4fdd\u7559\u6362\u884c\u548c\u7f29\u8fdb** \u2014 Template Literal \u4e2d\u7684\u6362\u884c\u7b26\u548c\u7a7a\u683c\u4f1a\u88ab\u539f\u6837\u4fdd\u7559\uff0c\u5e38\u7528 `.trim()` \u53bb\u9664\u9996\u5c3e\u591a\u4f59\u7a7a\u767d\u3002\n4. **\u6807\u7b7e\u6a21\u677f\u662f\u51fd\u6570\u8c03\u7528\u7684\u8bed\u6cd5\u7cd6** \u2014 `` tag`...` `` \u7b49\u4ef7\u4e8e `tag(['\u5b57\u7b26\u4e32\u7247\u6bb5...'], ...\u503c)`\uff0c\u7528\u4e8e\u5b9e\u73b0\u56fd\u9645\u5316\u3001SQL \u8f6c\u4e49\u3001\u6837\u5f0f\u7ec4\u4ef6\u7b49\u9ad8\u7ea7\u529f\u80fd\u3002\n5. **`String.raw` \u83b7\u53d6\u539f\u59cb\u5b57\u7b26\u4e32** \u2014 `String.raw` \u662f\u4e00\u4e2a\u5185\u7f6e\u6807\u7b7e\u51fd\u6570\uff0c\u8fd4\u56de\u4e0d\u5904\u7406\u8f6c\u4e49\u5e8f\u5217\u7684\u539f\u59cb\u5b57\u7b26\u4e32\uff08\u53cd\u659c\u6760\u4fdd\u6301\u539f\u6837\uff09\uff0c\u9002\u5408\u5904\u7406\u6587\u4ef6\u8def\u5f84\u6216\u6b63\u5219\u8868\u8fbe\u5f0f\u3002\n6. **\u6027\u80fd\u901a\u5e38\u4f18\u4e8e\u62fc\u63a5** \u2014 \u73b0\u4ee3 V8 \u5f15\u64ce\u5bf9 Template Literal \u505a\u4e86\u4f18\u5316\uff0c\u6267\u884c\u6548\u7387\u4e0e\u5b57\u7b26\u4e32\u62fc\u63a5\u76f8\u5f53\u6216\u66f4\u597d\u3002\n\n## Common Mistakes\n\n1. **\u5fd8\u8bb0\u4f7f\u7528\u53cd\u5f15\u53f7\uff0c\u4ecd\u7136\u7528 `+` \u62fc\u63a5**\n\n   \u274c \u9519\u8bef\uff1a\n   ```javascript\n   const greeting = 'Hello, ' + name + '!';\n   ```\n\n   \u2705 \u6b63\u786e\uff1a\n   ```javascript\n   const greeting = `Hello, ${name}!`;\n   ```\n\n2. **\u5728\u63d2\u503c\u4e2d\u76f4\u63a5\u5d4c\u5165\u5bf9\u8c61\u6216\u6570\u7ec4\u672a\u5904\u7406\u683c\u5f0f**\n\n   \u274c \u9519\u8bef\uff1a\n   ```javascript\n   const items = [1, 2, 3];\n   console.log(`Items: ${items}`); // \u8f93\u51fa\uff1a\"Items: 1,2,3\" \u2014 \u81ea\u52a8\u8c03\u7528\u4e86 toString()\n   ```\n\n   \u2705 \u6b63\u786e\uff1a\n   ```javascript\n   const items = [1, 2, 3];\n   console.log(`Items: ${items.join(', ')}`); // \u8f93\u51fa\uff1a\"Items: 1, 2, 3\"\n   ```\n\n3. **\u6807\u7b7e\u6a21\u677f\u4e2d\u8bef\u7528\u666e\u901a\u5b57\u7b26\u4e32\u4f5c\u4e3a\u6807\u7b7e\u51fd\u6570**\n\n   \u274c \u9519\u8bef\uff1a\n   ```javascript\n   const tag = 'highlight'; // \u5b57\u7b26\u4e32\uff0c\u4e0d\u662f\u51fd\u6570\n   tag`Hello`; // TypeError: tag is not a function\n   ```\n\n   \u2705 \u6b63\u786e\uff1a\n   ```javascript\n   function highlight(strings, ...values) { /* ... */ }\n   highlight`Hello`; // \u6b63\u5e38\u5de5\u4f5c\n   ```\n\n## Related Concepts\n\n- [\u53d8\u91cf\u58f0\u660e\uff08let/const\uff09](../topics/variables.md) \u2014 \u5e38\u4e0e Template Literal \u914d\u5408\u4f7f\u7528\uff0c\u6a21\u677f\u4e2d\u5f15\u7528\u7684\u53d8\u91cf\u5efa\u8bae\u4f18\u5148\u4f7f\u7528 `const` \u6216 `let`\n- [\u7bad\u5934\u51fd\u6570](../syntax/arrow_function.md) \u2014 \u5728\u6a21\u677f\u63d2\u503c\u4e2d\u9891\u7e41\u4f7f\u7528\u7bad\u5934\u51fd\u6570\u8fdb\u884c\u6570\u7ec4\u8f6c\u6362\uff08\u5982 `.map()`\uff09\n- [\u89e3\u6784\u8d4b\u503c](../syntax/destructuring.md) \u2014 \u4e0e Template Literal \u7ed3\u5408\u4f7f\u7528\u65f6\uff0c\u53ef\u4ece\u5bf9\u8c61\u4e2d\u63d0\u53d6\u5b57\u6bb5\u76f4\u63a5\u7528\u4e8e\u63d2\u503c\n- [\u5c55\u5f00\u8fd0\u7b97\u7b26](../syntax/spread_rest.md) \u2014 \u5728\u6807\u7b7e\u6a21\u677f\u7684\u53c2\u6570\u5904\u7406\u4e2d\u5e38\u4e0e\u5269\u4f59\u53c2\u6570 `...` \u914d\u5408\u4f7f\u7528\n- [\u51fd\u6570](../topics/functions.md) \u2014 \u6807\u7b7e\u6a21\u677f\u672c\u8d28\u4e0a\u662f\u51fd\u6570\u7684\u7279\u6b8a\u8c03\u7528\u5f62\u5f0f\n\n## Citations\n\n- [MDN: Template literals](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Template_literals)\n- [ECMAScript 2015 (ES6) Specification \u2014 Template Literal Lexical Components](https://262.ecma-international.org/6.0/#sec-template-literal-lexical-components)\n- [MDN: String.raw](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/String/raw)", "syntax/var": "`var` \u662f JavaScript \u4e2d\u6700\u53e4\u8001\u7684\u53d8\u91cf\u58f0\u660e\u5173\u952e\u5b57\uff08\u81ea ES1 \u8d77\uff09\u3002\u5b83\u58f0\u660e\u7684\u53d8\u91cf\u5177\u6709**\u51fd\u6570\u4f5c\u7528\u57df**\u800c\u975e\u5757\u7ea7\u4f5c\u7528\u57df\uff0c\u5e76\u4e14\u5b58\u5728**\u53d8\u91cf\u63d0\u5347\uff08hoisting\uff09** \u884c\u4e3a\u2014\u2014\u58f0\u660e\u4f1a\u88ab\u63d0\u5347\u5230\u5f53\u524d\u4f5c\u7528\u57df\u9876\u90e8\uff0c\u4f46\u8d4b\u503c\u4fdd\u7559\u5728\u539f\u4f4d\u3002\u5728 ES2015\uff08ES6\uff09\u5f15\u5165 `let` \u548c `const` \u4e4b\u540e\uff0c`var` \u5728\u65e5\u5e38\u5f00\u53d1\u4e2d\u5df2\u9010\u6e10\u88ab\u53d6\u4ee3\uff0c\u4f46\u5728\u7406\u89e3\u9057\u7559\u4ee3\u7801\u3001\u5168\u5c40\u53d8\u91cf\u58f0\u660e\u4ee5\u53ca\u63d0\u5347\u673a\u5236\u65f6\u4ecd\u7136\u5fc5\u4e0d\u53ef\u5c11\u3002\n\n## Syntax\n\n```javascript\nvar variableName;           // \u58f0\u660e\uff0c\u521d\u59cb\u503c\u4e3a undefined\nvar variableName = value;   // \u58f0\u660e\u5e76\u8d4b\u503c\nvar name1 = val1, name2;    // \u540c\u65f6\u58f0\u660e\u591a\u4e2a\u53d8\u91cf\nvar x = 1, y = 2, z = 3;   // \u591a\u53d8\u91cf\u58f0\u660e\u5e76\u8d4b\u503c\n```\n\n- `variableName` \u2014 \u53d8\u91cf\u540d\uff0c\u9075\u5faa\u6807\u8bc6\u7b26\u547d\u540d\u89c4\u5219\uff08\u5b57\u6bcd\u3001`_`\u3001`$`\u3001\u6570\u5b57\uff0c\u6570\u5b57\u4e0d\u80fd\u5f00\u5934\uff09\n- `value` \u2014 \u4efb\u610f JavaScript \u8868\u8fbe\u5f0f\u7684\u503c\n- \u53d8\u91cf\u58f0\u660e\u5728\u4efb\u4f55\u5b9e\u9645\u4ee3\u7801\u6267\u884c\u4e4b\u524d\u88ab\u5904\u7406\uff08\u63d0\u5347\uff09\n- \u672a\u7ecf\u521d\u59cb\u5316\u65f6\uff0c\u9ed8\u8ba4\u503c\u4e3a `undefined`\n\n## Examples\n\n```javascript\n// \u793a\u4f8b 1: \u57fa\u672c\u58f0\u660e\u4e0e\u8d4b\u503c\nvar name = 'Alice';\nconsole.log(name); // \u8f93\u51fa \"Alice\"\n\nvar age;           // \u53ea\u58f0\u660e\u4e0d\u8d4b\u503c\nconsole.log(age);  // \u8f93\u51fa undefined\n```\n\n```javascript\n// \u793a\u4f8b 2: \u53d8\u91cf\u63d0\u5347\uff08hoisting\uff09\u2014\u2014 \u58f0\u660e\u7684\u63d0\u5347\nconsole.log(message);   // \u8f93\u51fa undefined\uff0c\u800c\u4e0d\u662f ReferenceError\nvar message = 'Hello';  // \u8d4b\u503c\u4ecd\u7136\u5728\u539f\u4f4d\u6267\u884c\n\n// \u4e0a\u9762\u4ee3\u7801\u5b9e\u9645\u88ab\u5f15\u64ce\u7406\u89e3\u4e3a\uff1a\n// var message;           // \u58f0\u660e\u88ab\u63d0\u5347\u5230\u9876\u90e8\n// console.log(message);  // undefined\n// message = 'Hello';     // \u8d4b\u503c\u4fdd\u7559\u5728\u539f\u5904\n```\n\n```javascript\n// \u793a\u4f8b 3: \u51fd\u6570\u4f5c\u7528\u57df \u2014\u2014 var \u6ca1\u6709\u5757\u7ea7\u4f5c\u7528\u57df\nfunction example() {\n  if (true) {\n    var x = 10;   // x \u5728\u6574\u4e2a example \u51fd\u6570\u5185\u90fd\u53ef\u89c1\n  }\n  console.log(x); // \u8f93\u51fa 10 \u2014\u2014 \u5757\u6ca1\u6709\u9694\u79bb var\n\n  for (var i = 0; i < 3; i++) {\n    // i \u5728\u6574\u4e2a\u51fd\u6570\u5185\u53ef\u89c1\n  }\n  console.log(i); // \u8f93\u51fa 3 \u2014\u2014 \u5faa\u73af\u7ed3\u675f\u540e\u7684 i \u4ecd\u7136\u5b58\u5728\n}\n\nexample();\n```\n\n```javascript\n// \u793a\u4f8b 4: \u5728\u5faa\u73af\u4e2d\u91cd\u590d\u58f0\u660e\u540c\u4e00\u4e2a\u53d8\u91cf\u4e0d\u4f1a\u62a5\u9519\nvar counter = 0;\nvar counter = 1;  // \u2705 \u5141\u8bb8\u91cd\u590d\u58f0\u660e\nvar counter;      // \u2705 \u91cd\u590d\u58f0\u660e\u4e0d\u4f1a\u91cd\u7f6e\u503c\nconsole.log(counter); // \u8f93\u51fa 1\n\n// \u5bf9\u6bd4\uff1alet \u4e0d\u5141\u8bb8\u91cd\u590d\u58f0\u660e\n// let a = 1;\n// let a = 2; // SyntaxError: Identifier 'a' has already been declared\n```\n\n## Key Points\n\n- **\u51fd\u6570\u4f5c\u7528\u57df**\uff1a`var` \u58f0\u660e\u7684\u53d8\u91cf\u5728\u6574\u4e2a\u51fd\u6570\u5185
