\uff08\u800c\u4e0d\u662f\u5757\u5185\uff09\u53ef\u89c1\uff0c\u8fd9\u662f\u5b83\u4e0e `let`/`const` \u6700\u672c\u8d28\u7684\u533a\u522b\u3002\n- **\u53d8\u91cf\u63d0\u5347\uff08Hoisting\uff09**\uff1a\u58f0\u660e\u88ab\u63d0\u5347\u5230\u5f53\u524d\u4f5c\u7528\u57df\u9876\u90e8\uff0c\u4f46\u8d4b\u503c\u987a\u5e8f\u4e0d\u53d8\u3002\u56e0\u6b64\u5728\u58f0\u660e\u524d\u8bbf\u95ee\u53d8\u91cf\u4e0d\u4f1a\u62a5\u9519\uff0c\u53ea\u4f1a\u5f97\u5230 `undefined`\u3002\n- **\u5168\u5c40\u5bf9\u8c61\u7684\u5c5e\u6027**\uff1a\u5728\u5168\u5c40\u4f5c\u7528\u57df\u4f7f\u7528 `var` \u58f0\u660e\u7684\u53d8\u91cf\u4f1a\u6210\u4e3a `window`\uff08\u6d4f\u89c8\u5668\uff09\u6216 `global`\uff08Node.js\uff09\u7684\u5c5e\u6027\u3002`let` \u548c `const` \u5219\u4e0d\u4f1a\u3002\n- **\u5141\u8bb8\u91cd\u590d\u58f0\u660e**\uff1a\u5728\u540c\u4e00\u4f5c\u7528\u57df\u5185\uff0c`var` \u53ef\u4ee5\u91cd\u590d\u58f0\u660e\u540c\u540d\u53d8\u91cf\uff0c\u4e0d\u4f1a\u89e6\u53d1\u9519\u8bef\u3002\u8fd9\u5728\u5927\u578b\u9879\u76ee\u4e2d\u5bb9\u6613\u5bfc\u81f4\u610f\u5916\u8986\u76d6\u3002\n- **\u6ca1\u6709\u6682\u65f6\u6027\u6b7b\u533a\uff08TDZ\uff09**\uff1a\u4e0e `let`/`const` \u4e0d\u540c\uff0c`var` \u4e0d\u5b58\u5728\u6682\u65f6\u6027\u6b7b\u533a\u2014\u2014\u5728\u58f0\u660e\u524d\u8bbf\u95ee\u5f97\u5230\u7684\u662f `undefined` \u800c\u975e `ReferenceError`\u3002\n- **\u9ed8\u8ba4\u503c\u4e3a `undefined`**\uff1a\u53ea\u58f0\u660e\u4e0d\u8d4b\u503c\u7684 `var` \u53d8\u91cf\uff0c\u521d\u59cb\u503c\u4e00\u5f8b\u4e3a `undefined`\u3002\n\n## Common Mistakes\n\n- **\u8bef\u4ee5\u4e3a `var` \u6709\u5757\u7ea7\u4f5c\u7528\u57df\u800c\u5199\u51fa\u610f\u5916\u884c\u4e3a**\n  ```javascript\n  // \u9519\u8bef\uff1a\u8ba4\u4e3a if \u5757\u4f1a\u9650\u5236\u53d8\u91cf\u7684\u53ef\u89c1\u8303\u56f4\n  if (false) {\n    var status = 'active';\n  }\n  console.log(status); // \u8f93\u51fa undefined\uff08\u4e0d\u4f1a\u62a5\u9519\uff09\uff0c\u56e0\u4e3a var \u58f0\u660e\u88ab\u63d0\u5347\n\n  // \u4fee\u6b63\uff1a\u4f7f\u7528 let \u83b7\u5f97\u5757\u7ea7\u4f5c\u7528\u57df\n  if (false) {\n    let status = 'active';\n  }\n  // console.log(status); // ReferenceError: status is not defined\n  ```\n\n- **\u5728\u5faa\u73af\u4e2d\u8bef\u7528 `var` \u5bfc\u81f4\u95ed\u5305\u6355\u83b7\u540c\u4e00\u4e2a\u53d8\u91cf**\n  ```javascript\n  // \u9519\u8bef\uff1a\u6240\u6709\u56de\u8c03\u90fd\u6355\u83b7\u540c\u4e00\u4e2a i\n  for (var i = 0; i < 3; i++) {\n    setTimeout(() => console.log(i), 100); // 3, 3, 3\n  }\n\n  // \u4fee\u6b63\uff1a\u4f7f\u7528 let\uff08\u5757\u7ea7\u4f5c\u7528\u57df\uff09\u6216 IIFE \u521b\u5efa\u65b0\u4f5c\u7528\u57df\n  for (let i = 0; i < 3; i++) {\n    setTimeout(() => console.log(i), 100); // 0, 1, 2\n  }\n\n  // \u6216\u8005\u7528 IIFE \u5305\u88f9\uff08\u8001\u5f0f\u5199\u6cd5\uff09\n  for (var i = 0; i < 3; i++) {\n    (function(j) {\n      setTimeout(() => console.log(j), 100); // 0, 1, 2\n    })(i);\n  }\n  ```\n\n- **\u5728\u5168\u5c40\u4f5c\u7528\u57df\u610f\u5916\u8986\u76d6\u5df2\u6709\u5c5e\u6027**\n  ```javascript\n  // \u9519\u8bef\uff1avar \u58f0\u660e\u4f1a\u8986\u76d6 window \u4e0a\u7684\u5c5e\u6027\n  var name = 'MyApp';       // window.name \u88ab\u8986\u76d6\n  var top = 'something';    // window.top \u88ab\u8986\u76d6\uff08\u53ef\u80fd\u7834\u574f\u9875\u9762\uff01\uff09\n\n  // \u4fee\u6b63\uff1a\u4f7f\u7528 let \u6216 const \u4e0d\u5f71\u54cd\u5168\u5c40\u5bf9\u8c61\n  let name = 'MyApp';       // \u4e0d\u4f1a\u53d8\u6210 window.name\n  const top = 'something';  // \u4e0d\u4f1a\u53d8\u6210 window.top\n  ```\n\n## Related Concepts\n\n- [let \u548c const \u58f0\u660e](../syntax/let_const.md) \u2014 ES6 \u5f15\u5165\u7684\u5757\u7ea7\u4f5c\u7528\u57df\u53d8\u91cf\u58f0\u660e\uff0c\u63a8\u8350\u5728\u73b0\u4ee3 JavaScript \u4e2d\u66ff\u4ee3 `var`\n- [\u53d8\u91cf](../topics/variables.md) \u2014 JavaScript \u53d8\u91cf\u58f0\u660e\u65b9\u5f0f\u7684\u5168\u9762\u6982\u8ff0\uff0c\u6db5\u76d6\u4f5c\u7528\u57df\u3001\u63d0\u5347\u548c\u6700\u4f73\u5b9e\u8df5\n\n## Citations\n\n- [MDN: var statement](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Statements/var)\n- [MDN: Variable hoisting](https://developer.mozilla.org/en-US/docs/Glossary/Hoisting)\n- [ECMAScript Specification \u2014 var statement](https://tc39.es/ecma262/#sec-variable-statement)", "topics/arrays_and_iteration": "\u6570\u7ec4\uff08Array\uff09\u662f JavaScript \u4e2d\u6700\u6838\u5fc3\u7684\u6570\u636e\u7ed3\u6784\u4e4b\u4e00\uff0c\u800c\u8fed\u4ee3\u5219\u662f\u64cd\u4f5c\u6570\u7ec4\u7684\u57fa\u672c\u65b9\u5f0f\u3002JavaScript \u63d0\u4f9b\u4e86\u4e00\u7cfb\u5217**\u9ad8\u9636\u8fed\u4ee3\u65b9\u6cd5**\uff08\u5982 `map`\u3001`filter`\u3001`reduce`\uff09\uff0c\u8ba9\u4f60\u4ee5\u58f0\u660e\u5f0f\u3001\u51fd\u6570\u5f0f\u98ce\u683c\u5904\u7406\u6570\u636e\uff0c\u800c\u65e0\u9700\u624b\u52a8\u7ba1\u7406\u7d22\u5f15\u6216\u5faa\u73af\u53d8\u91cf\u3002\u6b64\u5916\uff0c`for\u2026of`\u3001**\u5c55\u5f00\u8fd0\u7b97\u7b26**\uff08spread\uff09\u548c**\u89e3\u6784\u8d4b\u503c**\uff08destructuring\uff09\u8fdb\u4e00\u6b65\u7b80\u5316\u4e86\u6570\u7ec4\u7684\u904d\u5386\u3001\u590d\u5236\u548c\u63d0\u53d6\u64cd\u4f5c\u3002\u638c\u63e1\u8fd9\u4e9b\u5de5\u5177\u53ef\u4ee5\u5199\u51fa\u66f4\u7b80\u6d01\u3001\u53ef\u8bfb\u4e14\u4e0d\u6613\u51fa\u9519\u7684\u4ee3\u7801\u3002\n\n## Syntax\n\n### 1. \u51fd\u6570\u5f0f\u8fed\u4ee3\u65b9\u6cd5\uff08Array.prototype \u4e0a\u7684\u65b9\u6cd5\uff09\n\n```javascript\n// map \u2014\u2014 \u5c06\u6bcf\u4e2a\u5143\u7d20\u6620\u5c04\u4e3a\u65b0\u503c\uff0c\u8fd4\u56de\u7b49\u957f\u65b0\u6570\u7ec4\nconst newArray = arr.map((element, index, array) => newValue);\n\n// filter \u2014\u2014 \u4fdd\u7559\u6ee1\u8db3\u6761\u4ef6\u7684\u5143\u7d20\uff0c\u8fd4\u56de\u5b50\u96c6\u65b0\u6570\u7ec4\nconst filtered = arr.filter((element, index, array) => booleanCondition);\n\n// reduce \u2014\u2014 \u4ece\u5de6\u5230\u53f3\u5f52\u7ea6\uff0c\u7d2f\u8ba1\u4e3a\u5355\u4e00\u503c\nconst result = arr.reduce((accumulator, element, index, array) => newAccumulator, initialValue);\n\n// forEach \u2014\u2014 \u904d\u5386\u6267\u884c\u526f\u4f5c\u7528\uff0c\u4e0d\u8fd4\u56de\u65b0\u6570\u7ec4\narr.forEach((element, index, array) => void);\n\n// find \u2014\u2014 \u8fd4\u56de\u7b2c\u4e00\u4e2a\u6ee1\u8db3\u6761\u4ef6\u7684\u5143\u7d20\uff08\u6216 undefined\uff09\nconst found = arr.find((element) => booleanCondition);\n\n// some \u2014\u2014 \u662f\u5426\u81f3\u5c11\u6709\u4e00\u4e2a\u5143\u7d20\u6ee1\u8db3\u6761\u4ef6\nconst hasAny = arr.some((element) => booleanCondition);\n\n// every \u2014\u2014 \u662f\u5426\u5168\u90e8\u5143\u7d20\u6ee1\u8db3\u6761\u4ef6\nconst allMatch = arr.every((element) => booleanCondition);\n```\n\n### 2. `for\u2026of` \u5faa\u73af\uff08ES2015+\uff09\n\n```javascript\nfor (const element of iterable) {\n  // \u904d\u5386\u4efb\u610f\u53ef\u8fed\u4ee3\u5bf9\u8c61\uff08Array\u3001Map\u3001Set\u3001String \u7b49\uff09\n}\n```\n\n### 3. \u5c55\u5f00\u8fd0\u7b97\u7b26 `...`\uff08ES2015+\uff09\n\n```javascript\n// \u6d45\u62f7\u8d1d + \u5408\u5e76\u6570\u7ec4\nconst copy = [...arr];\nconst merged = [...arr1, ...arr2];\n```\n\n### 4. \u6570\u7ec4\u89e3\u6784\uff08ES2015+\uff09\n\n```javascript\nconst [first, second, ...rest] = arr;   // \u6309\u4f4d\u7f6e\u63d0\u53d6\nconst [, , third] = arr;                // \u8df3\u8fc7\u524d\u4e24\u4e2a\n```\n\n## Examples\n\n### \u57fa\u7840\uff1a\u4f20\u7edf\u5faa\u73af vs. \u51fd\u6570\u5f0f\u65b9\u6cd5\n\n```javascript\nconst numbers = [1, 2, 3, 4, 5];\n\n// \u274c \u4f20\u7edf for \u5faa\u73af\u2014\u2014\u5bb9\u6613\u51fa\u9519\uff0c\u53ef\u8bfb\u6027\u5dee\nconst doubled1 = [];\nfor (let i = 0; i < numbers.length; i++) {\n  doubled1.push(numbers[i] * 2);\n}\n\n// \u2705 map \u2014\u2014 \u610f\u56fe\u6e05\u6670\uff0c\u65e0\u7d22\u5f15\u7ba1\u7406\nconst doubled2 = numbers.map(n => n * 2);\n// doubled2 \u2192 [2, 4, 6, 8, 10]\n```\n\n### \u94fe\u5f0f\u8c03\u7528\uff1afilter \u2192 map \u2192 reduce\n\n```javascript\nconst products = [\n  { name: '\u9f20\u6807', price: 80, inStock: true },\n  { name: '\u952e\u76d8', price: 200, inStock: false },\n  { name: '\u663e\u793a\u5668', price: 1500, inStock: true },\n  { name: '\u8033\u673a', price: 300, inStock: true },\n];\n\n// \u627e\u51fa\u5e93\u5b58\u4e2d\u4ef7\u683c \u2265 100 \u7684\u5546\u54c1\uff0c\u8ba1\u7b97\u603b\u4ef7\nconst total = products\n  .filter(p => p.inStock)           // \u5148\u8fc7\u6ee4\u5e93\u5b58\n  .filter(p => p.price >= 100)      // \u518d\u8fc7\u6ee4\u4ef7\u683c\n  .map(p => p.price)                // \u63d0\u53d6\u4ef7\u683c\n  .reduce((sum, price) => sum + price, 0);  // \u7d2f\u52a0\n// total \u2192 1800 (1500 + 300)\n```\n\n### `for\u2026of` \u4e0e\u89e3\u6784\u7ed3\u5408\n\n```javascript\nconst users = [\n  { id: 1, name: 'Alice' },\n  { id: 2, name: 'Bob' },\n  { id: 3, name: 'Charlie' },\n];\n\n// \u540c\u65f6\u83b7\u53d6\u7d22\u5f15\u548c\u5143\u7d20\u2014\u2014\u4f7f\u7528 entries()\nfor (const [index, { name }] of users.entries()) {\n  console.log(`${index + 1}. ${name}`);\n}\n// \u8f93\u51fa:\n// 1. Alice\n// 2. Bob\n// 3. Charlie\n```\n\n### \u5c55\u5f00\u8fd0\u7b97\u7b26\u7684\u9ad8\u7ea7\u7528\u6cd5\n\n```javascript\nconst a = [1, 2, 3];\nconst b = [4, 5, 6];\n\n// \u5408\u5e76\u5e76\u53bb\u91cd\uff08\u914d\u5408 Set\uff09\nconst unique = [...new Set([...a, ...b, 1, 2])];\n// unique \u2192 [1, 2, 3, 4, 5, 6]\n\n// \u627e\u51fa\u4e24\u4e2a\u6570\u7ec4\u7684\u4ea4\u96c6\nconst intersection = a.filter(x => b.includes(x)); // [4, 5]... \u4e0d\u5bf9\uff0ca/b\u6ca1\u6709\u4ea4\u96c6\n\n// \u5b9e\u9645\u4f8b\u5b50\uff1a\u627e\u5230\u5171\u540c\u559c\u6b22\u7684\u4e66\u7c4d\nconst aliceBooks = ['\u7ea2\u4e0e\u9ed1', '\u767e\u5e74\u5b64\u72ec', '1984'];\nconst bobBooks   = ['\u767e\u5e74\u5b64\u72ec', '\u632a\u5a01\u7684\u68ee\u6797', '1984'];\nconst common = aliceBooks.filter(book => bobBooks.includes(book));\n// common \u2192 ['\u767e\u5e74\u5b64\u72ec', '1984']\n```\n\n## Key Points\n\n1. **`map`\u3001`filter`\u3001`reduce` \u8fd4\u56de\u65b0\u6570\u7ec4\uff0c\u4e0d\u4fee\u6539\u539f\u6570\u7ec4**\u3002\u8fd9\u662f\u51fd\u6570\u5f0f\u7f16\u7a0b\u7684\u91cd\u8981\u539f\u5219\u2014\u2014\u907f\u514d\u526f\u4f5c\u7528\u3002\u5982\u679c\u9700\u8981\u539f\u6570\u7ec4\uff0c\u8bf7\u4f7f\u7528 `arr[index] = newValue` \u6216 `splice`\u3002\n2. **`forEach` \u4e0d\u8fd4\u56de\u65b0\u6570\u7ec4**\uff0c\u53ea\u7528\u4e8e\u526f\u4f5c\u7528\uff08\u5982\u6253\u5370\u65e5\u5fd7\uff09\u3002\u5982\u679c\u4f60\u5728 `forEach` \u91cc push \u5230\u4e00\u4e2a\u5916\u90e8\u6570\u7ec4\uff0c99% \u7684\u573a\u666f\u5e94\u8be5\u6539\u7528 `map` \u6216 `filter`\u3002\n3. **\u56de\u8c03\u51fd\u6570\u7684\u53c2\u6570\u7b7e\u540d**\uff1a\u51e0\u4e4e\u6240\u6709\u8fed\u4ee3\u65b9\u6cd5\u90fd\u63a5\u53d7 `(element, index, array)` \u4e09\u4e2a\u53c2\u6570\u3002`reduce` \u4f8b\u5916\uff1a\u5b83\u7684\u524d\u4e24\u4e2a\u53c2\u6570\u662f\u7d2f\u8ba1\u503c `(accumulator, currentValue)`\u3002\n4. **`for\u2026of` \u904d\u5386\u53ef\u8fed\u4ee3\u5bf9\u8c61\uff0c\u4e0d\u5c40\u9650\u4e8e\u6570\u7ec4**\u3002\u5b83\u652f\u6301 `Map`\u3001`Set`\u3001`String`\u3001`TypedArray`\u3001`arguments` \u4ee5\u53ca\u5b9e\u73b0\u4e86 `[Symbol.iterator]` \u534f\u8bae\u7684\u4efb\u4f55\u5bf9\u8c61\u3002\u4e0e `for\u2026in`\uff08\u904d\u5386\u952e\u540d\uff09\u6709\u672c\u8d28\u533a\u522b\u3002\n5. **\u5c55\u5f00\u8fd0\u7b97\u7b26\u53ea\u505a\u6d45\u62f7\u8d1d**\u3002\u5d4c\u5957\u6570\u7ec4\u6216\u5bf9\u8c61\u4e2d\u7684\u5f15\u7528\u4ecd\u7136\u5171\u4eab\uff0c\u4fee\u6539\u5185\u5c42\u4f1a\u5f71\u54cd\u539f\u6570\u636e\u3002\u6df1\u62f7\u8d1d\u9700\u8981 `structuredClone()` \u6216\u7b2c\u4e09\u65b9\u5e93\u3002\n6. **`reduce` \u4e00\u5b9a\u8981\u4f20\u521d\u59cb\u503c `initialValue`**\uff0c\u5426\u5219\u7a7a\u6570\u7ec4\u4f1a\u629b\u51fa `TypeError`\u3002\u5f53\u6570\u7ec4\u53ea\u6709\u4e00\u4e2a\u5143\u7d20\u4e14\u672a\u4f20\u521d\u59cb\u503c\u65f6\uff0c\u8be5\u5143\u7d20\u76f4\u63a5\u6210\u4e3a\u7d2f\u8ba1\u503c\u800c\u4e0d\u4f1a\u8c03\u7528\u56de\u8c03\uff0c\u53ef\u80fd\u5f15\u53d1\u610f\u6599\u4e4b\u5916\u7684\u7ed3\u679c\u3002\n\n## Common Mistakes\n\n1. **\u5728 `forEach` \u4e2d\u4f7f\u7528 `return` \u6216 `break` \u4f01\u56fe\u63d0\u524d\u9000\u51fa**\n\n```javascript\nconst arr = [1, 2, 3, 4, 5];\n\n// \u274c \u9519\u8bef\uff1areturn \u53ea\u662f\u7ed3\u675f\u5f53\u524d\u56de\u8c03\uff0c\u4e0d\u4f1a\u8df3\u51fa\u5faa\u73af\narr.forEach((n) => {\n  if (n > 3) return;  // \u53ea\u662f\u8df3\u8fc7 n > 3 \u7684\u5143\u7d20\n  console.log(n);     // \u4ecd\u7136\u8f93\u51fa 1,2,3\n});\n\n// \u2705 \u6b63\u786e\uff1a\u4f7f\u7528 for...of + break\uff0c\u6216 find()/some() \u66ff\u4ee3\nfor (const n of arr) {\n  if (n > 3) break;   // \u786e\u5b9e\u8df3\u51fa\u5faa\u73af\n  console.log(n);     // \u53ea\u8f93\u51fa 1,2,3\n}\n\n// \u6216\u7528 find() \u66ff\u4ee3\u67e5\u627e\u8bed\u4e49\nconst found = arr.find(n => n > 3); // \u8fd4\u56de\u7b2c\u4e00\u4e2a >3 \u7684\u5143\u7d20\n```\n\n2. **`map` \u56de\u8c03\u4e2d\u76f4\u63a5\u4fee\u6539\u539f\u6570\u7ec4**\n\n```javascript\n// \u274c \u4e0d\u826f\u5b9e\u8df5\uff1a\u540c\u65f6\u4fee\u6539\u539f\u6570\u7ec4\nconst items = [{ count: 1 }, { count: 2 }];\nitems.map(item => {\n  item.count *= 2;   // \u526f\u4f5c\u7528\uff01\u4fee\u6539\u4e86\u539f\u5bf9\u8c61\n  return item;\n});\n\n// \u2705 \u6b63\u786e\uff1a\u8fd4\u56de\u65b0\u5bf9\u8c61\nconst updated = items.map(item => ({\n  ...item,            // \u5c55\u5f00\u539f\u5c5e\u6027\n  count: item.count * 2,\n}));\n```\n\n3. **\u6df7\u6dc6 `map` \u548c `forEach` \u7684\u8fd4\u56de\u503c**\n\n```javascript\nconst numbers = [1, 2, 3];\n\n// \u274c \u4ee5\u4e3a forEach \u8fd4\u56de\u4e86\u65b0\u6570\u7ec4\nconst result = numbers.forEach(n => n * 2);\nconsole.log(result);  // undefined\uff01\n\n// \u2705 \u7528 map\nconst result2 = numbers.map(n => n * 2);\nconsole.log(result2); // [2, 4, 6]\n```\n\n## Related Concepts\n\n- [Array (Builtin)](../builtin/array.md) \u2014 \u672c\u4e3b\u9898\u805a\u7126\u7684 `Array` \u5185\u7f6e\u5bf9\u8c61\u53ca\u5176\u6240\u6709\u6838\u5fc3\u65b9\u6cd5\n- [Destructuring](../syntax/destructuring.md) \u2014 \u4ece\u6570\u7ec4\u548c\u5bf9\u8c61\u4e2d\u5feb\u901f\u63d0\u53d6\u503c\u7684\u8bed\u6cd5\u7cd6\n- [Spread & Rest](../syntax/spread_rest.md) \u2014 \u5c55\u5f00\u4e0e\u5269\u4f59\u53c2\u6570\u8fd0\u7b97\u7b26\u7684\u5b8c\u6574\u7528\u6cd5\n- [Map & Set (Builtin)](../builtin/map_set.md) \u2014 \u540c\u6837\u652f\u6301\u8fed\u4ee3\u7684\u96c6\u5408\u7c7b\u578b\uff0c\u914d\u5408 `for\u2026of` \u6548\u679c\u66f4\u4f73\n- [Functions](../topics/functions.md) \u2014 \u56de\u8c03\u51fd\u6570\u3001\u7bad\u5934\u51fd\u6570\u4e0e `this` \u7ed1\u5b9a\u5982\u4f55\u4e0e\u8fed\u4ee3\u65b9\u6cd5\u4ea4\u4e92\n- [Async Patterns](../patterns/async_patterns.md) \u2014 \u5f02\u6b65\u573a\u666f\u4e0b\u6570\u7ec4\u8fed\u4ee3\u7684\u5e38\u89c1\u6a21\u5f0f\uff08\u4e32\u884c vs \u5e76\u884c\uff09\n\n## Citations\n\n- [MDN: Array](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Array)\n- [MDN: Iteration protocols](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Iteration_protocols)\n- [MDN: for\u2026of](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Statements/for...of)\n- [MDN: Spread syntax](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Operators/Spread_syntax)", "topics/async": "JavaScript \u662f**\u5355\u7ebf\u7a0b**\u8bed\u8a00\uff0c\u8fd9\u610f\u5473\u7740\u5b83\u540c\u4e00\u65f6\u95f4\u53ea\u80fd\u6267\u884c\u4e00\u6bb5\u4ee3\u7801\u3002\u4f46\u901a\u8fc7**\u4e8b\u4ef6\u5faa\u73af\uff08Event Loop\uff09**\u548c**\u5f02\u6b65 API**\uff0cJavaScript \u53ef\u4ee5\u9ad8\u6548\u5730\u5904\u7406 I/O \u64cd\u4f5c\u3001\u7f51\u7edc\u8bf7\u6c42\u548c\u5b9a\u65f6\u5668\u7b49\u8017\u65f6\u4efb\u52a1\uff0c\u800c\u4e0d\u4f1a\u963b\u585e\u4e3b\u7ebf\u7a0b\u3002\u5f02\u6b65\u7f16\u7a0b\u662f JavaScript \u8fd0\u884c\u65f6\u7684\u6838\u5fc3\u673a\u5236\uff0c\u7406\u89e3\u5b83\u5bf9\u4e8e\u5199\u51fa\u9ad8\u6027\u80fd\u3001\u65e0\u963b\u585e\u7684\u4ee3\u7801\u81f3\u5173\u91cd\u8981\u3002\n\n\u4ece\u6700\u65e9\u7684**\u56de\u8c03\u51fd\u6570\uff08Callback\uff09**\uff0c\u5230 ES2015 \u7684 **Promise**\uff0c\u518d\u5230 ES2017 \u7684 **async/await**\uff0cJavaScript \u7684\u5f02\u6b65\u7f16\u7a0b\u8bed\u6cd5\u4e0d\u65ad\u6f14\u8fdb\uff0c\u8ba9\u5f02\u6b65\u4ee3\u7801\u7684\u53ef\u8bfb\u6027\u548c\u53ef\u7ef4\u62a4\u6027\u5927\u5e45\u63d0\u5347\u3002\n\n## Syntax\n\n\u5f02\u6b65\u7f16\u7a0b\u6ca1\u6709\u5355\u4e00\u7684\u8bed\u6cd5\uff0c\u800c\u662f\u7531\u591a\u79cd\u6a21\u5f0f\u6784\u6210\u3002\u4ee5\u4e0b\u5217\u51fa\u6838\u5fc3\u7684\u5f02\u6b65\u8868\u8fbe\u5f0f\u5f62\u6001\uff1a\n\n```javascript\n// 1. \u56de\u8c03\u6a21\u5f0f\uff08Callback\uff09\nsetTimeout(() => { console.log('\u5ef6\u8fdf\u6267\u884c'); }, 1000);\nfs.readFile('file.txt', (err, data) => { /* \u5904\u7406\u7ed3\u679c */ });\n\n// 2. Promise \u94fe\nfetch(url)\n  .then(response => response.json())\n  .then(data => console.log(data))\n  .catch(err => console.error(err));\n\n// 3. async/await\uff08\u8bed\u6cd5\u7cd6\uff0c\u5e95\u5c42\u4ecd\u662f Promise\uff09\nasync function loadData() {\n  const response = await fetch(url);\n  const data = await response.json();\n  return data;\n}\n```\n\n## Examples\n\n### \u793a\u4f8b 1\uff1a\u4ece\u56de\u8c03\u5230 Promise \u7684\u6f14\u8fdb\n\n```javascript\n// \u56de\u8c03\u5730\u72f1\uff08Callback Hell\uff09\u2014\u2014 \u96be\u4ee5\u7ef4\u62a4\nfunction getUserCallback(userId, callback) {\n  setTimeout(() => {\n    callback({ id: userId, name: 'Alice' });\n  }, 100);\n}\nfunction getPostsCallback(user, callback) {\n  setTimeout(() => {\n    callback(['Post 1', 'Post 2']);\n  }, 100);\n}\n\n// \u5d4c\u5957\u5c42\u7ea7\u8d8a\u6765\u8d8a\u6df1\uff0c\u9519\u8bef\u5904\u7406\u6df7\u4e71\ngetUserCallback(1, (user) => {\n  getPostsCallback(user, (posts) => {\n    console.log(user.name, posts); // Alice ['Post 1', 'Post 2']\n  });\n});\n\n// Promise \u7248\u672c \u2014\u2014 \u6241\u5e73\u5316\u94fe\u5f0f\u8c03\u7528\nfunction getUserPromise(userId) {\n  return new Promise(resolve => {\n    setTimeout(() => resolve({ id: userId, name: 'Alice' }), 100);\n  });\n}\nfunction getPostsPromise(user) {\n  return new Promise(resolve => {\n    setTimeout(() => resolve(['Post 1', 'Post 2']), 100);\n  });\n}\n\ngetUserPromise(1)\n  .then(user => getPostsPromise(user))\n  .then(posts => console.log('Promise \u94fe:', posts))\n  .catch(err => console.error(err));\n```\n\n### \u793a\u4f8b 2\uff1aasync/await \u2014\u2014 \u4ee5\u540c\u6b65\u65b9\u5f0f\u5199\u5f02\u6b65\u4ee3\u7801\n\n```javascript\n// async/await \u8ba9\u5f02\u6b65\u8bfb\u8d77\u6765\u50cf\u540c\u6b65\u4ee3\u7801\nasync function loadUserProfile(userId) {\n  try {\n    const user = await getUserPromise(userId);\n    const posts = await getPostsPromise(user);\n    console.log(`${user.name} \u7684\u5e16\u5b50:`, posts);\n    return { user, posts };\n  } catch (err) {\n    console.error('\u52a0\u8f7d\u5931\u8d25:', err);\n    throw err; // \u91cd\u65b0\u629b\u51fa\uff0c\u8ba9\u8c03\u7528\u8005\u7ee7\u7eed\u5904\u7406\n  }\n}\n\n// \u9876\u5c42 await\uff08\u73b0\u4ee3 JavaScript / \u6a21\u5757\u4e2d\u53ef\u7528\uff09\n// const profile = await loadUserProfile(1);\n```\n\n### \u793a\u4f8b 3\uff1a\u4e8b\u4ef6\u5faa\u73af \u2014\u2014 \u7406\u89e3\u6267\u884c\u987a\u5e8f\n\n```javascript\nconsole.log('1: \u540c\u6b65\u4ee3\u7801 start');\n\nsetTimeout(() => {\n  console.log('2: macrotask\uff08\u5b8f\u4efb\u52a1\uff09');\n}, 0);\n\nPromise.resolve().then(() => {\n  console.log('3: microtask\uff08\u5fae\u4efb\u52a1\uff09');\n});\n\nconsole.log('4: \u540c\u6b65\u4ee3\u7801 end');\n\n// \u8f93\u51fa\u987a\u5e8f\uff1a\n// 1: \u540c\u6b65\u4ee3\u7801 start\n// 4: \u540c\u6b65\u4ee3\u7801 end\n// 3: microtask\uff08\u5fae\u4efb\u52a1\uff09\n// 2: macrotask\uff08\u5b8f\u4efb\u52a1\uff09\n// \u6ce8\u610f\uff1a\u6bcf\u4e2a\u5b8f\u4efb\u52a1\u6267\u884c\u5b8c\u540e\uff0c\u4f1a\u6e05\u7a7a\u6240\u6709\u5fae\u4efb\u52a1\u961f\u5217\uff0c\u518d\u53d6\u4e0b\u4e00\u4e2a\u5b8f\u4efb\u52a1\n```\n\n### \u793a\u4f8b 4\uff1a\u5e76\u884c vs \u4e32\u884c\n\n```javascript\n// \u4e32\u884c\u6267\u884c \u2014\u2014 \u9010\u4e2a\u7b49\u5f85\nasync function serial() {\n  const a = await fetch('/api/user').then(r => r.json());\n  const b = await fetch(`/api/posts/${a.id}`).then(r => r.json());\n  // \u603b\u8017\u65f6 = T(a) + T(b)\n  return b;\n}\n\n// \u5e76\u884c\u6267\u884c \u2014\u2014 \u540c\u65f6\u53d1\u8d77\nasync function parallel() {\n  const [user, config] = await Promise.all([\n    fetch('/api/user').then(r => r.json()),\n    fetch('/api/config').then(r => r.json())\n  ]);\n  // \u603b\u8017\u65f6 = max(T(user), T(config))\n  return { user, config };\n}\n```\n\n## Key Points\n\n- **JavaScript \u662f\u5355\u7ebf\u7a0b\u7684**\uff1a\u4e00\u6b21\u53ea\u6267\u884c\u4e00\u4e2a\u4efb\u52a1\uff0c\u5f02\u6b65\u9760\u7684\u662f\u4e8b\u4ef6\u5faa\u73af\u5c06\u4efb\u52a1\u5206\u9636\u6bb5\u8c03\u5ea6\uff0c\u800c\u975e\u591a\u7ebf\u7a0b\u3002\n- **\u4e8b\u4ef6\u5faa\u73af\u5206\u4e3a\u5b8f\u4efb\u52a1\uff08macrotask\uff09\u548c\u5fae\u4efb\u52a1\uff08microtask\uff09**\uff1a\u5b8f\u4efb\u52a1\u5305\u62ec `setTimeout`\u3001`setInterval`\u3001I/O\uff1b\u5fae\u4efb\u52a1\u5305\u62ec `Promise.then/catch/finally`\u3001`MutationObserver`\u3002\u6bcf\u4e2a\u5b8f\u4efb\u52a1\u7ed3\u675f\u540e\u4f1a\u6e05\u7a7a\u6240\u6709\u5fae\u4efb\u52a1\u961f\u5217\u3002\n- **Promise \u6709\u4e09\u79cd\u72b6\u6001**\uff1a`pending`\uff08\u7b49\u5f85\uff09\u3001`fulfilled`\uff08\u6210\u529f\uff09\u3001`rejected`\uff08\u5931\u8d25\uff09\uff0c\u72b6\u6001\u4e00\u65e6\u786e\u5b9a\u5c31\u4e0d\u53ef\u518d\u53d8\u3002\n- **async \u51fd\u6570\u59cb\u7ec8\u8fd4\u56de Promise**\uff1a\u5373\u4f7f `return 42`\uff0c\u5916\u90e8\u62ff\u5230\u7684\u4e5f\u662f\u4e00\u4e2a resolved \u7684 Promise\uff0c\u800c\u975e\u666e\u901a\u503c\u3002\n- **await \u53ea\u80fd\u5728 async \u51fd\u6570\u5185\u90e8\u4f7f\u7528**\uff08\u9664\u4e86\u6a21\u5757\u9876\u5c42\u7684 Top-level await\uff09\u3002\n- **\u9519\u8bef\u5904\u7406**\uff1aasync \u51fd\u6570\u4e2d\u7684 `throw` \u7b49\u540c\u4e8e Promise \u7684 `reject`\uff0c\u672a\u6355\u83b7\u7684\u9519\u8bef\u9700\u8981\u7528 `try/catch` \u6216 `.catch()` \u5904\u7406\uff0c\u5426\u5219\u4f1a\u9759\u9ed8\u5931\u8d25\u3002\n\n## Common Mistakes\n\n- **\u5fd8\u8bb0 await \u5bfc\u81f4 Bug**\uff1a\u5728 async \u51fd\u6570\u4e2d\u8c03\u7528\u53e6\u4e00\u4e2a async \u51fd\u6570\u65f6\u5fd8\u8bb0\u5199 `await`\uff0c\u4f1a\u62ff\u5230\u4e00\u4e2a Promise \u5bf9\u8c61\u800c\u975e\u5b9e\u9645\u503c\u3002\n  ```javascript\n  // \u9519\u8bef\n  async function wrong() {\n    const data = fetchData(); // data \u662f Promise\uff0c\u4e0d\u662f\u5b9e\u9645\u6570\u636e\uff01\n    console.log(data); // Promise { <pending> }\n  }\n  // \u6b63\u786e\n  async function right() {\n    const data = await fetchData();\n    console.log(data); // \u5b9e\u9645\u6570\u636e\n  }\n  ```\n\n- **\u6ee5\u7528\u4e32\u884c\u5bfc\u81f4\u6027\u80fd\u4f4e\u4e0b**\uff1a\u5f53\u591a\u4e2a\u5f02\u6b65\u64cd\u4f5c\u5f7c\u6b64\u4e0d\u4f9d\u8d56\u65f6\uff0c\u5374\u7528 `await` \u9010\u4e2a\u7b49\u5f85\uff0c\u6d6a\u8d39\u4e86\u5e76\u53d1\u80fd\u529b\u3002\n  ```javascript\n  // \u5dee \u2014\u2014 \u4e32\u884c\n  const a = await fetch(urlA);\n  const b = await fetch(urlB); // \u7b49 a \u5b8c\u6210\u624d\u53d1\u8d77\n\n  // \u597d \u2014\u2014 \u5e76\u884c\n  const [a, b] = await Promise.all([fetch(urlA), fetch(urlB)]);\n  ```\n\n- **\u672a\u5904\u7406 Promise \u62d2\u7edd**\uff1a\u6ca1\u6709 `.catch()` \u6216 `try/catch` \u7684 Promise \u62d2\u7edd\u4f1a\u89e6\u53d1 `unhandledrejection`\uff0c\u5728 Node.js \u4e2d\u4f1a\u5bfc\u81f4\u8fdb\u7a0b\u9000\u51fa\u3002\n  ```javascript\n  // \u5371\u9669\n  fetch('/api').then(handle); // \u5982\u679c\u5931\u8d25\uff0c\u9519\u8bef\u672a\u88ab\u6355\u83b7\n\n  // \u5b89\u5168\n  fetch('/api').then(handle).catch(console.error);\n  // \u6216\n  try { await fetch('/api'); } catch (e) { /* \u5904\u7406 */ }\n  ```\n\n## Related Concepts\n\n- [Promise\uff08\u5185\u7f6e\u5bf9\u8c61\uff09](../builtin/promise.md) \u2014\u2014 JavaScript \u5f02\u6b65\u7f16\u7a0b\u7684\u6838\u5fc3\u6784\u5efa\u5757\n- [async/await\uff08\u8bed\u6cd5\uff09](../syntax/async_await.md) \u2014\u2014 \u57fa\u4e8e Promise \u7684\u8bed\u6cd5\u7cd6\uff0c\u8ba9\u5f02\u6b65\u4ee3\u7801\u66f4\u7b80\u6d01\n- [\u5f02\u6b65\u7f16\u7a0b\u6a21\u5f0f](../patterns/async_patterns.md) \u2014\u2014 \u5e76\u53d1\u63a7\u5236\u3001\u8d85\u65f6\u3001\u91cd\u8bd5\u7b49\u8fdb\u9636\u6a21\u5f0f\n- [\u51fd\u6570\uff08\u8bdd\u9898\uff09](../topics/functions.md) \u2014\u2014 \u56de\u8c03\u51fd\u6570\u662f\u5f02\u6b65\u7f16\u7a0b\u7684\u6700\u65e9\u5f62\u5f0f\n\n## Citations\n\n- [MDN: Asynchronous JavaScript](https://developer.mozilla.org/en-US/docs/Learn/JavaScript/Asynchronous)\n- [MDN: Promise](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Promise)\n- [MDN: async function](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Statements/async_function)\n- [MDN: Event Loop](https://developer.mozilla.org/en-US/docs/Web/JavaScript/EventLoop)\n- [MDN: Using Promises](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Guide/Using_promises)", "topics/functions": "## \u6982\u8ff0\n\n**\u51fd\u6570\uff08Function\uff09** \u662f JavaScript \u4e2d\u6700\u91cd\u8981\u7684\u6784\u5efa\u5757\u4e4b\u4e00\u3002\u51fd\u6570\u662f\u4e00\u6bb5\u53ef\u590d\u7528\u7684\u4ee3\u7801\u5757\uff0c\u7528\u4e8e\u6267\u884c\u7279\u5b9a\u4efb\u52a1\uff0c\u53ef\u4ee5\u63a5\u53d7\u8f93\u5165\uff08\u53c2\u6570\uff09\u5e76\u8fd4\u56de\u8f93\u51fa\uff08\u8fd4\u56de\u503c\uff09\u3002JavaScript \u7684\u51fd\u6570\u662f\u4e00\u7b49\u516c\u6c11\uff08first-class citizens\uff09\uff0c\u610f\u5473\u7740\u51fd\u6570\u53ef\u4ee5\u88ab\u8d4b\u503c\u7ed9\u53d8\u91cf\u3001\u4f5c\u4e3a\u53c2\u6570\u4f20\u9012\u7ed9\u5176\u4ed6\u51fd\u6570\u3001\u4ee5\u53ca\u4f5c\u4e3a\u8fd4\u56de\u503c\u4ece\u5176\u4ed6\u51fd\u6570\u8fd4\u56de\u3002\u7406\u89e3\u51fd\u6570\u7684\u5de5\u4f5c\u673a\u5236\u2014\u2014\u5305\u62ec\u58f0\u660e\u65b9\u5f0f\u3001\u4f5c\u7528\u57df\u89c4\u5219\u3001`this` \u7ed1\u5b9a\u548c\u53c2\u6570\u5904\u7406\u2014\u2014\u662f\u638c\u63e1 JavaScript \u7684\u6838\u5fc3\u3002\n\n## Syntax\n\n### \u51fd\u6570\u58f0\u660e\uff08Function Declaration\uff09\n\n```javascript\nfunction \u51fd\u6570\u540d(\u53c2\u65701, \u53c2\u65702, ...) {\n  // \u51fd\u6570\u4f53\n  return \u8fd4\u56de\u503c; // \u53ef\u9009\n}\n```\n\n### \u51fd\u6570\u8868\u8fbe\u5f0f\uff08Function Expression\uff09\n\n```javascript\nconst \u51fd\u6570\u540d = function(\u53c2\u65701, \u53c2\u65702, ...) {\n  // \u51fd\u6570\u4f53\n};\n```\n\n### \u7bad\u5934\u51fd\u6570\uff08Arrow Function\uff09\n\n```javascript\nconst \u51fd\u6570\u540d = (\u53c2\u65701, \u53c2\u65702, ...) => {\n  // \u51fd\u6570\u4f53\n  return \u8fd4\u56de\u503c;\n};\n\n// \u9690\u5f0f\u8fd4\u56de\uff08\u5355\u8868\u8fbe\u5f0f\u65f6\u7701\u7565 {} \u548c return\uff09\nconst \u51fd\u6570\u540d = (\u53c2\u65701, \u53c2\u65702) => \u8868\u8fbe\u5f0f;\n\n// \u5355\u53c2\u6570\u65f6\u7701\u7565 ()\nconst \u51fd\u6570\u540d = \u53c2\u6570 => \u8868\u8fbe\u5f0f;\n```\n\n### \u7acb\u5373\u6267\u884c\u51fd\u6570\u8868\u8fbe\u5f0f\uff08IIFE\uff09\n\n```javascript\n(function() {\n  // \u51fd\u6570\u4f53\n})();\n\n// \u6216\u4f7f\u7528\u7bad\u5934\u51fd\u6570\n(() => {\n  // \u51fd\u6570\u4f53\n})();\n```\n\n## Examples\n\n### \u57fa\u7840\uff1a\u4e09\u79cd\u51fd\u6570\u5b9a\u4e49\u65b9\u5f0f\u5bf9\u6bd4\n\n```javascript\n// 1. \u51fd\u6570\u58f0\u660e \u2014 \u4f1a\u88ab\u63d0\u5347\uff08hoisted\uff09\nfunction greet(name) {\n  return `Hello, ${name}!`;\n}\n\n// 2. \u51fd\u6570\u8868\u8fbe\u5f0f \u2014 \u4e0d\u4f1a\u88ab\u63d0\u5347\nconst greetExpr = function(name) {\n  return `Hello, ${name}!`;\n};\n\n// 3. \u7bad\u5934\u51fd\u6570 \u2014 \u7b80\u6d01\u8bed\u6cd5\uff0c\u65e0\u81ea\u5df1\u7684 this\nconst greetArrow = (name) => `Hello, ${name}!`;\n\nconsole.log(greet('Alice'));      // \"Hello, Alice!\"\nconsole.log(greetExpr('Bob'));    // \"Hello, Bob!\"\nconsole.log(greetArrow('Charlie')); // \"Hello, Charlie!\"\n```\n\n### \u53c2\u6570\u5904\u7406\uff1a\u9ed8\u8ba4\u503c\u4e0e\u5269\u4f59\u53c2\u6570\n\n```javascript\n// \u9ed8\u8ba4\u53c2\u6570 \u2014 \u5f53\u53c2\u6570\u4e3a undefined \u65f6\u751f\u6548\nfunction createUser(name, role = 'guest', isActive = true) {\n  return { name, role, isActive };\n}\n\nconsole.log(createUser('Alice'));           // { name: 'Alice', role: 'guest', isActive: true }\nconsole.log(createUser('Bob', 'admin'));    // { name: 'Bob', role: 'admin', isActive: true }\n\n// \u5269\u4f59\u53c2\u6570 \u2014 \u6536\u96c6\u6240\u6709\u5269\u4f59\u53c2\u6570\u4e3a\u6570\u7ec4\nfunction sum(prefix, ...numbers) {\n  const total = numbers.reduce((acc, n) => acc + n, 0);\n  return `${prefix}: ${total}`;\n}\n\nconsole.log(sum('Total', 1, 2, 3, 4, 5)); // \"Total: 15\"\n```\n\n### \u56de\u8c03\u51fd\u6570\u4e0e\u9ad8\u9636\u51fd\u6570\n\n```javascript\n// \u51fd\u6570\u4f5c\u4e3a\u53c2\u6570\u4f20\u9012\uff08\u56de\u8c03\uff09\nfunction processArray(arr, callback) {\n  const result = [];\n  for (let i = 0; i < arr.length; i++) {\n    result.push(callback(arr[i], i));\n  }\n  return result;\n}\n\nconst numbers = [1, 2, 3, 4, 5];\n\n// \u4f20\u5165\u4e0d\u540c\u7684\u56de\u8c03\u5b9e\u73b0\u4e0d\u540c\u7684\u884c\u4e3a\nconst doubled = processArray(numbers, n => n * 2);\nconsole.log(doubled); // [2, 4, 6, 8, 10]\n\nconst descriptions = processArray(numbers, (n, idx) => `\u7d22\u5f15 ${idx} \u7684\u503c\u662f ${n}`);\nconsole.log(descriptions);\n// [\"\u7d22\u5f15 0 \u7684\u503c\u662f 1\", \"\u7d22\u5f15 1 \u7684\u503c\u662f 2\", ...]\n\n// \u51fd\u6570\u4f5c\u4e3a\u8fd4\u56de\u503c\uff08\u95ed\u5305\uff09\nfunction createCounter(start = 0) {\n  let count = start;\n  return function() {\n    count += 1;\n    return count;\n  };\n}\n\nconst counter = createCounter(10);\nconsole.log(counter()); // 11\nconsole.log(counter()); // 12\nconsole.log(counter()); // 13\n```\n\n### IIFE \u4e0e\u6a21\u5757\u6a21\u5f0f\n\n```javascript\n// IIFE \u521b\u5efa\u79c1\u6709\u4f5c\u7528\u57df\uff0c\u907f\u514d\u5168\u5c40\u6c61\u67d3\nconst calculator = (function() {\n  // \u79c1\u6709\u53d8\u91cf \u2014 \u5916\u90e8\u65e0\u6cd5\u76f4\u63a5\u8bbf\u95ee\n  let result = 0;\n\n  return {\n    // \u516c\u5f00\u65b9\u6cd5\n    add(n) {\n      result += n;\n      return this;\n    },\n    subtract(n) {\n      result -= n;\n      return this;\n    },\n    getResult() {\n      return result;\n    },\n    reset() {\n      result = 0;\n      return this;\n    }\n  };\n})();\n\ncalculator.add(10).subtract(3).add(5);\nconsole.log(calculator.getResult()); // 12\nconsole.log(calculator.result);      // undefined \u2014 \u65e0\u6cd5\u76f4\u63a5\u8bbf\u95ee\u79c1\u6709\u53d8\u91cf\n```\n\n## Key Points\n\n- **\u51fd\u6570\u58f0\u660e\u4f1a\u88ab\u63d0\u5347\uff08hoisted\uff09**\uff1a\u6574\u4e2a\u51fd\u6570\u58f0\u660e\uff08\u5305\u62ec\u51fd\u6570\u4f53\uff09\u4f1a\u88ab\u63d0\u5347\u5230\u4f5c\u7528\u57df\u9876\u90e8\uff0c\u56e0\u6b64\u53ef\u4ee5\u5728\u58f0\u660e\u4e4b\u524d\u8c03\u7528\u3002\u51fd\u6570\u8868\u8fbe\u5f0f\u548c\u7bad\u5934\u51fd\u6570\u5219\u4e0d\u4f1a\u3002\n- **\u7bad\u5934\u51fd\u6570\u6ca1\u6709\u81ea\u5df1\u7684 `this`**\uff1a\u7bad\u5934\u51fd\u6570\u4ece\u5305\u56f4\u5b83\u7684\u4f5c\u7528\u57df\u7ee7\u627f `this`\uff0c\u4e0d\u80fd\u7528 `call`\u3001`apply` \u6216 `bind` \u6539\u53d8\u3002\u8fd9\u4f7f\u5f97\u5b83\u4eec\u5728\u56de\u8c03\u4e2d\u7279\u522b\u6709\u7528\uff0c\u4f46\u4e0d\u9002\u5408\u4f5c\u4e3a\u5bf9\u8c61\u65b9\u6cd5\u3002\n- **`return` \u8bed\u53e5**\uff1a\u5982\u679c\u4e0d\u5199 `return`\uff0c\u51fd\u6570\u9ed8\u8ba4\u8fd4\u56de `undefined`\u3002\u7bad\u5934\u51fd\u6570\u4f7f\u7528 `=> \u8868\u8fbe\u5f0f` \u8bed\u6cd5\u65f6\uff0c\u8868\u8fbe\u5f0f\u7684\u7ed3\u679c\u4f1a\u81ea\u52a8\u8fd4\u56de\uff08\u9690\u5f0f\u8fd4\u56de\uff09\u3002\n- **\u53c2\u6570\u6309\u503c\u4f20\u9012**\uff1a\u57fa\u672c\u7c7b\u578b\u6309\u503c\u4f20\u9012\uff0c\u5bf9\u8c61\u6309\u5f15\u7528\u4f20\u9012\uff08\u4f46\u5f15\u7528\u672c\u8eab\u662f\u6309\u503c\u4f20\u9012\u7684\uff09\u3002\u51fd\u6570\u5185\u90e8\u4fee\u6539\u5bf9\u8c61\u5c5e\u6027\u4f1a\u5f71\u54cd\u5916\u90e8\u3002\n- **`arguments` \u5bf9\u8c61**\uff1a\u4f20\u7edf\u51fd\u6570\uff08\u975e\u7bad\u5934\uff09\u5185\u90e8\u6709 `arguments` \u7c7b\u6570\u7ec4\u5bf9\u8c61\uff0c\u5305\u542b\u6240\u6709\u4f20\u5165\u53c2\u6570\u3002\u63a8\u8350\u7528\u5269\u4f59\u53c2\u6570\uff08`...rest`\uff09\u66ff\u4ee3\u3002\n- **\u51fd\u6570\u662f\u4e00\u7b49\u516c\u6c11**\uff1a\u53ef\u4ee5\u8d4b\u503c\u7ed9\u53d8\u91cf\u3001\u5b58\u5165\u6570\u7ec4/\u5bf9\u8c61\u3001\u4f5c\u4e3a\u53c2\u6570\u4f20\u5165\u3001\u4f5c\u4e3a\u8fd4\u56de\u503c\u8fd4\u56de\uff0c\u8fd9\u6784\u6210\u4e86\u9ad8\u9636\u51fd\u6570\u548c\u51fd\u6570\u5f0f\u7f16\u7a0b\u7684\u57fa\u7840\u3002\n\n## Common Mistakes\n\n- **\u628a\u7bad\u5934\u51fd\u6570\u5f53\u4f5c\u5bf9\u8c61\u65b9\u6cd5**\uff1a\u7bad\u5934\u51fd\u6570\u4e0d\u7ed1\u5b9a `this`\uff0c\u7528\u4f5c\u5bf9\u8c61\u65b9\u6cd5\u65f6 `this` \u6307\u5411\u5916\u90e8\u4f5c\u7528\u57df\uff08\u901a\u5e38\u662f `window` \u6216 `undefined` \u4e25\u683c\u6a21\u5f0f\u4e0b\uff09\uff0c\u800c\u975e\u5bf9\u8c61\u672c\u8eab\u3002\n  ```javascript\n  const obj = {\n    value: 42,\n    // \u274c \u9519\u8bef\uff1a\u7bad\u5934\u51fd\u6570\u7684 this \u6307\u5411\u5916\u90e8\uff0c\u4e0d\u662f obj\n    getValue: () => this.value,\n    // \u2705 \u6b63\u786e\uff1a\u4f7f\u7528\u4f20\u7edf\u51fd\u6570\u8868\u8fbe\u5f0f\n    getValueCorrect() { return this.value; }\n  };\n  ```\n\n- **\u5fd8\u8bb0 `return` \u5bfc\u81f4\u51fd\u6570\u8fd4\u56de `undefined`**\uff1a\u7bad\u5934\u51fd\u6570\u4f7f\u7528 `{}` \u65f6\u5fc5\u987b\u5199 `return`\u3002\n  ```javascript\n  // \u274c \u9519\u8bef\uff1a\u82b1\u62ec\u53f7 {} \u4e0d\u4f1a\u81ea\u52a8\u8fd4\u56de\n  const double = (n) => { n * 2 };\n  console.log(double(5)); // undefined\n\n  // \u2705 \u6b63\u786e\uff1a\u7701\u7565\u82b1\u62ec\u53f7\u4ee5\u9690\u5f0f\u8fd4\u56de\n  const doubleFixed = (n) => n * 2;\n  console.log(doubleFixed(5)); // 10\n  ```\n\n- **\u5728\u5faa\u73af\u4e2d\u521b\u5efa\u56de\u8c03\u65f6\u6355\u83b7\u4e86\u76f8\u540c\u7684\u53d8\u91cf**\uff1a\u7528 `var` \u58f0\u660e\u7684\u53d8\u91cf\u5728\u5faa\u73af\u4e2d\u53ea\u6709\u4e00\u4efd\uff0c\u5bfc\u81f4\u6240\u6709\u56de\u8c03\u5171\u4eab\u540c\u4e00\u53d8\u91cf\u3002\n  ```javascript\n  // \u274c \u9519\u8bef\uff1a\u6240\u6709\u56de\u8c03\u90fd\u8f93\u51fa 3\n  for (var i = 0; i < 3; i++) {\n    setTimeout(() => console.log(i), 100);\n  }\n\n  // \u2705 \u6b63\u786e\uff1a\u7528 let \u521b\u5efa\u6bcf\u6b21\u8fed\u4ee3\u7684\u5757\u7ea7\u4f5c\u7528\u57df\n  for (let i = 0; i < 3; i++) {\n    setTimeout(() => console.log(i), 100); // 0, 1, 2\n  }\n  ```\n\n## Related Concepts\n\n- [\u7bad\u5934\u51fd\u6570](../syntax/arrow_function.md) \u2014 \u7bad\u5934\u51fd\u6570\u7684\u8be6\u7ec6\u8bed\u6cd5\u548c `this` \u7ed1\u5b9a\u89c4\u5219\n- [\u9ed8\u8ba4\u53c2\u6570](../syntax/default_params.md) \u2014 \u53c2\u6570\u9ed8\u8ba4\u503c\u7684\u5de5\u4f5c\u539f\u7406\n- [\u53d8\u91cf](../topics/variables.md) \u2014 `var`\u3001`let`\u3001`const` \u4e0e\u51fd\u6570\u4f5c\u7528\u57df\u7684\u5173\u7cfb\n- [\u95ed\u5305](../patterns/closure.md) \u2014 \u51fd\u6570\u4e0e\u5176\u8bcd\u6cd5\u73af\u5883\u7684\u7ec4\u5408\u6a21\u5f0f\n- [\u5f02\u6b65\u51fd\u6570](../topics/async.md) \u2014 Promise\u3001async/await \u4e0e\u56de\u8c03\u7684\u5173\u7cfb\n\n## Citations\n\n- [MDN: Functions guide](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Guide/Functions)\n- [MDN: Function declaration](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Statements/function)\n- [MDN: Arrow functions](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Functions/Arrow_functions)\n- [MDN: Default parameters](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Functions/Default_parameters)\n- [MDN: Rest parameters](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Functions/rest_parameters)\n- [MDN: IIFE](https://developer.mozilla.org/en-US/docs/Glossary/IIFE)", "topics/objects_and_classes": "JavaScript \u4e2d\u7684\u5bf9\u8c61\uff08Object\uff09\u662f\u952e\u503c\u5bf9\u96c6\u5408\uff0c\u662f\u8fd9\u95e8\u8bed\u8a00\u6700\u57fa\u672c\u7684\u6570\u636e\u7ed3\u6784\u3002\u51e0\u4e4e\u6240\u6709\u503c\u5728 JavaScript \u4e2d\u90fd\u53ef\u4ee5\u8868\u73b0\u4e3a\u5bf9\u8c61\u2014\u2014\u6570\u7ec4\u3001\u51fd\u6570\u3001\u65e5\u671f\u7b49\u5e95\u5c42\u90fd\u57fa\u4e8e\u5bf9\u8c61\u5b9e\u73b0\u3002\u7c7b\uff08Class\uff09\u662f ES2015\uff08ES6\uff09\u5f15\u5165\u7684\u8bed\u6cd5\u7cd6\uff0c\u5e95\u5c42\u4ecd\u57fa\u4e8e\u539f\u578b\u94fe\uff0c\u4f46\u63d0\u4f9b\u4e86\u66f4\u6e05\u6670\u3001\u66f4\u63a5\u8fd1\u4f20\u7edf OOP \u8bed\u8a00\u7684\u58f0\u660e\u65b9\u5f0f\u3002\n\n\u7406\u89e3\u5bf9\u8c61\u4e0e\u7c7b\u7684\u5173\u952e\u5728\u4e8e\u638c\u63e1\u4e09\u4e2a\u5c42\u6b21\uff1a**\u5bf9\u8c61\u5b57\u9762\u91cf**\uff08\u5feb\u901f\u521b\u5efa\u5355\u4f8b\uff09\u3001**\u6784\u9020\u51fd\u6570\u4e0e\u539f\u578b**\uff08\u5b9e\u73b0\u590d\u7528\uff09\u3001**class \u8bed\u6cd5**\uff08\u66f4\u4f18\u96c5\u7684\u5c01\u88c5\u4e0e\u7ee7\u627f\uff09\u3002\n\n## Syntax\n\n### \u5bf9\u8c61\u5b57\u9762\u91cf\n\n```javascript\n// \u57fa\u672c\u5bf9\u8c61\u5b57\u9762\u91cf\nconst obj = {\n  key: 'value',\n  method() { return this.key; }\n};\n\n// \u52a8\u6001\u5c5e\u6027\u540d\uff08Computed property names\uff09\nconst dynamicKey = 'score';\nconst player = {\n  name: 'Alice',\n  [dynamicKey]: 95       // \u5c5e\u6027\u540d\u7531\u53d8\u91cf dynamicKey \u7684\u503c\u51b3\u5b9a\n};\n\n// \u7b80\u5199\u5c5e\u6027\uff08Shorthand property names\uff09\nconst x = 10, y = 20;\nconst point = { x, y };   // \u7b49\u4ef7\u4e8e { x: x, y: y }\n```\n\n### \u7c7b\u8bed\u6cd5\uff08ES2015+\uff09\n\n```javascript\nclass ClassName {\n  // \u79c1\u6709\u5b57\u6bb5\uff08ES2022 \u6b63\u5f0f\u652f\u6301\uff09\n  #privateField = 'secret';\n\n  constructor(param) {\n    this.publicField = param;\n  }\n\n  // \u5b9e\u4f8b\u65b9\u6cd5\n  methodName() { /* ... */ }\n\n  // \u9759\u6001\u65b9\u6cd5\uff08\u6302\u8f7d\u5728\u7c7b\u672c\u8eab\u4e0a\uff0c\u800c\u975e\u5b9e\u4f8b\uff09\n  static staticMethod() { /* ... */ }\n\n  // Getter / Setter\n  get prop() { return this.#privateField; }\n  set prop(val) { this.#privateField = val; }\n}\n```\n\n## Examples\n\n### 1\ufe0f\u20e3 \u5bf9\u8c61\u5b57\u9762\u91cf\u7684\u5e38\u89c1\u7528\u6cd5\n\n```javascript\n// \u8868\u793a\u4e00\u4e2a\u7528\u6237\u5b9e\u4f53\nconst user = {\n  id: 1001,\n  name: '\u5f20\u4e09',\n  role: 'admin',\n  // \u65b9\u6cd5\u7b80\u5199\n  greet() {\n    console.log(`\u4f60\u597d\uff0c\u6211\u662f ${this.name}`);\n  },\n  // Getter\n  get isAdmin() {\n    return this.role === 'admin';\n  }\n};\n\nuser.greet();      // \u8f93\u51fa: \u4f60\u597d\uff0c\u6211\u662f \u5f20\u4e09\nconsole.log(user.isAdmin); // true\n```\n\n### 2\ufe0f\u20e3 \u4f7f\u7528 class \u5b9e\u73b0\u7c7b\u4e0e\u7ee7\u627f\n\n```javascript\nclass Animal {\n  constructor(name) {\n    this.name = name;\n  }\n\n  speak() {\n    console.log(`${this.name} \u53d1\u51fa\u58f0\u97f3`);\n  }\n\n  static classify() {\n    return '\u52a8\u7269\u754c';\n  }\n}\n\nclass Dog extends Animal {\n  constructor(name, breed) {\n    super(name);          // \u5fc5\u987b\u5148\u8c03\u7528 super() \u624d\u80fd\u4f7f\u7528 this\n    this.breed = breed;\n  }\n\n  // \u8986\u5199\u7236\u7c7b\u65b9\u6cd5\n  speak() {\n    console.log(`${this.name}\uff08${this.breed}\uff09\u6c6a\u6c6a\u53eb`);\n  }\n\n  fetch() {\n    console.log(`${this.name} \u53bb\u6361\u7403\u4e86`);\n  }\n}\n\nconst d = new Dog('\u65fa\u8d22', '\u91d1\u6bdb');\nd.speak();      // \u8f93\u51fa: \u65fa\u8d22\uff08\u91d1\u6bdb\uff09\u6c6a\u6c6a\u53eb\nd.fetch();      // \u8f93\u51fa: \u65fa\u8d22 \u53bb\u6361\u7403\u4e86\nconsole.log(Dog.classify()); // \u8f93\u51fa: \u52a8\u7269\u754c\uff08\u7ee7\u627f\u9759\u6001\u65b9\u6cd5\uff09\n```\n\n### 3\ufe0f\u20e3 \u4f7f\u7528 Object.create \u548c\u539f\u578b\u94fe\uff08\u65e0 class \u8bed\u6cd5\uff09\n\n```javascript\n// \u4f20\u7edf\u539f\u578b\u7ee7\u627f\u65b9\u5f0f\uff08\u4ecd\u88ab\u5927\u91cf\u751f\u4ea7\u4ee3\u7801\u4f7f\u7528\uff09\nconst animalProto = {\n  init(name) {\n    this.name = name;\n    return this;\n  },\n  speak() {\n    console.log(`${this.name} \u53d1\u51fa\u58f0\u97f3`);\n  }\n};\n\nconst dogProto = Object.create(animalProto);\ndogProto.bark = function() {\n  console.log(`${this.name} \u6c6a\u6c6a\uff01`);\n};\n\nconst myDog = Object.create(dogProto).init('\u5c0f\u9ed1');\nmyDog.bark();      // \u8f93\u51fa: \u5c0f\u9ed1 \u6c6a\u6c6a\uff01\nmyDog.speak();     // \u8f93\u51fa: \u5c0f\u9ed1 \u53d1\u51fa\u58f0\u97f3\uff08\u6765\u81ea\u539f\u578b\u94fe\uff09\n```\n\n### 4\ufe0f\u20e3 \u79c1\u6709\u5b57\u6bb5\u4e0e Getter/Setter\n\n```javascript\nclass BankAccount {\n  #balance = 0;       // \u79c1\u6709\u5b57\u6bb5\uff0c\u5916\u90e8\u4e0d\u53ef\u76f4\u63a5\u8bbf\u95ee\n\n  constructor(owner) {\n    this.owner = owner;\n  }\n\n  deposit(amount) {\n    if (amount <= 0) throw new Error('\u91d1\u989d\u5fc5\u987b\u4e3a\u6b63\u6570');\n    this.#balance += amount;\n  }\n\n  withdraw(amount) {\n    if (amount > this.#balance) throw new Error('\u4f59\u989d\u4e0d\u8db3');\n    this.#balance -= amount;\n  }\n\n  // \u53ea\u8bfb\u66b4\u9732\u4f59\u989d\n  get balance() {\n    return this.#balance;\n  }\n}\n\nconst account = new BankAccount('Alice');\naccount.deposit(1000);\naccount.withdraw(300);\nconsole.log(account.balance); // 700\n// console.log(account.#balance); // \u274c SyntaxError: \u79c1\u6709\u5b57\u6bb5\u4e0d\u53ef\u5728\u7c7b\u5916\u8bbf\u95ee\n```\n\n## Key Points\n\n- **\u5bf9\u8c61\u662f\u5f15\u7528\u7c7b\u578b**\uff1a\u6bd4\u8f83\u4e24\u4e2a\u5bf9\u8c61\u65f6 `==` \u548c `===` \u90fd\u5224\u65ad\u5f15\u7528\u662f\u5426\u76f8\u540c\uff0c\u800c\u975e\u7ed3\u6784\u662f\u5426\u76f8\u7b49\u3002`{a:1} === {a:1}` \u7ed3\u679c\u4e3a `false`\u3002\n- **class \u672c\u8d28\u662f\u51fd\u6570**\uff1a`typeof MyClass` \u8fd4\u56de `\"function\"`\uff0cclass \u8bed\u6cd5\u53ea\u662f\u6784\u9020\u51fd\u6570\u52a0\u539f\u578b\u65b9\u6cd5\u7684\u8bed\u6cd5\u7cd6\u3002\n- **\u5fc5\u987b\u5148\u8c03\u7528 super()**\uff1a\u5728 `extends` \u5b50\u7c7b\u7684 `constructor` \u4e2d\uff0c\u8bbf\u95ee `this` \u4e4b\u524d\u5fc5\u987b\u5148\u8c03\u7528 `super()`\uff0c\u5426\u5219\u62a5 `ReferenceError`\u3002\n- **\u65b9\u6cd5\u5728 prototype \u4e0a\uff0c\u5c5e\u6027\u5728\u5b9e\u4f8b\u4e0a**\uff1a\u7c7b\u4e2d\u58f0\u660e\u7684\u65b9\u6cd5\u5b58\u50a8\u5728 `ClassName.prototype` \u4e0a\u5171\u4eab\u7ed9\u6240\u6709\u5b9e\u4f8b\uff1b\u5b57\u6bb5\uff08constructor \u4e2d\u8d4b\u503c\u7684\u5c5e\u6027\uff09\u5219\u5c5e\u4e8e\u6bcf\u4e2a\u5b9e\u4f8b\u81ea\u8eab\u3002\n- **\u79c1\u6709\u5b57\u6bb5**\uff1a`#` \u524d\u7f00\u5b57\u6bb5\uff08ES2022 \u6b63\u5f0f\u652f\u6301\uff09\u662f**\u771f\u6b63\u7684\u79c1\u6709**\uff0c\u5728\u524d\u7aef\u8fd0\u884c\u65f6\u4e0d\u901a\u8fc7\u904d\u5386\u53ef\u83b7\u53d6\uff0c\u4e0e TypeScript `private` \u5173\u952e\u5b57\u4e0d\u540c\uff08\u540e\u8005\u4ec5\u7f16\u8bd1\u65f6\u68c0\u67e5\uff09\u3002\n- **\u9759\u6001\u65b9\u6cd5\u4e0d\u53ef\u901a\u8fc7\u5b9e\u4f8b\u8c03\u7528**\uff1a`MyClass.staticMethod()` \u6b63\u786e\uff1b`instance.staticMethod()` \u4f1a\u629b\u51fa `TypeError`\u3002\n\n## Common Mistakes\n\n- **\u5fd8\u8bb0 `new` \u8c03\u7528\u6784\u9020\u51fd\u6570/\u7c7b**\uff1a`const p = Person('Alice')` \u4e0d\u4f1a\u62a5\u9519\u4f46 `this` \u6307\u5411\u5168\u5c40\u5bf9\u8c61\uff08\u4e25\u683c\u6a21\u5f0f\u4e0b\u4e3a `undefined`\uff09\uff0c\u5bfc\u81f4\u5c5e\u6027\u6cc4\u6f0f\u3002\u5e94\u59cb\u7ec8\u4f7f\u7528 `new Person('Alice')`\u3002\n  ```javascript\n  // \u9519\u8bef\n  const p1 = Person('Alice');  // \u6ca1\u6709 new\uff0cthis \u6307\u5411 window/global\n  // \u6b63\u786e\n  const p2 = new Person('Alice');\n  ```\n\n- **\u7bad\u5934\u51fd\u6570\u4e0e `this` \u7684\u8bef\u89e3**\uff1a\u5728\u7c7b\u4e2d\u4f7f\u7528\u7bad\u5934\u51fd\u6570\u5b9a\u4e49\u65b9\u6cd5\u65f6\uff0c`this` \u4f1a**\u8bcd\u6cd5\u7ed1\u5b9a**\u5230\u5b9e\u4f8b\uff0c\u800c\u975e\u52a8\u6001\u7ed1\u5b9a\u3002\u8fd9\u5728\u4e8b\u4ef6\u76d1\u542c\u4e2d\u5f88\u65b9\u4fbf\uff0c\u4f46\u610f\u5473\u7740\u8be5\u65b9\u6cd5\u4e0d\u5728 prototype \u4e0a\uff0c\u6bcf\u4e2a\u5b9e\u4f8b\u90fd\u4f1a\u72ec\u7acb\u521b\u5efa\u4e00\u4efd\u3002\n  ```javascript\n  class Counter {\n    count = 0;\n    // \u7bad\u5934\u51fd\u6570\u65b9\u6cd5 \u2014 \u6bcf\u4e2a\u5b9e\u4f8b\u81ea\u5df1\u6709\u4e00\u4efd\uff0c\u4e0d\u5728 prototype \u4e0a\n    increment = () => { this.count++; };\n  }\n  ```\n\n- **\u76f4\u63a5\u4fee\u6539\u539f\u578b\u5bfc\u81f4\u6240\u6709\u5b9e\u4f8b\u53d7\u5f71\u54cd**\uff1a\u8bef\u4fee\u6539 `Array.prototype` \u6216 `Object.prototype` \u4f1a\u5f71\u54cd\u5168\u5c40\u6240\u6709\u5bf9\u8c61\uff0c\u7edd\u5bf9\u907f\u514d\u5728\u751f\u4ea7\u4ee3\u7801\u4e2d\u8fd9\u6837\u505a\u3002\n  ```javascript\n  // \u274c \u6781\u5ea6\u5371\u9669\uff1a\u4f1a\u6c61\u67d3\u6240\u6709\u6570\u7ec4\u5b9e\u4f8b\n  Array.prototype.customMethod = function() { return this.length; };\n  ```\n\n## Related Concepts\n\n- [Class \u8bed\u6cd5](../syntax/class.md) \u2014 \u8be6\u7ec6\u4e86\u89e3 class \u7684 constructor\u3001extends\u3001super\u3001static\u3001\u79c1\u6709\u5b57\u6bb5\u7b49\u5173\u952e\u8bcd\u3002\n- [\u539f\u578b\u94fe\u6a21\u5f0f](../patterns/prototype_chain.md) \u2014 \u6df1\u5165\u539f\u578b\u94fe\u673a\u5236\uff1a`__proto__`\u3001`Object.create`\u3001`hasOwnProperty` \u4e0e `instanceof`\u3002\n- [\u89e3\u6784\u8d4b\u503c](../syntax/destructuring.md) \u2014 \u4ece\u5bf9\u8c61\u4e2d\u5feb\u901f\u63d0\u53d6\u5c5e\u6027\u503c\u3002\n- [\u5c55\u5f00\u4e0e\u5269\u4f59\u8bed\u6cd5](../syntax/spread_rest.md) \u2014 \u4f7f\u7528 `...` \u6d45\u62f7\u8d1d\u5bf9\u8c61\u6216\u5408\u5e76\u591a\u4e2a\u5bf9\u8c61\u3002\n- [\u53d8\u91cf\u58f0\u660e](../topics/variables.md) \u2014 `let`/`const`/`var` \u7684\u4f5c\u7528\u57df\u89c4\u5219\uff0c\u7406\u89e3\u5bf9\u8c61\u4e0e\u539f\u59cb\u7c7b\u578b\u7684\u533a\u522b\u3002\n\n## Citations\n\n- [MDN: Working with Objects](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Guide/Working_with_objects)\n- [MDN: Classes](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Classes)\n- [MDN: Private class fields](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Classes/Private_class_fields)\n- [MDN: Inheritance and the prototype chain](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Inheritance_and_the_prototype_chain)", "topics/variables": "## \u6982\u8ff0\n\n**\u53d8\u91cf\uff08Variable\uff09** \u662f JavaScript \u4e2d\u5b58\u50a8\u6570\u636e\u7684\u547d\u540d\u5bb9\u5668\u3002JavaScript \u63d0\u4f9b\u4e86\u4e09\u79cd\u58f0\u660e\u53d8\u91cf\u7684\u5173\u952e\u5b57\uff1a`var`\uff08ES1 \u8d77\uff09\u3001`let` \u548c `const`\uff08ES2015/ES6 \u8d77\uff09\u3002\u4e09\u8005\u7684\u6838\u5fc3\u533a\u522b\u5728\u4e8e**\u4f5c\u7528\u57df\uff08scope\uff09**\u3001**\u63d0\u5347\uff08hoisting\uff09** \u884c\u4e3a\u548c**\u53ef\u5426\u91cd\u65b0\u8d4b\u503c**\u3002\u7406\u89e3\u8fd9\u4e9b\u5dee\u5f02\u662f\u5199\u51fa\u53ef\u9884\u6d4b\u3001\u65e0 Bug \u4ee3\u7801\u7684\u57fa\u7840\u2014\u2014\u73b0\u4ee3 JavaScript \u5f00\u53d1\u4e2d\u5e94\u4f18\u5148\u4f7f\u7528 `const`\uff0c\u4ec5\u5728\u9700\u8981\u91cd\u65b0\u8d4b\u503c\u65f6\u4f7f\u7528 `let`\uff0c\u5e76\u907f\u514d\u4f7f\u7528 `var`\u3002\n\n## \u58f0\u660e\u8bed\u6cd5\n\n```javascript\n// \u57fa\u672c\u58f0\u660e\u5f62\u5f0f\nvar    name = value;   // \u51fd\u6570\u4f5c\u7528\u57df\uff0c\u53ef\u91cd\u65b0\u58f0\u660e\uff0c\u53ef\u91cd\u65b0\u8d4b\u503c\nlet    name = value;   // \u5757\u4f5c\u7528\u57df\uff0c\u4e0d\u53ef\u91cd\u65b0\u58f0\u660e\uff0c\u53ef\u91cd\u65b0\u8d4b\u503c\nconst  name = value;   // \u5757\u4f5c\u7528\u57df\uff0c\u4e0d\u53ef\u91cd\u65b0\u58f0\u660e\uff0c\u4e0d\u53ef\u91cd\u65b0\u8d4b\u503c\uff08\u5fc5\u987b\u521d\u59cb\u5316\uff09\n\n// \u540c\u65f6\u58f0\u660e\u591a\u4e2a\u53d8\u91cf\uff08\u9017\u53f7\u5206\u9694\uff09\nlet a = 1, b = 2, c;\n\n// \u53ea\u58f0\u660e\u4e0d\u8d4b\u503c\uff08const \u4e0d\u5141\u8bb8\uff09\nlet x;        // \u2705 x === undefined\nvar y;        // \u2705 y === undefined\n// const z;   // \u274c SyntaxError: Missing initializer\n```\n\n## \u793a\u4f8b\n\n### \u793a\u4f8b 1\uff1a`var` vs `let` \u7684\u4f5c\u7528\u57df\u5dee\u5f02\n\n```javascript\nfunction scopeDemo() {\n  if (true) {\n    var a = '\u6211\u662f var';    // var \u65e0\u89c6\u5757\n    let b = '\u6211\u662f let';    // let \u4ec5\u5728\u5757\u5185\n  }\n  console.log(a);  // \u2705 \"\u6211\u662f var\" \u2014 var \u7a7f\u900f\u4e86 if \u5757\n  console.log(b);  // \u274c ReferenceError: b is not defined\n}\nscopeDemo();\n```\n\n### \u793a\u4f8b 2\uff1a`const` \u4e0d\u80fd\u91cd\u65b0\u7ed1\u5b9a\uff0c\u4f46\u53ef\u4ee5\u4fee\u6539\u5bf9\u8c61\u7684\u5c5e\u6027\n\n```javascript\nconst person = { name: 'Alice', age: 25 };\n\nperson.age = 26;          // \u2705 \u4fee\u6539\u5c5e\u6027\u5141\u8bb8\nconsole.log(person.age);  // 26\n\n// person = { name: 'Bob' };  // \u274c TypeError: Assignment to constant variable\n\nconst arr = [1, 2, 3];\narr.push(4);              // \u2705 \u6570\u7ec4\u65b9\u6cd5\u53ef\u4ee5\u4fee\u6539\u5185\u5bb9\nconsole.log(arr);         // [1, 2, 3, 4]\n\n// arr = [5, 6, 7];       // \u274c \u4e0d\u80fd\u91cd\u65b0\u8d4b\u503c\n```\n\n### \u793a\u4f8b 3\uff1a\u6682\u65f6\u6027\u6b7b\u533a\uff08Temporal Dead Zone, TDZ\uff09\n\n```javascript\nconsole.log(myVar);   // \u2705 undefined \u2014 var \u63d0\u5347\u5e76\u521d\u59cb\u5316\u4e3a undefined\nvar myVar = 10;\n\nconsole.log(myLet);   // \u274c ReferenceError: Cannot access 'myLet' before initialization\nlet myLet = 20;\n\n// TDZ \u533a\u95f4\uff1a\u4ece\u5757\u5f00\u59cb\u5230 let/const \u58f0\u660e\u4f4d\u7f6e\u4e4b\u95f4\u7684\u533a\u57df\n{\n  // TDZ \u5f00\u59cb \u2014 \u6b64\u5904\u8bbf\u95ee name \u4f1a\u62a5\u9519\n  // console.log(name);  // \u274c ReferenceError\n  const name = 'TDZ';\n  // TDZ \u7ed3\u675f \u2014 \u6b64\u5904\u4e4b\u540e\u53ef\u5b89\u5168\u8bbf\u95ee\n  console.log(name);   // \u2705 \"TDZ\"\n}\n```\n\n### \u793a\u4f8b 4\uff1a\u5168\u5c40\u5bf9\u8c61\u5c5e\u6027\u6302\u8f7d\u5dee\u5f02\n\n```javascript\nvar globalVar = '\u6211\u662f var';       // \u6210\u4e3a window \u7684\u5c5e\u6027\nlet globalLet = '\u6211\u662f let';       // \u4e0d\u6210\u4e3a window \u7684\u5c5e\u6027\nconst globalConst = '\u6211\u662f const'; // \u4e0d\u6210\u4e3a window \u7684\u5c5e\u6027\n\nconsole.log(window.globalVar);   // \u2705 \"\u6211\u662f var\"\nconsole.log(window.globalLet);   // \u274c undefined\nconsole.log(window.globalConst); // \u274c undefined\n```\n\n## \u5173\u952e\u8981\u70b9\n\n1. **\u4f18\u5148\u4f7f\u7528 `const`\uff0c\u9700\u8981\u91cd\u65b0\u8d4b\u503c\u65f6\u7528 `let`\uff0c\u907f\u514d\u4f7f\u7528 `var`** \u2014 \u8fd9\u662f\u73b0\u4ee3 JavaScript \u7684\u6700\u4f73\u5b9e\u8df5\uff08lint \u5de5\u5177\u5982 ESLint \u7684\u63a8\u8350\u89c4\u5219\uff09\u3002\n2. **`const` \u9632\u6b62\u7684\u662f\u300c\u91cd\u65b0\u7ed1\u5b9a\u300d\uff0c\u800c\u4e0d\u662f\u300c\u4e0d\u53ef\u53d8\u300d** \u2014 `const obj = {}` \u4ecd\u7136\u53ef\u4ee5\u4fee\u6539 `obj.key`\uff0c\u82e5\u9700\u6df1\u5ea6\u4e0d\u53ef\u53d8\u8bf7\u4f7f\u7528 `Object.freeze()` \u6216 TypeScript \u7684 `readonly`\u3002\n3. **`let` \u548c `const` \u5b58\u5728\u6682\u65f6\u6027\u6b7b\u533a\uff08TDZ\uff09** \u2014 \u5728\u58f0\u660e\u4e4b\u524d\u8bbf\u95ee\u4f1a\u629b\u51fa `ReferenceError`\uff0c\u800c `var` \u4f1a\u88ab\u63d0\u5347\u5e76\u521d\u59cb\u5316\u4e3a `undefined`\u3002\n4. **\u5728\u5168\u5c40\u4f5c\u7528\u57df\u4e0b\uff0c`var` \u58f0\u660e\u7684\u53d8\u91cf\u4f1a\u6210\u4e3a `window`\uff08\u6216 `globalThis`\uff09\u7684\u5c5e\u6027**\uff0c\u800c `let` \u548c `const` \u4e0d\u4f1a\u6c61\u67d3\u5168\u5c40\u5bf9\u8c61\u3002\n5. **\u540c\u4e00\u4f5c\u7528\u57df\u5185 `let` \u548c `const` \u4e0d\u5141\u8bb8\u91cd\u590d\u58f0\u660e**\uff0c\u800c `var` \u5141\u8bb8\u91cd\u590d\u58f0\u660e\uff08\u540e\u8005\u4f1a\u8986\u76d6\u524d\u8005\uff09\u3002\n6. **`switch` \u8bed\u53e5\u7684 `case` \u5757\u4e2d\u58f0\u660e `let`/`const` \u9700\u8981\u663e\u5f0f\u5305\u88f9\u5927\u62ec\u53f7**\uff0c\u5426\u5219\u4f1a\u62a5\u91cd\u590d\u58f0\u660e\u9519\u8bef\u3002\n\n## \u5e38\u89c1\u9519\u8bef\n\n### \u9519\u8bef 1\uff1a\u8bef\u4ee5\u4e3a `const` \u7684\u503c\u5b8c\u5168\u4e0d\u53ef\u53d8\n\n```javascript\nconst data = [1, 2, 3];\ndata[0] = 99;     // \u2705 \u5141\u8bb8 \u2014 const \u53ea\u4fdd\u8bc1\u5f15\u7528\u4e0d\u53d8\nconsole.log(data); // [99, 2, 3]\n\n// \u274c \u6b63\u786e\u7406\u89e3\uff1aconst \u7981\u6b62\u91cd\u65b0\u8d4b\u503c\uff0c\u4e0d\u7981\u6b62\u4fee\u6539\u5185\u5bb9\n```\n\n### \u9519\u8bef 2\uff1a\u5728\u5faa\u73af\u4e2d\u4f7f\u7528 `var` \u5bfc\u81f4\u95ed\u5305\u5171\u4eab\u540c\u4e00\u53d8\u91cf\n\n```javascript\n// \u274c \u53cd\u6a21\u5f0f\nfor (var i = 0; i < 3; i++) {\n  setTimeout(() => console.log(i), 100);\n}\n// \u6253\u5370: 3, 3, 3\uff08\u4e0d\u662f 0, 1, 2\uff09\n\n// \u2705 \u6b63\u786e\u4fee\u590d\uff1a\u4f7f\u7528 let\nfor (let i = 0; i < 3; i++) {\n  setTimeout(() => console.log(i), 100);\n}\n// \u6253\u5370: 0, 1, 2\n```\n\n### \u9519\u8bef 3\uff1a\u610f\u5916\u521b\u5efa\u5168\u5c40\u53d8\u91cf\uff08\u7701\u7565\u58f0\u660e\u5173\u952e\u5b57\uff09\n\n```javascript\nfunction oops() {\n  message = '\u6211\u4e0d\u5c0f\u5fc3\u6210\u4e86\u5168\u5c40\u53d8\u91cf';  // \u274c \u6ca1\u6709 var/let/const\n}\noops();\nconsole.log(window.message);  // \u2705 \"\u6211\u4e0d\u5c0f\u5fc3\u6210\u4e86\u5168\u5c40\u53d8\u91cf\" \u2014 \u6c61\u67d3\u4e86\u5168\u5c40\u7a7a\u95f4\n\n// \u2705 \u6b63\u786e\u65b9\u5f0f\uff1a\u59cb\u7ec8\u4f7f\u7528 let \u6216 const\nfunction correct() {\n  const msg = '\u6211\u662f\u5c40\u90e8\u53d8\u91cf';\n  return msg;\n}\n```\n\n## \u76f8\u5173\u6982\u5ff5\n\n- [let & const \u58f0\u660e](../syntax/let_const.md) \u2014 \u6df1\u5165\u7406\u89e3\u5757\u4f5c\u7528\u57df\u3001\u4e0d\u53ef\u91cd\u590d\u58f0\u660e\u548c TDZ \u89c4\u5219\n- [var \u58f0\u660e](../syntax/var.md) \u2014 \u51fd\u6570\u4f5c\u7528\u57df\u3001\u53d8\u91cf\u63d0\u5347\u548c\u5168\u5c40\u5bf9\u8c61\u6302\u8f7d\n- [\u95ed\u5305](../patterns/closure.md) \u2014 \u53d8\u91cf\u4f5c\u7528\u57df\u4e0e\u51fd\u6570\u7ed3\u5408\u7684\u7ecf\u5178\u6a21\u5f0f\n- [\u6a21\u677f\u5b57\u9762\u91cf](../syntax/template_literals.md) \u2014 \u5728\u5b57\u7b26\u4e32\u4e2d\u5d4c\u5165\u53d8\u91cf\u8868\u8fbe\u5f0f `${variable}`\n- [\u51fd\u6570](../topics/functions.md) \u2014 \u51fd\u6570\u5185\u90e8\u7684\u53d8\u91cf\u4f5c\u7528\u57df\u89c4\u5219\n\n## \u5f15\u7528\n\n- [MDN: JavaScript Variables](https://developer.mozilla.org/en-US/docs/Learn/JavaScript/First_steps/Variables)\n- [MDN: let](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Statements/let)\n- [MDN: const](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Statements/const)\n- [MDN: var](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Statements/var)\n- [MDN: Temporal Dead Zone](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Statements/let#temporal_dead_zone_tdz)"}, "types": ["JS Builtin", "JS Pattern", "JS Syntax", "JS Topic"], "palette": {"BigQuery Dataset": "#8b5cf6", "BigQuery Table": "#3b82f6", "Reference": "#10b981"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
</body>
</html>
